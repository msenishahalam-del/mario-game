    ctx.fillStyle = '#1a3a5a';
    ctx.fillRect(cx-3, cy-1, 2, 3); ctx.fillRect(cx+1, cy-1, 2, 3);
    // Batang
    ctx.fillStyle = '#1a8a2a';
    ctx.fillRect(cx-2, cy+8, 4, 8);
    return;
  }
  if (kind === 'star') {
    // Super Star — bintang kuning kerlap-kerlip
    const cx = x + 14, cy = y + 14;
    const flash = (Date.now() / 80) % 2 < 1;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = flash ? '#FFD700' : '#FFFFFF';
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i * Math.PI / 5) - Math.PI/2;
      const r = i % 2 === 0 ? 14 : 6;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    // Mata
    ctx.fillStyle = '#000';
    ctx.fillRect(-4, -1, 2, 3); ctx.fillRect(2, -1, 2, 3);
    // Smile
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 2, 3, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.restore();
    return;
  }
  // Default mushroom (merah)
  ctx.fillStyle = '#E53935';
  ctx.beginPath(); ctx.arc(x+14, y+12, 14, Math.PI, 0); ctx.fill();
  ctx.fillRect(x, y+12, 28, 6);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+8, y+8, 4, 0, 7); ctx.arc(x+20, y+8, 4, 0, 7); ctx.fill();
  ctx.fillStyle = '#f5deb3'; ctx.fillRect(x+6, y+18, 16, 10);
  ctx.fillStyle = '#000'; ctx.fillRect(x+9, y+21, 3, 3); ctx.fillRect(x+16, y+21, 3, 3);
}

function drawEnemy(e) {
  if (!e.alive) return;
  const x = Math.round(e.x - cameraX), y = Math.round(e.y);
  if (e.frozen > 0) {
    // ❄️ Musuh dalam kiub ais — blink bila nak cair
    const blinking = e.frozen < 60 && (e.frozen % 10 < 5);
    ctx.save();
    if (!blinking) {
      ctx.globalAlpha = 0.55;
      drawEnemyBody(e, x, y);
      ctx.globalAlpha = 1;
      // Kiub ais
      ctx.fillStyle = 'rgba(160,220,255,0.7)';
      ctx.beginPath(); ctx.roundRect(x-4, y-4, e.w+8, e.h+8, 6); ctx.fill();
      ctx.strokeStyle = 'rgba(220,245,255,0.9)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(x-4, y-4, e.w+8, e.h+8, 6); ctx.stroke();
      // Kilauan
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(x, y, 5, 2); ctx.fillRect(x+2, y+4, 2, 5);
    } else {
      drawEnemyBody(e, x, y);
    }
    ctx.restore();
    return;
  }
  drawEnemyBody(e, x, y);
}

function drawEnemyBody(e, x, y) {
  if (e.squished) {
    if (e.kind === 'piranha' || e.kind === 'fish') return;
    ctx.fillStyle = e.kind==='apikecil' ? '#ff6a1e' : e.kind==='monkey' ? '#6e4a2f' : e.kind==='koopa' ? '#2a8f2a' : '#7a4a22';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h-5, e.w/2, 6, 0, 0, 7); ctx.fill();
    return;
  }
  // 👹 Api Kecil (raksasa kecil api)
  if (e.kind === 'apikecil') {
    const cx = x+e.w/2, cy = y+e.h*0.55;
    // nyala di kepala
    ctx.fillStyle = '#ffd21a'; ctx.beginPath(); ctx.moveTo(cx-6, y+8); ctx.quadraticCurveTo(cx-4, y-4, cx, y-8); ctx.quadraticCurveTo(cx+4, y-4, cx+6, y+8); ctx.fill();
    // badan bulat oren
    ctx.fillStyle = '#ff6a1e'; ctx.beginPath(); ctx.arc(cx, cy, e.w*0.42, 0, 7); ctx.fill();
    ctx.fillStyle = '#ffb020'; ctx.beginPath(); ctx.arc(cx, cy+4, e.w*0.24, 0, 7); ctx.fill();
    // mata marah
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx-5, cy-2, 3.5, 0, 7); ctx.arc(cx+5, cy-2, 3.5, 0, 7); ctx.fill();
    ctx.fillStyle = '#3a1000'; ctx.beginPath(); ctx.arc(cx-5, cy-1, 1.8, 0, 7); ctx.arc(cx+5, cy-1, 1.8, 0, 7); ctx.fill();
    ctx.strokeStyle = '#7a2000'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(cx-8,cy-6); ctx.lineTo(cx-2,cy-4); ctx.moveTo(cx+8,cy-6); ctx.lineTo(cx+2,cy-4); ctx.stroke();
    // kaki
    ctx.fillStyle = '#c23a0e'; const fo = e.animF===0?2:-2;
    ctx.fillRect(cx-8+fo, y+e.h-5, 6, 5); ctx.fillRect(cx+2-fo, y+e.h-5, 6, 5);
    return;
  }
  // 🐟 Ikan melompat dari pipe
  if (e.kind === 'fish') {
    if (e.phase === 'hidden') return;
    const cx = x+e.w/2, cy = y+e.h*0.4;
    const d = e.dir < 0 ? -1 : 1;
    // ekor
    ctx.fillStyle = '#1f9ab0'; ctx.beginPath(); ctx.moveTo(cx-d*10, cy); ctx.lineTo(cx-d*20, cy-8); ctx.lineTo(cx-d*20, cy+8); ctx.fill();
    // badan
    ctx.fillStyle = '#2fb8d0'; ctx.beginPath(); ctx.ellipse(cx, cy, 13, 9, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#8fe3d6'; ctx.beginPath(); ctx.ellipse(cx, cy+3, 8, 4, 0, 0, 7); ctx.fill();
    // sirip atas
    ctx.fillStyle = '#1f9ab0'; ctx.beginPath(); ctx.moveTo(cx-3, cy-8); ctx.lineTo(cx+3, cy-14); ctx.lineTo(cx+7, cy-8); ctx.fill();
    // mata + mulut
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx+d*6, cy-2, 3, 0, 7); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(cx+d*7, cy-2, 1.6, 0, 7); ctx.fill();
    ctx.strokeStyle = '#0d5a6a'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(cx+d*8, cy+3, 3, 0, Math.PI); ctx.stroke();
    return;
  }
  // 🐒 Monyet (baling pisang)
  if (e.kind === 'monkey') {
    const cx = x+e.w/2, cy = y+e.h*0.55, d = e.dir<0?-1:1;
    // ekor
    ctx.strokeStyle = '#5a3416'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(cx-d*10, cy+4); ctx.quadraticCurveTo(cx-d*20, cy, cx-d*16, cy-8); ctx.stroke();
    // badan
    ctx.fillStyle = '#6e4a2f'; ctx.beginPath(); ctx.ellipse(cx, cy+2, e.w*0.4, e.h*0.42, 0, 0, 7); ctx.fill();
    // muka
    ctx.fillStyle = '#f0d3ad'; ctx.beginPath(); ctx.arc(cx, cy-4, e.w*0.3, 0, 7); ctx.fill();
    ctx.fillStyle = '#6e4a2f'; ctx.beginPath(); ctx.arc(cx-e.w*0.32, cy-6, 4, 0, 7); ctx.arc(cx+e.w*0.32, cy-6, 4, 0, 7); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx-4, cy-5, 1.8, 0, 7); ctx.arc(cx+4, cy-5, 1.8, 0, 7); ctx.fill();
    ctx.strokeStyle = '#3a2416'; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(cx, cy, 3, 0.2, Math.PI-0.2); ctx.stroke();
    // tangan (baling)
    ctx.fillStyle = '#6e4a2f'; ctx.fillRect(cx+d*8, cy-4, 5, 10);
    return;
  }
  if (e.kind === 'piranha') {
    // Piranha Plant — bunga karnivor keluar dari pipe
    if (e.phase === 'hidden') return;
    const cy = y + e.h*0.55;
    // Stem hijau
    ctx.fillStyle = '#1a8a2a';
    ctx.fillRect(x+e.w/2-3, cy, 6, y+e.h - cy);
    // Daun
    ctx.fillStyle = '#2ecc40';
    ctx.beginPath(); ctx.ellipse(x+4, cy+8, 7, 4, 0.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+e.w-4, cy+8, 7, 4, -0.4, 0, 7); ctx.fill();
    // Kepala bulat
    ctx.fillStyle = '#e8235a';
    ctx.beginPath(); ctx.arc(x+e.w/2, cy-4, 12, 0, 7); ctx.fill();
    // Bintik putih
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x+e.w/2-5, cy-5, 2.5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(x+e.w/2+4, cy-3, 2, 0, 7); ctx.fill();
    // Mulut (gigi)
    const open = e.animF === 0;
    ctx.fillStyle = '#fff';
    if (open) {
      // Mulut terbuka — gigi tajam
      ctx.beginPath();
      ctx.moveTo(x+e.w/2-7, cy-2); ctx.lineTo(x+e.w/2-5, cy+3); ctx.lineTo(x+e.w/2-3, cy-2);
      ctx.moveTo(x+e.w/2-1, cy-2); ctx.lineTo(x+e.w/2+1, cy+3); ctx.lineTo(x+e.w/2+3, cy-2);
      ctx.moveTo(x+e.w/2+5, cy-2); ctx.lineTo(x+e.w/2+7, cy+3); ctx.lineTo(x+e.w/2+9, cy-2);
      ctx.fill();
      ctx.fillStyle = '#7a0a1a';
      ctx.fillRect(x+e.w/2-8, cy, 16, 3);
    } else {
      ctx.fillRect(x+e.w/2-8, cy-1, 16, 2);
    }
    return;
  }
  if (e.kind === 'koopa') {
    // green shell turtle
    ctx.fillStyle = '#2ecc40';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.55, e.w*0.5, e.h*0.45, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#1a9e2a';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.55, e.w*0.32, e.h*0.3, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#f5deb3'; // head
    const hx = e.dir<0 ? x+2 : x+e.w-10;
    ctx.beginPath(); ctx.arc(hx+4, y+6, 6, 0, 7); ctx.fill();
    ctx.fillStyle='#000'; ctx.fillRect(hx+ (e.dir<0?2:4), y+4, 2, 3);
    // feet
    ctx.fillStyle = '#f5b733';
    const fo = e.animF===0?2:-2;
    ctx.fillRect(x+3+fo, y+e.h-6, 8, 6); ctx.fillRect(x+e.w-11-fo, y+e.h-6, 8, 6);
  } else {
    // goomba
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.66, e.w*0.5, e.h*0.42, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#A0682D';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.34, e.w*0.44, e.h*0.34, 0, 0, 7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillRect(x+5,y+6,8,7); ctx.fillRect(x+e.w-13,y+6,8,7);
    ctx.fillStyle='#000'; ctx.fillRect(x+7,y+8,4,4); ctx.fillRect(x+e.w-11,y+8,4,4);
    ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+4,y+4); ctx.lineTo(x+12,y+7);
    ctx.moveTo(x+e.w-4,y+4); ctx.lineTo(x+e.w-12,y+7); ctx.stroke();
    ctx.fillStyle='#3D2200'; const fo=e.animF===0?2:-2;
    ctx.fillRect(x+2+fo, y+e.h-7, 10, 7); ctx.fillRect(x+e.w-12-fo, y+e.h-7, 10, 7);
  }
}

function drawMario(p) {
  const x = Math.round(p.x - cameraX), y = Math.round(p.y);
  const flip = p.facing === -1;
  let alpha = (p.inv>0 && Math.floor(p.inv/4)%2===0) ? 0.35 : 1;
  const sc = p.big ? 1.27 : 1;

  // Star Mario — flash pelangi
  let starCycle = 0;
  if (p.starT > 0) {
    starCycle = Math.floor(p.starT / 6) % 5;
    if (p.starT < 80 && Math.floor(p.starT / 6) % 2 === 0) alpha = 0.5; // berkelip bila nak habis
  }

  // Palette Edris (wira pengembara): topi & baju hijau, seluar coklat. Fire/Ice/Star ubah warna.
  let shirtColor = '#2e9e4a', overallColor = '#6a4423', hatColor = '#1f7a35';
  if (p.fire) {
    shirtColor = '#ffffff'; overallColor = '#d32f2f'; hatColor = '#ffffff';
  }
  if (p.ice) {
    shirtColor = '#ffffff'; overallColor = '#2a7ad4'; hatColor = '#ffffff';
  }
  if (starCycle > 0 || p.starT > 0) {
    const palette = ['#ff4444','#ffaa00','#44ff44','#4488ff','#ff44ff'];
    shirtColor = palette[starCycle];
    overallColor = palette[(starCycle + 2) % 5];
    hatColor = palette[(starCycle + 1) % 5];
  }

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x + p.w/2, y + p.h);
  if (flip) ctx.scale(-1,1);
  ctx.scale(sc, sc);
  ctx.translate(-14, -44);

  if (p.dead) {
    ctx.fillStyle='#CC0000'; ctx.beginPath(); ctx.arc(14,22,15,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 20px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText('×_×',14,28); ctx.restore(); return;
  }

  const airborne = !p.onGround;
  // legs
  ctx.fillStyle = overallColor;
  if (airborne) { ctx.fillRect(3,38,10,8); ctx.fillRect(15,36,10,8); }
  else if (Math.abs(p.vx)>0.4) {
    const lo=[[0,0],[5,-2],[0,0]][p.animF];
    ctx.fillRect(3+lo[0],38,9,8); ctx.fillRect(16-lo[0],38,9,8);
  } else { ctx.fillRect(4,38,9,8); ctx.fillRect(15,38,9,8); }
  // shoes
  ctx.fillStyle='#5a2d00';
  if (airborne){ctx.fillRect(1,44,12,5);ctx.fillRect(15,42,12,5);}
  else {ctx.fillRect(2,44,12,5);ctx.fillRect(14,44,12,5);}
  // overalls
  ctx.fillStyle = overallColor; ctx.fillRect(3,26,22,14);
  ctx.fillStyle='#e8b923'; ctx.fillRect(8,29,3,3); ctx.fillRect(17,29,3,3);
  // shirt/arms
  ctx.fillStyle = shirtColor; ctx.fillRect(2,24,24,6);
  ctx.fillStyle = shirtColor;
  if (airborne) ctx.fillRect(0,18,7,8); else ctx.fillRect(1,26,6,8);
  ctx.fillStyle='#f5c08a'; // hands
  if (airborne) ctx.fillRect(0,16,6,5); else ctx.fillRect(1,32,5,5);
  // face
  ctx.fillStyle='#f5c08a'; ctx.fillRect(5,12,18,13);
  ctx.fillStyle='#6b3a1a'; ctx.fillRect(7,21,13,3); // moustache
  ctx.fillStyle='#000'; ctx.fillRect(15,15,3,4);    // eye
  ctx.fillStyle='#5a2d00'; ctx.fillRect(4,18,4,6);  // sideburn
  // hat
  ctx.fillStyle = hatColor; ctx.fillRect(3,4,22,7); ctx.fillRect(1,9,26,4);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(11,8,3.5,0,7); ctx.fill(); // M emblem bg
  ctx.fillStyle = p.fire ? '#d32f2f' : hatColor;
  ctx.font='bold 6px Arial'; ctx.fillText('M',9,10);

  ctx.restore();
}

function drawFlag(f) {
  const x = f.x - cameraX;
  // pole
  ctx.fillStyle = '#bdbdbd'; ctx.fillRect(x+12, f.baseY-f.h, 5, f.h);
  ctx.fillStyle = '#2ecc40';

function drawParticles() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life/p.max); ctx.fillStyle = p.color;
    if (p.rect) ctx.fillRect(p.x-cameraX-3, p.y-3, p.size, p.size);
    else { ctx.beginPath(); ctx.arc(p.x-cameraX, p.y, p.size, 0, 7); ctx.fill(); }
    ctx.restore();
  }
  ctx.font = 'bold 16px Trebuchet MS'; ctx.textAlign='center';
  for (const f of floaters) {
    ctx.save(); ctx.globalAlpha = Math.max(0, f.life/50); ctx.fillStyle = f.color;
    ctx.fillText(f.txt, f.x - cameraX + 10, f.y); ctx.restore();

function drawOverlay() {
  ctx.textAlign='center';
  if (gameState === 'dead' && lives > 0) {
    dim(0.5);
    ctx.fillStyle='#fff'; ctx.font='bold 40px Trebuchet MS';
    ctx.fillText('❤️ × ' + lives, W/2, H/2);
    ctx.font='18px Trebuchet MS'; ctx.fillStyle='#FFD700';
    ctx.fillText('ENTER / ▲ untuk sambung', W/2, H/2+36);
  } else if (gameState === 'gameover') {
    dim(0.72);
    ctx.fillStyle='#FF4444'; ctx.font='bold 60px Trebuchet MS';
    ctx.fillText('GAME OVER', W/2, H/2-30);
    ctx.fillStyle='#fff'; ctx.font='22px Trebuchet MS';
    ctx.fillText('Skor: ' + score + '   🪙 ' + coins, W/2, H/2+14);
    ctx.fillStyle='#FFD700'; ctx.font='18px Trebuchet MS';
    ctx.fillText('ENTER / TAP untuk main lagi', W/2, H/2+48);
  } else if (gameState === 'win') {
    dim(0.72);
    ctx.fillStyle='#FFD700'; ctx.font='bold 56px Trebuchet MS';
    ctx.fillText('🎉 KAMU MENANG!', W/2, H/2-30);
    ctx.fillStyle='#fff'; ctx.font='22px Trebuchet MS';
    ctx.fillText('Skor Akhir: ' + score + '   🪙 ' + coins, W/2, H/2+14);
    ctx.fillStyle='#FFD700'; ctx.font='18px Trebuchet MS';
    ctx.fillText('ENTER / TAP untuk main lagi', W/2, H/2+48);
  } else if (gameState === 'clear') {
    const STONES = { 1: 'BATU API 🔴', 2: 'BATU AIR 🔵', 3: 'BATU HUTAN 🟢', 4: 'BATU PELANGI 🌈' };
    ctx.fillStyle='#FFD700'; ctx.font='bold 34px Trebuchet MS';
    ctx.fillText(level.boss ? '✨ ' + STONES[currentLevel] + ' DIRAMPAS!' : 'DUNIA ' + currentLevel + ' SELAMAT!', W/2, 84);
    // Bintang diperoleh
    const sg = (level && level.starsGot) || 0;
    ctx.font='30px serif';
    ctx.fillText((sg>=1?'⭐':'☆') + (sg>=2?'⭐':'☆') + (sg>=3?'⭐':'☆'), W/2, 122);
    // Story beat — jejak menyelamatkan Puteri Peach
    const beats = {
      1: 'Batu Api selamat! Puteri Peach dibawa ke laut… 🌊',
      2: 'Ombak reda! Jejak menuju hutan gelap… 🌳',
      3: 'Raja Monyet jadi kawan! Kubu di depan — Puteri Peach dekat! 🌉'
    };
    if (beats[currentLevel]) {
      ctx.fillStyle='#ffffff'; ctx.font='bold 19px Trebuchet MS';
      ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 5;
      ctx.fillText(beats[currentLevel], W/2, 158);
      ctx.shadowBlur = 0;
    }
  }
  ctx.textAlign='left';
}
function dim(a){ ctx.fillStyle=`rgba(0,0,20,${a})`; ctx.fillRect(0,0,W,H); }

function drawFireballs() {
  for (const fb of level.fireballs) {
    const x = fb.x - cameraX, y = fb.y;
    if (fb.banana) {   // 🍌 pisang monyet
      ctx.save(); ctx.translate(x, y); ctx.rotate(Math.sin(Date.now()/120)*0.5);
      ctx.fillStyle = '#f5c518';
      ctx.beginPath(); ctx.arc(0, 4, 11, Math.PI*1.15, Math.PI*1.95); ctx.arc(0, 0, 11, Math.PI*1.95, Math.PI*1.15, true); ctx.fill();
      ctx.fillStyle = '#3a2a10'; ctx.fillRect(-11, -2, 3, 3);
      ctx.restore();
      continue;
    }
    // bola api boss (oren) / air (biru)
    const outer = fb.ice ? '#4488ff' : '#FF6600';
    const inner = fb.ice ? '#cce4ff' : '#FFD000';
    ctx.fillStyle = outer;
    ctx.beginPath(); ctx.arc(x, y, 9, 0, 7); ctx.fill();
    ctx.fillStyle = inner;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.fill();
  }
  // Player fireballs/iceballs (Mario lempar) — bola kecil berpusing
  for (const fb of (level.playerFireballs || [])) {
    const cx = fb.x + fb.w/2 - cameraX, cy = fb.y + fb.h/2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(fb.spin || 0);
    // Outer glow (api oren / ais biru)
    ctx.fillStyle = fb.ice ? '#4488ff' : '#ff3300';
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, 7); ctx.fill();

    ctx.fillStyle = fb.ice ? '#ccf0ff' : '#ffee44';
    ctx.beginPath(); ctx.arc(0, 0, 4, 0, 7); ctx.fill();
    // Cross sparkles
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-1, -1, 2, 2);
    ctx.restore();
  }
}

  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-w * 0.09, -h * 0.24, w * 0.02, 0, Math.PI * 2); ctx.arc(w * 0.13, -h * 0.24, w * 0.02, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = bodyDark; ctx.lineWidth = Math.max(2, w * 0.04); ctx.beginPath(); ctx.moveTo(-w * 0.20, -h * 0.34); ctx.lineTo(-w * 0.03, -h * 0.30); ctx.moveTo(w * 0.20, -h * 0.34); ctx.lineTo(w * 0.03, -h * 0.30); ctx.stroke();
  ctx.fillStyle = '#3a0a1e'; ctx.beginPath(); ctx.moveTo(-w * 0.18, -h * 0.10); ctx.quadraticCurveTo(0, h * 0.02, w * 0.18, -h * 0.10); ctx.quadraticCurveTo(0, -h * 0.04, -w * 0.18, -h * 0.10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff'; for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i * w * 0.07 - w * 0.02, -h * 0.09); ctx.lineTo(i * w * 0.07 + w * 0.02, -h * 0.09); ctx.lineTo(i * w * 0.07, -h * 0.03); ctx.closePath(); ctx.fill(); }
  ctx.restore();
}

function drawBoss() {
  const bs = level.boss; if (!bs || !bs.alive) return;
  const x = Math.round(bs.x - cameraX), y = Math.round(bs.y);
  const flash = bs.hit > 0 && Math.floor(bs.hit/3)%2===0;
  ctx.save();
  if (flash) ctx.globalAlpha = 0.5;

  if (bs.type === 'gergasiapi') drawGergasiApi(x, y, bs.w, bs.h, bs.dir, bs.enraged);
  else if (bs.type === 'ularlaut') drawUlarLaut(x, y, bs.w, bs.h, bs.dir, bs.enraged);
  else if (bs.type === 'rajamonyet') drawRajaMonyet(x, y, bs.w, bs.h, bs.dir, bs.enraged);
  else drawRajaGergasi(x, y, bs.w, bs.h, bs.dir, bs.enraged);
  // Aura bila enraged
  if (bs.enraged) {
    ctx.globalAlpha = (Math.sin(Date.now()*0.01)+1)*0.13;
    ctx.fillStyle = bs.type === 'ularlaut' ? '#3fc9d6' : '#ff6600';
    ctx.beginPath(); ctx.arc(x+bs.w/2, y+bs.h/2, bs.w*0.72, 0, 7); ctx.fill();
    ctx.globalAlpha = flash ? 0.5 : 1;
  }
  ctx.restore();
  // HP bar
  ctx.fillStyle = '#000'; ctx.fillRect(x+4, y-14, bs.w-8, 7);
  const hpColor = bs.enraged ? '#ff3020' : (bs.type === 'ularlaut' ? '#1f9ab0' : bs.type === 'rajamonyet' ? '#6e4a2f' : bs.type === 'rajagergasi' ? '#8a4fc4' : '#ff8a1e');
  ctx.fillStyle = hpColor; ctx.fillRect(x+5, y-13, (bs.w-10)*(bs.hp/bs.maxHp), 5);
  // Label nama boss
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px Trebuchet MS'; ctx.textAlign = 'center';
  const NAMES = { gergasiapi:'GERGASI API', ularlaut:'ULAR LAUT', rajamonyet:'RAJA MONYET', rajagergasi:'RAJA GERGASI' };
  let name = NAMES[bs.type] || 'BOS';
  if (bs.enraged) name = '🔥 ' + name + ' — MENGGILA!';
  ctx.fillText(name, x+bs.w/2, y-16);
  // 💬 gelembung dialog bos (bila baru aktif)
  if (bossTalk > 0) {
    const line = BOSS_LINES[bs.type] || '';
    ctx.font = 'bold 12px Trebuchet MS'; ctx.textAlign = 'center';
    const bw = ctx.measureText(line).width + 20, bxx = x + bs.w/2, byy = y - 40;
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.roundRect(bxx - bw/2, byy - 16, bw, 24, 8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bxx-6, byy+7); ctx.lineTo(bxx, byy+15); ctx.lineTo(bxx+6, byy+7); ctx.fill();
    ctx.fillStyle = '#7a1030'; ctx.fillText(line, bxx, byy);
    ctx.textAlign = 'left';
  }
}

function drawPipeHint() {
  for (const b of level.blocks) {
    if (!b.enterable && !b.isExit) continue;
    const x = b.x - cameraX + b.w/2;
    if (x < -40 || x > W+40) continue;
    const bob = Math.sin(Date.now()/200)*3;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 22px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText('↓', x, b.y - 14 + bob);
  }
}

function drawHazards() {
  // 🚩 Bendera checkpoint
  if (level.checkpoint) {
    const cx = level.checkpoint.x - cameraX;
    if (cx > -20 && cx < W+20) {
      ctx.fillStyle = '#8a8a9a'; ctx.fillRect(cx, GROUND_Y-90, 4, 90);
      const reached = level.checkpoint.reached;
      ctx.fillStyle = reached ? '#5cff5c' : '#cccccc';
      const fy = reached ? GROUND_Y-88 : GROUND_Y-40;
      ctx.beginPath(); ctx.moveTo(cx+4, fy); ctx.lineTo(cx+30, fy+8); ctx.lineTo(cx+4, fy+16); ctx.fill();
      ctx.fillStyle = '#333'; ctx.font = '10px Trebuchet MS'; ctx.textAlign='center'; ctx.fillText('🚩', cx+16, fy+13); ctx.textAlign='left';
    }
  }
  // 🌲 Kayu tumbang
  for (const f of (level.fallers || [])) {
    const x = f.x - cameraX;
    ctx.save(); ctx.translate(x + f.w/2, f.y + f.h/2); ctx.rotate(Math.sin(f.spin)*0.15);
    ctx.fillStyle = '#7a4a20'; ctx.fillRect(-f.w/2, -f.h/2, f.w, f.h);
    ctx.fillStyle = '#5a3416'; ctx.fillRect(-f.w/2, -f.h/2, f.w, 6);
    ctx.strokeStyle = '#5a3416'; ctx.lineWidth = 1;
    for (let i=-2;i<3;i++){ ctx.beginPath(); ctx.moveTo(-f.w/2, i*12); ctx.lineTo(f.w/2, i*12); ctx.stroke(); }
    ctx.fillStyle = '#caa060'; ctx.beginPath(); ctx.ellipse(0, -f.h/2+3, f.w/2-2, 4, 0, 0, 7); ctx.fill();
    ctx.restore();
  }
  // 🌊 Tsunami
  const ts = level.tsunami;
  if (ts) {
    if (ts.warning) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Trebuchet MS'; ctx.textAlign = 'center';
      ctx.shadowColor = '#003'; ctx.shadowBlur = 6;
      if (Math.floor(Date.now()/250)%2===0) ctx.fillText('⚠️ OMBAK DATANG! NAIK ATAS! ⚠️', W/2, 80);
      ctx.shadowBlur = 0; ctx.textAlign = 'left';
    }
    if (ts.active) {
      const wx = ts.waveX - cameraX;
      const g = ctx.createLinearGradient(wx-60, 0, wx+20, 0);
      g.addColorStop(0, 'rgba(30,140,200,0)'); g.addColorStop(1, 'rgba(30,120,200,0.85)');
      ctx.fillStyle = g; ctx.fillRect(wx-60, 60, 80, H-60);
      ctx.fillStyle = '#2f86c8'; ctx.fillRect(wx-6, 60, 26, H-60);
      ctx.fillStyle = '#fff';
      for (let yy=90; yy<H; yy+=40){ ctx.beginPath(); ctx.arc(wx+6, yy + Math.sin(Date.now()/150+yy)*4, 7, Math.PI, 0); ctx.fill(); }
      // buih putih puncak
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.arc(wx+4, 66, 14, 0, 7); ctx.arc(wx-14, 74, 12, 0, 7); ctx.fill();
    }
  }
}

function render() {
  if (gameState === 'cutscene' || gameState === 'ending') { drawCutscene(); return; }
  if (gameState === 'map') { drawMap(); return; }
  ctx.save();
  if (shake > 0.5) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  drawBackground();
  for (const d of level.decos) drawBush(d);
  for (const b of level.blocks) drawBlock(b);
  for (const lv of (level.lavas || [])) drawLava(lv);
  drawPipeHint();
  for (const c of level.coinList) drawCoin(c);
  if (level.flag) drawFlag(level.flag);
  for (const m of level.powerups) drawMushroom(m);
  for (const e of level.enemies) drawEnemy(e);
  drawHazards();
  // Yoshi mount (belum diambil) + Yoshi lari
  if (level.yoshi && !level.yoshi.taken) drawYoshi(level.yoshi.x - cameraX, level.yoshi.y + Math.sin(level.yoshi.bob||0)*3, level.yoshi.dir, level.yoshi.animF);
  if (fleeingYoshi) drawYoshi(fleeingYoshi.x - cameraX, fleeingYoshi.y, -1, 1);
  drawBoss();
  drawFireballs();
  drawParticles();
  if (player) {
    // Mario tunggang Yoshi — Yoshi di tanah, Mario diangkat duduk atas belakang
    if (player.onYoshi && !player.dead) {
      drawYoshi(player.x - cameraX - 6, player.y + player.h - 40, player.facing, Math.abs(player.vx)>0.4 ? (Math.floor(player.animT/4)%2) : 0);
      player.y -= 22; drawMario(player); player.y += 22;
    } else {
      drawMario(player);
    }
  }
  ctx.restore();
  drawPowerupHUD();
  drawOverlay();
}

function drawLava(lv) {
  const x = Math.round(lv.x - cameraX);
  if (x + lv.w < -20 || x > W + 20) return;
  const topY = GROUND_Y + 6;
  // Badan lava (merah gelap sampai bawah)
  ctx.fillStyle = '#c22a00';
  ctx.fillRect(x, topY, lv.w, H - topY);
  // Permukaan bergelombang (oren terang)
  ctx.fillStyle = '#ff6a00';
  ctx.beginPath();
  ctx.moveTo(x, topY + 10);
  for (let i = 0; i <= lv.w; i += 8) {
    ctx.lineTo(x + i, topY + Math.sin(Date.now()/300 + (lv.x + i) * 0.05) * 3);
  }
  ctx.lineTo(x + lv.w, topY + 10);
  ctx.closePath(); ctx.fill();
  // Kilauan panas (kuning)
  ctx.fillStyle = '#ffd040';
  for (let i = 6; i < lv.w - 6; i += 26) {
    const gy = topY + 2 + Math.sin(Date.now()/250 + (lv.x + i) * 0.09) * 2;
    ctx.fillRect(x + i, gy, 10, 3);
  }
  // Buih lava naik (particle ringkas guna masa)
  const bubbleT = Math.floor(Date.now() / 400);
  const bx = x + ((bubbleT * 37 + Math.floor(lv.x)) % (lv.w - 12)) + 6;
  const bphase = (Date.now() % 400) / 400;
  ctx.fillStyle = `rgba(255,160,40,${1 - bphase})`;
  ctx.beginPath(); ctx.arc(bx, topY - bphase * 18, 3 + bphase * 2, 0, 7); ctx.fill();
}

function drawYoshi(x, y, dir, frame) {
  // Yoshi hijau — kepala kanan, badan, ekor, kaki
  ctx.save();
  ctx.translate(x + 20, y + 21);
  if (dir === -1) ctx.scale(-1, 1);
  ctx.translate(-20, -21);
  // Ekor
  ctx.fillStyle = '#2aa82a';
  ctx.beginPath(); ctx.moveTo(2, 22); ctx.lineTo(-8, 16); ctx.lineTo(2, 30); ctx.fill();
  // Badan
  ctx.fillStyle = '#3ac83a';
  ctx.beginPath(); ctx.ellipse(18, 22, 16, 13, 0, 0, 7); ctx.fill();
  // Perut putih
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(18, 27, 10, 7, 0, 0, 7); ctx.fill();
  // Kaki (animasi)
  ctx.fillStyle = '#e8731a';
  const lo = frame===0 ? 0 : 3;
  ctx.fillRect(10+lo, 32, 7, 9); ctx.fillRect(22-lo, 32, 7, 9);
  // Leher + kepala
  ctx.fillStyle = '#3ac83a';
  ctx.fillRect(26, 8, 8, 16);
  ctx.beginPath(); ctx.arc(34, 10, 11, 0, 7); ctx.fill();
  // Muncung
  ctx.fillStyle = '#3ac83a';
  ctx.beginPath(); ctx.ellipse(42, 13, 7, 5, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#1a8a1a';
  ctx.beginPath(); ctx.arc(45, 13, 2, 0, 7); ctx.fill();
  // Mata
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(34, 5, 5, 0, 7); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(35, 5, 2.5, 0, 7); ctx.fill();
  // Sisik kepala (merah)
  ctx.fillStyle = '#d83030';
  ctx.beginPath(); ctx.moveTo(28, 2); ctx.lineTo(32, -6); ctx.lineTo(34, 2); ctx.fill();
  ctx.restore();
}

function drawPowerupHUD() {
  if (!player) return;
  // Indicator power-up state — kanan atas canvas
  const padX = W - 12;
  let yPos = 14;
  if (player.fire) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX - 88, yPos - 2, 88, 22);
    ctx.fillStyle = '#FF6600';
    ctx.beginPath(); ctx.arc(padX - 78, yPos + 9, 8, 0, 7); ctx.fill();
    ctx.fillStyle = '#FFD000';
    ctx.beginPath(); ctx.arc(padX - 78, yPos + 9, 5, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Trebuchet MS'; ctx.textAlign = 'left';
    ctx.fillText('API — Z lempar', padX - 66, yPos + 13);
    yPos += 26;
  }
  if (player.ice) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX - 88, yPos - 2, 88, 22);
    ctx.fillStyle = '#4488ff';
    ctx.beginPath(); ctx.arc(padX - 78, yPos + 9, 8, 0, 7); ctx.fill();
    ctx.fillStyle = '#ccf0ff';
    ctx.beginPath(); ctx.arc(padX - 78, yPos + 9, 5, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Trebuchet MS'; ctx.textAlign = 'left';
    ctx.fillText('AIS — Z lempar', padX - 66, yPos + 13);
    yPos += 26;
  }
  if (player.starT > 0) {
    const sec = Math.ceil(player.starT / 60);
    const cycle = Math.floor(player.starT / 6) % 5;
    const palette = ['#ff4444','#ffaa00','#44ff44','#4488ff','#ff44ff'];
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX - 88, yPos - 2, 88, 22);
    ctx.fillStyle = palette[cycle];
    // Bintang
    ctx.save();
    ctx.translate(padX - 78, yPos + 9);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI/2;
      const r = i % 2 === 0 ? 9 : 4;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Trebuchet MS'; ctx.textAlign = 'left';
    ctx.fillText('STAR ' + sec + 's', padX - 66, yPos + 13);
  }
}

// ─── CUTSCENE (intro kahwin & ending selamatkan Peach) ────
const INTRO_DUR = 900, ENDING_DUR = 780;
const CUT_GROUND = 400;

function startIntro() { cut = { t: 0, kind: 'intro', fx: {} }; cameraX = 0; particles = []; gameState = 'cutscene'; }
function startEnding() { cut = { t: 0, kind: 'ending', fx: {} }; cameraX = 0; particles = []; gameState = 'ending'; MUSIC.start('menang'); }
function endCutscene() {
  if (!cut) return;
  const k = cut.kind; cut = null;
  if (k === 'intro') startGame();
  else { gameState = 'win'; updateHUD(); }   // updateHUD trigger leaderboard flow
}
// Skip cutscene / main semula / buka audio dengan tap/klik canvas
canvas.addEventListener('click', (e) => {
  initAudio();
  if (gameState==='cutscene'||gameState==='ending') endCutscene();
  else if (gameState==='map') mapClick(e);
  else if (gameState==='gameover'||gameState==='win') gameState='map';
});
canvas.addEventListener('touchstart', e => {
  initAudio();
  if (gameState==='cutscene'||gameState==='ending') { e.preventDefault(); endCutscene(); }
  else if (gameState==='map') { e.preventDefault(); mapClick(e); }
  else if (gameState==='gameover'||gameState==='win') { e.preventDefault(); gameState='map'; }
}, {passive:false});

// ── v2: Peta Dunia (pilih level) ──
function mapCards() {
  const cards = []; const cw = 170, gap = 16, total = 4*cw + 3*gap, x0 = (W - total)/2;
  for (let i = 0; i < 4; i++) cards.push({ n: i+1, x: x0 + i*(cw+gap), y: 170, w: cw, h: 190 });
  return cards;
}
function mapClick(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
  const px = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * sx;
  const py = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) * sy;
  for (const c of mapCards()) {
    if (px>=c.x && px<=c.x+c.w && py>=c.y && py<=c.y+c.h) {
      if (c.n <= progress.unlocked) { SFX.power(); score = 0; coins = 0; lives = 5; startLevelAt(c.n); }
      else SFX.bump();
      return;
    }
  }
}
function openMap() { gameState = 'map'; MUSIC.stop(); }

// Lukis Peta Dunia (skrin pilih level)
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
const MAP_ICON = { 1: '🔥', 2: '🌊', 3: '🌳', 4: '👹' };
const MAP_COL  = { 1: ['#c0392b','#e67e22'], 2: ['#1c6dd0','#3fb0d8'], 3: ['#1e8b3e','#57c463'], 4: ['#5b2a86','#8e44ad'] };
function drawMap() {
  // latar
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a2440'); g.addColorStop(1, '#0d1526');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // tajuk
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe36e';
  ctx.font = 'bold 40px Trebuchet MS, sans-serif';
  ctx.fillText('🌈 PILIH DUNIA', W/2, 90);
  ctx.fillStyle = '#9fb4e8';
  ctx.font = 'bold 16px Trebuchet MS, sans-serif';
  ctx.fillText('Ketuk dunia atau tekan 1-4', W/2, 122);
  // kad dunia
  for (const c of mapCards()) {
    const locked = c.n > progress.unlocked;
    const stars = progress.stars[c.n] || 0;
    const col = MAP_COL[c.n];
    // badan kad
    ctx.save();
    if (locked) ctx.globalAlpha = 0.45;
    const cg = ctx.createLinearGradient(c.x, c.y, c.x, c.y + c.h);
    cg.addColorStop(0, col[0]); cg.addColorStop(1, col[1]);
    ctx.fillStyle = cg;
    roundRect(c.x, c.y, c.w, c.h, 16); ctx.fill();
    ctx.lineWidth = 4; ctx.strokeStyle = locked ? '#556' : '#ffffff';
    roundRect(c.x, c.y, c.w, c.h, 16); ctx.stroke();
    const cx = c.x + c.w/2;
    // nombor dunia
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = 'bold 15px Trebuchet MS, sans-serif';
    ctx.fillText('DUNIA ' + c.n, cx, c.y + 30);
    // ikon
    ctx.font = '58px serif';
    ctx.fillText(locked ? '🔒' : MAP_ICON[c.n], cx, c.y + 100);
    // nama
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px Trebuchet MS, sans-serif';
    const nm = LEVEL_NAMES[c.n];
    ctx.fillText(nm.length > 13 ? 'KUBU RAJA' : nm, cx, c.y + 135);
    if (nm === 'KUBU RAJA GERGASI') ctx.fillText('GERGASI', cx, c.y + 153);
    // bintang
    ctx.font = '20px serif';
    let sstr = '';
    for (let i = 0; i < 3; i++) sstr += (i < stars ? '⭐' : '☆');
    ctx.fillText(locked ? '' : sstr, cx, c.y + c.h - 16);
    ctx.restore();
  }
  ctx.textAlign = 'left';
}

function lerp(a, b, k) { return a + (b - a) * Math.max(0, Math.min(1, k)); }

// Mario di koordinat skrin — wrap drawMario dengan player stub
function drawMarioAt(x, y, opts) {
  opts = opts || {};
  const savedCam = cameraX; cameraX = 0;
  drawMario({ x, y, w: 28, h: 44, vx: opts.walking ? 2 : 0, vy: 0,
    onGround: true, facing: opts.facing || 1, animT: 0, animF: opts.animF || 0,
    big: false, fire: false, ice: false, starT: 0, fireCD: 0,
    onYoshi: false, flutterT: 0, inv: 0, dead: false, deadT: 0, skid: false });
  cameraX = savedCam;
  if (opts.groom) {   // tali leher kupu-kupu hitam
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.moveTo(x+14, y+22); ctx.lineTo(x+8, y+18); ctx.lineTo(x+8, y+26); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+14, y+22); ctx.lineTo(x+20, y+18); ctx.lineTo(x+20, y+26); ctx.closePath(); ctx.fill();
  }
  if (opts.sad) {     // air mata biru menitis
    const drip = (Date.now() / 30) % 14;
    ctx.fillStyle = '#66ccff';
    ctx.beginPath(); ctx.arc(x + (opts.facing === -1 ? 8 : 20), y + 12 + drip, 2.5, 0, 7); ctx.fill();
  }
}

// Puteri Peach di koordinat skrin
function drawPeachAt(x, y, opts) {
  opts = opts || {};
  ctx.save();
  ctx.translate(x, y);
  // Gaun pink (trapezoid)
  ctx.fillStyle = '#ff9ec6';
  ctx.beginPath(); ctx.moveTo(14, 16); ctx.lineTo(28, 48); ctx.lineTo(0, 48); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff7ab2';
  ctx.fillRect(6, 44, 16, 4);
  // Lengan
  ctx.fillStyle = '#ffd9b3';
  if (opts.panic) {   // tangan angkat atas
    ctx.fillRect(-2, 4, 5, 14); ctx.fillRect(25, 4, 5, 14);
  } else {
    ctx.fillRect(1, 20, 5, 12); ctx.fillRect(22, 20, 5, 12);
  }
  // Kepala
  ctx.fillStyle = '#ffd9b3';
  ctx.beginPath(); ctx.arc(14, 8, 8, 0, 7); ctx.fill();
  // Rambut emas
  ctx.fillStyle = '#f7c948';
  ctx.beginPath(); ctx.arc(14, 4, 8, Math.PI, 0); ctx.fill();
  ctx.fillRect(4, 4, 4, 12); ctx.fillRect(20, 4, 4, 12);
  // Mahkota
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.moveTo(8, -3); ctx.lineTo(10, -9); ctx.lineTo(13, -4);
  ctx.lineTo(15, -10); ctx.lineTo(17, -4); ctx.lineTo(20, -9); ctx.lineTo(22, -3); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e83e8c';
  ctx.beginPath(); ctx.arc(15, -5, 1.6, 0, 7); ctx.fill();
  // Veil pengantin (putih jarang)
  if (opts.bride) {
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.moveTo(6, -6); ctx.lineTo(26, 2); ctx.lineTo(24, 26); ctx.lineTo(10, 8); ctx.closePath(); ctx.fill();
  }
  // Mata + senyum / panik
  ctx.fillStyle = '#1a3a5a';
  ctx.fillRect(10, 6, 2, 3); ctx.fillRect(17, 6, 2, 3);
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.4;
  if (opts.panic) {
    ctx.beginPath(); ctx.arc(14, 13, 2.4, 0, 7); ctx.stroke();   // mulut O terkejut
  } else {
    ctx.beginPath(); ctx.arc(14, 11, 3, 0.25, Math.PI - 0.25); ctx.stroke();
  }
  ctx.restore();
  if (opts.panic) {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Trebuchet MS'; ctx.textAlign = 'center';
    ctx.fillText('!!', x + 14, y - 16);
    ctx.textAlign = 'left';
  }
}

function cutCaption(txt, y, color, size) {
  ctx.fillStyle = color || '#ffffff';
  ctx.font = 'bold ' + (size || 22) + 'px Trebuchet MS';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 6;
  ctx.fillText(txt, W/2, y);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
}

function drawCutscene() {
  if (!cut) return;
  ctx.save();
  if (shake > 0.5) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  if (cut.kind === 'intro') drawIntroScene(cut.t);
  else drawEndingScene(cut.t);
  ctx.restore();
  // Hint skip
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 13px Trebuchet MS'; ctx.textAlign = 'right';
  ctx.fillText('ENTER / SENTUH untuk skip ▶', W - 14, H - 12);
  ctx.textAlign = 'left';
}

function drawIntroScene(t) {
  // ── Latar: hari perkahwinan yang ceria ──
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, SKY_TOP); g.addColorStop(1, SKY_BOT);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  // Matahari
  ctx.fillStyle = '#fff3a0'; ctx.beginPath(); ctx.arc(90, 80, 34, 0, 7); ctx.fill();
  // Rumput
  ctx.fillStyle = '#3fbf3f'; ctx.fillRect(0, CUT_GROUND, W, H - CUT_GROUND);
  ctx.fillStyle = '#2e8b2e'; ctx.fillRect(0, CUT_GROUND, W, 8);
  // Arch perkahwinan (dua tiang + bunga)
  ctx.fillStyle = '#8a5a2a';
  ctx.fillRect(300, 240, 12, CUT_GROUND - 240);
  ctx.fillRect(490, 240, 12, CUT_GROUND - 240);
  ctx.font = '22px serif'; ctx.textAlign = 'center';
  for (let i = 0; i <= 6; i++) {
    const ax = 306 + (i / 6) * 190;
    const ay = 240 - Math.sin((i / 6) * Math.PI) * 46;
    ctx.fillText('🌸', ax, ay);
  }
  // Tetamu Toad (comel, statik)
  ctx.font = '24px serif';
  ctx.fillText('🍄', 150, CUT_GROUND - 6);
  ctx.fillText('🍄', 660, CUT_GROUND - 6);
  ctx.textAlign = 'left';

  const edrisX = 350, enisaX = 425, actorY = CUT_GROUND - 48;

  if (t < 380) {
    // ── Babak 1: kampung ceria + Raja Gergasi menyerbu (t 200-380) ──
    drawMarioAt(edrisX, actorY + 4, { facing: 1 });
    ctx.font = '18px serif';
    for (let i = 0; i < 5; i++) {
      const hy = CUT_GROUND - 80 - ((t * 0.7 + i * 53) % 220);
      const hx = 330 + i * 38 + Math.sin((t + i * 40) / 25) * 8;
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin((t + i * 30) / 20);
      ctx.fillText('🌈', hx, hy);
    }
    ctx.globalAlpha = 1;
    if (t < 200) {
      drawPeachAt(enisaX, actorY, {});
      cutCaption('Kampung Pulau Pelangi yang aman & ceria 🌈', 70, '#ffffff', 22);
    } else {
      const k = (t - 200) / 100;
      const bx = lerp(W + 120, enisaX - 30, k);
      const by = lerp(40, actorY - 50, k);
      if (t === 300 && !cut.fx.landed) { cut.fx.landed = true; shake = 10; SFX.hurt(); }
      drawPeachAt(enisaX, actorY, { panic: t > 260 });
      drawRajaGergasi(bx, by, 80, 90, -1, t > 300);
      if (t > 290) cutCaption('RAJA GERGASI: HAHAHA!!', by - 26 > 40 ? by - 26 : 40, '#ff6a3a', 24);
    }
  } else if (t < 520) {
    // ── Babak 2: Raja Gergasi culik Puteri Peach ──
    const k = (t - 380) / 140;
    const bx = lerp(enisaX - 30, W + 160, k);
    const by = lerp(actorY - 50, -140, k);
    drawMarioAt(edrisX, actorY + 4, { facing: 1 });
    drawRajaGergasi(bx, by, 80, 90, 1, true);
    drawPeachAt(bx + 62, by + 58, { panic: true });   // dalam cengkaman
    cutCaption('TOLONG, EDRIS!!', 90, '#ffb3d1', 26);
  } else if (t < 700) {
    // ── Babak 3: Edris sedih ──
    dim(lerp(0, 0.4, (t - 520) / 60));
    drawMarioAt(edrisX, actorY + 4, { facing: 1, sad: true });
    cutCaption('Edris sedih... Puteri Peach diculik Raja Gergasi 😢', 80, '#c9d8f0', 22);
  } else {
    // ── Babak 4: EDRIS AKAN SELAMATKAN PUTERI PEACH! ──
    if (!cut.fx.resolve) { cut.fx.resolve = true; SFX.power(); }
    if (t < 706) { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); }
    drawMarioAt(edrisX, actorY + 4, { facing: 1 });
    const pulse = 1 + 0.06 * Math.sin(t / 5);
    ctx.save();
    ctx.translate(W/2, 110); ctx.scale(pulse, pulse);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 30px Trebuchet MS'; ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8;
    ctx.fillText('EDRIS AKAN SELAMATKAN PUTERI PEACH! 💪', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.textAlign = 'left';
    cutCaption('Rentasi 4 dunia, kalahkan Raja Gergasi!', 150, '#ffffff', 18);
    if (t > INTRO_DUR - 40) dim((t - (INTRO_DUR - 40)) / 40);
  }
}

function drawEndingScene(t) {
  // ── Latar: dalam istana Bowser (gelap + cahaya lava) ──
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, '#0d0508'); g.addColorStop(0.6, '#2a0a0a'); g.addColorStop(1, '#571207');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#1a0d10';
  for (const px of [120, 400, 680]) { ctx.fillRect(px-30, 60, 60, CUT_GROUND-60); }
  // Lantai batu
  ctx.fillStyle = '#4a4a55'; ctx.fillRect(0, CUT_GROUND, W, H - CUT_GROUND);
  ctx.fillStyle = '#6a6a78'; ctx.fillRect(0, CUT_GROUND, W, 8);

  const actorY = CUT_GROUND - 48;
  const cageX = 545, cageY = CUT_GROUND - 110;
  const broken = t >= 180;

  if (t === 180 && !cut.fx.cage) {
    cut.fx.cage = true; shake = 8; SFX.clear();
    brickBits(cageX + 10, cageY + 30); brickBits(cageX + 40, cageY + 50);
  }

  // Peach — dalam sangkar dulu, lari ke Mario selepas bebas
  const peachX = broken ? lerp(575, 405, (t - 200) / 100) : 575;
  // Mario masuk dari kiri
  const marioX = t < 150 ? lerp(-40, 300, t / 150) : (broken ? lerp(300, 370, (t - 200) / 100) : 300);

  // Sangkar besi (sebelum pecah)
  if (!broken) {
    ctx.fillStyle = '#333340';
    ctx.fillRect(cageX, cageY, 90, 110);
    ctx.fillStyle = '#0d0508';
    ctx.fillRect(cageX + 6, cageY + 8, 78, 102);
    drawPeachAt(575, actorY, { panic: t > 60 && t < 150 });
    ctx.fillStyle = '#555568';
    for (let i = 0; i <= 5; i++) ctx.fillRect(cageX + 6 + i * 15, cageY + 8, 5, 102);
    ctx.fillStyle = '#333340'; ctx.fillRect(cageX - 4, cageY - 8, 98, 12);
  } else {
    drawPeachAt(peachX, actorY, {});
  }

  drawMarioAt(marioX, actorY + 4, { facing: 1, walking: t < 150, animF: Math.floor(t / 7) % 3 });

  if (t < 150) {
    cutCaption('Edris sampai ke kubu Raja Gergasi...', 70, '#ffffff', 22);
  } else if (t < 300) {
    cutCaption(broken ? 'PUTERI PEACH BEBAS!' : 'Edris pecahkan sangkar!', 70, '#ffd700', 24);
  } else {
    // Bertemu semula — hujan hati!
    ctx.font = '20px serif';
    for (let i = 0; i < 10; i++) {
      const hy = (t * 1.2 + i * 67) % (H + 40) - 20;
      const hx = 60 + i * 76 + Math.sin((t + i * 31) / 22) * 12;
      ctx.globalAlpha = 0.75;
      ctx.fillText(i % 2 ? '💕' : '❤️', hx, hy);
    }
    ctx.globalAlpha = 1;
    ctx.font = '26px serif'; ctx.textAlign = 'center';
    ctx.fillText('❤️', (marioX + peachX) / 2 + 14, actorY - 24 - Math.sin(t / 10) * 5);
    ctx.textAlign = 'left';
    cutCaption('PUTERI PEACH SELAMAT! ❤️', 70, '#ffb3d1', 26);
    if (t > 420) {
      const pulse = 1 + 0.05 * Math.sin(t / 6);
      ctx.save();
      ctx.translate(W/2, 150); ctx.scale(pulse, pulse);
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 36px Trebuchet MS'; ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10;
      ctx.fillText('TAMAT 👑🌈', 0, 0);
      ctx.font = 'bold 22px Trebuchet MS';
      ctx.fillText('EDRIS WIRA PULAU PELANGI!', 0, 36);
      ctx.shadowBlur = 0;
      ctx.restore();
      ctx.textAlign = 'left';
    }
  }
  drawParticles();
  if (t > ENDING_DUR - 50) dim((t - (ENDING_DUR - 50)) / 50);
}

// ─── LOOP ─────────────────────────────────────────────────
function loop() { update(); render(); requestAnimationFrame(loop); }

// ─── INIT ─────────────────────────────────────────────────
// Pemain baharu → cutscene pembukaan. Pemain yg dah maju → terus ke Peta Dunia.
if (progress.unlocked > 1) openMap();
else startIntro();
loop();
</script>
<script src="reward-timer.js"></script>
