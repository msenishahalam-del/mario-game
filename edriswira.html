<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Edris Wira Pulau Pelangi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(circle at 50% 30%, #1a1a3e 0%, #0a0a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      overflow: hidden;
      padding: 8px;
    }

    /* ── Game frame wrapper ── */
    #gameWrap {
      position: relative;
      width: 800px;
      max-width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 4px #1b2a4a, 0 18px 50px rgba(0,0,0,0.6), 0 0 60px rgba(92,148,252,0.25);
    }

    /* ── HUD ── */
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: linear-gradient(180deg, #1b2a4a 0%, #0f1a30 100%);
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
    }
    .hud-item {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.07);
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }
    .hud-item .lbl { color: #8fb4ff; font-size: 11px; }
    #scoreDisplay .val { color: #FFD700; }
    canvas {
      display: block;
      width: 800px;
      max-width: 100%;
      image-rendering: pixelated;
      touch-action: none;
      background: #5C94FC;
    }

    /* ── HUB + mute buttons ── */
    .topbtn {
      position: fixed; top: 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 14px;
      border: 2px solid #FFD700;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 14px; font-weight: bold;
      letter-spacing: 1px;
      z-index: 60; cursor: pointer;
      user-select: none;
    }
    .topbtn:hover { background: #FFD700; color: #000; }
    #hubBtn { left: 12px; }
    #muteBtn { right: 12px; border-color: #8fb4ff; }

    /* ── Mobile controls ── */
    #mobileControls {
      display: none;
      width: 800px; max-width: 100%;
      padding: 12px 14px;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .ctrl-group { display: flex; gap: 12px; }
    .ctrl-btn {
      width: 66px; height: 66px;
      background: rgba(255,255,255,0.12);
      border: 3px solid rgba(255,255,255,0.45);
      border-radius: 50%;
      color: #fff; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; -webkit-user-select: none;
      touch-action: none; transition: transform 0.05s, background 0.1s;
    }
    .ctrl-btn:active, .ctrl-btn.pressed { background: rgba(255,255,255,0.42); transform: scale(0.92); }
    #btnJump { width: 84px; height: 84px; background: rgba(204,0,0,0.55); border-color: #FF5555; font-size: 30px; }
    #btnJump.pressed { background: rgba(255,60,60,0.85); }
    #btnRun  { width: 64px; height: 64px; background: rgba(255,180,0,0.35); border-color: #FFC107; font-size: 22px; }
    #btnFire { width: 64px; height: 64px; background: rgba(255,80,0,0.35); border-color: #FF6A00; font-size: 22px; }

    @media (max-width: 820px) {
      #hud { font-size: 12px; padding: 6px 8px; }
      .hud-item { padding: 3px 7px; }
      #mobileControls { display: flex; }
    }

  </style>
</head>
<body>

  <a id="hubBtn" class="topbtn" href="arcade.html">◀ HUB</a>
  <div id="muteBtn" class="topbtn">🔊</div>

  <div id="gameWrap">
    <div id="hud">
      <div class="hud-item"><span class="lbl">PLAYER</span> <span id="nameTag">—</span></div>
      <div class="hud-item" id="scoreDisplay"><span class="lbl">SCORE</span> <span class="val">0</span></div>
      <div class="hud-item"><span class="lbl">🪙</span> <span id="coinsDisplay">0</span></div>
      <div class="hud-item"><span class="lbl">❤️</span> <span id="livesDisplay">3</span></div>
      <div class="hud-item"><span class="lbl">WORLD</span> <span id="worldDisplay">1-1</span></div>
    </div>

    <canvas id="canvas" width="800" height="480"></canvas>
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls">
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btnRun">💨</div>
      <div class="ctrl-btn" id="btnFire">🔥</div>
      <div class="ctrl-btn" id="btnJump">▲</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── AUDIO (WebAudio chiptune SFX — original, no copyrighted music) ───
let actx = null, muted = false;
function initAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (actx && actx.state === 'suspended') actx.resume();
}
function tone(freq, dur, type='square', vol=0.14, when=0, slideTo=null) {
  if (!actx || muted) return;
  const t0 = actx.currentTime + when;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0008, t0 + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function noise(dur, vol=0.18, when=0) {
  if (!actx || muted) return;
  const t0 = actx.currentTime + when;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = actx.createBufferSource(); const g = actx.createGain();
  src.buffer = buf; g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g); g.connect(actx.destination); src.start(t0);
}
const SFX = {
  jump:    () => tone(300, 0.18, 'square', 0.13, 0, 640),
  coin:    () => { tone(988, 0.07, 'square', 0.13); tone(1319, 0.13, 'square', 0.13, 0.07); },
  stomp:   () => { tone(180, 0.09, 'square', 0.16, 0, 70); noise(0.06, 0.1); },
  bump:    () => tone(130, 0.09, 'square', 0.16, 0, 90),
  brk:     () => { noise(0.14, 0.2); tone(200, 0.1, 'square', 0.1, 0, 90); },
  power:   () => { [523,659,784,1047].forEach((f,i)=>tone(f,0.1,'square',0.13,i*0.06)); },
  appear:  () => { [392,523,659].forEach((f,i)=>tone(f,0.09,'triangle',0.12,i*0.05)); },
  hurt:    () => tone(400, 0.2, 'sawtooth', 0.14, 0, 120),
  die:     () => { [440,330,220,165].forEach((f,i)=>tone(f,0.18,'square',0.15,i*0.13)); },
  clear:   () => { [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.14,'square',0.14,i*0.1)); },
  oneup:   () => { [659,784,1047,1319].forEach((f,i)=>tone(f,0.1,'triangle',0.13,i*0.07)); },
};
document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
});

// ─── CONSTANTS ───────────────────────────────────────────
const GROUND_Y = 432;
const SKY_TOP = '#3a7bd5', SKY_BOT = '#9ad0ff';
const BRICK = '#C5500F';

// physics
const WALK_ACC = 0.55, RUN_ACC = 0.85;
const MAX_WALK = 3.2, MAX_RUN = 5.2;
const FRICTION = 0.80, AIR_FRICTION = 0.92;
const JUMP_V = -11.4;
const GRAV = 0.72, GRAV_HOLD = 0.40, MAX_FALL = 13.5;
const COYOTE = 6, JUMP_BUF = 7;
const FIRE_COOLDOWN = 18;       // frames antara fireball
const STAR_DURATION = 600;      // 10 saat @ 60fps
const ICE_FRICTION = 0.05;      // licin untuk Level 2 (Dunia Salji)
const FLUTTER_FRAMES = 32;      // tempoh flutter jump atas Yoshi
const FREEZE_FRAMES = 240;      // musuh beku 4 saat

// ─── MUZIK LATAR (chiptune original — bukan lagu berhak cipta) ───
const MUSIC = (function () {
  const MASTER = 0.045, LOOKAHEAD_MS = 25, SCHEDULE_AHEAD = 0.12;
  const SEMI = { C:-9,'C#':-8,D:-7,'D#':-6,E:-5,F:-4,'F#':-3,G:-2,'G#':-1,A:0,'A#':1,B:2 };
  function f(n){ if(n==null)return 0; if(typeof n==='number')return n; const m=/^([A-G]#?)(\d)$/.exec(n); if(!m)return 0; const s=SEMI[m[1]]+(parseInt(m[2],10)-4)*12; return 440*Math.pow(2,s/12); }
  const THEMES = {
    api:{ bpm:152, lead:'square', bass:'sawtooth', leadGain:1.0, bassGain:0.7,
      melody:[['E5',.5],['E5',.5],[null,.5],['E5',.5],[null,.5],['C5',.5],['E5',.5],['G5',1],[null,.5],['G4',.5],[null,1],['A4',.5],['B4',.5],['A#4',.5],['A4',.5],['G4',.5],['E5',.5],['G5',.5],['A5',1],['F5',.5],['G5',.5],[null,.5],['E5',.5],['C5',.5],['D5',.5],['B4',1],[null,1]],
      bassline:[['E2',1],['E2',1],['E2',1],['G2',1],['A2',1],['A2',1],['E2',1],['E2',1],['C2',1],['C2',1],['G2',1],['G2',1],['A2',1],['B2',1],['E2',1],['E2',1]] },
    laut:{ bpm:92, lead:'triangle', bass:'triangle', leadGain:1.0, bassGain:0.6,
      melody:[['G4',1],['B4',1],['D5',1.5],['B4',.5],['C5',2],['A4',2],['F4',1],['A4',1],['C5',1.5],['A4',.5],['G4',2],[null,2],['E5',1],['D5',1],['C5',1.5],['B4',.5],['A4',2],['C5',2],['D5',1],['B4',1],['G4',1.5],['A4',.5],['G4',3],[null,1]],
      bassline:[['G2',2],['G2',2],['C3',2],['C3',2],['F2',2],['F2',2],['G2',2],['G2',2],['A2',2],['A2',2],['F2',2],['F2',2],['G2',2],['G2',2],['G2',2],['D2',2]] },
    hutan:{ bpm:130, lead:'square', bass:'triangle', leadGain:0.95, bassGain:0.65,
      melody:[['C5',.5],['E5',.5],['G5',.5],['E5',.5],['C5',.5],['E5',.5],['G5',1],['A5',.5],['G5',.5],['E5',.5],['C5',.5],['D5',1],[null,.5],['D5',.5],['F5',.5],['A5',.5],['G5',.5],['F5',.5],['E5',.5],['G5',.5],['C5',1],['E5',.5],['D5',.5],['E5',.5],['F5',.5],['G5',1.5],[null,.5]],
      bassline:[['C3',.5],['G2',.5],['C3',.5],['G2',.5],['C3',.5],['G2',.5],['C3',.5],['G2',.5],['A2',.5],['E2',.5],['A2',.5],['E2',.5],['G2',.5],['D2',.5],['G2',.5],['D2',.5],['F2',.5],['C3',.5],['F2',.5],['C3',.5],['C3',.5],['G2',.5],['C3',.5],['G2',.5],['C3',.5],['G2',.5],['C3',.5],['G2',.5],['G2',.5],['G2',.5],['C3',.5],['C3',.5]] },
    kubu:{ bpm:108, lead:'square', bass:'sawtooth', leadGain:0.9, bassGain:0.7,
      melody:[['A4',1],['A#4',1],['A4',1],[null,1],['D5',1],['C#5',.5],['D5',.5],['A4',1],[null,1],['F4',1.5],['E4',.5],['F4',1],[null,1],['A4',.5],['A#4',.5],['A4',.5],['G#4',.5],['A4',2],[null,1]],
      bassline:[['A1',2],['A1',2],['D2',2],['A1',2],['F1',2],['F1',2],['E2',2],['A1',2]] },
    bos:{ bpm:174, lead:'sawtooth', bass:'square', leadGain:0.95, bassGain:0.7,
      melody:[['D5',.5],['A4',.5],['D5',.5],['F5',.5],['E5',.5],['D5',.5],['A4',.5],['D5',.5],['C5',.5],['A4',.5],['C5',.5],['E5',.5],['D5',1],['A4',.5],['F5',.5],['G5',.5],['F5',.5],['E5',.5],['D5',.5],['C5',.5],['D5',.5],['E5',.5],['F5',.5],['E5',.5],['C5',.5],['A4',.5],['G4',.5],['A4',1],[null,1]],
      bassline:[['D2',.5],['D2',.5],['D2',.5],['D2',.5],['D2',.5],['D2',.5],['D2',.5],['D2',.5],['A1',.5],['A1',.5],['A1',.5],['A1',.5],['A1',.5],['A1',.5],['A1',.5],['A1',.5],['A#1',.5],['A#1',.5],['A#1',.5],['A#1',.5],['C2',.5],['C2',.5],['C2',.5],['C2',.5],['A1',.5],['A1',.5],['A1',.5],['A1',.5],['D2',.5],['D2',.5],['D2',.5],['D2',.5]] },
    menang:{ bpm:140, lead:'square', bass:'triangle', leadGain:1.0, bassGain:0.6, once:true,
      melody:[['C5',.5],['E5',.5],['G5',.5],['C6',.75],['G5',.25],['C6',1.5],[null,.5],['A5',.5],['B5',.5],['C6',1.5],[null,.5]],
      bassline:[['C3',1],['G2',1],['C3',1],['C3',1],['F2',1],['G2',1],['C3',2]] }
  };
  let current=null, timer=null, nextTime=0, leadIdx=0, bassIdx=0, bassBeatsLeft=0, melodyDone=false;
  function beatDur(){ return 60/THEMES[current].bpm; }
  function playNote(freq, when, dur, type, gainScale){ if(!freq)return; try{ const o=actx.createOscillator(), g=actx.createGain(); o.type=type; o.frequency.setValueAtTime(freq,when); const vol=MASTER*gainScale, atk=0.008, rel=Math.min(0.08,dur*0.4); g.gain.setValueAtTime(0.0001,when); g.gain.exponentialRampToValueAtTime(vol,when+atk); g.gain.setValueAtTime(vol,Math.max(when+atk,when+dur-rel)); g.gain.exponentialRampToValueAtTime(0.0001,when+dur); o.connect(g).connect(actx.destination); o.start(when); o.stop(when+dur+0.02); }catch(e){} }
  function scheduleStep(){ const th=THEMES[current], bd=beatDur(); const ln=th.melody[leadIdx], lbeats=ln[1]; if(!muted) playNote(f(ln[0]), nextTime, lbeats*bd*0.96, th.lead, th.leadGain); if(bassBeatsLeft<=0.0001){ const bn=th.bassline[bassIdx]; if(!muted) playNote(f(bn[0]), nextTime, bn[1]*bd*0.9, th.bass, th.bassGain); bassBeatsLeft=bn[1]; bassIdx=(bassIdx+1)%th.bassline.length; } bassBeatsLeft-=lbeats; nextTime+=lbeats*bd; leadIdx++; if(leadIdx>=th.melody.length){ leadIdx=0; if(th.once) melodyDone=true; } }
  function tick(){ if(!actx||current==null)return; while(nextTime<actx.currentTime+SCHEDULE_AHEAD){ if(melodyDone){ stop(); return; } scheduleStep(); } }
  function start(theme){ if(!actx||!THEMES[theme])return; if(current===theme&&timer)return; current=theme; leadIdx=0; bassIdx=0; bassBeatsLeft=0; melodyDone=false; nextTime=actx.currentTime+0.06; if(timer)clearInterval(timer); timer=setInterval(tick,LOOKAHEAD_MS); tick(); }
  function stop(){ if(timer){ clearInterval(timer); timer=null; } current=null; melodyDone=false; }
  return { start, stop, get current(){ return current; } };
})();

// ─── STATE ───────────────────────────────────────────────
let score = 0, coins = 0, lives = 5;   // mod mudah — lebih nyawa untuk 6 tahun
let gameState = 'name'; // name | cutscene | playing | dead | gameover | win | clear | ending
let cameraX = 0, shake = 0;
let spawnX = 60, currentLevel = 1;
const MAX_LEVEL = 4;            // Api(1) · Laut(2) · Hutan(3) · Kubu Raja Gergasi(4)
const LEVEL_NAMES = { 1: 'DUNIA API', 2: 'DUNIA LAUT', 3: 'DUNIA HUTAN', 4: 'KUBU RAJA GERGASI' };
let snowflakes = [];            // untuk Level 2 background
let embers = [];                // untuk Level 4 background (bara api naik)
let cut = null;                 // cutscene timeline {t, kind:'intro'|'ending'}
let fleeingYoshi = null;        // animasi Yoshi lari bila kena hit
let level, player, particles = [], floaters = [];
let scoreSent = false, playerName = '';
let clearTimer = 0;
let bonusReturn = null;   // simpan state level utama bila masuk pipe
let winTimer = 0;

// ── v2: simpan kemajuan + bintang ──
const PROGRESS_KEY = 'edriswira_progress';
function loadProgress() { try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{"unlocked":1,"stars":{}}'); } catch { return { unlocked: 1, stars: {} }; } }
function saveProgress() { try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); } catch {} }
let progress = loadProgress();
let levelDeaths = 0;          // mati dalam level semasa → penilaian bintang
let bossTalk = 0;             // pemasa gelembung dialog bos
const BOSS_LINES = { gergasiapi: 'Kamu akan hangus!', ularlaut: 'Tenggelam kamu!', rajamonyet: 'Hihihi, tangkap pisang ni!', rajagergasi: 'Puteri Peach milik aku!' };
// Bintang ikut kematian dalam level
function awardStars() {
  const s = levelDeaths === 0 ? 3 : levelDeaths === 1 ? 2 : 1;
  if (!progress.stars[currentLevel] || s > progress.stars[currentLevel]) progress.stars[currentLevel] = s;
  if (currentLevel + 1 > progress.unlocked && currentLevel < MAX_LEVEL) progress.unlocked = currentLevel + 1;
  if (currentLevel === MAX_LEVEL) progress.unlocked = MAX_LEVEL;   // habis semua
  saveProgress();
  return s;
}

// ─── INPUT ───────────────────────────────────────────────
const keys = {};
let coyoteT = 0, bufferT = 0;
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyZ'].includes(e.code)) e.preventDefault();
  if ((e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW')) bufferT = JUMP_BUF;
  if (e.code === 'KeyZ' && gameState === 'playing' && player && (player.fire || player.ice) && player.fireCD <= 0 && !player.dead) {
    throwProjectile();
  }
  if (e.code === 'Enter' && (gameState === 'dead' && lives > 0)) respawn();
  if (e.code === 'Enter' && (gameState === 'cutscene' || gameState === 'ending')) endCutscene();
  // Main semula selepas tamat → ke Peta Dunia
  if (e.code === 'Enter' && (gameState === 'gameover' || gameState === 'win')) openMap();
  // Peta Dunia: buka dengan M; pilih dunia 1-4
  if (e.code === 'KeyM' && (gameState === 'playing' || gameState === 'gameover' || gameState === 'win')) openMap();
  if (gameState === 'map' && ['Digit1','Digit2','Digit3','Digit4'].includes(e.code)) {
    const n = parseInt(e.code.slice(5), 10);
    if (n <= progress.unlocked) { SFX.power(); score = 0; coins = 0; lives = 5; startLevelAt(n); }
  }
  initAudio();   // buka bunyi pada input pertama
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function jumpHeld() { return keys['ArrowUp'] || keys['Space'] || keys['KeyW']; }
function runHeld()  { return keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyX'] || mobileRun; }

// ─── MOBILE CONTROLS ──────────────────────────────────────
let mobileRun = false;
function setupMobile() {
  const bind = (id, code) => {
    const b = document.getElementById(id);
    const on = e => { e.preventDefault(); initAudio(); keys[code] = true; b.classList.add('pressed');
      if (code === 'ArrowUp') bufferT = JUMP_BUF;
      if (gameState === 'cutscene' || gameState === 'ending') endCutscene();
      else if (gameState === 'gameover' || gameState === 'win') startGame(); };
    const off = e => { e.preventDefault(); keys[code] = false; b.classList.remove('pressed'); };
    b.addEventListener('touchstart', on, {passive:false});
    b.addEventListener('touchend', off, {passive:false});
    b.addEventListener('touchcancel', off, {passive:false});
  };
  bind('btnLeft','ArrowLeft'); bind('btnRight','ArrowRight'); bind('btnJump','ArrowUp');
  const r = document.getElementById('btnRun');
  r.addEventListener('touchstart', e=>{e.preventDefault(); initAudio(); mobileRun=true; r.classList.add('pressed');}, {passive:false});
  r.addEventListener('touchend',   e=>{e.preventDefault(); mobileRun=false; r.classList.remove('pressed');}, {passive:false});
  // Butang tembak api/ais 🔥
  const f = document.getElementById('btnFire');
  f.addEventListener('touchstart', e=>{
    e.preventDefault(); initAudio(); f.classList.add('pressed');
    if (gameState === 'playing' && player && (player.fire || player.ice) && player.fireCD <= 0 && !player.dead) throwProjectile();
    else if (gameState === 'cutscene' || gameState === 'ending') endCutscene();
    else if (gameState === 'gameover' || gameState === 'win') startGame();
  }, {passive:false});
  f.addEventListener('touchend', e=>{e.preventDefault(); f.classList.remove('pressed');}, {passive:false});
}
setupMobile();

// ─── LEVEL BUILDING ───────────────────────────────────────
function B(x, y, w, h, type, content) { return { x, y, w, h, type, content: content||null, bumpT: 0, broken: false, used: false }; }

function mkBoss(type, x, hp, minX, maxX) {
  return { type, x, y: GROUND_Y - 90, w: 80, h: 90, vx: 1.5, dir: -1,
           hp, maxHp: hp, hit: 0, fireT: 90, jumpT: 190, alive: true, active: false,
           enraged: false, vy: 0, onGround: true, minX, maxX, stompLock: 0 };
}

function buildLevel(num) {
  const blocks = [], coinList = [], enemies = [], powerups = [], decos = [], lavas = [];
  const firePipes = [], logZones = []; let tsunami = null;
  let lengthX, boss = null;

  if (num === 1) {
    // ── LEVEL 1 — DUNIA API 🔥 (pipe tembak api, lava, api kecil) ──
    lengthX = 2900;
    blocks.push(B(0, GROUND_Y, 560, 48, 'ground'));       // lava 560-700
    blocks.push(B(700, GROUND_Y, 640, 48, 'ground'));     // lava 1340-1460
    blocks.push(B(1460, GROUND_Y, 560, 48, 'ground'));    // lava 2020-2140
    blocks.push(B(2140, GROUND_Y, 760, 48, 'ground'));    // arena bos
    lavas.push({ x: 560, w: 140 }, { x: 1340, w: 120 }, { x: 2020, w: 120 });
    blocks.push(B(600, 340, 80, 20, 'solid'));            // platform atas lava
    blocks.push(B(1370, 335, 90, 20, 'solid'));
    blocks.push(B(2050, 345, 70, 20, 'solid'));

    // power-up: Bunga Ais (ais lawan api!)
    blocks.push(B(300, 290, 32, 32, 'question', 'mushroom'));
    blocks.push(B(360, 290, 32, 32, 'question', 'ice'));
    blocks.push(B(880, 250, 32, 32, 'question', 'coin'));
    blocks.push(B(1600, 270, 32, 32, 'question', 'fire'));
    blocks.push(B(1000, 300, 32, 32, 'brick'));

    // 🔴 PIPE TEMBAK API — pipe yang menyembur bola api berkala
    const fp1 = B(760, GROUND_Y-64, 56, 64, 'pipe'); fp1.firePipe = true; blocks.push(fp1);
    firePipes.push({ x: 760, y: GROUND_Y-64 });
    const fp2 = B(1520, GROUND_Y-64, 56, 64, 'pipe'); fp2.firePipe = true; blocks.push(fp2);
    firePipes.push({ x: 1520, y: GROUND_Y-64 });

    // 👹 Api Kecil (raksasa kecil api) — musuh berjalan
    [420, 820, 1150, 1560, 1780, 2260].forEach(x => enemies.push(mkEnemy(x, 'apikecil')));
    [[300,240],[420,200],[900,240],[1200,220],[1650,220],[2200,240]].forEach(([x,y]) => coinList.push(mkCoin(x,y)));
    decos.push(...[150,1050,1750,2400].map(x => ({x, type:'firerock'})));

    blocks.push(B(2860, GROUND_Y-220, 40, 220, 'solid'));   // dinding arena
    boss = mkBoss('gergasiapi', 2560, 4, 2200, 2800);

  } else if (num === 2) {
    // ── LEVEL 2 — DUNIA LAUT 🌊 (tsunami!) ──
    lengthX = 2900;
    blocks.push(B(0, GROUND_Y, 700, 48, 'ground'));
    blocks.push(B(820, GROUND_Y, 520, 48, 'ground'));     // air 700-820
    blocks.push(B(1460, GROUND_Y, 560, 48, 'ground'));    // air 1340-1460
    blocks.push(B(2140, GROUND_Y, 760, 48, 'ground'));    // air 2020-2140 + arena bos

    // batu/platform TINGGI untuk naik elak ombak
    blocks.push(B(260, 300, 90, 22, 'solid'));
    blocks.push(B(430, 250, 80, 22, 'solid'));
    blocks.push(B(720, 300, 100, 22, 'solid'));           // atas air
    blocks.push(B(980, 250, 90, 22, 'solid'));
    blocks.push(B(1360, 300, 100, 22, 'solid'));          // atas air
    blocks.push(B(1620, 250, 90, 22, 'solid'));
    blocks.push(B(1880, 220, 90, 22, 'solid'));
    blocks.push(B(2040, 300, 90, 22, 'solid'));           // atas air

    blocks.push(B(300, 250, 32, 32, 'question', 'mushroom'));
    blocks.push(B(760, 250, 32, 32, 'question', 'fire'));
    blocks.push(B(1400, 250, 32, 32, 'question', 'star'));
    blocks.push(B(1900, 170, 32, 32, 'question', 'coin'));

    // ikan dari pipe
    blocks.push(B(1050, GROUND_Y-56, 56, 56, 'pipe'));
    enemies.push(mkEnemy(1078, 'fish', { pipeY: GROUND_Y-56 }));
    [520, 900, 1550, 1750, 2260, 2400].forEach(x => enemies.push(mkEnemy(x, 'apikecil')));
    [[280,200],[440,200],[1000,200],[1640,200],[2050,250]].forEach(([x,y]) => coinList.push(mkCoin(x,y)));
    decos.push(...[150,1150,1950,2500].map(x => ({x, type:'palmtree'})));

    // 🌊 TSUNAMI — ombak menyapu berkala; naik platform tinggi untuk elak
    tsunami = { t: 0, interval: 420, warn: 90, waveX: 0, active: false, warning: false, speed: 6, safeY: GROUND_Y - 70 };

    blocks.push(B(2860, GROUND_Y-220, 40, 220, 'solid'));
    boss = mkBoss('ularlaut', 2560, 5, 2200, 2800);

  } else if (num === 3) {
    // ── LEVEL 3 — DUNIA HUTAN 🌳 (kayu jatuh, monyet baling pisang, tunggang Si Comel) ──
    lengthX = 2900;
    blocks.push(B(0, GROUND_Y, 760, 48, 'ground'));
    blocks.push(B(860, GROUND_Y, 600, 48, 'ground'));     // gaung 760-860
    blocks.push(B(1560, GROUND_Y, 560, 48, 'ground'));    // gaung 1460-1560
    blocks.push(B(2140, GROUND_Y, 760, 48, 'ground'));    // arena bos

    blocks.push(B(280, 300, 90, 22, 'solid'));
    blocks.push(B(560, 290, 100, 22, 'solid'));           // atas gaung
    blocks.push(B(1000, 280, 90, 22, 'solid'));
    blocks.push(B(1260, 290, 100, 22, 'solid'));          // atas gaung
    blocks.push(B(1700, 250, 90, 22, 'solid'));

    blocks.push(B(360, 250, 32, 32, 'question', 'mushroom'));
    blocks.push(B(1100, 220, 32, 32, 'question', 'fire'));
    blocks.push(B(1750, 190, 32, 32, 'question', 'star'));
    blocks.push(B(1900, 260, 32, 32, 'question', 'coin'));

    // 🐒 Monyet baling pisang + 🌲 kayu tumbang (logZones = x tempat kayu jatuh)
    [500, 1150, 1650, 2260].forEach(x => enemies.push(mkEnemy(x, 'monkey')));
    [320, 980, 1820].forEach(x => enemies.push(mkEnemy(x, 'apikecil')));
    logZones.push({ x: 700, t: 40 }, { x: 1350, t: 120 }, { x: 1950, t: 80 });
    [[300,240],[600,240],[1050,230],[1300,240],[1750,230],[2200,240]].forEach(([x,y]) => coinList.push(mkCoin(x,y)));
    decos.push(...[150,700,1200,1900,2500].map(x => ({x, type:'palmtree'})));

    blocks.push(B(2860, GROUND_Y-220, 40, 220, 'solid'));
    boss = mkBoss('rajamonyet', 2560, 5, 2200, 2800);

  } else {
    // ── LEVEL 4 — KUBU RAJA GERGASI 👹 (jambatan, ikan dari pipe) + BOS AKHIR ──
    lengthX = 2900;
    blocks.push(B(0, GROUND_Y, 480, 48, 'ground'));       // air 480-620
    blocks.push(B(620, GROUND_Y, 360, 48, 'ground'));     // air 980-1120
    blocks.push(B(1120, GROUND_Y, 380, 48, 'ground'));    // air 1500-1640
    blocks.push(B(1640, GROUND_Y, 340, 48, 'ground'));    // air 1980-2140
    blocks.push(B(2140, GROUND_Y, 760, 48, 'ground'));    // arena bos

    // 🌉 JAMBATAN kayu melintas air (papan nipis)
    for (let i = 0; i < 6; i++) blocks.push(B(480 + i*24, GROUND_Y-6, 24, 12, 'bridge'));
    for (let i = 0; i < 7; i++) blocks.push(B(980 + i*24, GROUND_Y-6, 24, 12, 'bridge'));
    for (let i = 0; i < 6; i++) blocks.push(B(1500 + i*24, GROUND_Y-6, 24, 12, 'bridge'));
    for (let i = 0; i < 7; i++) blocks.push(B(1980 + i*24, GROUND_Y-6, 24, 12, 'bridge'));

    // loadout penuh sebelum bos akhir
    blocks.push(B(240, 290, 32, 32, 'question', 'mushroom'));
    blocks.push(B(300, 290, 32, 32, 'question', 'fire'));
    blocks.push(B(720, 260, 32, 32, 'question', 'ice'));
    blocks.push(B(1720, 250, 32, 32, 'question', 'star'));

    // 🐟 Ikan melompat keluar dari pipe (tolak Edris jatuh)
    blocks.push(B(760, GROUND_Y-56, 56, 56, 'pipe'));
    blocks.push(B(1280, GROUND_Y-56, 56, 56, 'pipe'));
    enemies.push(mkEnemy(788, 'fish', { pipeY: GROUND_Y-56 }));
    enemies.push(mkEnemy(1308, 'fish', { pipeY: GROUND_Y-56 }));
    [350, 1200, 1800].forEach(x => enemies.push(mkEnemy(x, 'apikecil')));
    [[250,240],[720,220],[1180,240],[1720,210],[2050,250]].forEach(([x,y]) => coinList.push(mkCoin(x,y)));

    blocks.push(B(2860, GROUND_Y-220, 40, 220, 'solid'));
    boss = mkBoss('rajagergasi', 2560, 7, 2180, 2800);
  }

  // ── Si Comel (mount) — hanya Dunia Hutan ──
  let yoshi = null;
  if (num === 3) {
    yoshi = { x: 180, y: GROUND_Y - 42, w: 40, h: 42, vx: 0, dir: 1,
              taken: false, animT: 0, animF: 0, bob: 0 };
  }

  const theme = num === 1 ? 'api' : num === 2 ? 'laut' : num === 3 ? 'hutan' : 'kubu';
  // Checkpoint mesti atas tanah pejal — bukan atas longkang/lava/air, jauh dari pipe api & musuh
  const cpX = safeCheckpointX(blocks, lavas, firePipes, enemies, Math.floor(lengthX * 0.52));
  return { blocks, coinList, enemies, powerups, decos, flag: null, boss, yoshi,
           fireballs: [], playerFireballs: [], theme, lengthX, lavas,
           firePipes, logZones, tsunami, fallers: [], hazT: 0,
           checkpoint: { x: cpX, reached: false } };
}

// Cari kedudukan checkpoint yang selamat: atas blok 'ground', elak lava/longkang, pipe api & musuh
function safeCheckpointX(blocks, lavas, firePipes, enemies, target) {
  const half = 16;   // separuh lebar pemain + margin
  const onGround = x => blocks.some(b => b.type === 'ground' && x - half >= b.x && x + half <= b.x + b.w);
  const overLava = x => (lavas || []).some(l => x + half > l.x && x - half < l.x + l.w);
  const nearPipe = x => (firePipes || []).some(p => Math.abs(x - (p.x + 28)) < 72);
  const nearEnemy = x => enemies.some(e => e.kind !== 'fish' && e.kind !== 'piranha' && Math.abs(e.x - x) < 72);
  const safe = x => x > 60 && onGround(x) && !overLava(x) && !nearPipe(x) && !nearEnemy(x);
  if (safe(target)) return target;
  for (let d = 24; d < 1500; d += 24) {
    if (safe(target - d)) return target - d;
    if (safe(target + d)) return target + d;
  }
  return target;
}

// ─── BONUS ROOM (bawah tanah, penuh coin) ─────────────────
function buildBonus(returnX) {
  const blocks = [], coinList = [], enemies = [], powerups = [], decos = [];
  const lengthX = 760;
  blocks.push(B(0, GROUND_Y, 760, 48, 'ground'));
  blocks.push(B(-40, 0, 40, H, 'solid'));        // dinding kiri
  blocks.push(B(760, 0, 40, H, 'solid'));        // dinding kanan
  // coin rows
  for (let r = 0; r < 2; r++)
    for (let i = 0; i < 9; i++)
      coinList.push(mkCoin(120 + i*64, 220 + r*60));
  // exit pipe di hujung kanan
  const exitPipe = B(640, GROUND_Y-80, 56, 80, 'pipe'); exitPipe.isExit = true; blocks.push(exitPipe);
  return { blocks, coinList, enemies, powerups, decos, flag: null, boss: null,
           fireballs: [], playerFireballs: [], theme: 'underground', lengthX, isBonus: true, returnX, lavas: [] };
}

function mkEnemy(x, kind, opts) {
  opts = opts || {};
  if (kind === 'piranha' || kind === 'fish') {
    // Keluar masuk dari pipe. 'fish' = ikan melompat (Dunia Laut/Kubu). opts.pipeY = puncak pipe.
    const pipeY = opts.pipeY !== undefined ? opts.pipeY : GROUND_Y - 56;
    const hideY = pipeY + 4;        // tersembunyi: dalam pipe
    const showY = pipeY - (kind === 'fish' ? 44 : 36);   // ikan melompat lebih tinggi
    return { x, y: hideY, w: 28, h: 36, vx: 0, vy: 0,
             hideY, showY, baseY: hideY,
             alive: true, kind, stateT: kind === 'fish' ? 60 : 90, phase: 'hidden',
             squished: false, squishT: 0, animT: 0, animF: 0, onGround: false };
  }
  return { x, y: GROUND_Y - 30, w: 30, h: 30, vx: 0, vy: 0,
           speed: (kind === 'apikecil' ? 1.0 : 1.2) + Math.random()*0.5, dir: -1,
           alive: true, kind, squished: false, squishT: 0, animT: 0, animF: 0, onGround:false,
           throwT: kind === 'monkey' ? 120 + Math.floor(Math.random()*90) : 0 };
}
function mkCoin(x, y) { return { x, y, w: 20, h: 20, got: false, spin: Math.random()*6 }; }

// ─── PLAYER ───────────────────────────────────────────────
function makePlayer() {
  return { x: spawnX, y: GROUND_Y - 44, w: 28, h: 44, vx: 0, vy: 0,
           onGround: false, facing: 1, animT: 0, animF: 0,
           big: false, fire: false, ice: false, starT: 0, fireCD: 0,
           onYoshi: false, flutterT: 0,
           inv: 0, dead: false, deadT: 0, skid: false };
}
function hurtPlayer() {
  // Hierarki kecederaan: Yoshi → Ais → Fire → Big → mati
  if (player.inv > 0 || player.dead) return;
  if (player.onYoshi) {
    player.onYoshi = false; player.flutterT = 0; player.inv = 100;
    // Yoshi lari (kesan visual)
    fleeingYoshi = { x: player.x, y: player.y + player.h - 36, vx: player.facing * -4, vy: -7, life: 50 };
    burst(player.x+player.w/2, player.y, '#3a3', 14);
    SFX.hurt();
    return;
  }
  if (player.ice || player.fire || player.big) shrink();
  else killPlayer();
}
function growBig() {
  if (player.ice || player.fire) { score += 1000; floatText(player.x, player.y, '+1000'); return; }
  if (player.big) { score += 1000; floatText(player.x, player.y, '+1000'); return; }
  player.big = true; player.h = 56; player.y -= 12; player.inv = 40;
  burst(player.x+player.w/2, player.y+10, '#FFD700', 16);
  SFX.power();
}
function setFire() {
  if (!player.big) { player.big = true; player.h = 56; player.y -= 12; }
  if (player.fire || player.ice) { score += 1000; floatText(player.x, player.y, '+1000'); return; }
  player.fire = true; player.inv = 40;
  burst(player.x+player.w/2, player.y+10, '#FF4400', 18);
  burst(player.x+player.w/2, player.y+10, '#FFAA00', 14);
  floatText(player.x, player.y - 12, 'API!', '#FF6600');
  SFX.power();
}
function setIce() {
  if (!player.big) { player.big = true; player.h = 56; player.y -= 12; }
  if (player.ice) { score += 1000; floatText(player.x, player.y, '+1000'); return; }
  player.ice = true; player.fire = false; player.inv = 40;
  burst(player.x+player.w/2, player.y+10, '#66ccff', 18);
  burst(player.x+player.w/2, player.y+10, '#ffffff', 14);
  floatText(player.x, player.y - 12, 'AIS!', '#66ccff');
  SFX.power();
}
function setStar() {
  player.starT = STAR_DURATION;
  burst(player.x+player.w/2, player.y, '#FFD700', 24);
  burst(player.x+player.w/2, player.y, '#FFFFFF', 14);
  floatText(player.x, player.y - 14, 'STAR!', '#FFD700');
  SFX.power();
}
function shrink() {
  if (player.ice) {
    // Ice Mario → Fire Mario (turun satu tahap)
    player.ice = false; player.fire = true; player.inv = 100;
    burst(player.x+player.w/2, player.y, '#66ccff', 12);
    SFX.hurt();
    return;
  }
  if (player.fire) {
    // Fire Mario → Big Mario (tak terus kecil)
    player.fire = false; player.inv = 100;
    burst(player.x+player.w/2, player.y, '#FFAA00', 12);
    SFX.hurt();
    return;
  }
  player.big = false; player.h = 44; player.y += 12; player.inv = 100;
  burst(player.x+player.w/2, player.y, '#fff', 12);
  SFX.hurt();
}
function throwProjectile() {
  if (!level || (!player.fire && !player.ice) || player.fireCD > 0) return;
  // Maksima 2 projectile aktif serentak
  if (level.playerFireballs.length >= 2) return;
  const fx = player.x + (player.facing > 0 ? player.w : -8);
  const fy = player.y + (player.big ? 16 : 12);
  level.playerFireballs.push({
    x: fx, y: fy, w: 12, h: 12,
    vx: player.facing * 6, vy: -2,
    life: 140, bounces: 0, spin: 0,
    ice: player.ice
  });
  player.fireCD = FIRE_COOLDOWN;
  SFX.bump();
}

// ─── PARTICLES / FLOAT TEXT ───────────────────────────────
function burst(x, y, color, n=8) {
  for (let i=0;i<n;i++) particles.push({ x, y, vx:(Math.random()-0.5)*6, vy:-(Math.random()*5+2),
    life:40, max:40, color, size:Math.random()*5+3 });
}
function brickBits(x, y) {
  const dirs = [[-2,-7],[2,-7],[-3,-4],[3,-4]];
  dirs.forEach(d => particles.push({ x:x+16, y:y+16, vx:d[0], vy:d[1], life:50, max:50, color:BRICK, size:7, rect:true }));
}
function floatText(x, y, txt, color='#fff') { floaters.push({ x, y, txt, color, life:50 }); }

// ─── FLOW ─────────────────────────────────────────────────
function startGame() {
  score = 0; coins = 0; lives = 5; spawnX = 60;   // mod mudah: 5 nyawa
  scoreSent = false; bonusReturn = null;
  startLevelAt(1);
}
// v2: mula terus di mana-mana level (dari peta dunia)
function startLevelAt(n) {
  currentLevel = n; spawnX = 60; bonusReturn = null; levelDeaths = 0;
  level = buildLevel(n); player = makePlayer();
  cameraX = 0; particles = []; floaters = [];
  initSnowflakes();
  gameState = 'playing'; updateHUD();
  MUSIC.start(level.theme);
  floatText(player.x - 10, player.y - 46, 'LEVEL ' + n + ' — ' + LEVEL_NAMES[n], '#FFD700');
}
function nextLevel() {
  currentLevel++; spawnX = 60; bonusReturn = null; levelDeaths = 0;
  level = buildLevel(currentLevel); player = makePlayer();
  cameraX = 0; particles = []; floaters = [];
  initSnowflakes();
  gameState = 'playing'; updateHUD();
  MUSIC.start(level.theme);
  floatText(player.x - 10, player.y - 46, 'LEVEL ' + currentLevel + ' — ' + LEVEL_NAMES[currentLevel], '#FFD700');
}

function initSnowflakes() {
  snowflakes = [];
  embers = [];
  fleeingYoshi = null;
  if (level && level.theme === 'ice') {
    for (let i = 0; i < 80; i++) {
      snowflakes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: -0.2 - Math.random() * 0.4,
        vy: 0.3 + Math.random() * 0.6,
        size: 1 + Math.random() * 2,
        sway: Math.random() * 6.28
      });
    }
  }
  if (level && (level.theme === 'castle' || level.theme === 'api')) {
    for (let i = 0; i < 40; i++) {
      embers.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vy: -(0.3 + Math.random() * 0.8),
        size: 1 + Math.random() * 2,
        sway: Math.random() * 6.28,
        glow: 0.4 + Math.random() * 0.6
      });
    }
  }
}
function respawn() {
  player = makePlayer();
  player.inv = 120;   // ~2 saat kebal — elak mati serta-merta jika musuh ada di titik respawn
  fleeingYoshi = null;
  cameraX = Math.max(0, spawnX - W/3);
  gameState = 'playing'; updateHUD();
}
function enterPipe(returnX) {
  if (bonusReturn) return;  // dah dalam bonus
  bonusReturn = { level, px: returnX + 70, py: GROUND_Y - player.h, big: player.big, fire: player.fire, ice: player.ice, cam: cameraX };
  level = buildBonus(returnX);
  player.x = 40; player.y = GROUND_Y - player.h; player.vx = 0; player.vy = 0;
  cameraX = 0;
  SFX.appear();
}
function exitBonus() {
  if (!bonusReturn) return;
  const r = bonusReturn; bonusReturn = null;
  level = r.level;
  player = makePlayer();
  player.x = r.px; player.y = r.py;
  if (r.big) { player.big = true; player.h = 56; player.y -= 12; }
  player.fire = r.fire; player.ice = r.ice;
  cameraX = r.cam;
  SFX.appear();
}

function updateHUD() {
  document.getElementById('scoreDisplay').querySelector('.val').textContent = score;
  document.getElementById('coinsDisplay').textContent = coins;
  document.getElementById('livesDisplay').textContent = lives;
  document.getElementById('worldDisplay').textContent = currentLevel + '-1';
  document.getElementById('nameTag').textContent = playerName || '★';
}

// ─── COLLISION ────────────────────────────────────────────
function overlap(a, b) { return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function solid(b) { return !b.broken; }

function moveX(e, blocks) {
  e.x += e.vx;
  for (const b of blocks) {
    if (!solid(b) || !overlap(e, b)) continue;
    if (e.vx > 0) e.x = b.x - e.w;
    else if (e.vx < 0) e.x = b.x + b.w;
    e.vx = 0;
  }
}
function moveY(e, blocks, onBump) {
  e.y += e.vy; e.onGround = false;
  for (const b of blocks) {
    if (!solid(b) || !overlap(e, b)) continue;
    if (e.vy > 0) { e.y = b.y - e.h; e.vy = 0; e.onGround = true; }
    else if (e.vy < 0) { e.y = b.y + b.h; e.vy = 0; if (onBump) onBump(b); }
  }
}

// ─── UPDATE ───────────────────────────────────────────────
function update() {
  if (shake > 0) shake *= 0.85;

  // ── Cutscene / Ending — jalankan timeline sahaja ──
  if (gameState === 'cutscene' || gameState === 'ending') {
    if (cut) {
      cut.t++;
      const dur = cut.kind === 'intro' ? INTRO_DUR : ENDING_DUR;
      if (cut.t > dur) endCutscene();
    }
    stepParticles();
    return;
  }

  if (gameState === 'clear') {
    if (!level.starsAwarded) { level.starsAwarded = true; level.starsGot = awardStars(); }
    clearTimer--;
    if (level.flag && player.y + player.h < GROUND_Y) { player.y += 2.2; level.flag.slide = Math.min(1, level.flag.slide + 0.012); }
    if (clearTimer <= 0) {
      if (currentLevel < MAX_LEVEL) nextLevel();
      else startEnding();   // Raja Gergasi tewas → babak selamatkan Puteri Peach!
    }
    stepParticles();
    return;
  }

  if (gameState !== 'playing') { stepParticles(); return; }

  const { blocks, coinList, enemies, powerups, flag } = level;

  if (!player.dead) {
    // horizontal accel — Level 4 (ice) lebih licin
    const onIce = level.theme === 'ice';
    const acc = (runHeld() ? RUN_ACC : WALK_ACC) * (onIce ? 0.45 : 1);
    const maxS = runHeld() ? MAX_RUN : MAX_WALK;
    if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= acc; player.facing = -1; }
    else if (keys['ArrowRight'] || keys['KeyD']) { player.vx += acc; player.facing = 1; }
    else {
      const fric = onIce && player.onGround ? (1 - ICE_FRICTION) : (player.onGround ? FRICTION : AIR_FRICTION);
      player.vx *= fric;
      if (Math.abs(player.vx) < 0.05) player.vx = 0;
    }
    player.vx = Math.max(-maxS, Math.min(maxS, player.vx));
    // skid detection
    player.skid = player.onGround && ((player.vx>0 && (keys['ArrowLeft']||keys['KeyA'])) || (player.vx<0 && (keys['ArrowRight']||keys['KeyD'])));

    // jump w/ coyote + buffer
    if (player.onGround) coyoteT = COYOTE; else if (coyoteT>0) coyoteT--;
    if (bufferT > 0) bufferT--;
    if (bufferT > 0 && coyoteT > 0) {
      player.vy = JUMP_V; player.onGround = false; coyoteT = 0; bufferT = 0;
      SFX.jump(); burst(player.x+player.w/2, player.y+player.h, '#fff', 4);
    }

    // variable gravity — Yoshi = flutter jump
    const gScale = 1;
    if (player.onGround) player.flutterT = FLUTTER_FRAMES;  // reset bila atas tanah
    if (player.onYoshi && !player.onGround && player.vy > 0 && jumpHeld() && player.flutterT > 0) {
      // Flutter jump — perlahan jatuh
      player.vy = Math.min(player.vy, 1.6);
      player.flutterT--;
      if (player.flutterT % 6 === 0) burst(player.x+player.w/2, player.y+player.h, '#fff', 2);
    } else {
      if (player.vy < 0 && jumpHeld()) player.vy += GRAV_HOLD * gScale;
      else player.vy += GRAV * gScale;
    }
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  } else {
    player.deadT--; player.y += player.vy; player.vy += 0.45;
    if (player.deadT <= 0) {
      lives--; levelDeaths++;
      if (lives <= 0) { gameState = 'gameover'; MUSIC.stop(); updateHUD(); }
      else respawn();
    }
    stepParticles(); return;
  }

  moveX(player, blocks);
  moveY(player, blocks, onHeadBump);

  // walk anim
  if (Math.abs(player.vx) > 0.4 && player.onGround) {
    const spd = Math.abs(player.vx) > MAX_WALK ? 4 : 7;
    player.animT++; if (player.animT > spd) { player.animT=0; player.animF=(player.animF+1)%3; }
  } else player.animF = 0;

  // pit death
  if (player.y > H + 30) killPlayer(true);
  // 🌋 LAVA — sentuh = mati terus (kecuali Star Mario: bounce!)
  if (!player.dead && level.lavas && level.lavas.length) {
    const lavaTop = GROUND_Y + 6;
    for (const lv of level.lavas) {
      if (player.x + player.w > lv.x && player.x < lv.x + lv.w && player.y + player.h > lavaTop) {
        if (player.starT > 0) {
          player.vy = -10;   // Star Mario melantun atas lava — lagi kuat!
          burst(player.x+player.w/2, lavaTop, '#ff6a00', 12);
          SFX.jump();
        } else {
          burst(player.x+player.w/2, lavaTop, '#ff6a00', 18);
          burst(player.x+player.w/2, lavaTop, '#ffd040', 10);
          shake = 8;
          killPlayer(true);
        }
        break;
      }
    }
  }
  if (player.inv > 0) player.inv--;
  if (bossTalk > 0) bossTalk--;

  // 🚩 Checkpoint tengah level — respawn dari sini
  if (level.checkpoint && !level.checkpoint.reached && player.x > level.checkpoint.x) {
    level.checkpoint.reached = true; spawnX = level.checkpoint.x;
    floatText(player.x - 10, player.y - 40, 'CHECKPOINT! 🚩', '#5cff5c'); SFX.appear();
  }

  // block bump animation decay
  for (const b of blocks) if (b.bumpT > 0) b.bumpT--;

  // ── HAZARD KHAS (mekanik Edris) ──
  level.hazT = (level.hazT || 0) + 1;
  // 🔴 Pipe tembak api (Dunia Api)
  if (level.firePipes && level.firePipes.length && level.hazT % 150 === 0) {
    for (const fp of level.firePipes) {
      const toL = player.x < fp.x ? -1 : 1;
      level.fireballs.push({ x: fp.x + 28, y: fp.y - 6, vx: toL * 2.6, vy: -6, life: 160 });
    }
    SFX.bump();
  }
  // 🌊 Tsunami (Dunia Laut) — naik platform tinggi elak
  if (level.tsunami) {
    const ts = level.tsunami; ts.t++;
    if (!ts.active && !ts.warning && ts.t >= ts.interval) { ts.warning = true; ts.t = 0; }
    if (ts.warning && ts.t >= ts.warn) { ts.warning = false; ts.active = true; ts.t = 0; ts.waveX = cameraX - 90; }
    if (ts.active) {
      ts.waveX += ts.speed;
      if (!player.dead && player.starT === 0 && player.inv === 0 &&
          player.x + player.w > ts.waveX - 34 && player.x < ts.waveX + 20 &&
          player.y + player.h > ts.safeY) { hurtPlayer(); player.vx = 7; player.vy = -6; }
      if (ts.waveX > cameraX + W + 120) { ts.active = false; ts.t = 0; }
    }
  }
  // 🌲 Kayu tumbang (Dunia Hutan)
  if (level.logZones) {
    for (const lz of level.logZones) { lz.t--; if (lz.t <= 0) { lz.t = 200 + Math.floor(Math.random()*140); level.fallers.push({ x: lz.x, y: -40, vy: 2, w: 26, h: 66, spin: 0 }); } }
  }
  if (level.fallers && level.fallers.length) {
    for (let i = level.fallers.length - 1; i >= 0; i--) {
      const f = level.fallers[i]; f.vy += 0.35; f.y += f.vy; f.spin += 0.05;
      if (!player.dead && player.starT === 0 && player.inv === 0 && overlap(player, f)) { hurtPlayer(); level.fallers.splice(i,1); continue; }
      if (f.y > GROUND_Y) { burst(f.x+13, GROUND_Y, '#7a4a20', 8); level.fallers.splice(i,1); }
    }
  }

  // enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.squished) { e.squishT--; if (e.squishT<=0) e.alive=false; continue; }

    // ❄️ Musuh BEKU — tak bergerak, tak bahaya sisi; pijak dari atas = pecah
    if (e.frozen > 0) {
      e.frozen--;
      if (!player.dead && player.inv === 0 && overlap(player, e)) {
        const fromAbove = player.vy > 0 && player.y + player.h < e.y + e.h*0.7;
        if (fromAbove) {
          e.alive = false; player.vy = -8.5;
          score += 300; floatText(e.x, e.y, 'PECAH! +300', '#aaddff'); updateHUD();
          burst(e.x+e.w/2, e.y+e.h/2, '#cceeff', 16);
          burst(e.x+e.w/2, e.y+e.h/2, '#ffffff', 8);
          shake = 5; SFX.brk();
        }
        // sisi = tiada apa-apa (selamat, mesra kanak-kanak)
      }
      continue;
    }

    if (e.kind === 'piranha' || e.kind === 'fish') {
      // Cycle: hidden → rising → showing → falling → hidden (ikan melompat = sama)
      e.stateT--;
      if (e.phase === 'hidden' && e.stateT <= 0) { e.phase = 'rising'; e.stateT = 30; }
      else if (e.phase === 'rising') {
        e.y -= 1.5;
        if (e.y <= e.showY || e.stateT <= 0) { e.y = e.showY; e.phase = 'showing'; e.stateT = 100; }
      }
      else if (e.phase === 'showing' && e.stateT <= 0) { e.phase = 'falling'; e.stateT = 30; }
      else if (e.phase === 'falling') {
        e.y += 1.5;
        if (e.y >= e.hideY || e.stateT <= 0) { e.y = e.hideY; e.phase = 'hidden'; e.stateT = 90; }
      }
      e.animT++; if (e.animT>15){ e.animT=0; e.animF=(e.animF+1)%2; }
      // Tak collision bila tersembunyi
      if (e.phase === 'hidden') continue;
    } else {
      e.vy += GRAV; if (e.vy > MAX_FALL) e.vy = MAX_FALL;
      e.vx = e.dir * e.speed;
      moveX(e, blocks); moveY(e, blocks, null);
      // wall probe — pusing kalau ada blok di hadapan
      const wx = e.dir > 0 ? e.x + e.w + 1 : e.x - 1;
      const wallAhead = blocks.some(b => solid(b) && wx>=b.x && wx<=b.x+b.w && b.y < e.y+e.h-3 && b.y+b.h > e.y+3);
      if (wallAhead) e.dir *= -1;
      // ledge probe — pusing kalau takde lantai di hadapan (jangan jatuh pit)
      else if (e.onGround) {
        const fx = e.dir > 0 ? e.x+e.w+2 : e.x-2;
        const ahead = blocks.some(b => solid(b) && fx>=b.x && fx<=b.x+b.w && b.y>=e.y+e.h && b.y<=e.y+e.h+6);
        if (!ahead) e.dir *= -1;
      }
      if (e.x <= 0) { e.x = 0; e.dir = 1; }
      e.animT++; if (e.animT>10){ e.animT=0; e.animF=(e.animF+1)%2; }
      // 🐒 Monyet baling pisang bila pemain dekat
      if (e.kind === 'monkey' && e.throwT !== undefined) {
        e.throwT--;
        if (e.throwT <= 0 && Math.abs(player.x - e.x) < 380) {
          e.throwT = 130 + Math.floor(Math.random()*80);
          const toL = player.x < e.x ? -1 : 1;
          level.fireballs.push({ x: e.x+15, y: e.y-4, vx: toL*3.2, vy: -4.5, life: 150, banana: true });
        } else if (e.throwT <= -60) { e.throwT = 90; }
      }
      // 🌋 Musuh jatuh dalam lava — hangus!
      if (level.lavas && level.lavas.some(lv => e.x + e.w > lv.x && e.x < lv.x + lv.w && e.y + e.h > GROUND_Y + 6)) {
        e.alive = false;
        burst(e.x+e.w/2, GROUND_Y + 6, '#ff6a00', 10);
        continue;
      }
    }

    if (!player.dead && overlap(player, e)) {
      // Star Mario kill semua musuh atas sentuhan
      if (player.starT > 0) {
        e.squished = true; e.squishT = 26;
        score += 500; floatText(e.x, e.y, '+500', '#FFD700'); updateHUD();
        burst(e.x+e.w/2, e.y+e.h/2, '#FFD700', 14); shake = 4; SFX.stomp();
        continue;
      }
      if (player.inv > 0) continue;
      // Piranha — tak boleh stomp dari atas (kepala berduri tersirat)
      if (e.kind === 'piranha') {
        hurtPlayer();
        continue;
      }
      const fromAbove = player.vy > 0 && player.y + player.h < e.y + e.h*0.7;
      if (fromAbove) {
        e.squished = true; e.squishT = 26; player.vy = -8.5;
        score += 100; floatText(e.x, e.y, '+100'); updateHUD();
        burst(e.x+e.w/2, e.y+e.h/2, '#C04000', 8); shake = 5; SFX.stomp();
      } else hurtPlayer();
    }
  }

  // mushroom / fire flower / star powerups (dynamic)
  for (const m of powerups) {
    if (m.taken) continue;
    const kind = m.kind || 'mushroom';
    if (m.emerging) {
      m.y -= 1; if (m.y <= m.targetY) { m.emerging = false; m.vy = 0; }
      continue;
    }
    m.vy += GRAV; if (m.vy > 8) m.vy = 8;
    if (kind === 'star') {
      // Star pantul kuat bila kena ground
      moveX(m, blocks);
      moveY(m, blocks, null);
      if (m.onGround) m.vy = -8;
      if (m.vx === 0) m.vx = 2.4;
    } else if (kind === 'fire' || kind === 'ice') {
      // Fire/Ice Flower diam — tunggu Mario ambik
      m.vx = 0; m.vy = 0;
    } else {
      moveX(m, blocks); moveY(m, blocks, null);
      if (m.vx === 0) m.vx = 1.5;
    }
    if (overlap(player, m)) {
      m.taken = true;
      if (kind === 'fire') setFire();
      else if (kind === 'ice') setIce();
      else if (kind === 'star') setStar();
      else growBig();
    }
  }

  // ── Yoshi mount (Level 6) ──
  if (level.yoshi && !level.yoshi.taken) {
    const yo = level.yoshi;
    yo.bob = (yo.bob || 0) + 0.08;
    yo.animT++; if (yo.animT > 16) { yo.animT = 0; yo.animF = (yo.animF+1)%2; }
    if (!player.dead && overlap(player, yo)) {
      yo.taken = true;
      player.onYoshi = true;
      player.flutterT = FLUTTER_FRAMES;
      floatText(player.x, player.y - 14, 'YOSHI! 🦖', '#3a3');
      burst(player.x+player.w/2, player.y, '#3c3', 16);
      SFX.power();
    }
  }
  // Yoshi lari (animasi selepas kena hit)
  if (fleeingYoshi) {
    fleeingYoshi.x += fleeingYoshi.vx;
    fleeingYoshi.y += fleeingYoshi.vy;
    fleeingYoshi.vy += 0.5;
    fleeingYoshi.life--;
    if (fleeingYoshi.life <= 0) fleeingYoshi = null;
  }

  // coins
  for (const c of coinList) {
    if (c.got) continue;
    c.spin += 0.18;
    if (overlap(player, c)) { c.got = true; collectCoin(c.x, c.y); }
  }

  // flag
  if (flag && !flag.reached) {
    const fr = { x: flag.x+12, y: flag.baseY - flag.h, w: 8, h: flag.h };
    if (overlap(player, fr)) {
      flag.reached = true;
      score += 2000; floatText(flag.x, player.y, '+2000', '#FFD700'); updateHUD();
      SFX.clear();
      player.dead = false; player.vx = 0; player.vy = 0;
      player.x = flag.x + 2;
      gameState = 'clear'; clearTimer = 150;
    }
  }

  // ── BOSS ──
  if (level.boss && level.boss.alive) {
    const bs = level.boss;
    if (!bs.active && player.x > bs.minX - 200) { bs.active = true; MUSIC.start('bos'); bossTalk = 170; }
    if (bs.active) {
      if (bs.hit > 0) bs.hit--;

      // Semua 4 bos Edris jenis "jumper" — multi-fasa
      const finalBoss = bs.type === 'rajagergasi';   // bos akhir = 4-arah, paling ganas
      const waterShot = bs.type === 'ularlaut';       // Ular Laut tembak air (biru)
      const jumper = true;
      const iceShot = waterShot;
      if (jumper && !bs.enraged && bs.hp <= bs.maxHp / 2) {
        bs.enraged = true;
        shake = 18;
        burst(bs.x+bs.w/2, bs.y+bs.h/2, waterShot ? '#3fc9d6' : '#FF8800', 24);
        SFX.power();
      }

      // Boss graviti (untuk jumper lompat)
      if (jumper) {
        bs.vy += GRAV; if (bs.vy > MAX_FALL) bs.vy = MAX_FALL;
        bs.y += bs.vy;
        if (bs.y + bs.h >= GROUND_Y) {
          if (!bs.onGround && bs.vy > 4) {
            // mendarat dari lompatan — shockwave!
            shake = 12;
            const sc = iceShot ? { ice: true } : {};
            level.fireballs.push(Object.assign({ x: bs.x - 20, y: GROUND_Y - 12, vx: -4, vy: -2, life: 90 }, sc));
            level.fireballs.push(Object.assign({ x: bs.x + bs.w + 20, y: GROUND_Y - 12, vx: 4, vy: -2, life: 90 }, sc));
          }
          bs.y = GROUND_Y - bs.h;
          bs.vy = 0;
          bs.onGround = true;
        } else {
          bs.onGround = false;
        }
      }

      // Patrol (hanya bila atas tanah untuk jumper)
      if (!jumper || bs.onGround) {
        const sp = jumper && bs.enraged ? 1.5 : 1;
        bs.x += bs.vx * bs.dir * sp;
        if (bs.x < bs.minX) { bs.x = bs.minX; bs.dir = 1; }
        if (bs.x > bs.maxX) { bs.x = bs.maxX; bs.dir = -1; }
      }

      // Throw fireball / iceball
      bs.fireT--;
      if (bs.fireT <= 0) {
        const baseInterval = bs.enraged ? (finalBoss ? 60 : 75) : (finalBoss ? 80 : 100);
        bs.fireT = baseInterval;
        const toL = player.x < bs.x ? -1 : 1;
        if (jumper && bs.enraged) {
          // 3-arah serentak (bos akhir 4-arah lebih ganas)
          const spreads = finalBoss ? [-0.5, -1.5, -2.5, -3.5] : [-1, -2, -3];
          for (const dvy of spreads) {
            level.fireballs.push({ x: bs.x + bs.w/2, y: bs.y + 24, vx: toL * 3.4, vy: dvy, life: 220, ice: iceShot });
          }
        } else if (jumper) {
          level.fireballs.push({ x: bs.x + bs.w/2, y: bs.y + 24, vx: toL * 3.2, vy: -1.5, life: 220, ice: iceShot });
        } else {
          level.fireballs.push({ x: bs.x + bs.w/2, y: bs.y + 20, vx: toL * 3.2, vy: -1, life: 200 });
        }
        SFX.bump();
      }

      // Jumper jump attack
      if (jumper && bs.onGround) {
        bs.jumpT--;
        if (bs.jumpT <= 0) {
          bs.vy = bs.enraged ? -12 : -10;
          bs.onGround = false;
          bs.jumpT = bs.enraged ? 140 : 240;
        }
      }

      if (bs.stompLock > 0) bs.stompLock--;

      // collision with player
      if (!player.dead && overlap(player, bs)) {
        // Star Mario terus bunuh boss (1 hit damage)
        if (player.starT > 0 && bs.stompLock === 0) {
          bs.hp--; bs.hit = 30; bs.stompLock = 20;
          score += 700; floatText(bs.x, bs.y, '+700', '#FFD700'); updateHUD();
          burst(bs.x+bs.w/2, bs.y, '#FFD700', 14); shake = 8; SFX.stomp();
          if (bs.hp <= 0) {
            bs.alive = false; score += finalBoss ? 8000 : 4000; updateHUD();
            burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FFD700', 30);
            burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FF4400', 20);
            shake = 14; SFX.clear();
            gameState = 'clear'; clearTimer = 130;
          }
        }
        else if (player.inv === 0) {
          const fromAbove = player.vy > 0 && player.y + player.h < bs.y + bs.h*0.5;
          if (fromAbove && bs.stompLock === 0) {
            bs.hp--; bs.hit = 30; bs.stompLock = 20; player.vy = -10;
            score += 500; floatText(bs.x, bs.y, '+500', '#FFD700'); updateHUD();
            burst(bs.x+bs.w/2, bs.y, '#FF8800', 14); shake = 8; SFX.stomp();
            if (bs.hp <= 0) {
              bs.alive = false; score += finalBoss ? 8000 : 4000; updateHUD();
              burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FFD700', 30);
              burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FF4400', 20);
              shake = 14; SFX.clear();
              gameState = 'clear'; clearTimer = 130;
            }
          } else if (!fromAbove) {
            hurtPlayer();
          }
        }
      }
    }
  }

  // ── Boss/Enemy Fireballs (mengejar player) ──
  for (const fb of level.fireballs) {
    fb.life--; fb.vy += 0.12; fb.x += fb.vx; fb.y += fb.vy;
    // bounce on ground
    if (fb.y > GROUND_Y - 12) { fb.y = GROUND_Y - 12; fb.vy = -4; }
    if (!player.dead && player.inv === 0 && player.starT === 0 && overlap(player, { x:fb.x-9, y:fb.y-9, w:18, h:18 })) {
      fb.life = 0;
      hurtPlayer();
    }
  }
  level.fireballs = level.fireballs.filter(f => f.life > 0 && f.x > cameraX - 40 && f.x < cameraX + W + 40);

  // ── Player Fireballs (Fire Mario lempar) ──
  if (player.fireCD > 0) player.fireCD--;
  if (player.starT > 0) player.starT--;
  for (const fb of level.playerFireballs) {
    fb.life--;
    fb.vy += 0.32;
    if (fb.vy > 9) fb.vy = 9;
    fb.x += fb.vx; fb.y += fb.vy;
    fb.spin = (fb.spin || 0) + 0.4;
    // Bounce off ground
    if (fb.y + fb.h > GROUND_Y) {
      fb.y = GROUND_Y - fb.h; fb.vy = -7; fb.bounces++;
      if (fb.bounces >= 4) fb.life = 0;
    }
    // Check collision dengan blok (mudah — kalau langgar dinding solid)
    for (const b of blocks) {
      if (b.broken) continue;
      if (!solid(b)) continue;
      if (fb.x + fb.w > b.x && fb.x < b.x + b.w && fb.y + fb.h > b.y && fb.y < b.y + b.h) {
        fb.life = 0;
        burst(fb.x+6, fb.y+6, fb.ice ? '#aaddff' : '#FF6600', 6);
        break;
      }
    }
    // Check collision dengan enemy
    if (fb.life > 0) {
      for (const e of enemies) {
        if (!e.alive || e.squished) continue;
        if (e.kind === 'piranha' && e.phase === 'hidden') continue;
        if (overlap(fb, e)) {
          if (fb.ice) {
            // ❄️ Bola ais — BEKUKAN musuh (bukan bunuh)
            e.frozen = FREEZE_FRAMES; e.vx = 0;
            score += 200; floatText(e.x, e.y, 'BEKU! +200', '#66ccff'); updateHUD();
            burst(e.x+e.w/2, e.y+e.h/2, '#aaddff', 14);
          } else {
            e.squished = true; e.squishT = 26;
            score += 200; floatText(e.x, e.y, '+200', '#FF8800'); updateHUD();
            burst(e.x+e.w/2, e.y+e.h/2, '#FF6600', 14);
          }
          shake = 4;
          fb.life = 0;
          SFX.stomp();
          break;
        }
      }
    }
    // Check collision dengan boss
    if (fb.life > 0 && level.boss && level.boss.alive && level.boss.active && level.boss.hit === 0) {
      const bs = level.boss;
      if (overlap(fb, bs)) {
        bs.hp--; bs.hit = 30;
        score += 300; floatText(bs.x, bs.y, '+300', '#FF6600'); updateHUD();
        burst(fb.x, fb.y, '#FF6600', 10);
        fb.life = 0; shake = 6;
        SFX.bump();
        if (bs.hp <= 0) {
          bs.alive = false; score += 5000; updateHUD();
          burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FFD700', 30);
          burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FF4400', 20);
          shake = 14; SFX.clear();
          gameState = 'clear'; clearTimer = 130;
        }
      }
    }
  }
  level.playerFireballs = level.playerFireballs.filter(f => f.life > 0 && f.x > cameraX - 60 && f.x < cameraX + W + 60);

  // ── Pipe entry (enterable / exit) ──
  if (!player.dead && (keys['ArrowDown'] || keys['KeyS'])) {
    for (const b of blocks) {
      if ((b.enterable || b.isExit) && player.onGround &&
          Math.abs((player.x + player.w/2) - (b.x + b.w/2)) < 22 &&
          Math.abs((player.y + player.h) - b.y) < 8) {
        if (b.isExit) exitBonus();
        else enterPipe(player.x);
        break;
      }
    }
  }

  // camera (smooth + lookahead + clamp)
  const look = player.facing * 60;
  const target = player.x - W/2.6 + look;
  cameraX += (target - cameraX) * 0.10;
  cameraX = Math.max(0, Math.min(cameraX, level.lengthX - W));

  stepParticles();
}

function onHeadBump(b) {
  if (b.type === 'question' && !b.used) {
    b.used = true; b.bumpT = 12; SFX.bump();
    if (b.content === 'coin') { collectCoin(b.x, b.y - 6); }
    else if (b.content === 'mushroom') {
      // Rantai auto-upgrade: kecil → cendawan, besar → api, api → ais, ais → api (spare)
      const kind = player.ice ? 'ice' : player.fire ? 'ice' : player.big ? 'fire' : 'mushroom';
      level.powerups.push({ x: b.x+2, y: b.y, targetY: b.y-30, w:28, h:28, vx: kind==='mushroom'?1.5:0, vy:0,
        emerging:true, taken:false, onGround:false, kind });
      SFX.appear();
    }
    else if (b.content === 'fire') {
      level.powerups.push({ x: b.x+2, y: b.y, targetY: b.y-30, w:28, h:28, vx:0, vy:0,
        emerging:true, taken:false, onGround:false, kind:'fire' });
      SFX.appear();
    }
    else if (b.content === 'ice') {
      level.powerups.push({ x: b.x+2, y: b.y, targetY: b.y-30, w:28, h:28, vx:0, vy:0,
        emerging:true, taken:false, onGround:false, kind:'ice' });
      SFX.appear();
    }
    else if (b.content === 'star') {
      level.powerups.push({ x: b.x+2, y: b.y, targetY: b.y-30, w:28, h:28, vx:2.4, vy:-6,
        emerging:true, taken:false, onGround:false, kind:'star' });
      SFX.appear();
    }
  } else if (b.type === 'brick') {
    if (player.big || player.fire) { b.broken = true; brickBits(b.x, b.y); score+=50; shake=6; SFX.brk(); }
    else { b.bumpT = 10; SFX.bump(); }
  } else { b.bumpT = 6; SFX.bump(); }
}

function collectCoin(x, y) {
  coins++; score += 200; updateHUD();
  floatText(x, y, '+200', '#FFD700');
  burst(x+10, y, '#FFD700', 5);
  SFX.coin();
  if (coins > 0 && coins % 20 === 0) { lives++; updateHUD(); floatText(player.x, player.y-20, '1-UP!', '#00FF95'); SFX.oneup(); }
}

function killPlayer(force) {
  if (player.dead) return;
  if (!force && player.big) { shrink(); return; }
  player.dead = true; player.vy = -11; player.deadT = 80; player.vx = 0;
  burst(player.x+player.w/2, player.y, '#FF4444', 10);
  SFX.die();
}

function stepParticles() {
  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life--; }
  particles = particles.filter(p => p.life > 0);
  for (const f of floaters) { f.y -= 0.8; f.life--; }
  floaters = floaters.filter(f => f.life > 0);
}

// ─── DRAW ─────────────────────────────────────────────────
function drawBackground() {
  if (level.theme === 'underground') {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#0a0a1e'); g.addColorStop(1, '#1a1a3a');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let i=0;i<30;i++){ const x=(i*97 - cameraX*0.3)%(W+40); ctx.fillRect(((x%W)+W)%W, (i*53)%H, 2, 2); }
    return;
  }
  // ── DUNIA API 🔥 ──
  if (level.theme === 'api') {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#3a0e08'); g.addColorStop(0.55,'#7a1f0a'); g.addColorStop(1,'#c23a0e');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(255,140,40,0.16)'; ctx.fillRect(0, H-120, W, 120);   // sinar lava
    // gunung berapi jauh
    ctx.fillStyle = '#3a1810';
    for (const mx of [120,520,900,1300,1700,2100,2500]) { const x=mx-cameraX*0.3; ctx.beginPath(); ctx.moveTo(x-120,GROUND_Y); ctx.lineTo(x,GROUND_Y-150); ctx.lineTo(x+120,GROUND_Y); ctx.fill(); ctx.fillStyle='#ff6a1e'; ctx.beginPath(); ctx.moveTo(x-14,GROUND_Y-142); ctx.lineTo(x,GROUND_Y-165); ctx.lineTo(x+14,GROUND_Y-142); ctx.fill(); ctx.fillStyle='#3a1810'; }
    // bara naik
    for (const em of embers) { em.y += em.vy; em.sway += 0.05; em.x += Math.sin(em.sway)*0.4; if (em.y<-5){ em.y=H+5; em.x=Math.random()*W; } ctx.fillStyle=`rgba(255,${140+Math.floor(80*em.glow)},40,${em.glow})`; ctx.beginPath(); ctx.arc(em.x, em.y, em.size, 0, 7); ctx.fill(); }
    return;
  }
  // ── DUNIA LAUT 🌊 ──
  if (level.theme === 'laut') {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#7ec8f0'); g.addColorStop(0.5,'#a8dff5'); g.addColorStop(1,'#5ab0e0');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff3a0'; ctx.beginPath(); ctx.arc(90, 80, 34, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (const [cx0,cy] of [[180,90],[520,60],[820,100],[1180,70],[1560,90]]) { let x=cx0-cameraX*0.4; x=((x%(level.lengthX+300))+(level.lengthX+300))%(level.lengthX+300); if(x>W+120)continue; ctx.beginPath(); ctx.arc(x,cy,18,0,7); ctx.arc(x+20,cy-6,22,0,7); ctx.arc(x+42,cy,16,0,7); ctx.fill(); }
    // laut jauh
    ctx.fillStyle = '#2f86c8'; ctx.fillRect(0, GROUND_Y-30, W, 30);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
    for (let i=0;i<W;i+=40){ const wy = GROUND_Y-20 + Math.sin(Date.now()/400 + i*0.05)*3; ctx.beginPath(); ctx.arc(i+20, wy, 8, Math.PI, 0); ctx.stroke(); }
    return;
  }
  // ── DUNIA HUTAN 🌳 ──
  if (level.theme === 'hutan') {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#8fd8f0'); g.addColorStop(0.6,'#bfeecf'); g.addColorStop(1,'#d8f4c0');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff3a0'; ctx.beginPath(); ctx.arc(W-110, 78, 36, 0, 7); ctx.fill();
    // bukit hijau berlapis
    ctx.fillStyle = '#7cc85a'; for (const hx of [150,600,1100,1600,2100,2600]) { const x=hx-cameraX*0.35; ctx.beginPath(); ctx.arc(x, GROUND_Y, 150, Math.PI, 0); ctx.fill(); }
    ctx.fillStyle = '#5aa83a'; for (const hx of [380,900,1450,1950,2450]) { const x=hx-cameraX*0.55; ctx.beginPath(); ctx.arc(x, GROUND_Y, 100, Math.PI, 0); ctx.fill(); }
    return;
  }
  // ── KUBU RAJA GERGASI 👹 (paya gelap) ──
  if (level.theme === 'kubu') {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0d0818'); g.addColorStop(0.6,'#241832'); g.addColorStop(1,'#3a2a48');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // tiang kubu siluet
    ctx.fillStyle = '#170e22';
    for (const px0 of [150,500,850,1250,1650,2050,2450,2850]) { const x=px0-cameraX*0.3; if(x<-90||x>W+90)continue; ctx.fillRect(x-30,60,60,GROUND_Y-60); ctx.fillRect(x-42,40,84,26); }
    // tingkap bercahaya ungu
    for (const wx0 of [300,700,1100,1500,1900,2300]) { const x=wx0-cameraX*0.5; if(x<-40||x>W+40)continue; const fl=0.5+0.2*Math.sin(Date.now()/300+wx0); ctx.fillStyle=`rgba(160,90,220,${fl})`; ctx.fillRect(x,130,24,42); }
    return;
  }
  if (level.theme === 'ice') {
    // Langit ais — gradient biru-putih
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#4a7ab8');
    g.addColorStop(0.5, '#88c4e8');
    g.addColorStop(1, '#d8eef8');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // Awan kelabu sejuk
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const clouds = [[120,80],[460,55],[820,95],[1180,65],[1560,80],[1920,55],[2300,90]];
    for (const [cx0,cy] of clouds) {
      let x = cx0 - cameraX*0.4; x = ((x % (level.lengthX+200)) + level.lengthX+200) % (level.lengthX+200);
      if (x > W+120) continue;
      cloud(x, cy);
    }
    // Gunung salji jauh (parallax 0.25)
    ctx.fillStyle = '#e8f4ff';
    for (const mx of [100,450,820,1180,1550,1920,2280,2640]) {
      const x = mx - cameraX*0.25;
      ctx.beginPath(); ctx.moveTo(x-110, GROUND_Y); ctx.lineTo(x-30, GROUND_Y-150); ctx.lineTo(x+30, GROUND_Y-140); ctx.lineTo(x+110, GROUND_Y); ctx.closePath(); ctx.fill();
      // Puncak salji
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.moveTo(x-30, GROUND_Y-150); ctx.lineTo(x-10, GROUND_Y-130); ctx.lineTo(x+10, GROUND_Y-138); ctx.lineTo(x+30, GROUND_Y-140); ctx.lineTo(x+5, GROUND_Y-120); ctx.lineTo(x-15, GROUND_Y-122); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#e8f4ff';
    }
    // Bukit ais (parallax 0.65)
    ctx.fillStyle = '#bdd8f0';
    for (const hx of [200,650,1150,1650,2150,2700,3150]) {
      const x = hx - cameraX*0.65;
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 95, Math.PI, 0); ctx.fill();
    }
    ctx.fillStyle = '#a0c8e8';
    for (const hx of [380,900,1450,2000,2500,3000]) {
      const x = hx - cameraX*0.65;
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 62, Math.PI, 0); ctx.fill();
    }
    // Snowflakes (foreground)
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    for (const sf of snowflakes) {
      sf.x += sf.vx; sf.y += sf.vy;
      sf.sway += 0.04;
      sf.x += Math.sin(sf.sway) * 0.3;
      if (sf.y > H) { sf.y = -5; sf.x = Math.random() * W; }
      if (sf.x < -10) sf.x = W;
      ctx.beginPath(); ctx.arc(sf.x, sf.y, sf.size, 0, 7); ctx.fill();
    }
    return;
  }
  if (level.theme === 'castle') {
    // Dalam istana Bowser — gunung berapi: hitam → merah gelap
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#0d0508');
    g.addColorStop(0.55, '#2a0a0a');
    g.addColorStop(1, '#571207');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // Cahaya lava dari bawah
    const lg = ctx.createLinearGradient(0, H-140, 0, H);
    lg.addColorStop(0, 'rgba(255,90,0,0)');
    lg.addColorStop(1, 'rgba(255,110,0,0.25)');
    ctx.fillStyle = lg; ctx.fillRect(0, H-140, W, 140);
    // Tiang batu siluet (parallax 0.3)
    ctx.fillStyle = '#1a0d10';
    for (const px0 of [150, 500, 850, 1250, 1650, 2050, 2450, 2850]) {
      const x = px0 - cameraX*0.3;
      if (x < -90 || x > W+90) continue;
      ctx.fillRect(x-32, 60, 64, GROUND_Y-60);
      ctx.fillRect(x-44, 40, 88, 26);   // kepala tiang
      ctx.fillRect(x-44, GROUND_Y-30, 88, 30);  // kaki tiang
    }
    // Tingkap oren bercahaya (parallax 0.5)
    for (const wx0 of [300, 700, 1100, 1500, 1900, 2300, 2700]) {
      const x = wx0 - cameraX*0.5;
      if (x < -40 || x > W+40) continue;
      const flick = 0.55 + 0.2*Math.sin(Date.now()/300 + wx0);
      ctx.fillStyle = `rgba(255,150,30,${flick})`;
      ctx.fillRect(x, 130, 26, 44);
      ctx.beginPath(); ctx.arc(x+13, 130, 13, Math.PI, 0); ctx.fill();
    }
    // Bara api naik (embers)
    for (const em of embers) {
      em.y += em.vy;
      em.sway += 0.05;
      em.x += Math.sin(em.sway) * 0.4;
      if (em.y < -5) { em.y = H + 5; em.x = Math.random() * W; }
      const tw = 0.5 + 0.5*Math.sin(em.sway*2);
      ctx.fillStyle = `rgba(255,${120+Math.floor(80*tw)},40,${em.glow*tw})`;
      ctx.beginPath(); ctx.arc(em.x, em.y, em.size, 0, 7); ctx.fill();
    }
    return;
  }
  if (level.theme === 'yoshi') {
    // Yoshi's Island — langit cerah, bukit warna-warni
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#7ec8f0');
    g.addColorStop(0.6, '#b8e8f8');
    g.addColorStop(1, '#d8f4d0');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // Matahari ceria
    ctx.fillStyle = '#fff3a0';
    ctx.beginPath(); ctx.arc(W-120, 80, 40, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,243,160,0.3)';
    ctx.beginPath(); ctx.arc(W-120, 80, 58, 0, 7); ctx.fill();
    // Awan comel
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    const clouds = [[140,90],[480,60],[820,100],[1180,70],[1540,90],[1900,60],[2280,95]];
    for (const [cx0,cy] of clouds) {
      let x = cx0 - cameraX*0.4; x = ((x % (level.lengthX+200)) + level.lengthX+200) % (level.lengthX+200);
      if (x > W+120) continue;
      cloud(x, cy);
    }
    // Bukit warna pastel (parallax)
    const hillColors = ['#f5a8c8','#a8e8a8','#f8d888','#a8c8f0'];
    for (let i=0;i<8;i++){
      const hx = (i*420 - cameraX*0.45);
      const x = hx;
      ctx.fillStyle = hillColors[i%4];
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 110, Math.PI, 0); ctx.fill();
    }
    // Bukit hijau depan
    ctx.fillStyle = '#5ac85a';
    for (const hx of [200,650,1150,1650,2150,2700]) {
      const x = hx - cameraX*0.65;
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 70, Math.PI, 0); ctx.fill();
    }
    return;
  }
  // sky gradient
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, SKY_TOP); g.addColorStop(1, SKY_BOT);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // far mountains (parallax 0.25)
  ctx.fillStyle = '#6fa8d8';
  const mtns = [100,450,800,1150,1500,1850,2200,2550,2900];
  for (const mx of mtns) {
    const x = mx - cameraX*0.25;
    ctx.beginPath(); ctx.moveTo(x-90, GROUND_Y); ctx.lineTo(x, GROUND_Y-120); ctx.lineTo(x+90, GROUND_Y); ctx.fill();
  }
  // clouds (parallax 0.45)
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  const clouds = [[120,70],[420,55],[760,85],[1080,60],[1420,75],[1760,55],[2100,80],[2480,62],[2850,72]];
  for (const [cx0,cy] of clouds) {
    let x = cx0 - cameraX*0.45; x = ((x % (level.lengthX)) + level.lengthX) % level.lengthX;
    if (x > W+120) continue;
    cloud(x, cy);
  }
  // hills (parallax 0.65)
  ctx.fillStyle = '#3fbf3f';
  for (const hx of [200,650,1150,1650,2150,2700,3150]) {
    const x = hx - cameraX*0.65;
    ctx.beginPath(); ctx.arc(x, GROUND_Y, 95, Math.PI, 0); ctx.fill();
  }
  ctx.fillStyle = '#34a534';
  for (const hx of [380,900,1450,2000,2500,3000]) {
    const x = hx - cameraX*0.65;
    ctx.beginPath(); ctx.arc(x, GROUND_Y, 62, Math.PI, 0); ctx.fill();
  }
}
function cloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, 7); ctx.arc(x+24, y-10, 26, 0, 7);
  ctx.arc(x+52, y, 20, 0, 7); ctx.arc(x+26, y+6, 24, 0, 7);
  ctx.fill();
}

function drawBush(d) {
  const x = d.x - cameraX*0.85;
  if (x < -100 || x > W+100) return;
  if (d.type === 'icepine') {
    // Pokok pain salji (segitiga tindih)
    const y = GROUND_Y;
    ctx.fillStyle = '#5a4020';
    ctx.fillRect(x-4, y-22, 8, 22);
    ctx.fillStyle = '#1a5a2a';
    ctx.beginPath(); ctx.moveTo(x-26, y-22); ctx.lineTo(x, y-72); ctx.lineTo(x+26, y-22); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x-22, y-44); ctx.lineTo(x, y-92); ctx.lineTo(x+22, y-44); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x-18, y-66); ctx.lineTo(x, y-104); ctx.lineTo(x+18, y-66); ctx.closePath(); ctx.fill();
    // Salji atas tiap lapisan
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.moveTo(x-26, y-22); ctx.lineTo(x-18, y-30); ctx.lineTo(x-10, y-26); ctx.lineTo(x, y-32); ctx.lineTo(x+10, y-26); ctx.lineTo(x+18, y-30); ctx.lineTo(x+26, y-22); ctx.fill();
    ctx.beginPath(); ctx.arc(x, y-104, 4, 0, 7); ctx.fill();
    return;
  }
  if (d.type === 'planet') {
    // Planet kecil melayang di latar (galaxy)
    const px = d.x - cameraX*0.5;
    if (px < -120 || px > W+120) return;
    const py = 150 + (d.x % 120);
    const colors = [['#ff8855','#cc4422'],['#55aaff','#2266cc'],['#aa88ff','#6644aa'],['#ffcc55','#cc9922']];
    const c = colors[Math.floor(d.x/150)%4];
    const r = 22 + (d.x % 18);
    const pg = ctx.createRadialGradient(px-r*0.3, py-r*0.3, 2, px, py, r);
    pg.addColorStop(0, c[0]); pg.addColorStop(1, c[1]);
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(px, py, r, 0, 7); ctx.fill();
    // Gelang planet
    if (Math.floor(d.x/150)%2===0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(px, py, r+8, 4, -0.3, 0, 7); ctx.stroke();
    }
    return;
  }
  if (d.type === 'palmtree') {
    // Pokok palma Yoshi's Island
    const y = GROUND_Y;
    ctx.fillStyle = '#a06830';
    ctx.fillRect(x-5, y-70, 10, 70);
    ctx.strokeStyle = '#8a5828'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x-3, y-20); ctx.lineTo(x-3, y-60); ctx.stroke();
    // Daun palma (lengkung)
    ctx.fillStyle = '#3aaa3a';
    for (const a of [-2.4, -1.7, -1.0, -0.4, 0.3]) {
      ctx.beginPath();
      ctx.moveTo(x, y-70);
      ctx.quadraticCurveTo(x+Math.cos(a)*36, y-70+Math.sin(a)*28-12, x+Math.cos(a)*64, y-70+Math.sin(a)*44);
      ctx.quadraticCurveTo(x+Math.cos(a)*40, y-70+Math.sin(a)*24, x, y-66);
      ctx.fill();
    }
    // Kelapa
    ctx.fillStyle = '#6a4020';
    ctx.beginPath(); ctx.arc(x-6, y-64, 5, 0, 7); ctx.arc(x+6, y-62, 5, 0, 7); ctx.fill();
    return;
  }
  ctx.fillStyle = '#2a9d2a';
  const y = GROUND_Y;
  ctx.beginPath(); ctx.arc(x, y, 24, Math.PI, 0);
  ctx.arc(x+28, y, 30, Math.PI, 0); ctx.arc(x+58, y, 24, Math.PI, 0); ctx.fill();
}

function drawBlock(b) {
  const x = Math.round(b.x - cameraX);
  if (x + b.w < -10 || x > W+10) return;
  const yo = b.bumpT > 0 ? -Math.sin((b.bumpT/12)*Math.PI)*8 : 0;
  const y = b.y + yo;

  if (b.type === 'ground') {
    let soil = '#C56A2C', top1 = '#3fbf3f', top2 = '#2e8b2e';
    if (level.theme === 'api') { soil = '#4a2418'; top1 = '#7a3a1a'; top2 = '#5a2a12'; }
    else if (level.theme === 'laut') { soil = '#c8a86a'; top1 = '#e6d29a'; top2 = '#c8a86a'; }
    else if (level.theme === 'hutan') { soil = '#8a5a2a'; top1 = '#5ac85a'; top2 = '#3a9a3a'; }
    else if (level.theme === 'kubu') { soil = '#33283f'; top1 = '#4a3a5a'; top2 = '#2a2035'; }
    else if (level.theme === 'castle') { soil = '#4a4a55'; top1 = '#6a6a78'; top2 = '#3a3a44'; }
    else if (level.theme === 'yoshi') { soil = '#c89a4a'; top1 = '#5ac85a'; top2 = '#3a9a3a'; }
    ctx.fillStyle = soil; ctx.fillRect(x, y, b.w, b.h);
    ctx.fillStyle = top1; ctx.fillRect(x, y, b.w, 12);
    ctx.fillStyle = top2; ctx.fillRect(x, y+10, b.w, 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth=1;
    for (let bx=0;bx<b.w;bx+=32){ ctx.strokeRect(x+bx, y+13, 32, b.h-13); }
  } else if (b.type === 'brick') {
    ctx.fillStyle = BRICK; ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#7a2e08'; ctx.lineWidth = 2;
    ctx.strokeRect(x+1, y+1, b.w-2, b.h-2);
    ctx.beginPath(); ctx.moveTo(x, y+16); ctx.lineTo(x+b.w, y+16);
    ctx.moveTo(x+16, y); ctx.lineTo(x+16, y+16); ctx.moveTo(x+8, y+16); ctx.lineTo(x+8, y+32);
    ctx.moveTo(x+24, y+16); ctx.lineTo(x+24, y+32); ctx.stroke();
  } else if (b.type === 'question') {
    if (b.used) {
      ctx.fillStyle = '#9b7028'; ctx.fillRect(x, y, b.w, b.h);
      ctx.strokeStyle = '#6b4d18'; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,b.w-2,b.h-2);
    } else {
      const sh = 0.5 + 0.5*Math.sin(Date.now()/250);
      ctx.fillStyle = '#E89B12'; ctx.fillRect(x, y, b.w, b.h);
      ctx.fillStyle = `rgba(255,230,120,${0.4+sh*0.5})`; ctx.fillRect(x+3, y+3, b.w-6, b.h-6);
      ctx.fillStyle = '#7a4e08';
      ctx.font = 'bold 22px Trebuchet MS'; ctx.textAlign='center';
      ctx.fillText('?', x+b.w/2, y+b.h/2+8);
      ctx.fillStyle = '#fff8d0'; ctx.fillRect(x+4, y+4, 4, 4); ctx.fillRect(x+b.w-8, y+4, 4, 4);
      ctx.fillRect(x+4, y+b.h-8, 4, 4); ctx.fillRect(x+b.w-8, y+b.h-8, 4, 4);
    }
  } else if (b.type === 'pipe') {
    ctx.fillStyle = '#1aa01a'; ctx.fillRect(x, y, b.w, b.h);
    ctx.fillStyle = '#27c427'; ctx.fillRect(x+5, y, 8, b.h);
    ctx.fillStyle = '#0d7a0d'; ctx.fillRect(x+b.w-12, y, 8, b.h);
    // rim
    ctx.fillStyle = '#1aa01a'; ctx.fillRect(x-5, y, b.w+10, 16);
    ctx.fillStyle = '#27c427'; ctx.fillRect(x-2, y+2, b.w+4, 5);
    ctx.fillStyle = '#0d7a0d'; ctx.fillRect(x-5, y+12, b.w+10, 4);
  } else if (b.type === 'bridge') {   // 🌉 papan jambatan kayu
    ctx.fillStyle = '#8a5a2a'; ctx.fillRect(x, y, b.w, b.h);
    ctx.fillStyle = '#6a3f18'; ctx.fillRect(x, y, b.w, 2);
    ctx.strokeStyle = '#5a3416'; ctx.lineWidth=1; ctx.strokeRect(x+0.5, y+0.5, b.w-1, b.h-1);
  } else { // solid
    ctx.fillStyle = '#c9a050'; ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#8a6a30'; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,b.w-2,b.h-2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(x+2, y+2, b.w-4, 4);
  }
}

function drawCoin(c) {
  if (c.got) return;
  const x = c.x - cameraX + 10, y = c.y + 10;
  const wob = Math.abs(Math.cos(c.spin)) * 9 + 2;
  ctx.fillStyle = '#FFB800';
  ctx.beginPath(); ctx.ellipse(x, y, wob, 11, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#FFE066';
  ctx.beginPath(); ctx.ellipse(x, y, wob*0.55, 7, 0, 0, 7); ctx.fill();
}

function drawMushroom(m) {
  if (m.taken) return;
  const x = Math.round(m.x - cameraX), y = Math.round(m.y);
  const kind = m.kind || 'mushroom';
  if (kind === 'fire') {
    // Fire Flower — bunga oren-merah dengan kelopak putih dan tengah hitam
    const cx = x + 14, cy = y + 14;
    const t = (Date.now() / 200) % 6.28;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.5);
    // Kelopak — 4 helai
    ctx.fillStyle = '#FF4400';
    for (let i = 0; i < 4; i++) {
      ctx.rotate(Math.PI / 2);
      ctx.beginPath();
      ctx.ellipse(8, 0, 9, 6, 0, 0, 7);
      ctx.fill();
    }
    ctx.restore();
    // Tengah putih
    ctx.fillStyle = '#FFEEAA';
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, 7); ctx.fill();
    // Mata
    ctx.fillStyle = '#000';
    ctx.fillRect(cx-3, cy-1, 2, 3); ctx.fillRect(cx+1, cy-1, 2, 3);
    // Batang
    ctx.fillStyle = '#1a8a2a';
    ctx.fillRect(cx-2, cy+8, 4, 8);
    return;
  }
  if (kind === 'ice') {
    // Ice Flower — bunga biru-putih berkilau ❄️
    const cx = x + 14, cy = y + 14;
    const t = (Date.now() / 200) % 6.28;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.5);
    // Kelopak — 4 helai biru
    ctx.fillStyle = '#4aa8e8';
    for (let i = 0; i < 4; i++) {
      ctx.rotate(Math.PI / 2);
      ctx.beginPath();
      ctx.ellipse(8, 0, 9, 6, 0, 0, 7);
      ctx.fill();
    }
    ctx.restore();
    // Tengah putih ais
    ctx.fillStyle = '#eaf8ff';
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, 7); ctx.fill();
    // Mata
