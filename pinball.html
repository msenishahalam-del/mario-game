<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Neon Pinball</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #backBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #ff44cc;
    padding: 6px 14px;
    border: 2px solid #ff44cc;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 2px;
    z-index: 999;
  }
  #backBtn:hover { background: #ff44cc; color: #000; }
  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100vw;
    max-height: 100vh;
    box-shadow: 0 0 30px rgba(255, 68, 204, 0.5);
    border: 2px solid #ff44cc;
  }
</style>
</head>
<body>

<a id="backBtn" href="/arcade.html">◀ HUB</a>
<canvas id="game" width="420" height="720"></canvas>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ============================================================
  // AUDIO (Web Audio API)
  // ============================================================
  let actx = null;
  function ensureAudio() {
    if (actx) return;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { actx = null; }
  }
  function tone(freq, dur, type = 'square', vol = 0.08, freqEnd = null) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (freqEnd !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(actx.destination);
    osc.start(t0);
    osc.stop(t0 + dur);
  }
  const SFX = {
    wall: () => tone(180, 0.04, 'square', 0.05),
    bumper: () => { tone(880, 0.06, 'square', 0.08, 1400); tone(440, 0.08, 'sine', 0.05); },
    flipper: () => tone(320, 0.06, 'square', 0.05, 480),
    launch: () => tone(220, 0.25, 'sawtooth', 0.07, 880),
    drain: () => tone(440, 0.4, 'sawtooth', 0.12, 80),
    ready: () => tone(660, 0.1, 'sine', 0.06)
  };

  // ============================================================
  // INPUT
  // ============================================================
  const keys = Object.create(null);
  const BLOCKED = new Set(['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown']);
  window.addEventListener('keydown', e => {
    ensureAudio();
    if (BLOCKED.has(e.code)) e.preventDefault();
    if (!keys[e.code]) {
      keys[e.code] = true;
      onKeyPress(e.code);
    }
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
  function held(...codes) { return codes.some(c => keys[c]); }

  function onKeyPress(code) {
    if (state === 'start' && code === 'Enter') startGame();
    else if (state === 'gameover' && (code === 'KeyR' || code === 'Enter')) startGame();
    else if (state === 'ready' && code === 'Space') launchBall();
  }

  // ============================================================
  // STATE
  // ============================================================
  let state = 'start';     // start | ready | playing | drained | gameover
  let score = 0;
  let highScore = parseInt(localStorage.getItem('pinball_hi') || '0', 10);
  let balls = 3;
  let drainCooldown = 0;
  let particles = [];
  let flashes = [];        // bumper hit flashes

  // Physics constants
  const GRAVITY = 0.00065;  // px/ms² (downward)
  const BALL_R = 9;
  const MAX_SPEED = 1.3;    // cap velocity magnitude

  // Ball
  const ball = { x: 0, y: 0, vx: 0, vy: 0, r: BALL_R, active: false };

  // Flippers: pivot, angle (rad from +x screen-clockwise), length
  const flipperL = {
    px: 130, py: 650,
    restAngle: 0.42, upAngle: -0.45,
    angle: 0.42, raised: false, vAngle: 0,
    length: 76, side: 'L'
  };
  const flipperR = {
    px: W - 130, py: 650,
    restAngle: Math.PI - 0.42, upAngle: Math.PI + 0.45,
    angle: Math.PI - 0.42, raised: false, vAngle: 0,
    length: 76, side: 'R'
  };
  const FLIPPER_SPEED = 0.025;  // angle change per ms

  // Walls (line segments around playfield)
  const walls = [
    // Top arc (approximated by segments)
    { x1: 20, y1: 110, x2: 50, y2: 60 },
    { x1: 50, y1: 60, x2: 120, y2: 30 },
    { x1: 120, y1: 30, x2: 300, y2: 30 },
    { x1: 300, y1: 30, x2: 370, y2: 60 },
    { x1: 370, y1: 60, x2: 400, y2: 110 },
    // Right wall
    { x1: 400, y1: 110, x2: 400, y2: 560 },
    // Right slope to flipper area
    { x1: 400, y1: 560, x2: W - 130, y2: 660 },
    // Left slope to flipper area
    { x1: 130, y1: 660, x2: 20, y2: 560 },
    // Left wall
    { x1: 20, y1: 560, x2: 20, y2: 110 }
  ];

  // Bumpers (circular, score on hit, glow)
  const bumpers = [
    { x: 130, y: 200, r: 26, score: 100, color: '#ff44cc' },
    { x: 290, y: 200, r: 26, score: 100, color: '#44ddff' },
    { x: 210, y: 290, r: 28, score: 150, color: '#ffd24d' },
    { x: 130, y: 400, r: 22, score: 75,  color: '#88ff88' },
    { x: 290, y: 400, r: 22, score: 75,  color: '#88ff88' }
  ];

  // Slingshots (triangular bumpers above flippers — line segments with bounce kick)
  const slings = [
    // Left sling
    { x1: 60,  y1: 470, x2: 100, y2: 580 },
    // Right sling
    { x1: 360, y1: 470, x2: 320, y2: 580 }
  ];

  // ============================================================
  // INIT & GAME FLOW
  // ============================================================
  function startGame() {
    score = 0;
    balls = 3;
    particles = [];
    flashes = [];
    ball.active = false;
    state = 'ready';
    SFX.ready();
  }

  function launchBall() {
    if (state !== 'ready') return;
    // Spawn at top-center with slight randomized downward+lateral velocity
    ball.x = W / 2 + (Math.random() - 0.5) * 30;
    ball.y = 100;
    ball.vx = (Math.random() - 0.5) * 0.05;
    ball.vy = 0.35 + Math.random() * 0.1;
    ball.active = true;
    state = 'playing';
    SFX.launch();
  }

  function drainBall() {
    if (state !== 'playing') return;
    state = 'drained';
    drainCooldown = 1200;
    ball.active = false;
    SFX.drain();
    spawnExplosion(ball.x, ball.y, '#ff4488', 14);
    balls--;
    if (balls <= 0) {
      setTimeout(() => {
        if (score > highScore) {
          highScore = score;
          try { localStorage.setItem('pinball_hi', String(highScore)); } catch {}
        }
        state = 'gameover';
      }, 1200);
    }
  }

  // ============================================================
  // PHYSICS HELPERS
  // ============================================================
  function lineCircleHit(x1, y1, x2, y2, cx, cy, r) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy;
    if (len2 < 0.001) return null;
    let t = ((cx - x1) * dx + (cy - y1) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = x1 + t * dx, py = y1 + t * dy;
    const ddx = cx - px, ddy = cy - py;
    const distSq = ddx * ddx + ddy * ddy;
    if (distSq < r * r) {
      const dist = Math.sqrt(distSq);
      return { px, py, dist, nx: dist > 0.001 ? ddx / dist : 0, ny: dist > 0.001 ? ddy / dist : -1 };
    }
    return null;
  }

  function reflectBall(nx, ny, bounce = 0.85, slipDamp = 0.98) {
    const dot = ball.vx * nx + ball.vy * ny;
    if (dot >= 0) return;  // moving away
    ball.vx = (ball.vx - 2 * dot * nx) * bounce;
    ball.vy = (ball.vy - 2 * dot * ny) * bounce;
    // tangential damping (light)
    ball.vx *= slipDamp;
    ball.vy *= slipDamp;
  }

  function pushOut(nx, ny, overlap) {
    ball.x += nx * (overlap + 0.5);
    ball.y += ny * (overlap + 0.5);
  }

  // ============================================================
  // FLIPPER LOGIC
  // ============================================================
  function flipperTip(f) {
    return { x: f.px + Math.cos(f.angle) * f.length, y: f.py + Math.sin(f.angle) * f.length };
  }

  function updateFlipper(f, raised, dt) {
    const target = raised ? f.upAngle : f.restAngle;
    const diff = target - f.angle;
    const maxStep = FLIPPER_SPEED * dt;
    const prev = f.angle;
    if (Math.abs(diff) <= maxStep) f.angle = target;
    else f.angle += Math.sign(diff) * maxStep;
    f.vAngle = (f.angle - prev) / Math.max(1, dt);
    f.raised = raised;
  }

  function collideFlipper(f) {
    const tip = flipperTip(f);
    const hit = lineCircleHit(f.px, f.py, tip.x, tip.y, ball.x, ball.y, ball.r);
    if (!hit) return;
    const overlap = ball.r - hit.dist;
    pushOut(hit.nx, hit.ny, overlap);
    reflectBall(hit.nx, hit.ny, 0.82);
    // Kick from flipper rotation: tangential velocity at contact point
    if (Math.abs(f.vAngle) > 0.001) {
      // Direction perpendicular to flipper arm at hit
      const armDx = tip.x - f.px, armDy = tip.y - f.py;
      const armLen = Math.hypot(armDx, armDy) || 1;
      // Distance from pivot to hit point
      const hitDistFromPivot = Math.hypot(hit.px - f.px, hit.py - f.py);
      // Tangential dir = perpendicular to arm direction; sign depends on rotation
      const tangX = -armDy / armLen;
      const tangY = armDx / armLen;
      const kickMag = f.vAngle * hitDistFromPivot * 1.6;
      ball.vx += tangX * kickMag;
      ball.vy += tangY * kickMag;
    }
    SFX.flipper();
  }

  // ============================================================
  // BALL UPDATE & COLLISIONS
  // ============================================================
  function updateBall(dt) {
    if (!ball.active) return;
    // Gravity
    ball.vy += GRAVITY * dt;
    // Cap speed
    const sp = Math.hypot(ball.vx, ball.vy);
    if (sp > MAX_SPEED) {
      ball.vx = (ball.vx / sp) * MAX_SPEED;
      ball.vy = (ball.vy / sp) * MAX_SPEED;
    }
    // Sub-step the motion to avoid tunneling (max step = ball radius)
    const stepDx = ball.vx * dt;
    const stepDy = ball.vy * dt;
    const stepLen = Math.hypot(stepDx, stepDy);
    const steps = Math.max(1, Math.ceil(stepLen / (ball.r * 0.6)));
    for (let s = 0; s < steps; s++) {
      ball.x += stepDx / steps;
      ball.y += stepDy / steps;
      // Walls
      for (const w of walls) {
        const hit = lineCircleHit(w.x1, w.y1, w.x2, w.y2, ball.x, ball.y, ball.r);
        if (hit) {
          pushOut(hit.nx, hit.ny, ball.r - hit.dist);
          reflectBall(hit.nx, hit.ny, 0.86);
          SFX.wall();
        }
      }
      // Slingshots (line, big kick)
      for (const sl of slings) {
        const hit = lineCircleHit(sl.x1, sl.y1, sl.x2, sl.y2, ball.x, ball.y, ball.r);
        if (hit) {
          pushOut(hit.nx, hit.ny, ball.r - hit.dist);
          reflectBall(hit.nx, hit.ny, 0.95);
          // Big kick along normal
          ball.vx += hit.nx * 0.35;
          ball.vy += hit.ny * 0.35;
          score += 25;
          SFX.bumper();
          flashes.push({ kind: 'sling', sling: sl, time: 200 });
          spawnSparks(hit.px, hit.py, '#ffaa00');
        }
      }
      // Bumpers
      for (const bm of bumpers) {
        const dx = ball.x - bm.x, dy = ball.y - bm.y;
        const distSq = dx * dx + dy * dy;
        const rr = ball.r + bm.r;
        if (distSq < rr * rr) {
          const dist = Math.sqrt(distSq) || 0.001;
          const nx = dx / dist, ny = dy / dist;
          const overlap = rr - dist;
          pushOut(nx, ny, overlap);
          reflectBall(nx, ny, 1.0);
          // Bumper kick boost
          ball.vx += nx * 0.32;
          ball.vy += ny * 0.32;
          score += bm.score;
          SFX.bumper();
          flashes.push({ kind: 'bumper', bumper: bm, time: 220 });
          spawnSparks(bm.x + nx * bm.r, bm.y + ny * bm.r, bm.color);
        }
      }
      // Flippers
      collideFlipper(flipperL);
      collideFlipper(flipperR);
    }
    // Drain check: ball passed below flippers
    if (ball.y > 720 + ball.r) {
      drainBall();
    }
  }

  // ============================================================
  // PARTICLES
  // ============================================================
  function spawnSparks(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.1 + Math.random() * 0.2;
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 250 + Math.random() * 150, maxLife: 400,
        color, size: 1.5 + Math.random() * 2
      });
    }
  }
  function spawnExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.08 + Math.random() * 0.28;
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 400 + Math.random() * 300, maxLife: 700,
        color, size: 2 + Math.random() * 2.5
      });
    }
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.0003 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = flashes.length - 1; i >= 0; i--) {
      flashes[i].time -= dt;
      if (flashes[i].time <= 0) flashes.splice(i, 1);
    }
  }

  // ============================================================
  // RENDER
  // ============================================================
  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a0030');
    g.addColorStop(0.5, '#250045');
    g.addColorStop(1, '#0a0018');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // Grid lines (subtle)
    ctx.strokeStyle = 'rgba(255, 68, 204, 0.05)';
    ctx.lineWidth = 1;
    for (let y = 50; y < H; y += 40) {
      ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(W - 20, y); ctx.stroke();
    }
    // Center decorative arrows pointing down toward flippers
    ctx.strokeStyle = 'rgba(255, 215, 80, 0.12)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const cy = 520 + i * 30;
      ctx.beginPath();
      ctx.moveTo(W / 2 - 12, cy);
      ctx.lineTo(W / 2, cy + 10);
      ctx.lineTo(W / 2 + 12, cy);
      ctx.stroke();
    }
  }

  function drawWalls() {
    ctx.strokeStyle = '#ff44cc';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#ff44cc';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for (const w of walls) {
      ctx.moveTo(w.x1, w.y1);
      ctx.lineTo(w.x2, w.y2);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Slingshots (orange triangles formed by line + bottom)
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 6;
    for (const sl of slings) {
      // Check if recently flashed
      const flash = flashes.find(f => f.kind === 'sling' && f.sling === sl);
      const alpha = flash ? Math.min(1, flash.time / 200) : 0;
      if (flash) {
        ctx.fillStyle = `rgba(255, 220, 100, ${alpha * 0.5})`;
        // Fill triangle for flash
        if (sl.x1 < W / 2) {
          ctx.beginPath();
          ctx.moveTo(20, 560);
          ctx.lineTo(sl.x1, sl.y1);
          ctx.lineTo(sl.x2, sl.y2);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.moveTo(400, 560);
          ctx.lineTo(sl.x1, sl.y1);
          ctx.lineTo(sl.x2, sl.y2);
          ctx.closePath();
          ctx.fill();
        }
      }
      ctx.beginPath();
      ctx.moveTo(sl.x1, sl.y1);
      ctx.lineTo(sl.x2, sl.y2);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  function drawBumpers() {
    for (const bm of bumpers) {
      const flash = flashes.find(f => f.kind === 'bumper' && f.bumper === bm);
      const pulse = flash ? Math.min(1, flash.time / 220) : 0;
      // Outer glow
      const glow = ctx.createRadialGradient(bm.x, bm.y, bm.r * 0.4, bm.x, bm.y, bm.r + 14 + pulse * 16);
      glow.addColorStop(0, bm.color);
      glow.addColorStop(0.4, bm.color + '88');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(bm.x, bm.y, bm.r + 14 + pulse * 16, 0, Math.PI * 2);
      ctx.fill();
      // Outer rim
      ctx.fillStyle = '#1a0030';
      ctx.beginPath();
      ctx.arc(bm.x, bm.y, bm.r + 3, 0, Math.PI * 2);
      ctx.fill();
      // Inner ring (bright color)
      const ring = ctx.createRadialGradient(bm.x - bm.r * 0.3, bm.y - bm.r * 0.3, 2, bm.x, bm.y, bm.r);
      ring.addColorStop(0, '#ffffff');
      ring.addColorStop(0.4, bm.color);
      ring.addColorStop(1, bm.color + '44');
      ctx.fillStyle = ring;
      ctx.beginPath();
      ctx.arc(bm.x, bm.y, bm.r, 0, Math.PI * 2);
      ctx.fill();
      // Center cap (darker)
      ctx.fillStyle = pulse > 0 ? '#ffffff' : '#1a0030';
      ctx.beginPath();
      ctx.arc(bm.x, bm.y, bm.r * 0.45, 0, Math.PI * 2);
      ctx.fill();
      // Small highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(bm.x - bm.r * 0.4, bm.y - bm.r * 0.4, bm.r * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawFlipper(f) {
    ctx.save();
    ctx.translate(f.px, f.py);
    ctx.rotate(f.angle);
    // Flipper body (metallic gradient)
    const g = ctx.createLinearGradient(0, -8, 0, 8);
    g.addColorStop(0, '#ddeeff');
    g.addColorStop(0.5, '#7a98c8');
    g.addColorStop(1, '#3a4a78');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.lineTo(f.length, -6);
    ctx.lineTo(f.length, 6);
    ctx.lineTo(0, 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Highlight stripe
    ctx.strokeStyle = '#aaccff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(2, -4); ctx.lineTo(f.length - 6, -2);
    ctx.stroke();
    // Pivot cap
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBall() {
    if (!ball.active) return;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(ball.x + 1, ball.y + 3, ball.r, ball.r * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Ball gradient (silver)
    const g = ctx.createRadialGradient(ball.x - ball.r * 0.4, ball.y - ball.r * 0.4, 1, ball.x, ball.y, ball.r);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.4, '#cce0ff');
    g.addColorStop(0.8, '#6a88aa');
    g.addColorStop(1, '#1a2a44');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    // Specular highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(ball.x - ball.r * 0.4, ball.y - ball.r * 0.4, ball.r * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.max(0, Math.min(1, p.life / p.maxLife));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    // Top strip
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, 28);
    ctx.fillStyle = '#ff44cc';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('SCORE ' + String(score).padStart(6, '0'), 8, 8);
    // Lives (balls)
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffd24d';
    let s = '';
    for (let i = 0; i < balls; i++) s += '● ';
    ctx.fillText('BALLS ' + s.trim(), W - 8, 8);
    // High score
    if (highScore > 0) {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#aaaaff';
      ctx.font = '11px Courier New';
      ctx.fillText('BEST ' + highScore, W / 2, 9);
    }

    if (state === 'ready') {
      const blink = Math.floor(performance.now() / 400) % 2 === 0;
      if (blink) {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffd24d';
        ctx.font = 'bold 18px Courier New';
        ctx.fillText('PRESS SPACE TO LAUNCH', W / 2, H / 2);
      }
    }
  }

  function drawStartScreen() {
    drawBackground();
    drawWalls();
    drawBumpers();
    drawFlipper(flipperL);
    drawFlipper(flipperR);

    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const glow = (Math.sin(performance.now() * 0.004) + 1) * 0.5;
    ctx.fillStyle = '#ff44cc';
    ctx.shadowColor = '#ff44cc';
    ctx.shadowBlur = 16 + glow * 16;
    ctx.font = 'bold 34px Courier New';
    ctx.fillText('NEON PINBALL', W / 2, 150);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffd24d';
    ctx.font = '14px Courier New';
    ctx.fillText('Hit bumpers — get the high score!', W / 2, 195);

    ctx.fillStyle = '#cceeff';
    ctx.font = '13px Courier New';
    ctx.fillText('Z  =  Left Flipper', W / 2, 310);
    ctx.fillText('/  =  Right Flipper', W / 2, 335);
    ctx.fillText('SPACE  =  Launch Ball', W / 2, 360);

    ctx.fillStyle = '#88ff88';
    ctx.font = '12px Courier New';
    ctx.fillText('3 BALLS · DON\'T LET IT DRAIN!', W / 2, 420);

    const blinkOn = Math.floor(performance.now() / 400) % 2 === 0;
    if (blinkOn) {
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 18px Courier New';
      ctx.fillText('PRESS ENTER TO START', W / 2, 510);
    }

    if (highScore > 0) {
      ctx.fillStyle = '#aaaaff';
      ctx.font = '12px Courier New';
      ctx.fillText('HIGH SCORE: ' + highScore, W / 2, 580);
    }
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff44cc';
    ctx.shadowColor = '#ff44cc';
    ctx.shadowBlur = 18;
    ctx.font = 'bold 32px Courier New';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '15px Courier New';
    ctx.fillText('FINAL SCORE: ' + score, W / 2, H / 2 - 8);
    if (highScore > 0) {
      ctx.fillStyle = '#ffd24d';
      ctx.fillText('BEST: ' + highScore, W / 2, H / 2 + 20);
    }
    const blink = Math.floor(performance.now() / 400) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 18px Courier New';
      ctx.fillText("PRESS 'R' TO RESTART", W / 2, H / 2 + 80);
    }
  }

  // ============================================================
  // MAIN LOOP
  // ============================================================
  let lastT = 0;
  function loop(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(40, t - lastT);
    lastT = t;

    if (state === 'playing' || state === 'drained' || state === 'ready') {
      updateFlipper(flipperL, held('KeyZ'), dt);
      updateFlipper(flipperR, held('Slash'), dt);
      updateBall(dt);
      updateParticles(dt);
      if (state === 'drained') {
        drainCooldown -= dt;
        if (drainCooldown <= 0 && balls > 0) {
          state = 'ready';
          SFX.ready();
        }
      }
    }

    if (state === 'start') {
      drawStartScreen();
    } else {
      drawBackground();
      drawWalls();
      drawBumpers();
      drawFlipper(flipperL);
      drawFlipper(flipperR);
      drawParticles();
      drawBall();
      drawHUD();
      if (state === 'gameover') drawGameOver();
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

<script src="/reward-timer.js"></script>
</body>
</html>
