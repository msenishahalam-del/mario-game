<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Super Mario — Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(circle at 50% 30%, #1a1a3e 0%, #0a0a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      overflow: hidden;
      padding: 8px;
    }

    /* ── Game frame wrapper ── */
    #gameWrap {
      position: relative;
      width: 800px;
      max-width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 4px #1b2a4a, 0 18px 50px rgba(0,0,0,0.6), 0 0 60px rgba(92,148,252,0.25);
    }

    /* ── HUD ── */
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: linear-gradient(180deg, #1b2a4a 0%, #0f1a30 100%);
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
    }
    .hud-item {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.07);
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }
    .hud-item .lbl { color: #8fb4ff; font-size: 11px; }
    #scoreDisplay .val { color: #FFD700; }
    canvas {
      display: block;
      width: 800px;
      max-width: 100%;
      image-rendering: pixelated;
      touch-action: none;
      background: #5C94FC;
    }

    /* ── HUB + mute buttons ── */
    .topbtn {
      position: fixed; top: 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 14px;
      border: 2px solid #FFD700;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 14px; font-weight: bold;
      letter-spacing: 1px;
      z-index: 60; cursor: pointer;
      user-select: none;
    }
    .topbtn:hover { background: #FFD700; color: #000; }
    #hubBtn { left: 12px; }
    #muteBtn { right: 12px; border-color: #8fb4ff; }

    /* ── Mobile controls ── */
    #mobileControls {
      display: none;
      width: 800px; max-width: 100%;
      padding: 12px 14px;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .ctrl-group { display: flex; gap: 12px; }
    .ctrl-btn {
      width: 66px; height: 66px;
      background: rgba(255,255,255,0.12);
      border: 3px solid rgba(255,255,255,0.45);
      border-radius: 50%;
      color: #fff; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; -webkit-user-select: none;
      touch-action: none; transition: transform 0.05s, background 0.1s;
    }
    .ctrl-btn:active, .ctrl-btn.pressed { background: rgba(255,255,255,0.42); transform: scale(0.92); }
    #btnJump { width: 84px; height: 84px; background: rgba(204,0,0,0.55); border-color: #FF5555; font-size: 30px; }
    #btnJump.pressed { background: rgba(255,60,60,0.85); }
    #btnRun  { width: 64px; height: 64px; background: rgba(255,180,0,0.35); border-color: #FFC107; font-size: 22px; }

    @media (max-width: 820px) {
      #hud { font-size: 12px; padding: 6px 8px; }
      .hud-item { padding: 3px 7px; }
      #mobileControls { display: flex; }
    }

  </style>
</head>
<body>

  <a id="hubBtn" class="topbtn" href="arcade.html">◀ HUB</a>
  <div id="muteBtn" class="topbtn">🔊</div>

  <div id="gameWrap">
    <div id="hud">
      <div class="hud-item"><span class="lbl">PLAYER</span> <span id="nameTag">—</span></div>
      <div class="hud-item" id="scoreDisplay"><span class="lbl">SCORE</span> <span class="val">0</span></div>
      <div class="hud-item"><span class="lbl">🪙</span> <span id="coinsDisplay">0</span></div>
      <div class="hud-item"><span class="lbl">❤️</span> <span id="livesDisplay">3</span></div>
      <div class="hud-item"><span class="lbl">WORLD</span> <span id="worldDisplay">1-1</span></div>
    </div>

    <canvas id="canvas" width="800" height="480"></canvas>
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls">
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btnRun">💨</div>
      <div class="ctrl-btn" id="btnJump">▲</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── AUDIO (WebAudio chiptune SFX — original, no copyrighted music) ───
let actx = null, muted = false;
function initAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (actx && actx.state === 'suspended') actx.resume();
}
function tone(freq, dur, type='square', vol=0.14, when=0, slideTo=null) {
  if (!actx || muted) return;
  const t0 = actx.currentTime + when;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0008, t0 + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function noise(dur, vol=0.18, when=0) {
  if (!actx || muted) return;
  const t0 = actx.currentTime + when;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = actx.createBufferSource(); const g = actx.createGain();
  src.buffer = buf; g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g); g.connect(actx.destination); src.start(t0);
}
const SFX = {
  jump:    () => tone(300, 0.18, 'square', 0.13, 0, 640),
  coin:    () => { tone(988, 0.07, 'square', 0.13); tone(1319, 0.13, 'square', 0.13, 0.07); },
  stomp:   () => { tone(180, 0.09, 'square', 0.16, 0, 70); noise(0.06, 0.1); },
  bump:    () => tone(130, 0.09, 'square', 0.16, 0, 90),
  brk:     () => { noise(0.14, 0.2); tone(200, 0.1, 'square', 0.1, 0, 90); },
  power:   () => { [523,659,784,1047].forEach((f,i)=>tone(f,0.1,'square',0.13,i*0.06)); },
  appear:  () => { [392,523,659].forEach((f,i)=>tone(f,0.09,'triangle',0.12,i*0.05)); },
  hurt:    () => tone(400, 0.2, 'sawtooth', 0.14, 0, 120),
  die:     () => { [440,330,220,165].forEach((f,i)=>tone(f,0.18,'square',0.15,i*0.13)); },
  clear:   () => { [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.14,'square',0.14,i*0.1)); },
  oneup:   () => { [659,784,1047,1319].forEach((f,i)=>tone(f,0.1,'triangle',0.13,i*0.07)); },
};
document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
});

// ─── CONSTANTS ───────────────────────────────────────────
const GROUND_Y = 432;
const SKY_TOP = '#3a7bd5', SKY_BOT = '#9ad0ff';
const BRICK = '#C5500F';

// physics
const WALK_ACC = 0.55, RUN_ACC = 0.85;
const MAX_WALK = 3.2, MAX_RUN = 5.2;
const FRICTION = 0.80, AIR_FRICTION = 0.92;
const JUMP_V = -11.4;
const GRAV = 0.72, GRAV_HOLD = 0.40, MAX_FALL = 13.5;
const COYOTE = 6, JUMP_BUF = 7;
const FIRE_COOLDOWN = 18;       // frames antara fireball
const STAR_DURATION = 600;      // 10 saat @ 60fps
const ICE_FRICTION = 0.05;      // licin untuk Level 4
const GALAXY_GRAV = 0.40;       // graviti rendah untuk Level 5 (floaty)
const FLUTTER_FRAMES = 32;      // tempoh flutter jump atas Yoshi

// ─── STATE ───────────────────────────────────────────────
let score = 0, coins = 0, lives = 3;
let gameState = 'name'; // name | playing | dead | gameover | win | clear
let cameraX = 0, shake = 0;
let spawnX = 60, currentLevel = 1;
const MAX_LEVEL = 6;            // L1-3 + Ice(4) + Galaxy(5) + Yoshi(6)
let snowflakes = [];            // untuk Level 4 background
let galaxyStars = [];           // untuk Level 5 background
let fleeingYoshi = null;        // animasi Yoshi lari bila kena hit
let level, player, particles = [], floaters = [];
let scoreSent = false, playerName = '';
let clearTimer = 0;
let bonusReturn = null;   // simpan state level utama bila masuk pipe
let winTimer = 0;

// ─── INPUT ───────────────────────────────────────────────
const keys = {};
let coyoteT = 0, bufferT = 0;
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyZ'].includes(e.code)) e.preventDefault();
  if ((e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW')) bufferT = JUMP_BUF;
  if (e.code === 'KeyZ' && gameState === 'playing' && player && player.fire && player.fireCD <= 0 && !player.dead) {
    throwFireball();
  }
  if (e.code === 'Enter' && (gameState === 'dead' && lives > 0)) respawn();
  // Main semula selepas tamat (tiada leaderboard lagi)
  if (e.code === 'Enter' && (gameState === 'gameover' || gameState === 'win')) startGame();
  initAudio();   // buka bunyi pada input pertama
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
// Tap/klik canvas: buka audio + main semula bila tamat
canvas.addEventListener('pointerdown', () => {
  initAudio();
  if (gameState === 'gameover' || gameState === 'win') startGame();
});

function jumpHeld() { return keys['ArrowUp'] || keys['Space'] || keys['KeyW']; }
function runHeld()  { return keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyX'] || mobileRun; }

// ─── MOBILE CONTROLS ──────────────────────────────────────
let mobileRun = false;
function setupMobile() {
  const bind = (id, code) => {
    const b = document.getElementById(id);
    const on = e => { e.preventDefault(); initAudio(); keys[code] = true; b.classList.add('pressed');
      if (code === 'ArrowUp') bufferT = JUMP_BUF;
      if (gameState === 'gameover' || gameState === 'win') startGame(); };
    const off = e => { e.preventDefault(); keys[code] = false; b.classList.remove('pressed'); };
    b.addEventListener('touchstart', on, {passive:false});
    b.addEventListener('touchend', off, {passive:false});
    b.addEventListener('touchcancel', off, {passive:false});
  };
  bind('btnLeft','ArrowLeft'); bind('btnRight','ArrowRight'); bind('btnJump','ArrowUp');
  const r = document.getElementById('btnRun');
  r.addEventListener('touchstart', e=>{e.preventDefault(); initAudio(); mobileRun=true; r.classList.add('pressed');}, {passive:false});
  r.addEventListener('touchend',   e=>{e.preventDefault(); mobileRun=false; r.classList.remove('pressed');}, {passive:false});
}
setupMobile();

// ─── LEVEL BUILDING ───────────────────────────────────────
function B(x, y, w, h, type, content) { return { x, y, w, h, type, content: content||null, bumpT: 0, broken: false, used: false }; }

function buildLevel(num) {
  const blocks = [], coinList = [], enemies = [], powerups = [], decos = [];
  let lengthX;

  if (num === 1) {
    lengthX = 3400;
    // ground segments (2 pits)
    blocks.push(B(0, GROUND_Y, 1120, 48, 'ground'));   // pit 1120-1200
    blocks.push(B(1200, GROUND_Y, 1180, 48, 'ground')); // pit 2380-2460
    blocks.push(B(2460, GROUND_Y, 1040, 48, 'ground'));

    // question blocks & bricks (row ~ y=300)
    blocks.push(B(340, 300, 32, 32, 'question', 'coin'));
    blocks.push(B(404, 300, 32, 32, 'brick'));
    blocks.push(B(436, 300, 32, 32, 'question', 'mushroom'));
    blocks.push(B(468, 300, 32, 32, 'brick'));
    blocks.push(B(436, 196, 32, 32, 'question', 'coin'));   // high one

    blocks.push(B(720, 300, 32, 32, 'brick'));
    blocks.push(B(752, 300, 32, 32, 'question', 'coin'));
    blocks.push(B(784, 300, 32, 32, 'brick'));

    // pipes (increasing height)
    blocks.push(B(560, GROUND_Y-56, 56, 56, 'pipe'));
    const ep1 = B(900, GROUND_Y-80, 56, 80, 'pipe'); ep1.enterable = true; blocks.push(ep1);
    blocks.push(B(1320, GROUND_Y-104, 56, 104, 'pipe'));
    blocks.push(B(1480, GROUND_Y-104, 56, 104, 'pipe'));

    // mid bricks cluster
    blocks.push(B(1640, 300, 32, 32, 'brick'));
    blocks.push(B(1672, 300, 32, 32, 'question', 'coin'));
    blocks.push(B(1704, 300, 32, 32, 'brick'));
    blocks.push(B(1850, 220, 32, 32, 'question', 'mushroom'));
    blocks.push(B(2000, 300, 32, 32, 'brick'));
    blocks.push(B(2032, 300, 32, 32, 'brick'));

    // staircase up (solid)
    for (let i = 0; i < 4; i++) blocks.push(B(2520 + i*32, GROUND_Y - 32*(i+1), 32, 32, 'solid'));
    // staircase down
    for (let i = 0; i < 4; i++) blocks.push(B(2700 + i*32, GROUND_Y - 32*(4-i), 32, 32, 'solid'));

    // enemies
    [380, 640, 760, 1000, 1700, 1750, 2050, 2200, 2900, 3050].forEach((x,i) =>
      enemies.push(mkEnemy(x, i % 4 === 0 ? 'koopa' : 'goomba')));

    // floating coins
    [[300,250],[440,150],[600,260],[660,260],[820,300],[1000,200],[1040,200],
     [1240,260],[1280,260],[1700,260],[1900,180],[2150,260],[2600,180],
     [3000,260],[3050,260],[3100,260]].forEach(([x,y]) => coinList.push(mkCoin(x,y)));

    // bushes/decor
    decos.push(...[200,700,1300,1900,2600].map(x => ({x, type:'bush'})));
  } else if (num === 2) {
    lengthX = 3500;
    blocks.push(B(0, GROUND_Y, 600, 48, 'ground'));     // pit 600-760
    blocks.push(B(760, GROUND_Y, 660, 48, 'ground'));    // pit 1420-1600
    blocks.push(B(1600, GROUND_Y, 760, 48, 'ground'));   // pit 2360-2540
    blocks.push(B(2540, GROUND_Y, 960, 48, 'ground'));

    blocks.push(B(260, 290, 32, 32, 'question', 'mushroom'));
    blocks.push(B(360, 230, 32, 32, 'brick'));
    blocks.push(B(392, 230, 32, 32, 'question', 'coin'));
    blocks.push(B(424, 230, 32, 32, 'brick'));

    // floating platforms over pits
    blocks.push(B(640, 320, 96, 24, 'solid'));
    blocks.push(B(1470, 300, 110, 24, 'solid'));
    blocks.push(B(2400, 300, 110, 24, 'solid'));

    blocks.push(B(900, 280, 32, 32, 'question', 'coin'));
    blocks.push(B(932, 280, 32, 32, 'brick'));
    blocks.push(B(1100, 220, 32, 32, 'question', 'coin'));
    blocks.push(B(1700, 290, 32, 32, 'brick'));
    blocks.push(B(1732, 290, 32, 32, 'question', 'mushroom'));
    blocks.push(B(1900, 220, 32, 32, 'brick'));
    blocks.push(B(2700, 290, 32, 32, 'question', 'coin'));
    blocks.push(B(2732, 290, 32, 32, 'brick'));

    const ep2 = B(1000, GROUND_Y-80, 56, 80, 'pipe'); ep2.enterable = true; blocks.push(ep2);
    blocks.push(B(2100, GROUND_Y-104, 56, 104, 'pipe'));

    for (let i = 0; i < 5; i++) blocks.push(B(2900 + i*32, GROUND_Y - 32*(i+1), 32, 32, 'solid'));

    [350, 520, 820, 980, 1150, 1700, 1850, 2050, 2650, 2800, 3100, 3200]
      .forEach((x,i) => enemies.push(mkEnemy(x, i % 3 === 0 ? 'koopa' : 'goomba')));

    [[280,250],[400,190],[660,280],[920,240],[1110,180],[1500,260],
     [1750,250],[2420,260],[2750,250],[3050,260],[3100,260]].forEach(([x,y]) => coinList.push(mkCoin(x,y)));

    decos.push(...[150,800,1500,2200,3000].map(x => ({x, type:'bush'})));
  } else if (num === 3) {
    // ── LEVEL 3 — laluan pendek + arena BOSS Giant Koopa ──
    lengthX = 2700;
    blocks.push(B(0, GROUND_Y, 560, 48, 'ground'));      // pit 560-700
    blocks.push(B(700, GROUND_Y, 1100, 48, 'ground'));   // arena bermula ~1800
    blocks.push(B(1800, GROUND_Y, 900, 48, 'ground'));   // arena (rata, takde pit)

    blocks.push(B(300, 290, 32, 32, 'question', 'mushroom'));  // power-up sebelum boss
    blocks.push(B(420, 240, 32, 32, 'brick'));
    blocks.push(B(452, 240, 32, 32, 'question', 'coin'));
    blocks.push(B(640, 320, 90, 24, 'solid'));            // platform atas pit
    blocks.push(B(900, 280, 32, 32, 'question', 'coin'));
    blocks.push(B(1100, 250, 32, 32, 'brick'));
    blocks.push(B(1132, 250, 32, 32, 'question', 'fire'));   // Fire Flower!
    blocks.push(B(1300, 290, 32, 32, 'question', 'star'));   // Super Star untuk boss
    blocks.push(B(1400, GROUND_Y-80, 56, 80, 'pipe'));

    // dinding arena (boss tak boleh lari keluar)
    blocks.push(B(2660, GROUND_Y-200, 40, 200, 'solid'));

    [380, 760, 1000, 1250].forEach((x,i) => enemies.push(mkEnemy(x, i%2===0?'goomba':'koopa')));
    // Piranha keluar dari pipe di x=1400
    enemies.push(mkEnemy(1428, 'piranha', { pipeY: GROUND_Y-80 }));

    [[300,250],[460,200],[660,280],[920,240],[1150,210],[1500,260],[1600,260]]
      .forEach(([x,y]) => coinList.push(mkCoin(x,y)));

    decos.push(...[150,900,1600].map(x => ({x, type:'bush'})));
  } else if (num === 4) {
    // ── LEVEL 4 — ICE WORLD + ICE KING BOSS ──
    lengthX = 3200;
    // Lantai berlapis (pit kecil utk cabaran)
    blocks.push(B(0, GROUND_Y, 720, 48, 'ground'));       // pit 720-820
    blocks.push(B(820, GROUND_Y, 540, 48, 'ground'));     // pit 1360-1460
    blocks.push(B(1460, GROUND_Y, 580, 48, 'ground'));    // arena bos start ~2040
    blocks.push(B(2040, GROUND_Y, 1160, 48, 'ground'));   // arena boss

    // Platforms terapung (ice block) + question blocks
    blocks.push(B(220, 320, 90, 24, 'solid'));
    blocks.push(B(360, 280, 32, 32, 'question', 'mushroom'));
    blocks.push(B(420, 280, 32, 32, 'brick'));
    blocks.push(B(540, 240, 32, 32, 'question', 'fire'));
    blocks.push(B(740, 300, 110, 24, 'solid'));           // platform atas pit pertama
    blocks.push(B(900, 250, 32, 32, 'question', 'coin'));
    blocks.push(B(932, 250, 32, 32, 'brick'));
    blocks.push(B(964, 250, 32, 32, 'question', 'star'));  // SUPER STAR!
    blocks.push(B(1100, 200, 32, 32, 'question', 'coin'));
    blocks.push(B(1280, 300, 100, 24, 'solid'));          // platform atas pit kedua
    blocks.push(B(1500, 280, 32, 32, 'brick'));
    blocks.push(B(1532, 280, 32, 32, 'question', 'fire'));  // satu lagi Fire Flower
    blocks.push(B(1720, 230, 32, 32, 'question', 'coin'));
    blocks.push(B(1900, 250, 32, 32, 'brick'));

    // Pipes — piranha plants emerge
    blocks.push(B(620, GROUND_Y-56, 56, 56, 'pipe'));
    blocks.push(B(1150, GROUND_Y-80, 56, 80, 'pipe'));
    const ep4 = B(1620, GROUND_Y-80, 56, 80, 'pipe'); ep4.enterable = true; blocks.push(ep4);

    // Dinding arena bos
    blocks.push(B(3160, GROUND_Y-220, 40, 220, 'solid'));

    // Enemies — Goomba, Koopa, Piranha
    [200, 480, 880, 1180, 1550, 1820].forEach((x,i) => enemies.push(mkEnemy(x, i%2===0?'goomba':'koopa')));
    // Piranha di setiap pipe non-enterable
    enemies.push(mkEnemy(648, 'piranha', { pipeY: GROUND_Y-56 }));
    enemies.push(mkEnemy(1178, 'piranha', { pipeY: GROUND_Y-80 }));

    // Coins (banyak — reward eksplorasi)
    [[220,280],[270,280],[310,280],[420,250],[460,250],[760,260],[820,260],
     [870,200],[1080,170],[1140,170],[1300,260],[1340,260],[1480,250],[1700,200],
     [1880,210],[1980,260]]
      .forEach(([x,y]) => coinList.push(mkCoin(x,y)));

    decos.push(...[100,500,1000,1700,2400].map(x => ({x, type:'icepine'})));
  } else if (num === 5) {
    // ── LEVEL 5 — GALAXY (graviti rendah) ──
    lengthX = 3400;
    // Lantai berlapis dengan banyak gaung (lompat floaty)
    blocks.push(B(0, GROUND_Y, 460, 48, 'ground'));      // pit 460-600
    blocks.push(B(600, GROUND_Y, 380, 48, 'ground'));    // pit 980-1120
    blocks.push(B(1120, GROUND_Y, 360, 48, 'ground'));   // pit 1480-1640
    blocks.push(B(1640, GROUND_Y, 420, 48, 'ground'));   // pit 2060-2200
    blocks.push(B(2200, GROUND_Y, 1200, 48, 'ground'));  // bahagian akhir + flag

    // Platform terapung "asteroid" (solid) di pelbagai ketinggian
    blocks.push(B(200, 320, 70, 22, 'solid'));
    blocks.push(B(330, 240, 32, 32, 'question', 'coin'));
    blocks.push(B(480, 280, 80, 22, 'solid'));           // atas pit pertama
    blocks.push(B(700, 250, 70, 22, 'solid'));
    blocks.push(B(820, 180, 32, 32, 'question', 'fire'));
    blocks.push(B(1000, 290, 90, 22, 'solid'));          // atas pit kedua
    blocks.push(B(1200, 230, 70, 22, 'solid'));
    blocks.push(B(1320, 160, 32, 32, 'question', 'coin'));
    blocks.push(B(1500, 300, 90, 22, 'solid'));          // atas pit ketiga

    blocks.push(B(1820, 170, 32, 32, 'question', 'star'));  // Super Star
    blocks.push(B(2080, 300, 90, 22, 'solid'));          // atas pit keempat
    blocks.push(B(2300, 250, 70, 22, 'solid'));
    blocks.push(B(2420, 190, 32, 32, 'question', 'coin'));
    blocks.push(B(2600, 230, 70, 22, 'solid'));
    blocks.push(B(2820, 270, 70, 22, 'solid'));
    blocks.push(B(3000, 200, 32, 32, 'question', 'fire'));

    // Enemies — Goomba/Koopa "angkasa"
    [350, 720, 1250, 1720, 2350, 2700, 2950].forEach((x,i) =>
      enemies.push(mkEnemy(x, i%2===0?'koopa':'goomba')));

    // Coins (star coins — banyak, ikut lengkung lompatan floaty)
    [[210,280],[250,250],[330,200],[510,240],[700,210],[760,180],
     [1020,250],[1210,190],[1330,120],[1520,260],[1710,200],[1830,130],
     [2100,260],[2310,210],[2620,190],[2840,230],[3050,180],[3150,180]]
      .forEach(([x,y]) => coinList.push(mkCoin(x,y)));

    decos.push(...[150,650,1150,1700,2300,2900].map(x => ({x, type:'planet'})));
  } else {
    // ── LEVEL 6 — YOSHI'S ISLAND + BOSS AKHIR (BOWSER) ──
    lengthX = 3000;
    blocks.push(B(0, GROUND_Y, 700, 48, 'ground'));      // pit 700-820
    blocks.push(B(820, GROUND_Y, 640, 48, 'ground'));    // pit 1460-1560
    blocks.push(B(1560, GROUND_Y, 540, 48, 'ground'));   // arena boss start ~2100
    blocks.push(B(2100, GROUND_Y, 900, 48, 'ground'));   // arena boss

    // Platform + power-up untuk lawan boss
    blocks.push(B(260, 300, 90, 22, 'solid'));
    blocks.push(B(420, 250, 32, 32, 'question', 'mushroom'));
    blocks.push(B(560, 290, 100, 22, 'solid'));          // atas pit pertama
    blocks.push(B(900, 280, 90, 22, 'solid'));
    blocks.push(B(1080, 230, 32, 32, 'brick'));
    blocks.push(B(1112, 230, 32, 32, 'question', 'fire'));
    blocks.push(B(1280, 290, 100, 22, 'solid'));         // atas pit kedua
    blocks.push(B(1620, 250, 32, 32, 'question', 'fire'));
    blocks.push(B(1780, 230, 32, 32, 'question', 'star'));
    blocks.push(B(1900, 290, 80, 22, 'solid'));

    // Dinding arena (boss tak lari)
    blocks.push(B(2960, GROUND_Y-220, 40, 220, 'solid'));

    // Enemies
    [320, 640, 980, 1340, 1700, 1920].forEach((x,i) =>

    // Coins
    [[280,260],[330,260],[440,210],[600,250],[920,240],[1100,190],
     [1300,250],[1480,200],[1640,210],[1800,190],[1960,250]]
      .forEach(([x,y]) => coinList.push(mkCoin(x,y)));

    decos.push(...[150,700,1300,2000,2600].map(x => ({x, type:'palmtree'})));
  }

  // ── Yoshi mount (hanya Level 6) ──
  let yoshi = null;
  if (num === 6) {
    yoshi = { x: 180, y: GROUND_Y - 42, w: 40, h: 42, vx: 0, dir: 1,
              taken: false, animT: 0, animF: 0, bob: 0 };
  }

  let boss = null, flag = null;
  if (num === 3) {
    // Giant Koopa boss (Level 3) — kekal seperti asal
    boss = { type: 'koopa', x: 2300, y: GROUND_Y - 70, w: 64, h: 70, vx: 1.4, dir: -1,
             hp: 3, maxHp: 3, hit: 0, fireT: 90, alive: true, active: false,
             minX: 1900, maxX: 2580, stompLock: 0 };
  } else if (num === 4) {

    boss = { type: 'iceking', x: 2900, y: GROUND_Y - 80, w: 70, h: 80, vx: 1.6, dir: -1,
             hp: 5, maxHp: 5, hit: 0, fireT: 100, jumpT: 200, alive: true, active: false,
             enraged: false, vy: 0, onGround: true,
