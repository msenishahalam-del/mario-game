  }
  const theme = num === 4 ? 'ice' : num === 5 ? 'galaxy' : num === 6 ? 'yoshi' : 'day';
  return { blocks, coinList, enemies, powerups, decos, flag, boss, yoshi, fireballs: [], playerFireballs: [], theme, lengthX };
}

// ─── BONUS ROOM (bawah tanah, penuh coin) ─────────────────
function buildBonus(returnX) {
  const blocks = [], coinList = [], enemies = [], powerups = [], decos = [];
  const lengthX = 760;
  blocks.push(B(0, GROUND_Y, 760, 48, 'ground'));
  blocks.push(B(-40, 0, 40, H, 'solid'));        // dinding kiri
  blocks.push(B(760, 0, 40, H, 'solid'));        // dinding kanan
  // coin rows
  for (let r = 0; r < 2; r++)
    for (let i = 0; i < 9; i++)
      coinList.push(mkCoin(120 + i*64, 220 + r*60));
  // exit pipe di hujung kanan
  const exitPipe = B(640, GROUND_Y-80, 56, 80, 'pipe'); exitPipe.isExit = true; blocks.push(exitPipe);
  return { blocks, coinList, enemies, powerups, decos, flag: null, boss: null,
           fireballs: [], playerFireballs: [], theme: 'underground', lengthX, isBonus: true, returnX };
}

function mkEnemy(x, kind, opts) {
  opts = opts || {};
  if (kind === 'piranha') {
    // Piranha Plant — keluar masuk dari pipe. opts.pipeY = y koordinat puncak pipe.
    const pipeY = opts.pipeY !== undefined ? opts.pipeY : GROUND_Y - 56;
    const hideY = pipeY + 4;        // tersembunyi: dalam pipe
    const showY = pipeY - 36;       // keluar penuh atas pipe
    return { x, y: hideY, w: 28, h: 36, vx: 0, vy: 0,
             hideY, showY, baseY: hideY,
             alive: true, kind: 'piranha', stateT: 90, phase: 'hidden',
             squished: false, squishT: 0, animT: 0, animF: 0, onGround: false };
  }
  return { x, y: GROUND_Y - 30, w: 30, h: 30, vx: 0, vy: 0,
           speed: 1.2 + Math.random()*0.6, dir: -1,
           alive: true, kind, squished: false, squishT: 0, animT: 0, animF: 0, onGround:false };
}
function mkCoin(x, y) { return { x, y, w: 20, h: 20, got: false, spin: Math.random()*6 }; }

// ─── PLAYER ───────────────────────────────────────────────
function makePlayer() {
  return { x: spawnX, y: GROUND_Y - 44, w: 28, h: 44, vx: 0, vy: 0,
           onGround: false, facing: 1, animT: 0, animF: 0,
           big: false, fire: false, starT: 0, fireCD: 0,
           onYoshi: false, flutterT: 0,
           inv: 0, dead: false, deadT: 0, skid: false };
}
function hurtPlayer() {
  // Hierarki kecederaan: Yoshi → Fire → Big → mati
  if (player.inv > 0 || player.dead) return;
  if (player.onYoshi) {
    player.onYoshi = false; player.flutterT = 0; player.inv = 100;
    // Yoshi lari (kesan visual)
    fleeingYoshi = { x: player.x, y: player.y + player.h - 36, vx: player.facing * -4, vy: -7, life: 50 };
    burst(player.x+player.w/2, player.y, '#3a3', 14);
    SFX.hurt();
    return;
  }
  if (player.fire || player.big) shrink();
  else killPlayer();
}
function growBig() {
  if (player.fire) { score += 1000; floatText(player.x, player.y, '+1000'); return; }
  if (player.big) { score += 1000; floatText(player.x, player.y, '+1000'); return; }
  player.big = true; player.h = 56; player.y -= 12; player.inv = 40;
  burst(player.x+player.w/2, player.y+10, '#FFD700', 16);
  SFX.power();
}
function setFire() {
  if (!player.big) { player.big = true; player.h = 56; player.y -= 12; }
  if (player.fire) { score += 1000; floatText(player.x, player.y, '+1000'); return; }
  player.fire = true; player.inv = 40;
  burst(player.x+player.w/2, player.y+10, '#FF4400', 18);
  burst(player.x+player.w/2, player.y+10, '#FFAA00', 14);
  floatText(player.x, player.y - 12, 'FIRE!', '#FF6600');
  SFX.power();
}
function setStar() {
  player.starT = STAR_DURATION;
  burst(player.x+player.w/2, player.y, '#FFD700', 24);
  burst(player.x+player.w/2, player.y, '#FFFFFF', 14);
  floatText(player.x, player.y - 14, 'STAR!', '#FFD700');
  SFX.power();
}
function shrink() {
  if (player.fire) {
    // Fire Mario → Big Mario (tak terus kecil)
    player.fire = false; player.inv = 100;
    burst(player.x+player.w/2, player.y, '#FFAA00', 12);
    SFX.hurt();
    return;
  }
  player.big = false; player.h = 44; player.y += 12; player.inv = 100;
  burst(player.x+player.w/2, player.y, '#fff', 12);
  SFX.hurt();
}
function throwFireball() {
  if (!level || !player.fire || player.fireCD > 0) return;
  // Maksima 2 fireball aktif serentak
  if (level.playerFireballs.length >= 2) return;
  const fx = player.x + (player.facing > 0 ? player.w : -8);
  const fy = player.y + (player.big ? 16 : 12);
  level.playerFireballs.push({
    x: fx, y: fy, w: 12, h: 12,
    vx: player.facing * 6, vy: -2,
    life: 140, bounces: 0, spin: 0
  });
  player.fireCD = FIRE_COOLDOWN;
  SFX.bump();   // reuse — atau define SFX baru kemudian
}

// ─── PARTICLES / FLOAT TEXT ───────────────────────────────
function burst(x, y, color, n=8) {
  for (let i=0;i<n;i++) particles.push({ x, y, vx:(Math.random()-0.5)*6, vy:-(Math.random()*5+2),
    life:40, max:40, color, size:Math.random()*5+3 });
}
function brickBits(x, y) {
  const dirs = [[-2,-7],[2,-7],[-3,-4],[3,-4]];
  dirs.forEach(d => particles.push({ x:x+16, y:y+16, vx:d[0], vy:d[1], life:50, max:50, color:BRICK, size:7, rect:true }));
}
function floatText(x, y, txt, color='#fff') { floaters.push({ x, y, txt, color, life:50 }); }

// ─── FLOW ─────────────────────────────────────────────────
function startGame() {
  score = 0; coins = 0; lives = 3; currentLevel = 1; spawnX = 60;
  scoreSent = false; bonusReturn = null;
  level = buildLevel(1); player = makePlayer();
  cameraX = 0; particles = []; floaters = [];
  initSnowflakes();
  gameState = 'playing'; updateHUD();
}
function nextLevel() {
  currentLevel++; spawnX = 60; bonusReturn = null;
  level = buildLevel(currentLevel); player = makePlayer();
  cameraX = 0; particles = []; floaters = [];
  initSnowflakes();
  gameState = 'playing'; updateHUD();
}

function initSnowflakes() {
  snowflakes = [];
  galaxyStars = [];
  fleeingYoshi = null;
  if (level && level.theme === 'ice') {
    for (let i = 0; i < 80; i++) {
      snowflakes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: -0.2 - Math.random() * 0.4,
        vy: 0.3 + Math.random() * 0.6,
        size: 1 + Math.random() * 2,
        sway: Math.random() * 6.28
      });
    }
  }
  if (level && level.theme === 'galaxy') {
    for (let i = 0; i < 110; i++) {
      galaxyStars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() < 0.8 ? 1 : 2,
        tw: Math.random() * 6.28,
        spd: 0.2 + Math.random() * 0.5
      });
    }
  }
}
function respawn() {
  player = makePlayer();
  fleeingYoshi = null;
  cameraX = Math.max(0, spawnX - W/3);
  gameState = 'playing'; updateHUD();
}
function enterPipe(returnX) {
  if (bonusReturn) return;  // dah dalam bonus
  bonusReturn = { level, px: returnX + 70, py: GROUND_Y - player.h, big: player.big, cam: cameraX };
  level = buildBonus(returnX);
  player.x = 40; player.y = GROUND_Y - player.h; player.vx = 0; player.vy = 0;
  cameraX = 0;
  SFX.appear();
}
function exitBonus() {
  if (!bonusReturn) return;
  const r = bonusReturn; bonusReturn = null;
  level = r.level;
  player = makePlayer();
  player.x = r.px; player.y = r.py;
  if (r.big) { player.big = true; player.h = 56; player.y -= 12; }
  cameraX = r.cam;
  SFX.appear();
}

function updateHUD() {
  document.getElementById('scoreDisplay').querySelector('.val').textContent = score;
  document.getElementById('coinsDisplay').textContent = coins;
  document.getElementById('livesDisplay').textContent = lives;
  document.getElementById('worldDisplay').textContent = currentLevel + '-1';
  document.getElementById('nameTag').textContent = playerName || '★';
}

// ─── COLLISION ────────────────────────────────────────────
function overlap(a, b) { return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function solid(b) { return !b.broken; }

function moveX(e, blocks) {
  e.x += e.vx;
  for (const b of blocks) {
    if (!solid(b) || !overlap(e, b)) continue;
    if (e.vx > 0) e.x = b.x - e.w;
    else if (e.vx < 0) e.x = b.x + b.w;
    e.vx = 0;
  }
}
function moveY(e, blocks, onBump) {
  e.y += e.vy; e.onGround = false;
  for (const b of blocks) {
    if (!solid(b) || !overlap(e, b)) continue;
    if (e.vy > 0) { e.y = b.y - e.h; e.vy = 0; e.onGround = true; }
    else if (e.vy < 0) { e.y = b.y + b.h; e.vy = 0; if (onBump) onBump(b); }
  }
}

// ─── UPDATE ───────────────────────────────────────────────
function update() {
  if (shake > 0) shake *= 0.85;

  if (gameState === 'clear') {
    clearTimer--;
    // mario slides down flag (level biasa sahaja)
    if (level.flag && player.y + player.h < GROUND_Y) { player.y += 2.2; level.flag.slide = Math.min(1, level.flag.slide + 0.012); }
    if (clearTimer <= 0) {
      if (currentLevel < MAX_LEVEL) nextLevel();
      else { gameState = 'win'; updateHUD(); }
    }
    stepParticles();
    return;
  }

  if (gameState !== 'playing') { stepParticles(); return; }

  const { blocks, coinList, enemies, powerups, flag } = level;

  if (!player.dead) {
    // horizontal accel — Level 4 (ice) lebih licin
    const onIce = level.theme === 'ice';
    const acc = (runHeld() ? RUN_ACC : WALK_ACC) * (onIce ? 0.45 : 1);
    const maxS = runHeld() ? MAX_RUN : MAX_WALK;
    if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= acc; player.facing = -1; }
    else if (keys['ArrowRight'] || keys['KeyD']) { player.vx += acc; player.facing = 1; }
    else {
      const fric = onIce && player.onGround ? (1 - ICE_FRICTION) : (player.onGround ? FRICTION : AIR_FRICTION);
      player.vx *= fric;
      if (Math.abs(player.vx) < 0.05) player.vx = 0;
    }
    player.vx = Math.max(-maxS, Math.min(maxS, player.vx));
    // skid detection
    player.skid = player.onGround && ((player.vx>0 && (keys['ArrowLeft']||keys['KeyA'])) || (player.vx<0 && (keys['ArrowRight']||keys['KeyD'])));

    // jump w/ coyote + buffer
    if (player.onGround) coyoteT = COYOTE; else if (coyoteT>0) coyoteT--;
    if (bufferT > 0) bufferT--;
    if (bufferT > 0 && coyoteT > 0) {
      player.vy = JUMP_V; player.onGround = false; coyoteT = 0; bufferT = 0;
      SFX.jump(); burst(player.x+player.w/2, player.y+player.h, '#fff', 4);
    }

    // variable gravity — galaxy = low grav, Yoshi = flutter jump
    const gScale = level.theme === 'galaxy' ? (GALAXY_GRAV / GRAV) : 1;
    if (player.onGround) player.flutterT = FLUTTER_FRAMES;  // reset bila atas tanah
    if (player.onYoshi && !player.onGround && player.vy > 0 && jumpHeld() && player.flutterT > 0) {
      // Flutter jump — perlahan jatuh
      player.vy = Math.min(player.vy, 1.6);
      player.flutterT--;
      if (player.flutterT % 6 === 0) burst(player.x+player.w/2, player.y+player.h, '#fff', 2);
    } else {
      if (player.vy < 0 && jumpHeld()) player.vy += GRAV_HOLD * gScale;
      else player.vy += GRAV * gScale;
    }
    const maxFall = level.theme === 'galaxy' ? MAX_FALL * 0.72 : MAX_FALL;
    if (player.vy > maxFall) player.vy = maxFall;
  } else {
    player.deadT--; player.y += player.vy; player.vy += 0.45;
    if (player.deadT <= 0) {
      lives--;
      if (lives <= 0) { gameState = 'gameover'; updateHUD(); }
      else respawn();
    }
    stepParticles(); return;
  }

  moveX(player, blocks);
  moveY(player, blocks, onHeadBump);

  // walk anim
  if (Math.abs(player.vx) > 0.4 && player.onGround) {
    const spd = Math.abs(player.vx) > MAX_WALK ? 4 : 7;
    player.animT++; if (player.animT > spd) { player.animT=0; player.animF=(player.animF+1)%3; }
  } else player.animF = 0;

  // pit death
  if (player.y > H + 30) killPlayer();
  if (player.inv > 0) player.inv--;

  // block bump animation decay
  for (const b of blocks) if (b.bumpT > 0) b.bumpT--;

  // enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.squished) { e.squishT--; if (e.squishT<=0) e.alive=false; continue; }

    if (e.kind === 'piranha') {
      // Cycle: hidden → rising → showing → falling → hidden
      e.stateT--;
      if (e.phase === 'hidden' && e.stateT <= 0) { e.phase = 'rising'; e.stateT = 30; }
      else if (e.phase === 'rising') {
        e.y -= 1.5;
        if (e.y <= e.showY || e.stateT <= 0) { e.y = e.showY; e.phase = 'showing'; e.stateT = 100; }
      }
      else if (e.phase === 'showing' && e.stateT <= 0) { e.phase = 'falling'; e.stateT = 30; }
      else if (e.phase === 'falling') {
        e.y += 1.5;
        if (e.y >= e.hideY || e.stateT <= 0) { e.y = e.hideY; e.phase = 'hidden'; e.stateT = 90; }
      }
      e.animT++; if (e.animT>15){ e.animT=0; e.animF=(e.animF+1)%2; }
      // Tak collision bila tersembunyi
      if (e.phase === 'hidden') continue;
    } else {
      e.vy += GRAV; if (e.vy > MAX_FALL) e.vy = MAX_FALL;
      e.vx = e.dir * e.speed;
      moveX(e, blocks); moveY(e, blocks, null);
      // wall probe — pusing kalau ada blok di hadapan
      const wx = e.dir > 0 ? e.x + e.w + 1 : e.x - 1;
      const wallAhead = blocks.some(b => solid(b) && wx>=b.x && wx<=b.x+b.w && b.y < e.y+e.h-3 && b.y+b.h > e.y+3);
      if (wallAhead) e.dir *= -1;
      // ledge probe — pusing kalau takde lantai di hadapan (jangan jatuh pit)
      else if (e.onGround) {
        const fx = e.dir > 0 ? e.x+e.w+2 : e.x-2;
        const ahead = blocks.some(b => solid(b) && fx>=b.x && fx<=b.x+b.w && b.y>=e.y+e.h && b.y<=e.y+e.h+6);
        if (!ahead) e.dir *= -1;
      }
      if (e.x <= 0) { e.x = 0; e.dir = 1; }
      e.animT++; if (e.animT>10){ e.animT=0; e.animF=(e.animF+1)%2; }
    }

    if (!player.dead && overlap(player, e)) {
      // Star Mario kill semua musuh atas sentuhan
      if (player.starT > 0) {
        e.squished = true; e.squishT = 26;
        score += 500; floatText(e.x, e.y, '+500', '#FFD700'); updateHUD();
        burst(e.x+e.w/2, e.y+e.h/2, '#FFD700', 14); shake = 4; SFX.stomp();
        continue;
      }
      if (player.inv > 0) continue;
      // Piranha — tak boleh stomp dari atas (kepala berduri tersirat)
      if (e.kind === 'piranha') {
        hurtPlayer();
        continue;
      }
      const fromAbove = player.vy > 0 && player.y + player.h < e.y + e.h*0.7;
      if (fromAbove) {
        e.squished = true; e.squishT = 26; player.vy = -8.5;
        score += 100; floatText(e.x, e.y, '+100'); updateHUD();
        burst(e.x+e.w/2, e.y+e.h/2, '#C04000', 8); shake = 5; SFX.stomp();
      } else hurtPlayer();
    }
  }

  // mushroom / fire flower / star powerups (dynamic)
  for (const m of powerups) {
    if (m.taken) continue;
    const kind = m.kind || 'mushroom';
    if (m.emerging) {
      m.y -= 1; if (m.y <= m.targetY) { m.emerging = false; m.vy = 0; }
      continue;
    }
    m.vy += GRAV; if (m.vy > 8) m.vy = 8;
    if (kind === 'star') {
      // Star pantul kuat bila kena ground
      moveX(m, blocks);
      moveY(m, blocks, null);
      if (m.onGround) m.vy = -8;
      if (m.vx === 0) m.vx = 2.4;
    } else if (kind === 'fire') {
      // Fire Flower diam — tunggu Mario ambik
      m.vx = 0; m.vy = 0;
    } else {
      moveX(m, blocks); moveY(m, blocks, null);
      if (m.vx === 0) m.vx = 1.5;
    }
    if (overlap(player, m)) {
      m.taken = true;
      if (kind === 'fire') setFire();
      else if (kind === 'star') setStar();
      else growBig();
    }
  }

  // ── Yoshi mount (Level 6) ──
  if (level.yoshi && !level.yoshi.taken) {
    const yo = level.yoshi;
    yo.bob = (yo.bob || 0) + 0.08;
    yo.animT++; if (yo.animT > 16) { yo.animT = 0; yo.animF = (yo.animF+1)%2; }
    if (!player.dead && overlap(player, yo)) {
      yo.taken = true;
      player.onYoshi = true;
      player.flutterT = FLUTTER_FRAMES;
      floatText(player.x, player.y - 14, 'YOSHI! 🦖', '#3a3');
      burst(player.x+player.w/2, player.y, '#3c3', 16);
      SFX.power();
    }
  }
  // Yoshi lari (animasi selepas kena hit)
  if (fleeingYoshi) {
    fleeingYoshi.x += fleeingYoshi.vx;
    fleeingYoshi.y += fleeingYoshi.vy;
    fleeingYoshi.vy += 0.5;
    fleeingYoshi.life--;
    if (fleeingYoshi.life <= 0) fleeingYoshi = null;
  }

  // coins
  for (const c of coinList) {
    if (c.got) continue;
    c.spin += 0.18;
    if (overlap(player, c)) { c.got = true; collectCoin(c.x, c.y); }
  }

  // flag
  if (flag && !flag.reached) {
    const fr = { x: flag.x+12, y: flag.baseY - flag.h, w: 8, h: flag.h };
    if (overlap(player, fr)) {
      flag.reached = true;
      score += 2000; floatText(flag.x, player.y, '+2000', '#FFD700'); updateHUD();
      SFX.clear();
      player.dead = false; player.vx = 0; player.vy = 0;
      player.x = flag.x + 2;
      gameState = 'clear'; clearTimer = 150;
    }
  }

  // ── BOSS ──
  if (level.boss && level.boss.alive) {
    const bs = level.boss;
    if (!bs.active && player.x > bs.minX - 200) bs.active = true;
    if (bs.active) {
      if (bs.hit > 0) bs.hit--;

      // Boss jenis "jumper" (Ice King + Bowser) — multi-fasa
      const isIceKing = bs.type === 'iceking';
      const isBowser = bs.type === 'bowser';
      const jumper = isIceKing || isBowser;
      const iceShot = isIceKing;   // Ice King tembak ais, Bowser tembak api
      if (jumper && !bs.enraged && bs.hp <= bs.maxHp / 2) {
        bs.enraged = true;
        shake = 18;
        burst(bs.x+bs.w/2, bs.y+bs.h/2, isBowser ? '#FF8800' : '#FF2244', 24);
        SFX.power();
      }

      // Boss graviti (untuk jumper lompat)
      if (jumper) {
        bs.vy += GRAV; if (bs.vy > MAX_FALL) bs.vy = MAX_FALL;
        bs.y += bs.vy;
        if (bs.y + bs.h >= GROUND_Y) {
          if (!bs.onGround && bs.vy > 4) {
            // mendarat dari lompatan — shockwave!
            shake = 12;
            const sc = iceShot ? { ice: true } : {};
            level.fireballs.push(Object.assign({ x: bs.x - 20, y: GROUND_Y - 12, vx: -4, vy: -2, life: 90 }, sc));
            level.fireballs.push(Object.assign({ x: bs.x + bs.w + 20, y: GROUND_Y - 12, vx: 4, vy: -2, life: 90 }, sc));
          }
          bs.y = GROUND_Y - bs.h;
          bs.vy = 0;
          bs.onGround = true;
        } else {
          bs.onGround = false;
        }
      }

      // Patrol (hanya bila atas tanah untuk jumper)
      if (!jumper || bs.onGround) {
        const sp = jumper && bs.enraged ? 1.5 : 1;
        bs.x += bs.vx * bs.dir * sp;
        if (bs.x < bs.minX) { bs.x = bs.minX; bs.dir = 1; }
        if (bs.x > bs.maxX) { bs.x = bs.maxX; bs.dir = -1; }
      }

      // Throw fireball / iceball
      bs.fireT--;
      if (bs.fireT <= 0) {
        const baseInterval = jumper ? (bs.enraged ? (isBowser ? 60 : 70) : (isBowser ? 80 : 100)) : 110;
        bs.fireT = baseInterval;
        const toL = player.x < bs.x ? -1 : 1;
        if (jumper && bs.enraged) {
          // 3-arah serentak (Bowser 4-arah lebih ganas)
          const spreads = isBowser ? [-0.5, -1.5, -2.5, -3.5] : [-1, -2, -3];
          for (const dvy of spreads) {
            level.fireballs.push({ x: bs.x + bs.w/2, y: bs.y + 24, vx: toL * 3.4, vy: dvy, life: 220, ice: iceShot });
          }
        } else if (jumper) {
          level.fireballs.push({ x: bs.x + bs.w/2, y: bs.y + 24, vx: toL * 3.2, vy: -1.5, life: 220, ice: iceShot });
        } else {
          level.fireballs.push({ x: bs.x + bs.w/2, y: bs.y + 20, vx: toL * 3.2, vy: -1, life: 200 });
        }
        SFX.bump();
      }

      // Jumper jump attack
      if (jumper && bs.onGround) {
        bs.jumpT--;
        if (bs.jumpT <= 0) {
          bs.vy = bs.enraged ? -12 : -10;
          bs.onGround = false;
          bs.jumpT = bs.enraged ? 140 : 240;
        }
      }

      if (bs.stompLock > 0) bs.stompLock--;

      // collision with player
      if (!player.dead && overlap(player, bs)) {
        // Star Mario terus bunuh boss (1 hit damage)
        if (player.starT > 0 && bs.stompLock === 0) {
          bs.hp--; bs.hit = 30; bs.stompLock = 20;
          score += 700; floatText(bs.x, bs.y, '+700', '#FFD700'); updateHUD();
          burst(bs.x+bs.w/2, bs.y, '#FFD700', 14); shake = 8; SFX.stomp();
          if (bs.hp <= 0) {
            bs.alive = false; score += isBowser ? 8000 : isIceKing ? 5000 : 3000; updateHUD();
            burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FFD700', 30);
            burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FF4400', 20);
            shake = 14; SFX.clear();
            gameState = 'clear'; clearTimer = 130;
          }
        }
        else if (player.inv === 0) {
          const fromAbove = player.vy > 0 && player.y + player.h < bs.y + bs.h*0.5;
          if (fromAbove && bs.stompLock === 0) {
            bs.hp--; bs.hit = 30; bs.stompLock = 20; player.vy = -10;
            score += 500; floatText(bs.x, bs.y, '+500', '#FFD700'); updateHUD();
            burst(bs.x+bs.w/2, bs.y, '#FF8800', 14); shake = 8; SFX.stomp();
            if (bs.hp <= 0) {
              bs.alive = false; score += isBowser ? 8000 : isIceKing ? 5000 : 3000; updateHUD();
              burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FFD700', 30);
              burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FF4400', 20);
              shake = 14; SFX.clear();
              gameState = 'clear'; clearTimer = 130;
            }
          } else if (!fromAbove) {
            hurtPlayer();
          }
        }
      }
    }
  }

  // ── Boss/Enemy Fireballs (mengejar player) ──
  for (const fb of level.fireballs) {
    fb.life--; fb.vy += 0.12; fb.x += fb.vx; fb.y += fb.vy;
    // bounce on ground
    if (fb.y > GROUND_Y - 12) { fb.y = GROUND_Y - 12; fb.vy = -4; }
    if (!player.dead && player.inv === 0 && player.starT === 0 && overlap(player, { x:fb.x-9, y:fb.y-9, w:18, h:18 })) {
      fb.life = 0;
      hurtPlayer();
    }
  }
  level.fireballs = level.fireballs.filter(f => f.life > 0 && f.x > cameraX - 40 && f.x < cameraX + W + 40);

  // ── Player Fireballs (Fire Mario lempar) ──
  if (player.fireCD > 0) player.fireCD--;
  if (player.starT > 0) player.starT--;
  for (const fb of level.playerFireballs) {
    fb.life--;
    fb.vy += 0.32;
    if (fb.vy > 9) fb.vy = 9;
    fb.x += fb.vx; fb.y += fb.vy;
    fb.spin = (fb.spin || 0) + 0.4;
    // Bounce off ground
    if (fb.y + fb.h > GROUND_Y) {
      fb.y = GROUND_Y - fb.h; fb.vy = -7; fb.bounces++;
      if (fb.bounces >= 4) fb.life = 0;
    }
    // Check collision dengan blok (mudah — kalau langgar dinding solid)
    for (const b of blocks) {
      if (b.broken) continue;
      if (!solid(b)) continue;
      if (fb.x + fb.w > b.x && fb.x < b.x + b.w && fb.y + fb.h > b.y && fb.y < b.y + b.h) {
        fb.life = 0;
        burst(fb.x+6, fb.y+6, '#FF6600', 6);
        break;
      }
    }
    // Check collision dengan enemy
    if (fb.life > 0) {
      for (const e of enemies) {
        if (!e.alive || e.squished) continue;
        if (e.kind === 'piranha' && e.phase === 'hidden') continue;
        if (overlap(fb, e)) {
          e.squished = true; e.squishT = 26;
          score += 200; floatText(e.x, e.y, '+200', '#FF8800'); updateHUD();
          burst(e.x+e.w/2, e.y+e.h/2, '#FF6600', 14);
          shake = 4;
          fb.life = 0;
          SFX.stomp();
          break;
        }
      }
    }
    // Check collision dengan boss
    if (fb.life > 0 && level.boss && level.boss.alive && level.boss.active && level.boss.hit === 0) {
      const bs = level.boss;
      if (overlap(fb, bs)) {
        bs.hp--; bs.hit = 30;
        score += 300; floatText(bs.x, bs.y, '+300', '#FF6600'); updateHUD();
        burst(fb.x, fb.y, '#FF6600', 10);
        fb.life = 0; shake = 6;
        SFX.bump();
        if (bs.hp <= 0) {
          bs.alive = false; score += 5000; updateHUD();
          burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FFD700', 30);
          burst(bs.x+bs.w/2, bs.y+bs.h/2, '#FF4400', 20);
          shake = 14; SFX.clear();
          gameState = 'clear'; clearTimer = 130;
        }
      }
    }
  }
  level.playerFireballs = level.playerFireballs.filter(f => f.life > 0 && f.x > cameraX - 60 && f.x < cameraX + W + 60);

  // ── Pipe entry (enterable / exit) ──
  if (!player.dead && (keys['ArrowDown'] || keys['KeyS'])) {
    for (const b of blocks) {
      if ((b.enterable || b.isExit) && player.onGround &&
          Math.abs((player.x + player.w/2) - (b.x + b.w/2)) < 22 &&
          Math.abs((player.y + player.h) - b.y) < 8) {
        if (b.isExit) exitBonus();
        else enterPipe(player.x);
        break;
      }
    }
  }

  // camera (smooth + lookahead + clamp)
  const look = player.facing * 60;
  const target = player.x - W/2.6 + look;
  cameraX += (target - cameraX) * 0.10;
  cameraX = Math.max(0, Math.min(cameraX, level.lengthX - W));

  stepParticles();
}

function onHeadBump(b) {
  if (b.type === 'question' && !b.used) {
    b.used = true; b.bumpT = 12; SFX.bump();
    if (b.content === 'coin') { collectCoin(b.x, b.y - 6); }
    else if (b.content === 'mushroom') {
      // Kalau dah Big atau Fire, spawn Fire Flower instead (auto-upgrade)
      const kind = (player.big || player.fire) ? 'fire' : 'mushroom';
      level.powerups.push({ x: b.x+2, y: b.y, targetY: b.y-30, w:28, h:28, vx: kind==='fire'?0:1.5, vy:0,
        emerging:true, taken:false, onGround:false, kind });
      SFX.appear();
    }
    else if (b.content === 'fire') {
      level.powerups.push({ x: b.x+2, y: b.y, targetY: b.y-30, w:28, h:28, vx:0, vy:0,
        emerging:true, taken:false, onGround:false, kind:'fire' });
      SFX.appear();
    }
    else if (b.content === 'star') {
      level.powerups.push({ x: b.x+2, y: b.y, targetY: b.y-30, w:28, h:28, vx:2.4, vy:-6,
        emerging:true, taken:false, onGround:false, kind:'star' });
      SFX.appear();
    }
  } else if (b.type === 'brick') {
    if (player.big || player.fire) { b.broken = true; brickBits(b.x, b.y); score+=50; shake=6; SFX.brk(); }
    else { b.bumpT = 10; SFX.bump(); }
  } else { b.bumpT = 6; SFX.bump(); }
}

function collectCoin(x, y) {
  coins++; score += 200; updateHUD();
  floatText(x, y, '+200', '#FFD700');
  burst(x+10, y, '#FFD700', 5);
  SFX.coin();
  if (coins > 0 && coins % 20 === 0) { lives++; updateHUD(); floatText(player.x, player.y-20, '1-UP!', '#00FF95'); SFX.oneup(); }
}

function killPlayer() {
  if (player.dead) return;
  if (player.big) { shrink(); return; }
  player.dead = true; player.vy = -11; player.deadT = 80; player.vx = 0;
  burst(player.x+player.w/2, player.y, '#FF4444', 10);
  SFX.die();
}

function stepParticles() {
  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life--; }
  particles = particles.filter(p => p.life > 0);
  for (const f of floaters) { f.y -= 0.8; f.life--; }
  floaters = floaters.filter(f => f.life > 0);
}

// ─── DRAW ─────────────────────────────────────────────────
function drawBackground() {
  if (level.theme === 'underground') {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#0a0a1e'); g.addColorStop(1, '#1a1a3a');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let i=0;i<30;i++){ const x=(i*97 - cameraX*0.3)%(W+40); ctx.fillRect(((x%W)+W)%W, (i*53)%H, 2, 2); }
    return;
  }
  if (level.theme === 'ice') {
    // Langit ais — gradient biru-putih
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#4a7ab8');
    g.addColorStop(0.5, '#88c4e8');
    g.addColorStop(1, '#d8eef8');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // Awan kelabu sejuk
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const clouds = [[120,80],[460,55],[820,95],[1180,65],[1560,80],[1920,55],[2300,90]];
    for (const [cx0,cy] of clouds) {
      let x = cx0 - cameraX*0.4; x = ((x % (level.lengthX+200)) + level.lengthX+200) % (level.lengthX+200);
      if (x > W+120) continue;
      cloud(x, cy);
    }
    // Gunung salji jauh (parallax 0.25)
    ctx.fillStyle = '#e8f4ff';
    for (const mx of [100,450,820,1180,1550,1920,2280,2640]) {
      const x = mx - cameraX*0.25;
      ctx.beginPath(); ctx.moveTo(x-110, GROUND_Y); ctx.lineTo(x-30, GROUND_Y-150); ctx.lineTo(x+30, GROUND_Y-140); ctx.lineTo(x+110, GROUND_Y); ctx.closePath(); ctx.fill();
      // Puncak salji
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.moveTo(x-30, GROUND_Y-150); ctx.lineTo(x-10, GROUND_Y-130); ctx.lineTo(x+10, GROUND_Y-138); ctx.lineTo(x+30, GROUND_Y-140); ctx.lineTo(x+5, GROUND_Y-120); ctx.lineTo(x-15, GROUND_Y-122); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#e8f4ff';
    }
    // Bukit ais (parallax 0.65)
    ctx.fillStyle = '#bdd8f0';
    for (const hx of [200,650,1150,1650,2150,2700,3150]) {
      const x = hx - cameraX*0.65;
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 95, Math.PI, 0); ctx.fill();
    }
    ctx.fillStyle = '#a0c8e8';
    for (const hx of [380,900,1450,2000,2500,3000]) {
      const x = hx - cameraX*0.65;
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 62, Math.PI, 0); ctx.fill();
    }
    // Snowflakes (foreground)
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    for (const sf of snowflakes) {
      sf.x += sf.vx; sf.y += sf.vy;
      sf.sway += 0.04;
      sf.x += Math.sin(sf.sway) * 0.3;
      if (sf.y > H) { sf.y = -5; sf.x = Math.random() * W; }
      if (sf.x < -10) sf.x = W;
      ctx.beginPath(); ctx.arc(sf.x, sf.y, sf.size, 0, 7); ctx.fill();
    }
    return;
  }
  if (level.theme === 'galaxy') {
    // Angkasa lepas — gradient ungu-hitam
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#0a0420');
    g.addColorStop(0.5, '#1a0a3a');
    g.addColorStop(1, '#2a0a44');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // Nebula glow
    for (let i=0;i<3;i++){
      const nx = (i*340 - cameraX*0.15) % (W+300);
      const x = ((nx%(W+300))+(W+300))%(W+300) - 150;
      const ng = ctx.createRadialGradient(x, 120+i*70, 10, x, 120+i*70, 150);
      ng.addColorStop(0, ['rgba(180,80,200,0.22)','rgba(80,120,220,0.18)','rgba(220,100,150,0.16)'][i]);
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ng;
      ctx.beginPath(); ctx.arc(x, 120+i*70, 150, 0, 7); ctx.fill();
    }
    // Bintang berkelip
    for (const s of galaxyStars) {
      s.tw += 0.04;
      const tw = 0.5 + 0.5*Math.sin(s.tw);
      ctx.fillStyle = `rgba(255,255,255,${tw})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    return;
  }
  if (level.theme === 'yoshi') {
    // Yoshi's Island — langit cerah, bukit warna-warni
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#7ec8f0');
    g.addColorStop(0.6, '#b8e8f8');
    g.addColorStop(1, '#d8f4d0');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // Matahari ceria
    ctx.fillStyle = '#fff3a0';
    ctx.beginPath(); ctx.arc(W-120, 80, 40, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,243,160,0.3)';
    ctx.beginPath(); ctx.arc(W-120, 80, 58, 0, 7); ctx.fill();
    // Awan comel
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    const clouds = [[140,90],[480,60],[820,100],[1180,70],[1540,90],[1900,60],[2280,95]];
    for (const [cx0,cy] of clouds) {
      let x = cx0 - cameraX*0.4; x = ((x % (level.lengthX+200)) + level.lengthX+200) % (level.lengthX+200);
      if (x > W+120) continue;
      cloud(x, cy);
    }
    // Bukit warna pastel (parallax)
    const hillColors = ['#f5a8c8','#a8e8a8','#f8d888','#a8c8f0'];
    for (let i=0;i<8;i++){
      const hx = (i*420 - cameraX*0.45);
      const x = hx;
      ctx.fillStyle = hillColors[i%4];
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 110, Math.PI, 0); ctx.fill();
    }
    // Bukit hijau depan
    ctx.fillStyle = '#5ac85a';
    for (const hx of [200,650,1150,1650,2150,2700]) {
      const x = hx - cameraX*0.65;
      ctx.beginPath(); ctx.arc(x, GROUND_Y, 70, Math.PI, 0); ctx.fill();
    }
    return;
  }
  // sky gradient
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, SKY_TOP); g.addColorStop(1, SKY_BOT);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // far mountains (parallax 0.25)
  ctx.fillStyle = '#6fa8d8';
  const mtns = [100,450,800,1150,1500,1850,2200,2550,2900];
  for (const mx of mtns) {
    const x = mx - cameraX*0.25;
    ctx.beginPath(); ctx.moveTo(x-90, GROUND_Y); ctx.lineTo(x, GROUND_Y-120); ctx.lineTo(x+90, GROUND_Y); ctx.fill();
  }
  // clouds (parallax 0.45)
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  const clouds = [[120,70],[420,55],[760,85],[1080,60],[1420,75],[1760,55],[2100,80],[2480,62],[2850,72]];
  for (const [cx0,cy] of clouds) {
    let x = cx0 - cameraX*0.45; x = ((x % (level.lengthX)) + level.lengthX) % level.lengthX;
    if (x > W+120) continue;
    cloud(x, cy);
  }
  // hills (parallax 0.65)
  ctx.fillStyle = '#3fbf3f';
  for (const hx of [200,650,1150,1650,2150,2700,3150]) {
    const x = hx - cameraX*0.65;
    ctx.beginPath(); ctx.arc(x, GROUND_Y, 95, Math.PI, 0); ctx.fill();
  }
  ctx.fillStyle = '#34a534';
  for (const hx of [380,900,1450,2000,2500,3000]) {
    const x = hx - cameraX*0.65;
    ctx.beginPath(); ctx.arc(x, GROUND_Y, 62, Math.PI, 0); ctx.fill();
  }
}
function cloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, 7); ctx.arc(x+24, y-10, 26, 0, 7);
  ctx.arc(x+52, y, 20, 0, 7); ctx.arc(x+26, y+6, 24, 0, 7);
  ctx.fill();
}

function drawBush(d) {
  const x = d.x - cameraX*0.85;
  if (x < -100 || x > W+100) return;
  if (d.type === 'icepine') {
    // Pokok pain salji (segitiga tindih)
    const y = GROUND_Y;
    ctx.fillStyle = '#5a4020';
    ctx.fillRect(x-4, y-22, 8, 22);
    ctx.fillStyle = '#1a5a2a';
    ctx.beginPath(); ctx.moveTo(x-26, y-22); ctx.lineTo(x, y-72); ctx.lineTo(x+26, y-22); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x-22, y-44); ctx.lineTo(x, y-92); ctx.lineTo(x+22, y-44); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x-18, y-66); ctx.lineTo(x, y-104); ctx.lineTo(x+18, y-66); ctx.closePath(); ctx.fill();
    // Salji atas tiap lapisan
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.moveTo(x-26, y-22); ctx.lineTo(x-18, y-30); ctx.lineTo(x-10, y-26); ctx.lineTo(x, y-32); ctx.lineTo(x+10, y-26); ctx.lineTo(x+18, y-30); ctx.lineTo(x+26, y-22); ctx.fill();
    ctx.beginPath(); ctx.arc(x, y-104, 4, 0, 7); ctx.fill();
    return;
  }
  if (d.type === 'planet') {
    // Planet kecil melayang di latar (galaxy)
    const px = d.x - cameraX*0.5;
    if (px < -120 || px > W+120) return;
    const py = 150 + (d.x % 120);
    const colors = [['#ff8855','#cc4422'],['#55aaff','#2266cc'],['#aa88ff','#6644aa'],['#ffcc55','#cc9922']];
    const c = colors[Math.floor(d.x/150)%4];
    const r = 22 + (d.x % 18);
    const pg = ctx.createRadialGradient(px-r*0.3, py-r*0.3, 2, px, py, r);
    pg.addColorStop(0, c[0]); pg.addColorStop(1, c[1]);
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(px, py, r, 0, 7); ctx.fill();
    // Gelang planet
    if (Math.floor(d.x/150)%2===0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(px, py, r+8, 4, -0.3, 0, 7); ctx.stroke();
    }
    return;
  }
  if (d.type === 'palmtree') {
    // Pokok palma Yoshi's Island
    const y = GROUND_Y;
    ctx.fillStyle = '#a06830';
    ctx.fillRect(x-5, y-70, 10, 70);
    ctx.strokeStyle = '#8a5828'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x-3, y-20); ctx.lineTo(x-3, y-60); ctx.stroke();
    // Daun palma (lengkung)
    ctx.fillStyle = '#3aaa3a';
    for (const a of [-2.4, -1.7, -1.0, -0.4, 0.3]) {
      ctx.beginPath();
      ctx.moveTo(x, y-70);
      ctx.quadraticCurveTo(x+Math.cos(a)*36, y-70+Math.sin(a)*28-12, x+Math.cos(a)*64, y-70+Math.sin(a)*44);
      ctx.quadraticCurveTo(x+Math.cos(a)*40, y-70+Math.sin(a)*24, x, y-66);
      ctx.fill();
    }
    // Kelapa
    ctx.fillStyle = '#6a4020';
    ctx.beginPath(); ctx.arc(x-6, y-64, 5, 0, 7); ctx.arc(x+6, y-62, 5, 0, 7); ctx.fill();
    return;
  }
  ctx.fillStyle = '#2a9d2a';
  const y = GROUND_Y;
  ctx.beginPath(); ctx.arc(x, y, 24, Math.PI, 0);
  ctx.arc(x+28, y, 30, Math.PI, 0); ctx.arc(x+58, y, 24, Math.PI, 0); ctx.fill();
}

function drawBlock(b) {
  const x = Math.round(b.x - cameraX);
  if (x + b.w < -10 || x > W+10) return;
  const yo = b.bumpT > 0 ? -Math.sin((b.bumpT/12)*Math.PI)*8 : 0;
  const y = b.y + yo;

  if (b.type === 'ground') {
    let soil = '#C56A2C', top1 = '#3fbf3f', top2 = '#2e8b2e';
    if (level.theme === 'galaxy') { soil = '#3a2a55'; top1 = '#8a5acc'; top2 = '#6a3aaa'; }
    else if (level.theme === 'yoshi') { soil = '#c89a4a'; top1 = '#5ac85a'; top2 = '#3a9a3a'; }
    ctx.fillStyle = soil; ctx.fillRect(x, y, b.w, b.h);
    ctx.fillStyle = top1; ctx.fillRect(x, y, b.w, 12);
    ctx.fillStyle = top2; ctx.fillRect(x, y+10, b.w, 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth=1;
    for (let bx=0;bx<b.w;bx+=32){ ctx.strokeRect(x+bx, y+13, 32, b.h-13); }
  } else if (b.type === 'brick') {
    ctx.fillStyle = BRICK; ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#7a2e08'; ctx.lineWidth = 2;
    ctx.strokeRect(x+1, y+1, b.w-2, b.h-2);
    ctx.beginPath(); ctx.moveTo(x, y+16); ctx.lineTo(x+b.w, y+16);
    ctx.moveTo(x+16, y); ctx.lineTo(x+16, y+16); ctx.moveTo(x+8, y+16); ctx.lineTo(x+8, y+32);
    ctx.moveTo(x+24, y+16); ctx.lineTo(x+24, y+32); ctx.stroke();
  } else if (b.type === 'question') {
    if (b.used) {
      ctx.fillStyle = '#9b7028'; ctx.fillRect(x, y, b.w, b.h);
      ctx.strokeStyle = '#6b4d18'; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,b.w-2,b.h-2);
    } else {
      const sh = 0.5 + 0.5*Math.sin(Date.now()/250);
      ctx.fillStyle = '#E89B12'; ctx.fillRect(x, y, b.w, b.h);
      ctx.fillStyle = `rgba(255,230,120,${0.4+sh*0.5})`; ctx.fillRect(x+3, y+3, b.w-6, b.h-6);
      ctx.fillStyle = '#7a4e08';
      ctx.font = 'bold 22px Trebuchet MS'; ctx.textAlign='center';
      ctx.fillText('?', x+b.w/2, y+b.h/2+8);
      ctx.fillStyle = '#fff8d0'; ctx.fillRect(x+4, y+4, 4, 4); ctx.fillRect(x+b.w-8, y+4, 4, 4);
      ctx.fillRect(x+4, y+b.h-8, 4, 4); ctx.fillRect(x+b.w-8, y+b.h-8, 4, 4);
    }
  } else if (b.type === 'pipe') {
    ctx.fillStyle = '#1aa01a'; ctx.fillRect(x, y, b.w, b.h);
    ctx.fillStyle = '#27c427'; ctx.fillRect(x+5, y, 8, b.h);
    ctx.fillStyle = '#0d7a0d'; ctx.fillRect(x+b.w-12, y, 8, b.h);
    // rim
    ctx.fillStyle = '#1aa01a'; ctx.fillRect(x-5, y, b.w+10, 16);
    ctx.fillStyle = '#27c427'; ctx.fillRect(x-2, y+2, b.w+4, 5);
    ctx.fillStyle = '#0d7a0d'; ctx.fillRect(x-5, y+12, b.w+10, 4);
  } else { // solid
    ctx.fillStyle = '#c9a050'; ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#8a6a30'; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,b.w-2,b.h-2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(x+2, y+2, b.w-4, 4);
  }
}

function drawCoin(c) {
  if (c.got) return;
  const x = c.x - cameraX + 10, y = c.y + 10;
  const wob = Math.abs(Math.cos(c.spin)) * 9 + 2;
  ctx.fillStyle = '#FFB800';
  ctx.beginPath(); ctx.ellipse(x, y, wob, 11, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#FFE066';
  ctx.beginPath(); ctx.ellipse(x, y, wob*0.55, 7, 0, 0, 7); ctx.fill();
}

function drawMushroom(m) {
  if (m.taken) return;
  const x = Math.round(m.x - cameraX), y = Math.round(m.y);
  const kind = m.kind || 'mushroom';
  if (kind === 'fire') {
    // Fire Flower — bunga oren-merah dengan kelopak putih dan tengah hitam
    const cx = x + 14, cy = y + 14;
    const t = (Date.now() / 200) % 6.28;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.5);
    // Kelopak — 4 helai
    ctx.fillStyle = '#FF4400';
    for (let i = 0; i < 4; i++) {
      ctx.rotate(Math.PI / 2);
      ctx.beginPath();
      ctx.ellipse(8, 0, 9, 6, 0, 0, 7);
      ctx.fill();
    }
    ctx.restore();
    // Tengah putih
    ctx.fillStyle = '#FFEEAA';
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, 7); ctx.fill();
    // Mata
    ctx.fillStyle = '#000';
    ctx.fillRect(cx-3, cy-1, 2, 3); ctx.fillRect(cx+1, cy-1, 2, 3);
    // Batang
    ctx.fillStyle = '#1a8a2a';
    ctx.fillRect(cx-2, cy+8, 4, 8);
    return;
  }
  if (kind === 'star') {
    // Super Star — bintang kuning kerlap-kerlip
    const cx = x + 14, cy = y + 14;
    const flash = (Date.now() / 80) % 2 < 1;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = flash ? '#FFD700' : '#FFFFFF';
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i * Math.PI / 5) - Math.PI/2;
      const r = i % 2 === 0 ? 14 : 6;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    // Mata
    ctx.fillStyle = '#000';
    ctx.fillRect(-4, -1, 2, 3); ctx.fillRect(2, -1, 2, 3);
    // Smile
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 2, 3, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.restore();
    return;
  }
  // Default mushroom (merah)
  ctx.fillStyle = '#E53935';
  ctx.beginPath(); ctx.arc(x+14, y+12, 14, Math.PI, 0); ctx.fill();
  ctx.fillRect(x, y+12, 28, 6);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+8, y+8, 4, 0, 7); ctx.arc(x+20, y+8, 4, 0, 7); ctx.fill();
  ctx.fillStyle = '#f5deb3'; ctx.fillRect(x+6, y+18, 16, 10);
  ctx.fillStyle = '#000'; ctx.fillRect(x+9, y+21, 3, 3); ctx.fillRect(x+16, y+21, 3, 3);
}

function drawEnemy(e) {
  if (!e.alive) return;
  const x = Math.round(e.x - cameraX), y = Math.round(e.y);
  if (e.squished) {
    if (e.kind === 'piranha') return;
    ctx.fillStyle = e.kind==='koopa' ? '#2a8f2a' : '#7a4a22';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h-5, e.w/2, 6, 0, 0, 7); ctx.fill();
    return;
  }
  if (e.kind === 'piranha') {
    // Piranha Plant — bunga karnivor keluar dari pipe
    if (e.phase === 'hidden') return;
    const cy = y + e.h*0.55;
    // Stem hijau
    ctx.fillStyle = '#1a8a2a';
    ctx.fillRect(x+e.w/2-3, cy, 6, y+e.h - cy);
    // Daun
    ctx.fillStyle = '#2ecc40';
    ctx.beginPath(); ctx.ellipse(x+4, cy+8, 7, 4, 0.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+e.w-4, cy+8, 7, 4, -0.4, 0, 7); ctx.fill();
    // Kepala bulat
    ctx.fillStyle = '#e8235a';
    ctx.beginPath(); ctx.arc(x+e.w/2, cy-4, 12, 0, 7); ctx.fill();
    // Bintik putih
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x+e.w/2-5, cy-5, 2.5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(x+e.w/2+4, cy-3, 2, 0, 7); ctx.fill();
    // Mulut (gigi)
    const open = e.animF === 0;
    ctx.fillStyle = '#fff';
    if (open) {
      // Mulut terbuka — gigi tajam
      ctx.beginPath();
      ctx.moveTo(x+e.w/2-7, cy-2); ctx.lineTo(x+e.w/2-5, cy+3); ctx.lineTo(x+e.w/2-3, cy-2);
      ctx.moveTo(x+e.w/2-1, cy-2); ctx.lineTo(x+e.w/2+1, cy+3); ctx.lineTo(x+e.w/2+3, cy-2);
      ctx.moveTo(x+e.w/2+5, cy-2); ctx.lineTo(x+e.w/2+7, cy+3); ctx.lineTo(x+e.w/2+9, cy-2);
      ctx.fill();
      ctx.fillStyle = '#7a0a1a';
      ctx.fillRect(x+e.w/2-8, cy, 16, 3);
    } else {
      ctx.fillRect(x+e.w/2-8, cy-1, 16, 2);
    }
    return;
  }
  if (e.kind === 'koopa') {
    // green shell turtle
    ctx.fillStyle = '#2ecc40';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.55, e.w*0.5, e.h*0.45, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#1a9e2a';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.55, e.w*0.32, e.h*0.3, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#f5deb3'; // head
    const hx = e.dir<0 ? x+2 : x+e.w-10;
    ctx.beginPath(); ctx.arc(hx+4, y+6, 6, 0, 7); ctx.fill();
    ctx.fillStyle='#000'; ctx.fillRect(hx+ (e.dir<0?2:4), y+4, 2, 3);
    // feet
    ctx.fillStyle = '#f5b733';
    const fo = e.animF===0?2:-2;
    ctx.fillRect(x+3+fo, y+e.h-6, 8, 6); ctx.fillRect(x+e.w-11-fo, y+e.h-6, 8, 6);
  } else {
    // goomba
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.66, e.w*0.5, e.h*0.42, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#A0682D';
    ctx.beginPath(); ctx.ellipse(x+e.w/2, y+e.h*0.34, e.w*0.44, e.h*0.34, 0, 0, 7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillRect(x+5,y+6,8,7); ctx.fillRect(x+e.w-13,y+6,8,7);
    ctx.fillStyle='#000'; ctx.fillRect(x+7,y+8,4,4); ctx.fillRect(x+e.w-11,y+8,4,4);
    ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+4,y+4); ctx.lineTo(x+12,y+7);
    ctx.moveTo(x+e.w-4,y+4); ctx.lineTo(x+e.w-12,y+7); ctx.stroke();
    ctx.fillStyle='#3D2200'; const fo=e.animF===0?2:-2;
    ctx.fillRect(x+2+fo, y+e.h-7, 10, 7); ctx.fillRect(x+e.w-12-fo, y+e.h-7, 10, 7);
  }
}

function drawMario(p) {
  const x = Math.round(p.x - cameraX), y = Math.round(p.y);
  const flip = p.facing === -1;
  let alpha = (p.inv>0 && Math.floor(p.inv/4)%2===0) ? 0.35 : 1;
  const sc = p.big ? 1.27 : 1;

  // Star Mario — flash pelangi
  let starCycle = 0;
  if (p.starT > 0) {
    starCycle = Math.floor(p.starT / 6) % 5;
    if (p.starT < 80 && Math.floor(p.starT / 6) % 2 === 0) alpha = 0.5; // berkelip bila nak habis
  }

  // Palette ikut state: Fire (merah+putih), Star (pelangi cycle), Normal (merah+biru)
  let shirtColor = '#d32f2f', overallColor = '#1a3a8f', hatColor = '#d32f2f';
  if (p.fire) {
    shirtColor = '#ffffff'; overallColor = '#d32f2f'; hatColor = '#ffffff';
  }
  if (starCycle > 0 || p.starT > 0) {
    const palette = ['#ff4444','#ffaa00','#44ff44','#4488ff','#ff44ff'];
    shirtColor = palette[starCycle];
    overallColor = palette[(starCycle + 2) % 5];
    hatColor = palette[(starCycle + 1) % 5];
  }

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x + p.w/2, y + p.h);
  if (flip) ctx.scale(-1,1);
  ctx.scale(sc, sc);
  ctx.translate(-14, -44);

  if (p.dead) {
    ctx.fillStyle='#CC0000'; ctx.beginPath(); ctx.arc(14,22,15,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 20px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText('×_×',14,28); ctx.restore(); return;
  }

  const airborne = !p.onGround;
  // legs
  ctx.fillStyle = overallColor;
  if (airborne) { ctx.fillRect(3,38,10,8); ctx.fillRect(15,36,10,8); }
  else if (Math.abs(p.vx)>0.4) {
    const lo=[[0,0],[5,-2],[0,0]][p.animF];
    ctx.fillRect(3+lo[0],38,9,8); ctx.fillRect(16-lo[0],38,9,8);
  } else { ctx.fillRect(4,38,9,8); ctx.fillRect(15,38,9,8); }
  // shoes
  ctx.fillStyle='#5a2d00';
  if (airborne){ctx.fillRect(1,44,12,5);ctx.fillRect(15,42,12,5);}
  else {ctx.fillRect(2,44,12,5);ctx.fillRect(14,44,12,5);}
  // overalls
  ctx.fillStyle = overallColor; ctx.fillRect(3,26,22,14);
  ctx.fillStyle='#e8b923'; ctx.fillRect(8,29,3,3); ctx.fillRect(17,29,3,3);
  // shirt/arms
  ctx.fillStyle = shirtColor; ctx.fillRect(2,24,24,6);
  ctx.fillStyle = shirtColor;
  if (airborne) ctx.fillRect(0,18,7,8); else ctx.fillRect(1,26,6,8);
  ctx.fillStyle='#f5c08a'; // hands
  if (airborne) ctx.fillRect(0,16,6,5); else ctx.fillRect(1,32,5,5);
  // face
  ctx.fillStyle='#f5c08a'; ctx.fillRect(5,12,18,13);
  ctx.fillStyle='#6b3a1a'; ctx.fillRect(7,21,13,3); // moustache
  ctx.fillStyle='#000'; ctx.fillRect(15,15,3,4);    // eye
  ctx.fillStyle='#5a2d00'; ctx.fillRect(4,18,4,6);  // sideburn
  // hat
  ctx.fillStyle = hatColor; ctx.fillRect(3,4,22,7); ctx.fillRect(1,9,26,4);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(11,8,3.5,0,7); ctx.fill(); // M emblem bg
  ctx.fillStyle = p.fire ? '#d32f2f' : hatColor;
  ctx.font='bold 6px Arial'; ctx.fillText('M',9,10);

  ctx.restore();
}

function drawFlag(f) {
  const x = f.x - cameraX;
  // pole
  ctx.fillStyle = '#bdbdbd'; ctx.fillRect(x+12, f.baseY-f.h, 5, f.h);
  ctx.fillStyle = '#2ecc40';
  ctx.beginPath(); ctx.arc(x+14, f.baseY-f.h, 7, 0, 7); ctx.fill();
  // flag triangle slides down as reached
  const fy = f.baseY - f.h + 14 + f.slide * (f.h - 60);
  ctx.fillStyle = '#e53935';
  ctx.beginPath(); ctx.moveTo(x+17, fy); ctx.lineTo(x+17, fy+26); ctx.lineTo(x+46, fy+13); ctx.fill();
  // castle
  const cx = f.x + 90 - cameraX;
  ctx.fillStyle = '#9e9e9e'; ctx.fillRect(cx, GROUND_Y-90, 110, 90);
  ctx.fillStyle = '#757575';
  for (let i=0;i<5;i++) ctx.fillRect(cx+i*22, GROUND_Y-100, 14, 12);
  ctx.fillStyle = '#3a3a3a'; ctx.fillRect(cx+44, GROUND_Y-46, 24, 46); // door
}

function drawParticles() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life/p.max); ctx.fillStyle = p.color;
    if (p.rect) ctx.fillRect(p.x-cameraX-3, p.y-3, p.size, p.size);
    else { ctx.beginPath(); ctx.arc(p.x-cameraX, p.y, p.size, 0, 7); ctx.fill(); }
    ctx.restore();
  }
  ctx.font = 'bold 16px Trebuchet MS'; ctx.textAlign='center';
  for (const f of floaters) {
    ctx.save(); ctx.globalAlpha = Math.max(0, f.life/50); ctx.fillStyle = f.color;
    ctx.fillText(f.txt, f.x - cameraX + 10, f.y); ctx.restore();
  }
}

function drawOverlay() {
  ctx.textAlign='center';
  if (gameState === 'dead' && lives > 0) {
    dim(0.5);
    ctx.fillStyle='#fff'; ctx.font='bold 40px Trebuchet MS';
    ctx.fillText('❤️ × ' + lives, W/2, H/2);
    ctx.font='18px Trebuchet MS'; ctx.fillStyle='#FFD700';
    ctx.fillText('ENTER / ▲ untuk sambung', W/2, H/2+36);
  } else if (gameState === 'gameover') {
    dim(0.72);
    ctx.fillStyle='#FF4444'; ctx.font='bold 60px Trebuchet MS';
    ctx.fillText('GAME OVER', W/2, H/2-30);
    ctx.fillStyle='#fff'; ctx.font='22px Trebuchet MS';
    ctx.fillText('Skor: ' + score + '   🪙 ' + coins, W/2, H/2+14);
    ctx.fillStyle='#FFD700'; ctx.font='18px Trebuchet MS';
    ctx.fillText('ENTER / TAP untuk main lagi', W/2, H/2+48);
  } else if (gameState === 'win') {
    dim(0.72);
    ctx.fillStyle='#FFD700'; ctx.font='bold 56px Trebuchet MS';
    ctx.fillText('🎉 KAMU MENANG!', W/2, H/2-30);
    ctx.fillStyle='#fff'; ctx.font='22px Trebuchet MS';
    ctx.fillText('Skor Akhir: ' + score + '   🪙 ' + coins, W/2, H/2+14);
    ctx.fillStyle='#FFD700'; ctx.font='18px Trebuchet MS';
    ctx.fillText('ENTER / TAP untuk main lagi', W/2, H/2+48);
  } else if (gameState === 'clear') {
    ctx.fillStyle='#FFD700'; ctx.font='bold 34px Trebuchet MS';
    ctx.fillText(level.boss ? '👑 BOSS DIKALAHKAN!' : 'LEVEL ' + currentLevel + ' CLEAR!', W/2, 90);
  }
  ctx.textAlign='left';
}
function dim(a){ ctx.fillStyle=`rgba(0,0,20,${a})`; ctx.fillRect(0,0,W,H); }

function drawFireballs() {
  for (const fb of level.fireballs) {
    const x = fb.x - cameraX, y = fb.y;
    // Ice King fireballs (biru) atau biasa (oren)
    const outer = fb.ice ? '#4488ff' : '#FF6600';
    const inner = fb.ice ? '#cce4ff' : '#FFD000';
    ctx.fillStyle = outer;
    ctx.beginPath(); ctx.arc(x, y, 9, 0, 7); ctx.fill();
    ctx.fillStyle = inner;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.fill();
  }
  // Player fireballs (Fire Mario lempar) — bola api kecil berpusing
  for (const fb of (level.playerFireballs || [])) {
    const cx = fb.x + fb.w/2 - cameraX, cy = fb.y + fb.h/2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(fb.spin || 0);
    // Outer glow
    ctx.fillStyle = '#ff3300';
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, 7); ctx.fill();
    // Bright core
    ctx.fillStyle = '#ffee44';
    ctx.beginPath(); ctx.arc(0, 0, 4, 0, 7); ctx.fill();
    // Cross sparkles
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-1, -1, 2, 2);
    ctx.restore();
  }
}

function drawBoss() {
  const bs = level.boss; if (!bs || !bs.alive) return;
  const x = Math.round(bs.x - cameraX), y = Math.round(bs.y);
  const flash = bs.hit > 0 && Math.floor(bs.hit/3)%2===0;
  ctx.save();
  if (flash) ctx.globalAlpha = 0.5;

  if (bs.type === 'iceking') {
    // ── ICE KING ── (biru normal / merah enraged)
    const bodyColor = bs.enraged ? '#cc2244' : '#3a6aaa';
    const accentColor = bs.enraged ? '#ff6688' : '#88c8f0';
    const crownColor = '#ffd24d';
    // Body
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.ellipse(x+bs.w/2, y+bs.h*0.6, bs.w*0.45, bs.h*0.45, 0, 0, 7); ctx.fill();
    // Frost shoulders (ice spikes)
    ctx.fillStyle = accentColor;
    for (let i=0;i<3;i++){ const sx=x+10+i*22; ctx.beginPath(); ctx.moveTo(sx,y+24); ctx.lineTo(sx+8,y+10); ctx.lineTo(sx+16,y+24); ctx.fill(); }
    // Belly (ice white)
    ctx.fillStyle = bs.enraged ? '#ffaaaa' : '#cce4f8';
    ctx.beginPath(); ctx.ellipse(x+bs.w/2, y+bs.h*0.65, bs.w*0.28, bs.h*0.3, 0, 0, 7); ctx.fill();
    // Head
    const hx = bs.dir<0 ? x+4 : x+bs.w-32;
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.arc(hx+14, y+18, 16, 0, 7); ctx.fill();
    // Crown (mahkota ais)
    ctx.fillStyle = crownColor;
    ctx.beginPath();
    ctx.moveTo(hx, y+8);
    ctx.lineTo(hx+5, y-2);
    ctx.lineTo(hx+10, y+6);
    ctx.lineTo(hx+14, y-6);
    ctx.lineTo(hx+18, y+6);
    ctx.lineTo(hx+23, y-2);
    ctx.lineTo(hx+28, y+8);
    ctx.closePath();
    ctx.fill();
    // Permata mahkota
    ctx.fillStyle = bs.enraged ? '#ff4444' : '#4488ff';
    ctx.beginPath(); ctx.arc(hx+14, y+4, 2.5, 0, 7); ctx.fill();
    // Eyes (bersinar bila enraged)
    ctx.fillStyle = '#fff';
    ctx.fillRect(hx+8, y+14, 6, 6); ctx.fillRect(hx+16, y+14, 6, 6);
    ctx.fillStyle = bs.enraged ? '#ff0000' : '#0044aa';
    ctx.fillRect(hx+10, y+16, 3, 3); ctx.fillRect(hx+18, y+16, 3, 3);
    // Janggut ais
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(hx+6, y+26); ctx.lineTo(hx+10, y+34); ctx.lineTo(hx+14, y+28);
    ctx.lineTo(hx+18, y+34); ctx.lineTo(hx+22, y+26);
    ctx.fill();
    // Arms (raised when in fight)
    ctx.fillStyle = bodyColor;
    ctx.fillRect(x+2, y+bs.h*0.42, 8, 18);
    ctx.fillRect(x+bs.w-10, y+bs.h*0.42, 8, 18);
    // Feet
    ctx.fillStyle = '#1a3a5a';
    ctx.fillRect(x+8, y+bs.h-10, 16, 10); ctx.fillRect(x+bs.w-24, y+bs.h-10, 16, 10);
    // Aura beku
    if (bs.enraged) {
      ctx.globalAlpha = (Math.sin(Date.now()*0.01)+1)*0.15;
      ctx.fillStyle = '#ff4488';
      ctx.beginPath(); ctx.arc(x+bs.w/2, y+bs.h/2, bs.w*0.7, 0, 7); ctx.fill();
      ctx.globalAlpha = flash ? 0.5 : 1;
    }
  } else if (bs.type === 'bowser') {
    // ── BOWSER ── (hijau normal / merah enraged)
    const shell = bs.enraged ? '#aa3322' : '#2a7a2a';
    const skin = bs.enraged ? '#ffcc66' : '#f5c040';
    // Ekor
    ctx.fillStyle = skin;
    const tx = bs.dir<0 ? x+bs.w-6 : x+6;
    ctx.beginPath(); ctx.ellipse(tx, y+bs.h-14, 10, 6, 0, 0, 7); ctx.fill();
    // Cangkang berduri
    ctx.fillStyle = shell;
    ctx.beginPath(); ctx.ellipse(x+bs.w/2, y+bs.h*0.55, bs.w*0.46, bs.h*0.44, 0, 0, 7); ctx.fill();
    // Duri cangkang (putih)
    ctx.fillStyle = '#f5f0e0';
    for (let i=0;i<5;i++){ const sx=x+14+i*14; ctx.beginPath(); ctx.moveTo(sx,y+20); ctx.lineTo(sx+7,y+2); ctx.lineTo(sx+14,y+20); ctx.fill(); }
    // Badan/perut
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(x+bs.w/2, y+bs.h*0.66, bs.w*0.3, bs.h*0.34, 0, 0, 7); ctx.fill();
    ctx.fillStyle = bs.enraged ? '#dd9944' : '#d8a020';
    for (let i=0;i<3;i++) ctx.fillRect(x+bs.w/2-14, y+bs.h*0.55+i*10, 28, 5);
    // Lengan
    ctx.fillStyle = skin;
    ctx.fillRect(x+4, y+bs.h*0.45, 12, 20);
    ctx.fillRect(x+bs.w-16, y+bs.h*0.45, 12, 20);
    // Kepala
    const hx = bs.dir<0 ? x+4 : x+bs.w-40;
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(hx+18, y+16, 17, 0, 7); ctx.fill();
    // Tanduk
    ctx.fillStyle = '#f5f0e0';
    ctx.beginPath(); ctx.moveTo(hx+4,y+6); ctx.lineTo(hx-2,y-6); ctx.lineTo(hx+10,y+4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(hx+26,y+4); ctx.lineTo(hx+38,y-6); ctx.lineTo(hx+32,y+6); ctx.fill();
    // Rambut merah
    ctx.fillStyle = '#cc3318';
    ctx.beginPath(); ctx.arc(hx+18, y+4, 9, Math.PI, 0); ctx.fill();
    ctx.fillRect(hx+9, y, 18, 5);
    // Mata
    ctx.fillStyle = '#fff'; ctx.fillRect(hx+18, y+10, 8, 7);
    ctx.fillStyle = bs.enraged ? '#ff0000' : '#000'; ctx.fillRect(hx+22, y+12, 4, 4);
    // Marah brows
    ctx.strokeStyle = '#7a1a0a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(hx+16, y+8); ctx.lineTo(hx+26, y+11); ctx.stroke();
    // Muncung + taring
    ctx.fillStyle = '#d89030';
    ctx.beginPath(); ctx.ellipse(hx+32, y+20, 8, 6, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(hx+28, y+23); ctx.lineTo(hx+30, y+28); ctx.lineTo(hx+32, y+23); ctx.fill();
    ctx.beginPath(); ctx.moveTo(hx+34, y+23); ctx.lineTo(hx+36, y+28); ctx.lineTo(hx+38, y+23); ctx.fill();
    // Kaki
    ctx.fillStyle = skin;
    ctx.fillRect(x+10, y+bs.h-10, 16, 10); ctx.fillRect(x+bs.w-26, y+bs.h-10, 16, 10);
    // Aura bila enraged
    if (bs.enraged) {
      ctx.globalAlpha = (Math.sin(Date.now()*0.01)+1)*0.15;
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.arc(x+bs.w/2, y+bs.h/2, bs.w*0.7, 0, 7); ctx.fill();
      ctx.globalAlpha = flash ? 0.5 : 1;
    }
  } else {
    // ── GIANT KOOPA (default existing) ──
    // shell/back
    ctx.fillStyle = '#1f7a1f';
    ctx.beginPath(); ctx.ellipse(x+bs.w/2, y+bs.h*0.55, bs.w*0.5, bs.h*0.45, 0, 0, 7); ctx.fill();
    // spikes
    ctx.fillStyle = '#e8e0c0';
    for (let i=0;i<4;i++){ const sx=x+12+i*13; ctx.beginPath(); ctx.moveTo(sx,y+18); ctx.lineTo(sx+6,y+4); ctx.lineTo(sx+12,y+18); ctx.fill(); }
    // belly
    ctx.fillStyle = '#f5d76e';
    ctx.beginPath(); ctx.ellipse(x+bs.w/2, y+bs.h*0.62, bs.w*0.3, bs.h*0.32, 0, 0, 7); ctx.fill();
    // head
    const hx = bs.dir<0 ? x+2 : x+bs.w-26;
    ctx.fillStyle = '#2a9a2a';
    ctx.beginPath(); ctx.arc(hx+12, y+14, 14, 0, 7); ctx.fill();
    // horns
    ctx.fillStyle = '#e8e0c0';
    ctx.beginPath(); ctx.moveTo(hx+2,y+4); ctx.lineTo(hx+6,y-6); ctx.lineTo(hx+12,y+4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(hx+14,y+4); ctx.lineTo(hx+20,y-6); ctx.lineTo(hx+24,y+4); ctx.fill();
    // eyes
    ctx.fillStyle = '#fff'; ctx.fillRect(hx+8, y+10, 6, 6); ctx.fillRect(hx+16, y+10, 6, 6);
    ctx.fillStyle = '#c00'; ctx.fillRect(hx+10, y+12, 3, 3); ctx.fillRect(hx+18, y+12, 3, 3);
    // feet
    ctx.fillStyle = '#f5b733';
    ctx.fillRect(x+8, y+bs.h-8, 14, 8); ctx.fillRect(x+bs.w-22, y+bs.h-8, 14, 8);
  }
  ctx.restore();
  // HP bar
  ctx.fillStyle = '#000'; ctx.fillRect(x+4, y-14, bs.w-8, 7);
  let hpColor = '#e53935';
  if (bs.type === 'iceking') hpColor = bs.enraged ? '#ff2244' : '#4488ff';
  else if (bs.type === 'bowser') hpColor = bs.enraged ? '#ff4400' : '#2a9a2a';
  ctx.fillStyle = hpColor; ctx.fillRect(x+5, y-13, (bs.w-10)*(bs.hp/bs.maxHp), 5);
  // Label nama boss
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px Trebuchet MS'; ctx.textAlign = 'center';
  let name = 'GIANT KOOPA';
  if (bs.type === 'iceking') name = bs.enraged ? '★ ICE KING — ENRAGED ★' : 'ICE KING';
  else if (bs.type === 'bowser') name = bs.enraged ? '🔥 BOWSER — MENGGILA! 🔥' : '👑 BOWSER';
  ctx.fillText(name, x+bs.w/2, y-16);
}

function drawPipeHint() {
  for (const b of level.blocks) {
    if (!b.enterable && !b.isExit) continue;
    const x = b.x - cameraX + b.w/2;
    if (x < -40 || x > W+40) continue;
    const bob = Math.sin(Date.now()/200)*3;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 22px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText('↓', x, b.y - 14 + bob);
  }
}

function render() {
  ctx.save();
  if (shake > 0.5) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  drawBackground();
  for (const d of level.decos) drawBush(d);
  for (const b of level.blocks) drawBlock(b);
  drawPipeHint();
  for (const c of level.coinList) drawCoin(c);
  if (level.flag) drawFlag(level.flag);
  for (const m of level.powerups) drawMushroom(m);
  for (const e of level.enemies) drawEnemy(e);
  // Yoshi mount (belum diambil) + Yoshi lari
  if (level.yoshi && !level.yoshi.taken) drawYoshi(level.yoshi.x - cameraX, level.yoshi.y + Math.sin(level.yoshi.bob||0)*3, level.yoshi.dir, level.yoshi.animF);
  if (fleeingYoshi) drawYoshi(fleeingYoshi.x - cameraX, fleeingYoshi.y, -1, 1);
  drawBoss();
  drawFireballs();
  drawParticles();
  if (player) {
    // Mario tunggang Yoshi — Yoshi di tanah, Mario diangkat duduk atas belakang
    if (player.onYoshi && !player.dead) {
      drawYoshi(player.x - cameraX - 6, player.y + player.h - 40, player.facing, Math.abs(player.vx)>0.4 ? (Math.floor(player.animT/4)%2) : 0);
      player.y -= 22; drawMario(player); player.y += 22;
    } else {
      drawMario(player);
    }
  }
  ctx.restore();
  drawPowerupHUD();
  drawOverlay();
}

function drawYoshi(x, y, dir, frame) {
  // Yoshi hijau — kepala kanan, badan, ekor, kaki
  ctx.save();
  ctx.translate(x + 20, y + 21);
  if (dir === -1) ctx.scale(-1, 1);
  ctx.translate(-20, -21);
  // Ekor
  ctx.fillStyle = '#2aa82a';
  ctx.beginPath(); ctx.moveTo(2, 22); ctx.lineTo(-8, 16); ctx.lineTo(2, 30); ctx.fill();
  // Badan
  ctx.fillStyle = '#3ac83a';
  ctx.beginPath(); ctx.ellipse(18, 22, 16, 13, 0, 0, 7); ctx.fill();
  // Perut putih
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(18, 27, 10, 7, 0, 0, 7); ctx.fill();
  // Kaki (animasi)
  ctx.fillStyle = '#e8731a';
  const lo = frame===0 ? 0 : 3;
  ctx.fillRect(10+lo, 32, 7, 9); ctx.fillRect(22-lo, 32, 7, 9);
  // Leher + kepala
  ctx.fillStyle = '#3ac83a';
  ctx.fillRect(26, 8, 8, 16);
  ctx.beginPath(); ctx.arc(34, 10, 11, 0, 7); ctx.fill();
  // Muncung
  ctx.fillStyle = '#3ac83a';
  ctx.beginPath(); ctx.ellipse(42, 13, 7, 5, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#1a8a1a';
  ctx.beginPath(); ctx.arc(45, 13, 2, 0, 7); ctx.fill();
  // Mata
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(34, 5, 5, 0, 7); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(35, 5, 2.5, 0, 7); ctx.fill();
  // Sisik kepala (merah)
  ctx.fillStyle = '#d83030';
  ctx.beginPath(); ctx.moveTo(28, 2); ctx.lineTo(32, -6); ctx.lineTo(34, 2); ctx.fill();
  ctx.restore();
}

function drawPowerupHUD() {
  if (!player) return;
  // Indicator power-up state — kanan atas canvas
  const padX = W - 12;
  let yPos = 14;
  if (player.fire) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX - 88, yPos - 2, 88, 22);
    ctx.fillStyle = '#FF6600';
    ctx.beginPath(); ctx.arc(padX - 78, yPos + 9, 8, 0, 7); ctx.fill();
    ctx.fillStyle = '#FFD000';
    ctx.beginPath(); ctx.arc(padX - 78, yPos + 9, 5, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Trebuchet MS'; ctx.textAlign = 'left';
    ctx.fillText('FIRE — Z lempar', padX - 66, yPos + 13);
    yPos += 26;
  }
  if (player.starT > 0) {
    const sec = Math.ceil(player.starT / 60);
    const cycle = Math.floor(player.starT / 6) % 5;
    const palette = ['#ff4444','#ffaa00','#44ff44','#4488ff','#ff44ff'];
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX - 88, yPos - 2, 88, 22);
    ctx.fillStyle = palette[cycle];
    // Bintang
    ctx.save();
    ctx.translate(padX - 78, yPos + 9);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI/2;
      const r = i % 2 === 0 ? 9 : 4;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Trebuchet MS'; ctx.textAlign = 'left';
    ctx.fillText('STAR ' + sec + 's', padX - 66, yPos + 13);
  }
}

// ─── LOOP ─────────────────────────────────────────────────
function loop() { update(); render(); requestAnimationFrame(loop); }

// ─── INIT ─────────────────────────────────────────────────
startGame();   // terus main — tiada skrin nama
loop();
</script>
<script src="reward-timer.js"></script>
</body>
