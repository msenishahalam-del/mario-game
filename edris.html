<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>EDRIS — Dino Flight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; background: #000; overflow: hidden;
    font-family: 'Trebuchet MS', sans-serif; color: #fff;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  #backBtn {
    position: fixed; top: 10px; left: 10px;
    background: rgba(0,0,0,0.75); color: #ffb347;
    padding: 6px 14px; border: 2px solid #ffb347; border-radius: 6px;
    text-decoration: none; font-size: 13px; font-weight: bold; letter-spacing: 2px;
    z-index: 999;
  }
  #backBtn:hover { background: #ffb347; color: #000; }
  canvas {
    display: block; background: #ffd9a0; image-rendering: pixelated;
    max-width: 100vw; max-height: 100vh; touch-action: none;
    border: 3px solid #7a4a1a; box-shadow: 0 0 26px rgba(255,179,71,0.4);
  }
</style>
</head>
<body>
<a id="backBtn" href="/arcade.html">◀ HUB</a>
<canvas id="game" width="900" height="540"></canvas>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = 470;
  const PLAYER_X = 320;

  // ============================================================
  // AUDIO (Web Audio API)
  // ============================================================
  let actx = null;
  function ensureAudio() {
    if (actx) return;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
  }
  function tone(freq, dur, type='square', vol=0.07, freqEnd=null) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if (freqEnd !== null) o.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), t0+dur);
    g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0+dur);
  }
  function noiseBurst(dur, vol=0.1) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const buf = actx.createBuffer(1, Math.floor(actx.sampleRate*dur), actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    const s = actx.createBufferSource(), g = actx.createGain();
    s.buffer = buf; g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    s.connect(g).connect(actx.destination); s.start(t0);
  }
  const SFX = {
    flap:      () => tone(360, 0.07, 'sine', 0.05, 520),
    hit:       () => { noiseBurst(0.12, 0.1); tone(160, 0.25, 'sawtooth', 0.1, 60); },
    roar:      () => { tone(90, 0.5, 'sawtooth', 0.13, 45); noiseBurst(0.3, 0.08); },
    chomp:     () => { noiseBurst(0.2, 0.16); tone(70, 0.5, 'sawtooth', 0.16, 30); },
    milestone: () => { tone(660, 0.1, 'square', 0.06); setTimeout(()=>tone(880,0.12,'square',0.06),90); },
    record:    () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'square',0.08),i*100)); }
  };

  // ============================================================
  // STATE
  // ============================================================
  let state = 'start';    // start | playing | caught | gameover
  let frame = 0, dist = 0, speed = 4.2;
  let highScore = parseInt(localStorage.getItem('edris_hi') || '0', 10);
  let lastMilestone = 0, roarT = 0, caughtT = 0, shake = 0;

  // ── SISTEM FASA (progressif — makin jauh makin susah) ──
  // Fasa 1: 0-150m asas · Fasa 2: 150-300m lebih kerap/tinggi ·
  // Fasa 3: 300-500m ptero MENJUNAM · Fasa 4: 500m+ METEOR!
  const PHASES = [0, 150, 300, 500];
  let phase = 1, phaseMsgT = 0;
  let meteors = [], meteorT = 0;
  function phaseFor(d) {
    let p = 1;
    for (let i=1;i<PHASES.length;i++) if (d >= PHASES[i]) p = i+1;
    return p;
  }
  // Tuning per fasa: [maxSpeed, spawnMin, spawnBase, gapRecover, enemyChance]
  const PHASE_CFG = {
    1: { maxSp: 5.2, spawnMin: 60, spawnBase: 100, recover: 0.18, foe: 0.32 },
    2: { maxSp: 6.2, spawnMin: 50, spawnBase: 84,  recover: 0.13, foe: 0.45 },
    3: { maxSp: 7.2, spawnMin: 42, spawnBase: 70,  recover: 0.10, foe: 0.52 },
    4: { maxSp: 8.2, spawnMin: 36, spawnBase: 60,  recover: 0.07, foe: 0.50 },
  };

  const player = { y: 240, vy: 0, r: 18, flapT: 0, inv: 0 };
  const GRAV = 0.42, FLAP_V = -7.4;

  // T-Rex chase: gap = jarak px antara muncung T-Rex dan player
  let gap = 260;
  const GAP_MAX = 300, GAP_CAUGHT = 26;
  const KNOCK_OBSTACLE = 95, KNOCK_GROUND = 65;

  let cacti = [];      // {x, w, h, hit}
  let enemies = [];    // pterodactyl musuh {x, y, t, hit}
  let clouds = [], hills = [];
  let particles = [];
  let spawnT = 0;

  // T-Rex LOMPAT — terkam ke atas bila dekat!
  const trexJump = { y: 0, vy: 0, jumping: false, timer: 300 };

  function initScenery() {
    clouds = []; hills = [];
    for (let i=0;i<5;i++) clouds.push({ x: Math.random()*W, y: 40+Math.random()*120, s: 0.7+Math.random()*0.6 });
    for (let i=0;i<4;i++) hills.push({ x: i*300, h: 60+Math.random()*70 });
  }

  function restart() {
    state = 'playing';
    frame = 0; dist = 0; speed = 4.2;
    player.y = 240; player.vy = 0; player.inv = 0;
    gap = 260; lastMilestone = 0; roarT = 0; caughtT = 0;
    cacti = []; enemies = []; particles = [];
    phase = 1; phaseMsgT = 0; meteors = []; meteorT = 0;
    trexJump.y = 0; trexJump.vy = 0; trexJump.jumping = false; trexJump.timer = 300;
    spawnT = 50;
    initScenery();
  }

  // ============================================================
  // INPUT
  // ============================================================
  function flap() {
    if (state === 'start' || state === 'gameover') { restart(); return; }
    if (state !== 'playing') return;
    player.vy = FLAP_V;
    player.flapT = 10;
    SFX.flap();
  }
  window.addEventListener('keydown', e => {
    ensureAudio();
    if (['Space','ArrowUp','KeyW'].includes(e.code)) { e.preventDefault(); flap(); }
    if (e.code === 'Enter' && state !== 'playing') restart();
  });
  canvas.addEventListener('mousedown', e => { ensureAudio(); flap(); });
  canvas.addEventListener('touchstart', e => { ensureAudio(); e.preventDefault(); flap(); }, {passive:false});

  // ============================================================
  // SPAWN
  // ============================================================
  function spawnObstacle() {
    const cfg = PHASE_CFG[phase];
    if (Math.random() > cfg.foe) {
      // cactus: 1-3 batang rapat — makin tinggi ikut fasa
      const n = 1 + Math.floor(Math.random()*Math.min(3, 1+phase));
      const extraH = (phase-1) * 22;   // fasa lewat = cactus lebih tinggi
      let x = W + 40;
      for (let i=0;i<n;i++) {
        const h = 46 + Math.random()*70 + extraH;
        cacti.push({ x: x, w: 26, h: Math.min(h, 200), hit: false });
        x += 34;
      }
      // Fasa 3+: kadang cactus + ptero SERENTAK (halangan berganda)
      if (phase >= 3 && Math.random() < 0.4) {
        enemies.push({ x: W + 80, y: foeY(), t: Math.random()*100, hit: false, dive: phase >= 3 && Math.random() < 0.5 });
      }
    } else {
      // pterodactyl musuh — Fasa 3+ boleh MENJUNAM ke arah player
      enemies.push({ x: W + 40, y: foeY(), t: Math.random()*100, hit: false, dive: phase >= 3 && Math.random() < 0.55 });
    }
  }
  // Ketinggian spawn musuh: 50% SASAR ketinggian player (anti-camping —
  // duduk di siling pun musuh datang!), selebihnya rawak merata (40..380)
  function foeY() {
    if (Math.random() < 0.5) {
      return Math.max(40, Math.min(380, player.y + (Math.random()-0.5)*90));
    }
    return 40 + Math.random()*340;
  }

  function burst(x, y, color, n=10) {
    for (let i=0;i<n;i++) {
      const a = Math.random()*6.28, s = 1+Math.random()*3.5;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s-1, life: 26+Math.random()*18, max: 44, color, size: 2+Math.random()*3 });
    }
  }

  // ============================================================
  // UPDATE
  // ============================================================
  function update() {
    frame++;
    if (shake > 0) shake -= 0.6;
    for (let i=particles.length-1;i>=0;i--) { const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; if (p.life<=0) particles.splice(i,1); }
    // awan gerak selalu (parallax hidup di semua state)
    for (const c of clouds) { c.x -= 0.3*c.s; if (c.x < -80) { c.x = W+60; c.y = 40+Math.random()*120; } }

    if (state === 'caught') {
      caughtT++;
      if (caughtT > 55) {
        state = 'gameover';
        const m = Math.floor(dist);
        if (m > highScore) { highScore = m; try { localStorage.setItem('edris_hi', String(highScore)); } catch {} SFX.record(); }
      }
      return;
    }
    if (state !== 'playing') return;

    // ── FASA: semak naik fasa ──
    const newPhase = phaseFor(dist);
    if (newPhase > phase) {
      phase = newPhase;
      phaseMsgT = 130;
      shake = Math.max(shake, 8);
      SFX.roar();
    }
    const cfg = PHASE_CFG[phase];

    // kelajuan meningkat — ramp dalam fasa + kap ikut fasa
    speed = Math.min(cfg.maxSp, speed + 0.0011);
    dist += speed / 38;

    // milestone setiap 100m
    if (Math.floor(dist/100) > Math.floor(lastMilestone/100)) SFX.milestone();
    lastMilestone = dist;

    // ── Player flappy physics ──
    player.vy += GRAV;
    if (player.vy > 10) player.vy = 10;
    player.y += player.vy;
    if (player.flapT > 0) player.flapT--;
    if (player.inv > 0) player.inv--;
    // siling
    if (player.y < 26) { player.y = 26; player.vy = 0; }
    // tanah — terpelanting (T-Rex makin dekat!)
    if (player.y > GROUND_Y - 20) {
      player.y = GROUND_Y - 20;
      if (player.inv <= 0) {
        player.vy = -6.5;
        knock(KNOCK_GROUND);
      } else player.vy = -4;
    }

    // ── Scenery ──
    for (const h of hills) { h.x -= speed*0.25; if (h.x < -300) h.x += 1200; }

    // ── Spawn halangan (kadar ikut fasa) ──
    spawnT--;
    if (spawnT <= 0) {
      spawnObstacle();
      spawnT = cfg.spawnMin + Math.random()*(cfg.spawnBase - cfg.spawnMin);
    }

    // ── METEOR (Fasa 4 sahaja!) ──
    if (phase >= 4) {
      meteorT--;
      if (meteorT <= 0) {
        meteorT = 90 + Math.random()*110;
        // jatuh menyerong dari atas kanan; targetX berhampiran player
        const tx = PLAYER_X - 60 + Math.random()*260;
        meteors.push({ x: tx + 220, y: -30, vx: -3.2, vy: 4.6, r: 13, t: 0 });
      }
    }
    for (let i=meteors.length-1;i>=0;i--) {
      const m = meteors[i];
      m.t++;
      m.x += m.vx - speed*0.3;
      m.y += m.vy;
      // trail api
      if (m.t % 2 === 0) particles.push({ x: m.x+4, y: m.y-4, vx: 0.5, vy: -0.5, life: 14, max: 14, color: Math.random()<0.5?'#ff8830':'#ffcc40', size: 3+Math.random()*3 });
      if (m.y > GROUND_Y) {
        burst(m.x, GROUND_Y, '#ff8830', 12);
        shake = Math.max(shake, 5);
        meteors.splice(i,1);
        continue;
      }
      if (player.inv <= 0 && Math.hypot(m.x-PLAYER_X, m.y-player.y) < m.r + 16) {
        burst(PLAYER_X, player.y, '#ff8830', 12);
        player.vy = 4;
        knock(KNOCK_OBSTACLE);
        meteors.splice(i,1);
      }
    }

    // ── Cactus ──
    for (let i=cacti.length-1;i>=0;i--) {
      const c = cacti[i];
      c.x -= speed;
      if (c.x < -60) { cacti.splice(i,1); continue; }
      if (!c.hit && player.inv <= 0 &&
          PLAYER_X + 14 > c.x && PLAYER_X - 14 < c.x + c.w &&
          player.y + 14 > GROUND_Y - c.h) {
        c.hit = true;
        burst(PLAYER_X, player.y, '#3a8a2a', 10);
        player.vy = -5;
        knock(KNOCK_OBSTACLE);
      }
    }

    // ── Pterodactyl musuh ──
    for (let i=enemies.length-1;i>=0;i--) {
      const e = enemies[i];
      e.t++;
      e.x -= speed + 1.4;
      if (e.dive && e.x < PLAYER_X + 320 && e.x > PLAYER_X - 20) {
        // MENJUNAM ke arah player (Fasa 3+)
        e.y += (player.y - e.y) * 0.028;
      } else {
        e.y += Math.sin(e.t*0.05)*0.8;
      }
      if (e.x < -60) { enemies.splice(i,1); continue; }
      if (!e.hit && player.inv <= 0 &&
          Math.hypot(e.x-PLAYER_X, e.y-player.y) < 30) {
        e.hit = true;
        burst(PLAYER_X, player.y, '#8a2a2a', 10);
        player.vy = 3;
        knock(KNOCK_OBSTACLE);
      }
    }

    // ── T-Rex chase ──
    // terbang bersih → jarak pulih; kadar pulih makin rendah ikut FASA
    gap += cfg.recover;
    if (gap > GAP_MAX) gap = GAP_MAX;

    // ── T-Rex LOMPAT terkam! ──
    if (trexJump.jumping) {
      trexJump.vy += 0.5;
      trexJump.y -= trexJump.vy;      // y = offset ke atas dari tanah
      if (trexJump.y <= 0) {
        trexJump.y = 0; trexJump.jumping = false;
        trexJump.timer = Math.max(160, 400 - phase*55) + Math.random()*140;
        shake = Math.max(shake, 6);   // hentakan mendarat
        burst(PLAYER_X - gap - 40, GROUND_Y - 6, 'rgba(160,120,70,0.8)', 8);
      }
      // rahang T-Rex kena player masa melompat = NGAP!
      const headX = PLAYER_X - gap + 8;
      const headY = GROUND_Y - 80 - trexJump.y;
      if (Math.hypot(headX - PLAYER_X, headY - player.y) < 42) {
        state = 'caught'; caughtT = 0; shake = 14;
        burst(PLAYER_X, player.y, '#ffb347', 20);
        burst(PLAYER_X, player.y, '#8a2a2a', 14);
        SFX.chomp();
        return;
      }
    } else {
      trexJump.timer--;
      // lompat hanya bila cukup dekat untuk jadi ancaman sebenar
      if (trexJump.timer <= 0 && gap < 250) {
        trexJump.jumping = true;
        trexJump.vy = -(9.5 + phase * 1.1);   // fasa lewat = lompat lebih tinggi
        SFX.roar();
        shake = Math.max(shake, 4);
      }
      if (trexJump.timer <= 0 && gap >= 250) trexJump.timer = 60;  // cuba lagi nanti
    }
    if (roarT > 0) roarT--;
    if (gap < 110 && roarT <= 0) { SFX.roar(); roarT = 140; shake = Math.max(shake, 5); }
    if (gap <= GAP_CAUGHT) {
      state = 'caught';
      caughtT = 0;
      shake = 14;
      burst(PLAYER_X, player.y, '#ffb347', 20);
      burst(PLAYER_X, player.y, '#8a2a2a', 14);
      SFX.chomp();
    }
  }
  function knock(amount) {
    gap -= amount;
    player.inv = 55;
    shake = 8;
    SFX.hit();
  }

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    ctx.save();
    if (shake > 0.5) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    drawSky();
    drawGround();
    for (const c of cacti) drawCactus(c);
    for (const e of enemies) drawEnemyPtero(e);
    for (const m of meteors) drawMeteor(m);
    drawTrex();
    if (state !== 'gameover') drawPlayer();
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life/p.max);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (state === 'start') drawStart();
    else { drawHUD(); if (state === 'gameover') drawGameOver(); }
    ctx.restore();
  }

  // Palet langit per fasa (makin gelap & merah = makin bahaya)
  const SKY_PAL = {
    1: ['#ff9e5a','#ffd9a0','#ffe8c0'],
    2: ['#e8784a','#eda878','#f0c8a0'],
    3: ['#9a4a5a','#c87a6a','#e0a888'],
    4: ['#3a1a2e','#7a2a2a','#a84a30'],
  };
  function hexLerp(a, b, t) {
    const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
    const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
    const c = pa.map((v,i)=>Math.round(v + (pb[i]-v)*t));
    return 'rgb('+c[0]+','+c[1]+','+c[2]+')';
  }
  function skyColors() {
    const prev = SKY_PAL[Math.max(1, phase-1)], cur = SKY_PAL[phase];
    // blend 40m selepas masuk fasa baru
    const t = phase === 1 ? 1 : Math.max(0, Math.min(1, (dist - PHASES[phase-1]) / 40));
    return [0,1,2].map(i => hexLerp(prev[i], cur[i], t));
  }
  function drawSky() {
    const [c0, c1, c2] = skyColors();
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,c0); g.addColorStop(0.5,c1); g.addColorStop(1,c2);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // matahari besar prasejarah
    ctx.fillStyle = '#ffef9a';
    ctx.beginPath(); ctx.arc(W-160, 110, 52, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,239,154,0.35)';
    ctx.beginPath(); ctx.arc(W-160, 110, 74, 0, 7); ctx.fill();
    // gunung berapi jauh
    ctx.fillStyle = '#b5714a';
    ctx.beginPath(); ctx.moveTo(60, GROUND_Y); ctx.lineTo(170, 180); ctx.lineTo(280, GROUND_Y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#8a4a2a';
    ctx.beginPath(); ctx.moveTo(140, 235); ctx.lineTo(170, 180); ctx.lineTo(200, 235); ctx.closePath(); ctx.fill();
    // asap volcano
    const st = frame*0.02;
    ctx.fillStyle = 'rgba(120,110,100,0.4)';
    for (let i=0;i<3;i++) {
      ctx.beginPath(); ctx.arc(172 + Math.sin(st+i)*10 + i*6, 165 - i*22, 10+i*5, 0, 7); ctx.fill();
    }
    // bukit parallax
    ctx.fillStyle = '#d8a86a';
    for (const h of hills) {
      ctx.beginPath(); ctx.arc(h.x, GROUND_Y, h.h, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(h.x+600, GROUND_Y, h.h*0.8, Math.PI, 0); ctx.fill();
    }
    // awan
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (const c of clouds) {
      ctx.beginPath();
      ctx.arc(c.x, c.y, 16*c.s, 0, 7); ctx.arc(c.x+18*c.s, c.y-7*c.s, 19*c.s, 0, 7); ctx.arc(c.x+38*c.s, c.y, 14*c.s, 0, 7);
      ctx.fill();
    }
  }

  function drawGround() {
    ctx.fillStyle = '#c8905a';
    ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
    ctx.fillStyle = '#a5713a';
    ctx.fillRect(0, GROUND_Y, W, 6);
    // jalur pasir scrolling
    ctx.fillStyle = 'rgba(90,60,30,0.25)';
    const off = (frame*speed) % 70;
    for (let x=-off; x<W; x+=70) ctx.fillRect(x, GROUND_Y+22, 34, 4);
  }

  function drawCactus(c) {
    const x = c.x, baseY = GROUND_Y;
    ctx.fillStyle = c.hit ? '#7aa86a' : '#2f8a3a';
    // batang utama
    roundRect(x, baseY-c.h, c.w, c.h, 8); ctx.fill();
    // lengan
    if (c.h > 60) {
      roundRect(x-12, baseY-c.h*0.7, 12, 8, 4); ctx.fill();
      roundRect(x-12, baseY-c.h*0.7-16, 8, 20, 4); ctx.fill();
      roundRect(x+c.w, baseY-c.h*0.55, 12, 8, 4); ctx.fill();
      roundRect(x+c.w+4, baseY-c.h*0.55-14, 8, 18, 4); ctx.fill();
    }
    // duri
    ctx.strokeStyle = 'rgba(20,60,20,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let yy=baseY-c.h+10; yy<baseY-8; yy+=14) { ctx.moveTo(x+4, yy); ctx.lineTo(x+8, yy-4); ctx.moveTo(x+c.w-4, yy+6); ctx.lineTo(x+c.w-8, yy+2); }
    ctx.stroke();
  }

  function drawEnemyPtero(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    const wing = Math.sin(e.t*0.25);
    // sayap (gelap merah)
    ctx.fillStyle = '#7a2a2a';
    ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(-22, -14*wing-4); ctx.lineTo(-30, 4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(20, -14*wing-4); ctx.lineTo(28, 4); ctx.closePath(); ctx.fill();
    // badan
    ctx.fillStyle = '#9a3a3a';
    ctx.beginPath(); ctx.ellipse(0, 0, 14, 8, 0, 0, 7); ctx.fill();
    // kepala + paruh (menghadap kiri)
    ctx.beginPath(); ctx.arc(-14, -3, 6, 0, 7); ctx.fill();
    ctx.fillStyle = '#d8b060';
    ctx.beginPath(); ctx.moveTo(-19, -4); ctx.lineTo(-32, -1); ctx.lineTo(-19, 1); ctx.closePath(); ctx.fill();
    // crest
    ctx.fillStyle = '#5a1a1a';
    ctx.beginPath(); ctx.moveTo(-12, -8); ctx.lineTo(-6, -15); ctx.lineTo(-8, -6); ctx.closePath(); ctx.fill();
    // mata
    ctx.fillStyle = '#ffd24d'; ctx.beginPath(); ctx.arc(-14, -4, 1.8, 0, 7); ctx.fill();
    ctx.restore();
  }

  function drawMeteor(m) {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(Math.atan2(m.vy, m.vx));
    // ekor api
    const fg = ctx.createLinearGradient(0, 0, 34, 0);
    fg.addColorStop(0, 'rgba(255,140,40,0.9)');
    fg.addColorStop(1, 'rgba(255,200,60,0)');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.moveTo(4, -8); ctx.lineTo(38, 0); ctx.lineTo(4, 8); ctx.closePath(); ctx.fill();
    // batu
    const rg = ctx.createRadialGradient(-3, -3, 2, 0, 0, m.r);
    rg.addColorStop(0, '#a87858'); rg.addColorStop(1, '#4a3020');
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(0, 0, m.r, 0, 7); ctx.fill();
    // kawah
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.arc(-4, 2, 3, 0, 7); ctx.arc(4, -3, 2.4, 0, 7); ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    ctx.save();
    const blink = player.inv > 0 && Math.floor(player.inv/4)%2===0;
    if (blink) ctx.globalAlpha = 0.45;
    ctx.translate(PLAYER_X, player.y);
    const tilt = Math.max(-0.45, Math.min(0.5, player.vy*0.06));
    ctx.rotate(tilt);
    const wing = player.flapT > 0 ? -1 : Math.sin(frame*0.15);
    // sayap oren
    ctx.fillStyle = '#e88a2a';
    ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-16, 16*wing-6); ctx.lineTo(-26, 2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(18, 16*wing-6); ctx.lineTo(26, 2); ctx.closePath(); ctx.fill();
    // badan
    ctx.fillStyle = '#ffb347';
    ctx.beginPath(); ctx.ellipse(0, 0, 16, 10, 0, 0, 7); ctx.fill();
    // ekor
    ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-26, 6); ctx.lineTo(-14, 6); ctx.closePath(); ctx.fill();
    // kepala + crest + paruh (menghadap kanan)
    ctx.beginPath(); ctx.arc(14, -6, 8, 0, 7); ctx.fill();
    ctx.fillStyle = '#d86a1a';
    ctx.beginPath(); ctx.moveTo(10, -13); ctx.lineTo(2, -22); ctx.lineTo(8, -10); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#e8c060';
    ctx.beginPath(); ctx.moveTo(20, -8); ctx.lineTo(36, -4); ctx.lineTo(20, -2); ctx.closePath(); ctx.fill();
    // mata
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(15, -7, 3.4, 0, 7); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(16, -7, 1.7, 0, 7); ctx.fill();
    ctx.restore();
  }

  function drawTrex() {
    // T-Rex muncung di x = PLAYER_X - gap (badan di belakangnya)
    const nose = PLAYER_X - gap;
    const x = nose - 10;   // rujukan rahang
    const y = GROUND_Y;
    const jumping = trexJump.jumping;
    const run = jumping ? 0.9 : Math.sin(frame*0.28);   // kaki terlipat masa lompat
    const lunge = state === 'caught' ? Math.min(30, caughtT*2) : 0;
    ctx.save();
    ctx.translate(x + lunge, y - trexJump.y);           // offset LOMPATAN
    if (jumping) ctx.rotate(-0.08);                      // condong sikit masa terkam
    const near = gap < 110 || jumping;
    const bodyC = '#4a7a3a', darkC = '#33582a';
    // ekor
    ctx.fillStyle = bodyC;
    ctx.beginPath(); ctx.moveTo(-95, -55); ctx.quadraticCurveTo(-150, -55, -175, -30); ctx.quadraticCurveTo(-145, -42, -95, -38); ctx.closePath(); ctx.fill();
    // kaki belakang + depan (berlari)
    ctx.fillStyle = darkC;
    const l1 = run*9, l2 = -run*9;
    ctx.beginPath(); ctx.moveTo(-70,-40); ctx.lineTo(-78+l1,-6); ctx.lineTo(-62+l1,0); ctx.lineTo(-56,-34); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-40,-40); ctx.lineTo(-48+l2,-6); ctx.lineTo(-32+l2,0); ctx.lineTo(-28,-34); ctx.closePath(); ctx.fill();
    // badan
    ctx.fillStyle = bodyC;
    ctx.beginPath(); ctx.ellipse(-58, -60, 48, 30, -0.12, 0, 7); ctx.fill();
    // tangan kecik
    ctx.fillStyle = darkC;
    ctx.fillRect(-26, -62, 12, 5); ctx.fillRect(-18, -60, 5, 10);
    // leher + kepala
    ctx.fillStyle = bodyC;
    ctx.beginPath(); ctx.moveTo(-34,-78); ctx.quadraticCurveTo(-12,-96, 4,-88); ctx.lineTo(0,-58); ctx.lineTo(-30,-56); ctx.closePath(); ctx.fill();
    // kepala + rahang nganga (lebih nganga bila dekat / caught)
    const jaw = state === 'caught' ? 0.55 : near ? 0.34 : 0.16 + Math.sin(frame*0.05)*0.04;
    // rahang atas
    ctx.save();
    ctx.translate(0, -80);
    ctx.rotate(-jaw*0.5);
    ctx.fillStyle = bodyC;
    ctx.beginPath(); ctx.moveTo(-8, 0); ctx.quadraticCurveTo(8, -12, 34, -4); ctx.lineTo(34, 4); ctx.lineTo(-8, 8); ctx.closePath(); ctx.fill();
    // gigi atas
    ctx.fillStyle = '#fff';
    for (let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(10+i*6, 3); ctx.lineTo(13+i*6, 10); ctx.lineTo(16+i*6, 3); ctx.closePath(); ctx.fill(); }
    // mata merah
    ctx.fillStyle = near ? '#ff2020' : '#c8a020';
    ctx.beginPath(); ctx.arc(2, -4, 3.4, 0, 7); ctx.fill();
    ctx.restore();
    // rahang bawah
    ctx.save();
    ctx.translate(0, -74);
    ctx.rotate(jaw);
    ctx.fillStyle = darkC;
    ctx.beginPath(); ctx.moveTo(-6, 0); ctx.quadraticCurveTo(10, 4, 30, 2); ctx.lineTo(28, 10); ctx.lineTo(-6, 8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    for (let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(10+i*7, 2); ctx.lineTo(13+i*7, -4); ctx.lineTo(16+i*7, 2); ctx.closePath(); ctx.fill(); }
    ctx.restore();
    // debu kaki
    if (state === 'playing' && frame % 5 === 0) {
      particles.push({ x: x-60+Math.random()*40, y: GROUND_Y-4, vx: -1-Math.random(), vy: -Math.random()*1.5, life: 20, max: 20, color: 'rgba(160,120,70,0.7)', size: 3+Math.random()*3 });
    }
    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,30);
    ctx.font = 'bold 15px Trebuchet MS'; ctx.textBaseline = 'middle';
    ctx.textAlign = 'left'; ctx.fillStyle = '#ffd24d';
    ctx.fillText(Math.floor(dist) + ' m', 12, 15);
    ctx.fillStyle = '#c8b090';
    ctx.fillText('BEST ' + highScore + ' m', 100, 15);
    // penunjuk fasa
    const phCol = ['#5cc85c','#ffc040','#ff7040','#ff3030'][phase-1] || '#ff3030';
    ctx.fillStyle = phCol;
    ctx.fillText('FASA ' + phase, 250, 15);
    // banner tukar fasa
    if (phaseMsgT > 0) {
      phaseMsgT--;
      ctx.globalAlpha = Math.min(1, phaseMsgT/35);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = phCol; ctx.font = 'bold 40px Trebuchet MS';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 8;
      const names = ['', 'FASA 2 — LEBIH LAJU!', 'FASA 3 — PTERO MENJUNAM!', 'FASA 4 — METEOR! 🌠'];
      ctx.fillText(names[phase-1] || ('FASA ' + phase + '!'), W/2, 160);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.font = 'bold 15px Trebuchet MS'; ctx.textBaseline = 'middle';
    }
    // bar jarak T-Rex
    const pct = Math.max(0, Math.min(1, (gap - GAP_CAUGHT) / (GAP_MAX - GAP_CAUGHT)));
    const bw = 240;
    ctx.textAlign = 'right'; ctx.fillStyle = '#fff';
    ctx.fillText('🦖', W - bw - 40, 15);
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(W - bw - 24, 8, bw+4, 14);
    const col = pct > 0.55 ? '#5cc85c' : pct > 0.28 ? '#ffc040' : '#ff4040';
    ctx.fillStyle = col; ctx.fillRect(W - bw - 22, 10, bw*pct, 10);
    if (pct < 0.28 && Math.floor(frame/12)%2===0) {
      ctx.textAlign = 'center'; ctx.fillStyle = '#ff4040'; ctx.font = 'bold 13px Trebuchet MS';
      ctx.fillText('⚠ T-REX DEKAT!', W - bw/2 - 22, 42);
    }
  }

  function drawStart() {
    ctx.fillStyle = 'rgba(40,20,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffb347'; ctx.shadowColor = '#ffb347'; ctx.shadowBlur = 18;
    ctx.font = 'bold 64px Trebuchet MS';
    ctx.fillText('EDRIS', W/2, 120);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffe0b0'; ctx.font = 'bold 20px Trebuchet MS';
    ctx.fillText('🦖 DINO FLIGHT 🦅', W/2, 170);
    ctx.fillStyle = '#fff'; ctx.font = '16px Trebuchet MS';
    ctx.fillText('TAP / SPACE = kepak terbang', W/2, 250);
    ctx.fillText('Elak CACTUS 🌵 dan PTERODACTYL musuh!', W/2, 280);
    ctx.fillStyle = '#ff8060'; ctx.font = 'bold 16px Trebuchet MS';
    ctx.fillText('AWAS: T-REX mengejar! Setiap langgaran = dia makin DEKAT!', W/2, 320);
    ctx.fillStyle = '#c8ffc8'; ctx.font = '15px Trebuchet MS';
    ctx.fillText('Terbang bersih untuk jauhkan diri semula', W/2, 350);
    if (Math.floor(Date.now()/400)%2===0) {
      ctx.fillStyle = '#5cff5c'; ctx.font = 'bold 22px Trebuchet MS';
      ctx.fillText('▶ TAP / SPACE UNTUK MULA', W/2, 430);
    }
    if (highScore > 0) { ctx.fillStyle = '#ffd24d'; ctx.font = '15px Trebuchet MS'; ctx.fillText('BEST: ' + highScore + ' m', W/2, 480); }
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(40,10,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff5040'; ctx.shadowColor = '#ff5040'; ctx.shadowBlur = 14;
    ctx.font = 'bold 46px Trebuchet MS';
    ctx.fillText('NGAP! DIMAKAN T-REX!', W/2, 180);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = '22px Trebuchet MS';
    ctx.fillText('Jarak: ' + Math.floor(dist) + ' m', W/2, 250);
    ctx.fillStyle = '#ffd24d';
    ctx.fillText(Math.floor(dist) >= highScore && dist > 0 ? '🏆 REKOD BAHARU!' : 'Best: ' + highScore + ' m', W/2, 288);
    if (Math.floor(Date.now()/400)%2===0) {
      ctx.fillStyle = '#5cff5c'; ctx.font = 'bold 20px Trebuchet MS';
      ctx.fillText('▶ TAP / ENTER UNTUK CUBA LAGI', W/2, 370);
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  // ============================================================
  // LOOP
  // ============================================================
  initScenery();
  function loop(){ update(); render(); requestAnimationFrame(loop); }
  loop();
})();
</script>

<script src="/reward-timer.js"></script>
