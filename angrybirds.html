<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Angry Birds — Slingshot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; background: #000; overflow: hidden;
    font-family: 'Trebuchet MS', sans-serif; color: #fff;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  #backBtn {
    position: fixed; top: 10px; left: 10px;
    background: rgba(0,0,0,0.75); color: #ff5a3c;
    padding: 6px 14px; border: 2px solid #ff5a3c; border-radius: 6px;
    text-decoration: none; font-size: 13px; font-weight: bold; letter-spacing: 2px;
    z-index: 999;
  }
  #backBtn:hover { background: #ff5a3c; color: #000; }
  canvas {
    display: block; background: #aEe4f7; image-rendering: pixelated;
    max-width: 100vw; max-height: 100vh; touch-action: none;
    border: 3px solid #5a3a1a; box-shadow: 0 0 26px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
<a id="backBtn" href="arcade.html">◀ HUB</a>
<canvas id="game" width="920" height="560"></canvas>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = 500;

  // ============================================================
  // AUDIO (Web Audio API)
  // ============================================================
  let actx = null;
  function ensureAudio() {
    if (actx) return;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
  }
  function tone(freq, dur, type='square', vol=0.07, freqEnd=null) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if (freqEnd !== null) o.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), t0+dur);
    g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0+dur);
  }
  function noiseBurst(dur, vol=0.1) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const buf = actx.createBuffer(1, Math.floor(actx.sampleRate*dur), actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    const s = actx.createBufferSource(), g = actx.createGain();
    s.buffer = buf; g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    s.connect(g).connect(actx.destination); s.start(t0);
  }
  const SFX = {
    stretch: () => tone(180, 0.18, 'sine', 0.05, 320),
    launch:  () => { tone(520, 0.18, 'square', 0.05, 160); noiseBurst(0.12, 0.05); },
    boost:   () => tone(700, 0.14, 'sawtooth', 0.06, 1300),
    wood:    () => tone(180, 0.1, 'square', 0.06, 90),
    ice:     () => { noiseBurst(0.18, 0.12); tone(1400, 0.1, 'sine', 0.05, 600); },
    stone:   () => { noiseBurst(0.1, 0.08); tone(120, 0.12, 'square', 0.06, 70); },
    pig:     () => { tone(440, 0.08, 'square', 0.08, 700); setTimeout(()=>noiseBurst(0.16,0.12),50); },
    thud:    () => tone(140, 0.08, 'square', 0.04, 80),
    clear:   () => { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'square',0.08),i*110)); },
    fail:    () => tone(300, 0.5, 'sawtooth', 0.1, 70),
    star:    () => { [784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.08),i*120)); }
  };

  // ============================================================
  // STATE
  // ============================================================
  const PHYS = { g: 0.38, airDamp: 0.999, groundFric: 0.78, restitution: 0.32 };
  const SLING = { x: 135, y: GROUND_Y - 96, forkH: 70 };  // anchor (tempat burung dilepas)
  const MAX_STRETCH = 95;
  const POWER = 0.185;

  let state = 'start';   // start | aim | flying | settling | clear | fail
  let levelIndex = 0;
  let score = 0;
  let birdsLeft = 0;
  let blocks = [], pigs = [], debris = [], birds = [];
  let bird = null;        // burung aktif di slingshot / terbang
  let dragging = false, dragX = 0, dragY = 0;
  let settleTimer = 0;
  let shake = 0;
  let starsThisLevel = 0;
  let bestStars = loadStars();

  function loadStars() {
    try { return JSON.parse(localStorage.getItem('angrybirds_stars') || '{}'); } catch { return {}; }
  }
  function saveStars() {
    try { localStorage.setItem('angrybirds_stars', JSON.stringify(bestStars)); } catch {}
  }

  // ============================================================
  // LEVEL DATA
  // ============================================================
  // Helper: blok (cx,cy = pusat). material: 'wood'|'ice'|'stone'
  function mkBlock(cx, cy, w, h, material) {
    const hp = material==='ice'?16 : material==='stone'?60 : 30;
    return { cx, cy, hw:w/2, hh:h/2, vx:0, vy:0, angle:0, angVel:0,
             material, hp, maxHp:hp, rest:0, sleeping:false, alive:true,
             mass: material==='stone'?2.6 : material==='ice'?0.7 : 1.1 };
  }
  function mkPig(cx, cy, r=18) {
    return { x:cx, y:cy, vx:0, vy:0, r, hp:16, maxHp:16, alive:true, rest:0, blink:0 };
  }

  const LEVELS = [
    // ── LEVEL 1 — menara mudah, 1 pig ──
    () => {
      blocks = [
        mkBlock(660, GROUND_Y-22, 28, 44, 'wood'),
        mkBlock(740, GROUND_Y-22, 28, 44, 'wood'),
        mkBlock(700, GROUND_Y-58, 104, 24, 'wood'),
        mkBlock(700, GROUND_Y-94, 28, 48, 'wood'),
      ];
      pigs = [ mkPig(700, GROUND_Y-58-18) ];
      birdsLeft = 3;
    },
    // ── LEVEL 2 — 2 tingkat + ais, 2 pig ──
    () => {
      blocks = [
        mkBlock(600, GROUND_Y-30, 24, 60, 'wood'),
        mkBlock(680, GROUND_Y-30, 24, 60, 'wood'),
        mkBlock(640, GROUND_Y-72, 110, 24, 'stone'),
        mkBlock(610, GROUND_Y-100, 22, 32, 'ice'),
        mkBlock(670, GROUND_Y-100, 22, 32, 'ice'),
        mkBlock(640, GROUND_Y-128, 90, 22, 'wood'),
        mkBlock(800, GROUND_Y-22, 24, 44, 'ice'),
        mkBlock(800, GROUND_Y-58, 60, 22, 'wood'),
      ];
      pigs = [ mkPig(640, GROUND_Y-72-18), mkPig(800, GROUND_Y-58-18) ];
      birdsLeft = 3;
    },
    // ── LEVEL 3 — kubu batu + ais, 3 pig ──
    () => {
      blocks = [
        // menara kiri
        mkBlock(560, GROUND_Y-34, 26, 68, 'stone'),
        mkBlock(620, GROUND_Y-34, 26, 68, 'stone'),
        mkBlock(590, GROUND_Y-80, 90, 24, 'stone'),
        mkBlock(590, GROUND_Y-112, 22, 40, 'ice'),
        // menara kanan
        mkBlock(760, GROUND_Y-34, 26, 68, 'wood'),
        mkBlock(820, GROUND_Y-34, 26, 68, 'wood'),
        mkBlock(790, GROUND_Y-80, 90, 24, 'stone'),
        mkBlock(790, GROUND_Y-112, 22, 40, 'ice'),
        // jambatan tengah
        mkBlock(690, GROUND_Y-150, 140, 22, 'wood'),
        mkBlock(690, GROUND_Y-22, 24, 44, 'ice'),
      ];
      pigs = [ mkPig(590, GROUND_Y-80-18), mkPig(790, GROUND_Y-80-18), mkPig(690, GROUND_Y-22-18, 16) ];
      birdsLeft = 4;
    },
  ];

  function startLevel(i) {
    levelIndex = i;
    score = 0;
    debris = []; birds = [];
    LEVELS[i]();
    loadNextBird();
    state = 'aim';
  }
  function loadNextBird() {
    if (birdsLeft <= 0) { bird = null; return; }
    birdsLeft--;
    bird = { x: SLING.x, y: SLING.y, vx:0, vy:0, r:15, launched:false, boosted:false, mass:1.3, trail:[], slowFrames:0, airTime:0 };
  }

  // ============================================================
  // INPUT (mouse + touch via pointer events)
  // ============================================================
  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx * sx, y: cy * sy };
  }
  function onDown(e) {
    ensureAudio();
    e.preventDefault();
    if (state === 'start') { startLevel(0); return; }
    if (state === 'clear') { nextLevel(); return; }
    if (state === 'fail') { startLevel(levelIndex); return; }
    const p = pointerPos(e);
    if (state === 'aim' && bird && !bird.launched) {
      const d = Math.hypot(p.x - bird.x, p.y - bird.y);
      if (d < 60) { dragging = true; dragX = p.x; dragY = p.y; }
    } else if (state === 'flying' && bird && bird.launched && !bird.boosted) {
      // Tap masa terbang = BOOST laju!
      bird.boosted = true;
      const sp = Math.hypot(bird.vx, bird.vy) || 1;
      bird.vx = bird.vx/sp * (sp + 6);
      bird.vy = bird.vy/sp * (sp + 6);
      SFX.boost();
      for (let k=0;k<8;k++) debris.push(spark(bird.x, bird.y, '#fff84a'));
    }
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = pointerPos(e);
    let dx = p.x - SLING.x, dy = p.y - SLING.y;
    const d = Math.hypot(dx, dy);
    if (d > MAX_STRETCH) { dx = dx/d*MAX_STRETCH; dy = dy/d*MAX_STRETCH; }
    // hanya benarkan tarik ke belakang/bawah (kiri) supaya lancar ke kanan
    if (dx > 0) dx *= 0.25;
    dragX = SLING.x + dx; dragY = SLING.y + dy;
    bird.x = dragX; bird.y = dragY;
  }
  function onUp(e) {
    if (!dragging) return;
    e.preventDefault();
    dragging = false;
    const dx = SLING.x - bird.x, dy = SLING.y - bird.y;
    const d = Math.hypot(dx, dy);
    if (d < 14) { bird.x = SLING.x; bird.y = SLING.y; return; }  // tak cukup tarik
    bird.vx = dx * POWER; bird.vy = dy * POWER;
    bird.launched = true;
    state = 'flying';
    SFX.launch();
  }
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('touchend', onUp, {passive:false});
  window.addEventListener('keydown', e => {
    ensureAudio();
    if (e.code === 'Enter' || e.code === 'Space') {
      if (state === 'start') startLevel(0);
      else if (state === 'clear') nextLevel();
      else if (state === 'fail') startLevel(levelIndex);
    }
  });

  function nextLevel() {
    if (levelIndex + 1 < LEVELS.length) startLevel(levelIndex + 1);
    else startLevel(0);  // habis semua → ulang dari mula
  }

  // ============================================================
  // PARTICLES / DEBRIS
  // ============================================================
  function spark(x, y, color) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*4;
    return { x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:30+Math.random()*20, max:50, color, size:2+Math.random()*3, kind:'spark' };
  }
  function chunk(x, y, color) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*5;
    return { x, y, vx:Math.cos(a)*s, vy:-(Math.random()*5+2), life:40, max:40, color, size:4+Math.random()*5, kind:'chunk', angle:Math.random()*6, av:(Math.random()-0.5)*0.4 };
  }
  function blockColor(m){ return m==='ice'?'#9fe8ff' : m==='stone'?'#9a9a9a' : '#c8843c'; }

  // ============================================================
  // PHYSICS HELPERS
  // ============================================================
  function blockAABB(b){ return { l:b.cx-b.hw, r:b.cx+b.hw, t:b.cy-b.hh, bot:b.cy+b.hh }; }

  function damageBlock(b, dmg, hitColor) {
    b.hp -= dmg;
    b.sleeping = false; b.rest = 0;
    if (b.hp <= 0 && b.alive) {
      b.alive = false;
      score += 500;
      const col = blockColor(b.material);
      for (let k=0;k<10;k++) debris.push(chunk(b.cx, b.cy, col));
      if (b.material==='ice') SFX.ice(); else if (b.material==='stone') SFX.stone(); else SFX.wood();
    }
  }
  function damagePig(p, dmg) {
    p.hp -= dmg; p.blink = 8;
    if (p.hp <= 0 && p.alive) {
      p.alive = false;
      score += 5000;
      for (let k=0;k<14;k++) debris.push(chunk(p.x, p.y, '#7ac943'));
      for (let k=0;k<6;k++) debris.push(spark(p.x, p.y, '#fff'));
      SFX.pig();
      shake = 6;
    }
  }

  // Circle (bird/pig) vs Block AABB — return collision info atau null
  function circleVsBlock(c, b) {
    const a = blockAABB(b);
    const nx = Math.max(a.l, Math.min(c.x, a.r));
    const ny = Math.max(a.t, Math.min(c.y, a.bot));
    const dx = c.x - nx, dy = c.y - ny;
    const d2 = dx*dx + dy*dy;
    if (d2 < c.r*c.r) {
      const d = Math.sqrt(d2) || 0.0001;
      return { nx: dx/d, ny: dy/d, depth: c.r - d, contactX: nx, contactY: ny };
    }
    return null;
  }

  // ============================================================
  // UPDATE
  // ============================================================
  function update() {
    if (shake > 0) shake -= 0.5;
    stepDebris();

    if (state !== 'flying' && state !== 'settling') {
      if (state === 'aim' && bird && !bird.launched && !dragging) {
        bird.x = SLING.x; bird.y = SLING.y;
      }
      stepBlocks();   // biar struktur settle walaupun masa aim
      stepPigs();
      return;
    }

    // ── BIRD terbang ──
    if (bird && bird.launched) {
      bird.airTime++;
      bird.vy += PHYS.g;
      bird.vx *= PHYS.airDamp; bird.vy *= PHYS.airDamp;
      bird.x += bird.vx; bird.y += bird.vy;
      bird.trail.push({x:bird.x, y:bird.y});
      if (bird.trail.length > 14) bird.trail.shift();

      // tanah
      if (bird.y + bird.r > GROUND_Y) {
        bird.y = GROUND_Y - bird.r;
        bird.vy *= -PHYS.restitution; bird.vx *= PHYS.groundFric;
        if (Math.abs(bird.vy) < 1) bird.vy = 0;
      }
      // dinding/atas
      if (bird.x - bird.r < 0) { bird.x = bird.r; bird.vx *= -0.4; }
      if (bird.y - bird.r < 0) { bird.y = bird.r; bird.vy *= -0.4; }

      // bird vs blocks
      for (const b of blocks) {
        if (!b.alive) continue;
        const col = circleVsBlock(bird, b);
        if (col) {
          // tolak burung keluar
          bird.x += col.nx * col.depth; bird.y += col.ny * col.depth;
          const vn = bird.vx*col.nx + bird.vy*col.ny;
          const impact = Math.abs(vn) * bird.mass;
          // pantul burung (hilang tenaga)
          if (vn < 0) {
            bird.vx -= (1+0.3) * vn * col.nx;
            bird.vy -= (1+0.3) * vn * col.ny;
            bird.vx *= 0.55; bird.vy *= 0.55;
          }
          // pindah impuls ke blok
          b.sleeping = false; b.rest = 0;
          b.vx -= col.nx * impact * 0.9 / b.mass;
          b.vy -= col.ny * impact * 0.9 / b.mass;
          b.angVel += (Math.random()-0.5) * impact * 0.05;
          if (impact > 1.5) damageBlock(b, impact * 2.4);
          if (impact > 2) { SFX.thud(); shake = Math.min(8, impact); }
        }
      }
      // bird vs pigs
      for (const p of pigs) {
        if (!p.alive) continue;
        const dx = bird.x - p.x, dy = bird.y - p.y;
        const d = Math.hypot(dx, dy);
        if (d < bird.r + p.r) {
          const impact = Math.hypot(bird.vx, bird.vy) * bird.mass;
          damagePig(p, impact * 4 + 6);
          const nx = dx/(d||1), ny = dy/(d||1);
          bird.x = p.x + nx*(bird.r+p.r); bird.y = p.y + ny*(bird.r+p.r);
          bird.vx *= 0.4; bird.vy *= 0.4;
          p.vx += -nx * impact * 0.5; p.vy += -ny * impact * 0.5;
        }
      }

      // burung berhenti (DI MANA-MANA) / luar skrin / timeout → settle
      // (hanya cetus SEKALI dari 'flying', supaya settleTimer tak reset setiap frame)
      if (Math.hypot(bird.vx, bird.vy) < 0.7) bird.slowFrames++; else bird.slowFrames = 0;
      if (state === 'flying' && (bird.slowFrames > 24 || bird.x > W + 60 || bird.x < -60 || bird.airTime > 360)) {
        state = 'settling'; settleTimer = 40;
      }
    }

    stepBlocks();
    stepPigs();

    // Semak menang dulu (elak deadlock): kalau semua pig mati → 'clear'
    checkWinLose();

    // Kalau belum menang & tempoh settle habis → load burung seterusnya
    if (state === 'settling') {
      settleTimer--;
      if (settleTimer <= 0) {
        loadNextBird();
        state = bird ? 'aim' : 'fail';
        if (state === 'fail') { SFX.fail(); }
      }
    }
  }

  function stepBlocks() {
    for (const b of blocks) {
      if (!b.alive || b.sleeping) continue;
      b.vy += PHYS.g;
      b.cx += b.vx; b.cy += b.vy;
      b.angle += b.angVel; b.angVel *= 0.95;

      // tanah
      if (b.cy + b.hh > GROUND_Y) {
        b.cy = GROUND_Y - b.hh;
        if (b.vy > 1.5) { /* landing */ if (b.vy>4) SFX.thud(); }
        b.vy *= -0.18; b.vx *= PHYS.groundFric; b.angVel *= 0.4;
        if (Math.abs(b.vy) < 0.6) b.vy = 0;
      }
      // dinding
      if (b.cx - b.hw < 0) { b.cx = b.hw; b.vx *= -0.3; }
      if (b.cx + b.hw > W) { b.cx = W - b.hw; b.vx *= -0.3; }
    }
    // block vs block (2 lelaran utk kestabilan)
    for (let iter=0; iter<2; iter++) {
      for (let i=0;i<blocks.length;i++) {
        const a = blocks[i]; if (!a.alive) continue;
        for (let j=i+1;j<blocks.length;j++) {
          const b = blocks[j]; if (!b.alive) continue;
          resolveBlockPair(a, b);
        }
      }
    }
    // sleeping check
    for (const b of blocks) {
      if (!b.alive || b.sleeping) continue;
      const spd = Math.abs(b.vx) + Math.abs(b.vy) + Math.abs(b.angVel);
      const onGround = (b.cy + b.hh >= GROUND_Y - 1.5);
      if (spd < 0.35) { b.rest++; if (b.rest > 24 && (onGround || restingSupport(b))) { b.sleeping=true; b.vx=0; b.vy=0; b.angVel=0; b.angle = Math.round(b.angle/(Math.PI/2))*(Math.PI/2)*0.0 + b.angle*0.0; } }
      else b.rest = 0;
    }
  }
  function restingSupport(b) {
    // ada blok rehat tepat di bawah?
    const a = blockAABB(b);
    for (const o of blocks) {
      if (o===b || !o.alive) continue;
      const ob = blockAABB(o);
      if (ob.t <= a.bot + 3 && ob.t >= a.bot - 3 && ob.l < a.r-2 && ob.r > a.l+2 && o.sleeping) return true;
    }
    return false;
  }
  function resolveBlockPair(a, b) {
    const A = blockAABB(a), B = blockAABB(b);
    const ox = Math.min(A.r, B.r) - Math.max(A.l, B.l);
    const oy = Math.min(A.bot, B.bot) - Math.max(A.t, B.t);
    if (ox <= 0 || oy <= 0) return;
    // both sleeping → biar
    if (a.sleeping && b.sleeping) return;
    const totalMass = a.mass + b.mass;
    if (ox < oy) {
      // pisah mendatar
      const dir = a.cx < b.cx ? -1 : 1;
      if (!a.sleeping) a.cx += dir * ox * (b.mass/totalMass);
      if (!b.sleeping) b.cx -= dir * ox * (a.mass/totalMass);
      const rel = (a.vx - b.vx);
      if (!a.sleeping) a.vx -= rel*0.3; if (!b.sleeping) b.vx += rel*0.3;
      a.vx*=0.9; b.vx*=0.9;
    } else {
      // pisah menegak
      const dir = a.cy < b.cy ? -1 : 1;
      if (!a.sleeping) a.cy += dir * oy * (b.mass/totalMass);
      if (!b.sleeping) b.cy -= dir * oy * (a.mass/totalMass);
      // blok atas duduk atas blok bawah
      if (dir < 0) { if(!a.sleeping){a.vy = Math.min(a.vy,0); a.vx*=PHYS.groundFric;} }
      else { if(!b.sleeping){b.vy = Math.min(b.vy,0); b.vx*=PHYS.groundFric;} }
      a.angVel *= 0.8; b.angVel *= 0.8;
    }
    a.rest = 0; b.rest = 0;
    // blok laju langgar blok lain → damage
    const impact = Math.abs(a.vx-b.vx) + Math.abs(a.vy-b.vy);
    if (impact > 5) { damageBlock(a, impact*0.6); damageBlock(b, impact*0.6); }
  }

  function stepPigs() {
    for (const p of pigs) {
      if (!p.alive) continue;
      if (p.blink > 0) p.blink--;
      p.vy += PHYS.g;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.99;
      // tanah
      if (p.y + p.r > GROUND_Y) {
        p.y = GROUND_Y - p.r;
        if (p.vy > 5) damagePig(p, (p.vy-5)*2);   // jatuh kuat = cedera
        p.vy *= -0.2; p.vx *= 0.7;
        if (Math.abs(p.vy) < 1) p.vy = 0;
      }
      // pig vs blocks (duduk atas, ditolak blok bergerak)
      for (const b of blocks) {
        if (!b.alive) continue;
        const col = circleVsBlock(p, b);
        if (col) {
          p.x += col.nx*col.depth; p.y += col.ny*col.depth;
          const bspd = Math.hypot(b.vx, b.vy);
          if (bspd > 2.6 && !b.sleeping) damagePig(p, bspd*3.6);  // blok laju hentam pig
          const vn = p.vx*col.nx + p.vy*col.ny;
          if (vn < 0) { p.vx -= vn*col.nx; p.vy -= vn*col.ny; }
          p.vx *= 0.92; p.vy *= 0.92;
        }
      }
      if (p.x < -40 || p.x > W+40) damagePig(p, 999);
    }
    pigs = pigs.filter(p => p.alive);
    blocks = blocks.filter(b => b.alive);
  }

  function stepDebris() {
    for (let i=debris.length-1;i>=0;i--) {
      const d = debris[i];
      d.x += d.vx; d.y += d.vy; d.vy += 0.3; d.life--;
      if (d.kind==='chunk') { d.angle += d.av; if (d.y > GROUND_Y) { d.y=GROUND_Y; d.vy*=-0.3; d.vx*=0.7; } }
      if (d.life <= 0) debris.splice(i,1);
    }
  }

  function checkWinLose() {
    if (pigs.length === 0 && (state==='flying'||state==='settling')) {
      // Menang!
      score += birdsLeft * 10000;   // bonus burung berbaki
      starsThisLevel = score >= starThresholds()[2] ? 3 : score >= starThresholds()[1] ? 2 : 1;
      const key = 'L'+levelIndex;
      if (!bestStars[key] || starsThisLevel > bestStars[key]) { bestStars[key] = starsThisLevel; saveStars(); }
      state = 'clear';
      SFX.clear(); setTimeout(()=>SFX.star(), 600);
    }
  }
  function starThresholds() {
    // ambang bintang ikut level
    const base = [ [8000,16000,25000], [15000,28000,42000], [22000,40000,60000] ];
    return base[levelIndex] || base[0];
  }

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    ctx.save();
    if (shake > 0.5) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    drawBackground();

    if (state === 'start') { drawStart(); ctx.restore(); return; }

    // struktur
    for (const b of blocks) drawBlock(b);
    for (const p of pigs) drawPig(p);
    // slingshot + bird
    drawSlingshot();
    if (bird) {
      if (!bird.launched && state==='aim') drawTrajectory();
      drawBird(bird);
    }
    drawDebris();
    drawHUD();

    if (state === 'clear') drawClear();
    else if (state === 'fail') drawFail();
    ctx.restore();
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#7ec8f0'); g.addColorStop(0.7,'#b8e8f8'); g.addColorStop(1,'#e8f8d8');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // matahari
    ctx.fillStyle = '#fff3a0'; ctx.beginPath(); ctx.arc(W-110, 80, 38, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,243,160,0.3)'; ctx.beginPath(); ctx.arc(W-110, 80, 54, 0, 7); ctx.fill();
    // awan
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    [[180,90],[460,60],[720,100],[300,150]].forEach(([x,y])=>{ ctx.beginPath(); ctx.arc(x,y,20,0,7); ctx.arc(x+22,y-8,24,0,7); ctx.arc(x+46,y,18,0,7); ctx.fill(); });
    // bukit
    ctx.fillStyle = '#8ed86a'; ctx.beginPath(); ctx.arc(250, GROUND_Y, 160, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#7ac84a'; ctx.beginPath(); ctx.arc(650, GROUND_Y, 200, Math.PI, 0); ctx.fill();
    // tanah
    ctx.fillStyle = '#7a4a20'; ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
    ctx.fillStyle = '#5aa83a'; ctx.fillRect(0, GROUND_Y, W, 14);
    ctx.fillStyle = '#4a8a2a'; ctx.fillRect(0, GROUND_Y+12, W, 4);
  }

  function drawSlingshot() {
    const baseX = SLING.x, baseY = GROUND_Y;
    // batang kayu Y
    ctx.strokeStyle = '#7a4a1a'; ctx.lineWidth = 12; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(baseX, baseY); ctx.lineTo(baseX, SLING.y+8); ctx.stroke();
    ctx.lineWidth = 9;
    ctx.beginPath(); ctx.moveTo(baseX, SLING.y+18); ctx.lineTo(baseX-14, SLING.y-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(baseX, SLING.y+18); ctx.lineTo(baseX+14, SLING.y-6); ctx.stroke();
    // getah (kalau drag, sambung ke burung)
    if (bird && !bird.launched) {
      ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(baseX-14, SLING.y-6); ctx.lineTo(bird.x, bird.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(baseX+14, SLING.y-6); ctx.lineTo(bird.x, bird.y); ctx.stroke();
    }
  }

  function drawTrajectory() {
    if (!dragging) return;
    let sx = bird.x, sy = bird.y;
    let vx = (SLING.x - bird.x) * POWER, vy = (SLING.y - bird.y) * POWER;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (let i=0;i<28;i++) {
      vy += PHYS.g; vx *= PHYS.airDamp; vy *= PHYS.airDamp;
      sx += vx; sy += vy;
      if (sy > GROUND_Y || sx > W) break;
      if (i % 2 === 0) { ctx.beginPath(); ctx.arc(sx, sy, 3.5 - i*0.08, 0, 7); ctx.fill(); }
    }
  }

  function drawBird(b) {
    // trail masa terbang
    if (b.launched) {
      for (let i=0;i<b.trail.length;i++) {
        const t = b.trail[i]; ctx.globalAlpha = i/b.trail.length*0.4;
        ctx.fillStyle = b.boosted ? '#fff84a' : '#fff';
        ctx.beginPath(); ctx.arc(t.x, t.y, 3, 0, 7); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    ctx.save(); ctx.translate(b.x, b.y);
    // badan merah
    ctx.fillStyle = b.boosted ? '#ff8800' : '#e03020';
    ctx.beginPath(); ctx.arc(0,0,b.r,0,7); ctx.fill();
    // perut
    ctx.fillStyle = '#f5d0c0'; ctx.beginPath(); ctx.arc(2,5,b.r*0.5,0,7); ctx.fill();
    // mata
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(4,-4,5,0,7); ctx.arc(11,-4,4,0,7); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(6,-4,2.2,0,7); ctx.arc(12,-4,2,0,7); ctx.fill();
    // kening marah
    ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(9,-6); ctx.moveTo(9,-9); ctx.lineTo(15,-6); ctx.stroke();
    // paruh
    ctx.fillStyle='#f5a623'; ctx.beginPath(); ctx.moveTo(b.r-2,0); ctx.lineTo(b.r+8,3); ctx.lineTo(b.r-2,6); ctx.fill();
    // ekor
    ctx.fillStyle='#a01818'; ctx.beginPath(); ctx.moveTo(-b.r,-4); ctx.lineTo(-b.r-6,-8); ctx.lineTo(-b.r-4,2); ctx.fill();
    ctx.restore();
  }

  function drawPig(p) {
    ctx.save(); ctx.translate(p.x, p.y);
    const hurt = p.blink > 0;
    ctx.fillStyle = hurt ? '#b5e85a' : '#7ac943';
    ctx.beginPath(); ctx.arc(0,0,p.r,0,7); ctx.fill();
    // telinga
    ctx.fillStyle = hurt ? '#a5d84a' : '#6ab933';
    ctx.beginPath(); ctx.arc(-p.r*0.6,-p.r*0.7,4,0,7); ctx.arc(p.r*0.6,-p.r*0.7,4,0,7); ctx.fill();
    // hidung
    ctx.fillStyle='#6ab933'; ctx.beginPath(); ctx.ellipse(0,3,7,5,0,0,7); ctx.fill();
    ctx.fillStyle='#3a7a18'; ctx.beginPath(); ctx.arc(-2,3,1.5,0,7); ctx.arc(2,3,1.5,0,7); ctx.fill();
    // mata
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-4,-4,4,0,7); ctx.arc(5,-4,4,0,7); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-3,-4,1.8,0,7); ctx.arc(6,-4,1.8,0,7); ctx.fill();
    // bar HP kecil bila cedera
    if (p.hp < p.maxHp) {
      ctx.fillStyle='#000'; ctx.fillRect(-p.r, -p.r-8, p.r*2, 4);
      ctx.fillStyle='#5cff5c'; ctx.fillRect(-p.r, -p.r-8, p.r*2*(Math.max(0,p.hp)/p.maxHp), 4);
    }
    ctx.restore();
  }

  function drawBlock(b) {
    ctx.save(); ctx.translate(b.cx, b.cy); ctx.rotate(b.angle);
    const w = b.hw*2, h = b.hh*2;
    let fill, edge;
    if (b.material==='ice') { fill='rgba(159,232,255,0.75)'; edge='#5ab8e0'; }
    else if (b.material==='stone') { fill='#9a9a9a'; edge='#5a5a5a'; }
    else { fill='#c8843c'; edge='#8a5a20'; }
    // kerosakan: gelapkan ikut hp
    const dmg = 1 - b.hp/b.maxHp;
    ctx.fillStyle = fill;
    ctx.fillRect(-b.hw, -b.hh, w, h);
    ctx.strokeStyle = edge; ctx.lineWidth = 2; ctx.strokeRect(-b.hw, -b.hh, w, h);
    // urat kayu / butiran
    if (b.material==='wood') {
      ctx.strokeStyle='rgba(90,60,20,0.5)'; ctx.lineWidth=1;
      for (let i=1;i<3;i++){ ctx.beginPath(); ctx.moveTo(-b.hw, -b.hh+h*i/3); ctx.lineTo(b.hw, -b.hh+h*i/3); ctx.stroke(); }
    } else if (b.material==='ice') {
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-b.hw+3,-b.hh+3); ctx.lineTo(b.hw-3,b.hh-3); ctx.stroke();
    } else {
      ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(-b.hw+3,-b.hh+3,5,5); ctx.fillRect(b.hw-8,b.hh-8,5,5);
    }
    // retak bila rosak
    if (dmg > 0.4) {
      ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-b.hw*0.4,-b.hh); ctx.lineTo(0,0); ctx.lineTo(b.hw*0.3,b.hh); ctx.stroke();
    }
    ctx.restore();
  }

  function drawDebris() {
    for (const d of debris) {
      ctx.globalAlpha = Math.max(0, d.life/d.max);
      ctx.fillStyle = d.color;
      if (d.kind==='chunk') {
        ctx.save(); ctx.translate(d.x,d.y); ctx.rotate(d.angle||0); ctx.fillRect(-d.size/2,-d.size/2,d.size,d.size); ctx.restore();
      } else { ctx.beginPath(); ctx.arc(d.x,d.y,d.size,0,7); ctx.fill(); }
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,34);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 17px Trebuchet MS'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('SKOR ' + score, 14, 17);
    ctx.textAlign='center';
    ctx.fillText('LEVEL ' + (levelIndex+1), W/2, 17);
    // burung berbaki (termasuk yg sedang dipegang)
    ctx.textAlign='right';
    let bx = W - 14;
    ctx.fillStyle='#ff5a3c';
    const totalBirds = birdsLeft + (bird && !bird.launched ? 1 : 0);
    for (let i=0;i<totalBirds;i++){ ctx.beginPath(); ctx.arc(bx - i*22, 17, 8, 0, 7); ctx.fill(); }
    ctx.fillStyle='#fff'; ctx.fillText('🐦', bx - totalBirds*22 - 6, 17);
    // pig tinggal
    ctx.textAlign='left'; ctx.fillStyle='#7ac943';
    ctx.fillText('🐷 ' + pigs.length, 150, 17);
  }

  function drawStars(cx, cy, n, size) {
    for (let i=0;i<3;i++) {
      const x = cx + (i-1)*size*1.6;
      const filled = i < n;
      drawStar(x, cy - (i===1?size*0.3:0), size, filled ? '#FFD700' : 'rgba(0,0,0,0.3)');
    }
  }
  function drawStar(cx, cy, r, color) {
    ctx.save(); ctx.translate(cx, cy); ctx.fillStyle = color;
    ctx.beginPath();
    for (let i=0;i<10;i++){ const a=(i*Math.PI/5)-Math.PI/2; const rr=i%2===0?r:r*0.45; ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr); }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(180,130,0,0.8)'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  }

  function drawStart() {
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ff5a3c'; ctx.font='bold 56px Trebuchet MS';
    ctx.shadowColor='#000'; ctx.shadowBlur=8;
    ctx.fillText('ANGRY BIRDS', W/2, 150); ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='20px Trebuchet MS';
    ctx.fillText('Tarik burung dgn slingshot, lepas untuk lancar!', W/2, 230);
    ctx.fillText('Hapus semua 🐷 pig untuk menang', W/2, 262);
    ctx.fillStyle='#FFD700'; ctx.font='bold 18px Trebuchet MS';
    ctx.fillText('💡 TAP/KLIK masa burung terbang = BOOST laju!', W/2, 310);
    // demo bird
    ctx.fillStyle='#e03020'; ctx.beginPath(); ctx.arc(W/2, 380, 26, 0, 7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(W/2+6,376,8,0,7); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(W/2+9,376,4,0,7); ctx.fill();
    ctx.fillStyle='#f5a623'; ctx.beginPath(); ctx.moveTo(W/2+24,380); ctx.lineTo(W/2+40,385); ctx.lineTo(W/2+24,390); ctx.fill();
    const blink = Math.floor(Date.now()/400)%2===0;
    if (blink) { ctx.fillStyle='#5cff5c'; ctx.font='bold 24px Trebuchet MS'; ctx.fillText('▶ KLIK / TAP UNTUK MULA', W/2, 450); }
  }

  function drawClear() {
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#FFD700'; ctx.font='bold 48px Trebuchet MS'; ctx.shadowColor='#000'; ctx.shadowBlur=8;
    ctx.fillText('LEVEL SELESAI!', W/2, 140); ctx.shadowBlur=0;
    drawStars(W/2, 240, starsThisLevel, 34);
    ctx.fillStyle='#fff'; ctx.font='24px Trebuchet MS';
    ctx.fillText('Skor: ' + score, W/2, 320);
    const last = levelIndex+1 >= LEVELS.length;
    const blink = Math.floor(Date.now()/400)%2===0;
    if (blink){ ctx.fillStyle='#5cff5c'; ctx.font='bold 22px Trebuchet MS';
      ctx.fillText(last ? '🏆 TAMAT! Klik untuk main semula' : '▶ Klik untuk LEVEL seterusnya', W/2, 400); }
  }

  function drawFail() {
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ff4444'; ctx.font='bold 48px Trebuchet MS'; ctx.shadowColor='#000'; ctx.shadowBlur=8;
    ctx.fillText('BURUNG HABIS!', W/2, 180); ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='22px Trebuchet MS';
    ctx.fillText('Masih ada ' + pigs.length + ' pig 🐷', W/2, 250);
    const blink = Math.floor(Date.now()/400)%2===0;
    if (blink){ ctx.fillStyle='#5cff5c'; ctx.font='bold 22px Trebuchet MS'; ctx.fillText('▶ Klik untuk CUBA LAGI', W/2, 330); }
  }

  // ============================================================
  // LOOP
  // ============================================================
  function loop(){ update(); render(); requestAnimationFrame(loop); }
  startLevel(0);   // terus main — tiada skrin mula
  loop();
})();
</script>

<script src="reward-timer.js"></script>
