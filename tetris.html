<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>TETRIS Classic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 10px;
    }
    h1 {
      color: #00CFFF;
      font-size: 38px;
      letter-spacing: 8px;
      text-shadow: 0 0 18px rgba(0,207,255,0.6);
      margin-bottom: 4px;
    }
    .subtitle {
      color: #FFD700;
      font-size: 12px;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .game-area {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    canvas {
      background: #0a0a1f;
      border: 3px solid #00CFFF;
      box-shadow: 0 0 30px rgba(0,207,255,0.4);
      display: block;
      touch-action: none;
    }
    .side-panel {
      display: flex; flex-direction: column;
      gap: 12px; min-width: 140px;
    }
    .panel-box {
      background: rgba(0,30,60,0.5);
      border: 2px solid #00CFFF;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
    }
    .panel-box .label {
      color: #00CFFF;
      font-size: 11px;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    .panel-box .value {
      color: #FFD700;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    #nextCanvas {
      width: 100%;
      height: 100px;
      background: #0a0a1f;
      border-radius: 4px;
    }
    #backBtn {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 8px 16px;
      border: 2px solid #00CFFF;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 50;
    }
    #backBtn:hover { background: #00CFFF; color: #000; }

    /* Name Screen */
    #nameScreen {
      position: fixed; inset: 0;
      background: rgba(0,0,30,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #nameScreen h1 {
      color: #00CFFF; font-size: 56px;
      letter-spacing: 8px; margin-bottom: 8px;
    }
    #nameScreen p { color: #FFD700; font-size: 16px; letter-spacing: 3px; margin-bottom: 30px; }
    #nameInput {
      font-family: 'Courier New', monospace;
      font-size: 24px; font-weight: bold;
      text-align: center; text-transform: uppercase;
      padding: 12px 24px; width: 280px;
      background: #0a0a1f; color: #fff;
      border: 3px solid #00CFFF; border-radius: 8px;
      outline: none; letter-spacing: 4px;
    }
    #startBtn {
      margin-top: 20px;
      font-family: 'Courier New', monospace;
      font-size: 18px; font-weight: bold;
      padding: 14px 50px;
      background: #00CFFF; color: #000;
      border: none; border-radius: 8px;
      cursor: pointer; letter-spacing: 4px;
    }
    #startBtn:hover { background: #00FFFF; }

    /* Leaderboard */
    #leaderboard {
      position: fixed; inset: 0;
      background: rgba(0,0,30,0.95);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #leaderboard h2 { color: #00CFFF; font-size: 30px; margin-bottom: 20px; letter-spacing: 4px; }
    #lbTable { width: 500px; max-width: 90vw; border-collapse: collapse; }
    #lbTable th { color: #FFD700; font-size: 13px; padding: 8px; border-bottom: 2px solid #00CFFF; text-align: left; }
    #lbTable td { color: #fff; font-size: 15px; padding: 8px 10px; border-bottom: 1px solid #224; }
    #lbTable tr:first-child td { color: #FFD700; font-size: 17px; }
    #lbClose {
      margin-top: 24px;
      font-family: 'Courier New', monospace;
      font-size: 16px; padding: 10px 30px;
      background: #00CFFF; color: #000;
      border: none; border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px; font-weight: bold;
    }
    #myRank { color: #00FF88; font-size: 16px; margin-top: 16px; }

    /* Mobile Controls */
    #mobileControls {
      display: none;
      width: 100%; max-width: 460px;
      margin-top: 12px;
      gap: 8px;
      justify-content: space-between;
    }
    .ctrl-row { display: flex; gap: 8px; }
    .ctrl-btn {
      width: 60px; height: 60px;
      background: rgba(0,207,255,0.2);
      border: 2px solid #00CFFF;
      border-radius: 12px;
      color: #fff;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
    }
    .ctrl-btn:active, .ctrl-btn.pressed { background: rgba(0,207,255,0.6); }
    #btnRotate { background: rgba(0,255,136,0.2); border-color: #00FF88; }
    #btnDrop   { background: rgba(255,215,0,0.2);  border-color: #FFD700; }

    @media (max-width: 600px) {
      .game-area { flex-direction: column; align-items: center; }
      .side-panel { flex-direction: row; flex-wrap: wrap; justify-content: center; min-width: 0; }
      .panel-box { min-width: 80px; padding: 6px 10px; }
      .panel-box .value { font-size: 16px; }
      #nextCanvas { width: 70px; height: 70px; }
      #mobileControls { display: flex; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <a id="backBtn" href="arcade.html">◀ HUB</a>

  <h1>🟦 TETRIS</h1>
  <p class="subtitle">CLASSIC EDITION</p>

  <div class="game-area">
    <canvas id="canvas" width="300" height="600"></canvas>

    <div class="side-panel">
      <div class="panel-box">
        <div class="label">SCORE</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
      <div class="panel-box">
        <div class="label">LINES</div>
        <div class="value" id="linesDisplay">0</div>
      </div>
      <div class="panel-box">
        <div class="label">LEVEL</div>
        <div class="value" id="levelDisplay">1</div>
      </div>
      <div class="panel-box">
        <div class="label">NEXT</div>
        <canvas id="nextCanvas" width="100" height="100"></canvas>
      </div>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls">
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn" id="btnDown">▼</div>
      <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btnRotate">↻</div>
      <div class="ctrl-btn" id="btnDrop">⇩</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');

const COLS = 10, ROWS = 20, BLOCK = 30;
const W = COLS * BLOCK, H = ROWS * BLOCK;

// ─── TETROMINOES ─────────────────────────────────────────
const SHAPES = {
  I: { color: '#00CFFF', cells: [[0,1],[1,1],[2,1],[3,1]] },
  O: { color: '#FFD700', cells: [[0,0],[1,0],[0,1],[1,1]] },
  T: { color: '#AA00FF', cells: [[1,0],[0,1],[1,1],[2,1]] },
  S: { color: '#00FF88', cells: [[1,0],[2,0],[0,1],[1,1]] },
  Z: { color: '#FF4444', cells: [[0,0],[1,0],[1,1],[2,1]] },
  L: { color: '#FFA500', cells: [[2,0],[0,1],[1,1],[2,1]] },
  J: { color: '#3366FF', cells: [[0,0],[0,1],[1,1],[2,1]] },
};
const SHAPE_NAMES = Object.keys(SHAPES);

// ─── STATE ───────────────────────────────────────────────
let grid = [];
let current = null, next = null;
let score = 0, lines = 0, level = 1;
let dropTimer = 0, dropInterval = 800;
let gameOver = false, gameStarted = false, scoreSent = false;
let playerName = '';

function initEmpty() {
  grid = Array.from({length: 20}, () => Array(10).fill(null));
}
initEmpty();

// ─── INIT ────────────────────────────────────────────────
function newGrid() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

function randomPiece() {
  const name = SHAPE_NAMES[Math.floor(Math.random() * SHAPE_NAMES.length)];
  const s = SHAPES[name];
  return {
    name, color: s.color,
    cells: s.cells.map(([x,y]) => [x,y]),
    x: 3, y: 0
  };
}

function resetGame() {
  grid = newGrid();
  current = randomPiece();
  next = randomPiece();
  score = 0; lines = 0; level = 1;
  dropInterval = 800;
  dropTimer = 0;
  gameOver = false; gameStarted = true; scoreSent = false;
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('linesDisplay').textContent = lines;
  document.getElementById('levelDisplay').textContent = level;
}

// ─── PIECE MOVEMENT ──────────────────────────────────────
function cellsAt(piece, dx = 0, dy = 0, cells = piece.cells) {
  return cells.map(([x, y]) => [piece.x + x + dx, piece.y + y + dy]);
}

function valid(piece, dx = 0, dy = 0, cells = piece.cells) {
  for (const [x, y] of cellsAt(piece, dx, dy, cells)) {
    if (x < 0 || x >= COLS || y >= ROWS) return false;
    if (y >= 0 && grid[y][x]) return false;
  }
  return true;
}

function rotateCells(cells) {
  // Rotate 90° clockwise around center
  const maxX = Math.max(...cells.map(c => c[0]));
  return cells.map(([x, y]) => [maxX - y, x]);
}

function rotate() {
  if (current.name === 'O') return; // O doesn't rotate
  const rotated = rotateCells(current.cells);
  // Try with wall kicks
  for (const dx of [0, -1, 1, -2, 2]) {
    if (valid(current, dx, 0, rotated)) {
      current.cells = rotated;
      current.x += dx;
      return;
    }
  }
}

function move(dx, dy) {
  if (valid(current, dx, dy)) {
    current.x += dx;
    current.y += dy;
    return true;
  }
  return false;
}

function hardDrop() {
  let drops = 0;
  while (move(0, 1)) drops++;
  score += drops * 2;
  lockPiece();
}

function softDrop() {
  if (move(0, 1)) {
    score += 1;
  } else {
    lockPiece();
  }
}

function lockPiece() {
  for (const [x, y] of cellsAt(current)) {
    if (y < 0) {
      // Game over
      gameOver = true;
      endGame();
      return;
    }
    grid[y][x] = current.color;
  }
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current)) {
    gameOver = true;
    endGame();
  }
  updateHUD();
}

function clearLines() {
  let cleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (grid[y].every(c => c !== null)) {
      grid.splice(y, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      y++; // re-check same row
    }
  }
  if (cleared > 0) {
    const pts = [0, 100, 300, 500, 800][cleared] * level;
    score += pts;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(80, 800 - (level - 1) * 60);
  }
}

// ─── INPUT ────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (gameOver) { if (e.code === 'Enter' || e.code === 'Space') resetGame(); return; }
  if (!gameStarted) return;
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') move(-1, 0);
  if (e.code === 'ArrowRight' || e.code === 'KeyD') move(1, 0);
  if (e.code === 'ArrowDown'  || e.code === 'KeyS') softDrop();
  if (e.code === 'ArrowUp'    || e.code === 'KeyW' || e.code === 'KeyX') rotate();
  if (e.code === 'Space') { hardDrop(); e.preventDefault(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile controls
function bindBtn(id, fn, repeat = false) {
  const el = document.getElementById(id);
  let intv;
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    el.classList.add('pressed');
    if (!gameStarted || gameOver) return;
    fn();
    if (repeat) intv = setInterval(fn, 120);
  }, { passive: false });
  el.addEventListener('touchend', e => {
    e.preventDefault();
    el.classList.remove('pressed');
    clearInterval(intv);
  }, { passive: false });
}
bindBtn('btnLeft',   () => move(-1, 0), true);
bindBtn('btnRight',  () => move(1, 0),  true);
bindBtn('btnDown',   () => softDrop(),  true);
bindBtn('btnRotate', () => rotate(),    false);
bindBtn('btnDrop',   () => hardDrop(),  false);

// ─── UPDATE ──────────────────────────────────────────────
let lastTime = 0;
function update(time = 0) {
  const dt = time - lastTime;
  lastTime = time;

  if (gameStarted && !gameOver) {
    dropTimer += dt;
    if (dropTimer >= dropInterval) {
      dropTimer = 0;
      softDrop();
    }
  }

  render();
  requestAnimationFrame(update);
}

// ─── RENDER ──────────────────────────────────────────────
function drawCell(c, x, y, color, alpha = 1) {
  c.save();
  c.globalAlpha = alpha;
  c.fillStyle = color;
  c.fillRect(x + 1, y + 1, BLOCK - 2, BLOCK - 2);
  // Highlight
  c.fillStyle = 'rgba(255,255,255,0.25)';
  c.fillRect(x + 1, y + 1, BLOCK - 2, 4);
  c.fillRect(x + 1, y + 1, 4, BLOCK - 2);
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.fillRect(x + 1, y + BLOCK - 5, BLOCK - 2, 4);
  c.fillRect(x + BLOCK - 5, y + 1, 4, BLOCK - 2);
  c.restore();
}

function render() {
  // Grid background
  ctx.fillStyle = '#0a0a1f';
  ctx.fillRect(0, 0, W, H);
  // Grid lines
  ctx.strokeStyle = 'rgba(0,207,255,0.1)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * BLOCK, 0); ctx.lineTo(x * BLOCK, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * BLOCK); ctx.lineTo(W, y * BLOCK); ctx.stroke();
  }

  // Locked pieces
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (grid[y][x]) drawCell(ctx, x * BLOCK, y * BLOCK, grid[y][x]);
    }
  }

  // Ghost piece (preview)
  if (gameStarted && !gameOver) {
    let ghostY = 0;
    while (valid(current, 0, ghostY + 1)) ghostY++;
    for (const [x, y] of cellsAt(current, 0, ghostY)) {
      if (y >= 0) drawCell(ctx, x * BLOCK, y * BLOCK, current.color, 0.2);
    }
  }

  // Current piece
  if (gameStarted && !gameOver) {
    for (const [x, y] of cellsAt(current)) {
      if (y >= 0) drawCell(ctx, x * BLOCK, y * BLOCK, current.color);
    }
  }

  // Game over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,30,0.85)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.fillStyle = '#fff';
    ctx.font = '16px Courier New';
    ctx.fillText('Score: ' + score, W/2, H/2 + 14);
    ctx.fillStyle = '#00CFFF';
    ctx.font = 'bold 14px Courier New';
    ctx.fillText('ENTER / TAP untuk main lagi', W/2, H/2 + 44);
  }

  // Next piece preview
  nextCtx.fillStyle = '#0a0a1f';
  nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (next) {
    const sz = 20;
    const offX = (nextCanvas.width - 4 * sz) / 2;
    const offY = (nextCanvas.height - 2 * sz) / 2;
    for (const [x, y] of next.cells) {
      nextCtx.fillStyle = next.color;
      nextCtx.fillRect(offX + x * sz + 1, offY + y * sz + 1, sz - 2, sz - 2);
      nextCtx.fillStyle = 'rgba(255,255,255,0.25)';
      nextCtx.fillRect(offX + x * sz + 1, offY + y * sz + 1, sz - 2, 3);
    }
  }
}

// ─── BACKEND ──────────────────────────────────────────────
function endGame() {
  // Tiada leaderboard lagi — game over dipaparkan atas board, tekan ENTER/TAP main lagi.
}

// Tap/klik mana-mana untuk main semula bila game over (mobile)
document.addEventListener('pointerdown', () => { if (gameOver) resetGame(); });

resetGame();   // terus main — tiada skrin nama
requestAnimationFrame(update);
</script>
<script src="reward-timer.js"></script>
</body>
</html>
