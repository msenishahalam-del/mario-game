<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Sky Warriors — Homework Mission Accomplished!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #backBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #00e5ff;
    padding: 6px 14px;
    border: 2px solid #00e5ff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 2px;
    z-index: 999;
  }
  #backBtn:hover { background: #00e5ff; color: #000; }
  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100vw;
    max-height: 100vh;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
    border: 2px solid #00e5ff;
  }
</style>
</head>
<body>

<a id="backBtn" href="arcade.html">◀ HUB</a>
<canvas id="game" width="480" height="720"></canvas>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ============================================================
  // AUDIO  (Web Audio API — no external files)
  // ============================================================
  let actx = null;
  function ensureAudio() {
    if (actx) return;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { actx = null; }
  }
  function tone(freq, dur, type = 'square', vol = 0.08, freqEnd = null) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (freqEnd !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(actx.destination);
    osc.start(t0);
    osc.stop(t0 + dur);
  }
  function noiseBurst(dur, vol = 0.15) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
    const src = actx.createBufferSource();
    const g = actx.createGain();
    src.buffer = buf;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(g).connect(actx.destination);
    src.start(t0);
  }
  const SFX = {
    shoot() { tone(880, 0.06, 'square', 0.04, 600); },
    enemyExplode() { noiseBurst(0.2, 0.15); tone(180, 0.18, 'sawtooth', 0.1, 60); },
    playerHit() { tone(140, 0.35, 'sawtooth', 0.18, 50); noiseBurst(0.15, 0.1); },
    powerup() { tone(660, 0.08, 'sine', 0.1); setTimeout(() => tone(990, 0.1, 'sine', 0.1), 60); setTimeout(() => tone(1320, 0.14, 'sine', 0.12), 130); },
    bossDefeat() {
      noiseBurst(0.5, 0.2);
      [220, 330, 440, 550, 660, 880].forEach((f, i) => setTimeout(() => tone(f, 0.25, 'square', 0.1, f * 0.5), i * 80));
    },
    levelClear() {
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'square', 0.1), i * 110));
    },
    enemyShoot() { tone(300, 0.05, 'sawtooth', 0.03, 200); },
    thunder() {
      // Rumble: low noise + descending tone
      noiseBurst(0.4, 0.18);
      tone(80, 0.5, 'sawtooth', 0.12, 40);
      setTimeout(() => noiseBurst(0.3, 0.1), 80);
    }
  };

  // ============================================================
  // INPUT
  // ============================================================
  const keys = Object.create(null);
  const BLOCKED = new Set([
    'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
    'Space', 'KeyW', 'KeyA', 'KeyS', 'KeyD'
  ]);
  window.addEventListener('keydown', (e) => {
    ensureAudio();
    if (BLOCKED.has(e.code)) e.preventDefault();
    keys[e.code] = true;
    if (state === 'start' && e.code === 'Enter') startGame();
    else if (state === 'gameover' && (e.code === 'KeyR' || e.code === 'Enter')) startGame();
    else if (state === 'victory' && (e.code === 'KeyR' || e.code === 'Enter')) startGame();
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  function held(...codes) { return codes.some(c => keys[c]); }

  // ============================================================
  // GAME STATE
  // ============================================================
  let state = 'start';        // start | playing | transition | gameover | victory
  let level = 1;
  let score = 0;
  let highScore = 0;
  let lives = 3;
  let waveTimer = 0;          // time alive in current level (ms)
  let bossSpawnAt = 25000;    // ms until boss appears in current level
  let bossSpawned = false;
  let transitionTimer = 0;
  let levelStartFlash = 0;
  let screenShake = 0;
  let lastSpawn = 0;
  let spawnInterval = 900;
  let bgOffset = 0;
  let stars = [];             // for level 3 starfield
  let fireworks = [];         // for victory screen
  let lightningHazards = [];  // for level 4 storm: vertical lightning strikes
  let nextLightning = 3000;
  let cloudFlash = 0;         // brief whole-screen lightning flash
  let snowflakes = [];        // for level 5 arctic

  let player = null;
  const eBullets = [];
  const pBullets = [];
  const enemies = [];
  const powerups = [];
  const particles = [];
  let boss = null;

  function makePlayer() {
    return {
      x: W / 2,
      y: H - 90,
      r: 16,
      speed: 0.32,           // pixels per ms
      health: 100,
      maxHealth: 100,
      weaponLevel: 1,        // 1, 2, 3
      shootCooldown: 0,
      invuln: 1500,          // brief invulnerability after spawn
      flashTimer: 0,
      thrust: 0              // visual flame phase
    };
  }

  function resetEntities() {
    eBullets.length = 0;
    pBullets.length = 0;
    enemies.length = 0;
    powerups.length = 0;
    particles.length = 0;
    boss = null;
  }

  function makeSnow() {
    snowflakes = [];
    for (let i = 0; i < 90; i++) {
      snowflakes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vy: 0.05 + Math.random() * 0.12,
        vx: (Math.random() - 0.5) * 0.04,
        size: 1 + Math.random() * 2,
        sway: Math.random() * Math.PI * 2
      });
    }
  }

  function makeStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: 0.04 + Math.random() * 0.16,
        size: Math.random() < 0.7 ? 1 : 2,
        twinkle: Math.random() * Math.PI * 2
      });
    }
  }

  function startGame() {
    level = 1;
    score = 0;
    lives = 3;
    player = makePlayer();
    resetEntities();
    waveTimer = 0;
    bossSpawned = false;
    bossSpawnAt = 25000;
    lastSpawn = 0;
    spawnInterval = 900;
    bgOffset = 0;
    levelStartFlash = 1500;
    lightningHazards.length = 0;
    nextLightning = 3000;
    snowflakes.length = 0;
    state = 'playing';
    makeStars();
  }

  function startNextLevel() {
    level++;
    if (level > 5) {
      state = 'victory';
      fireworks = [];
      return;
    }
    resetEntities();
    player.x = W / 2;
    player.y = H - 90;
    player.invuln = 1500;
    waveTimer = 0;
    bossSpawned = false;
    bossSpawnAt = level === 5 ? 32000 : level >= 3 ? 28000 : 25000;
    lastSpawn = 0;
    spawnInterval = level === 1 ? 900 : level === 2 ? 750 : level === 3 ? 650 : level === 4 ? 600 : 550;
    levelStartFlash = 1500;
    lightningHazards.length = 0;
    nextLightning = 3000;
    snowflakes.length = 0;
    if (level === 5) makeSnow();
    state = 'playing';
  }

  function loseLife() {
    lives--;
    SFX.playerHit();
    screenShake = 18;
    spawnExplosion(player.x, player.y, '#ffcc55', 24);
    if (lives <= 0) {
      state = 'gameover';
      if (score > highScore) highScore = score;
      return;
    }
    player.health = player.maxHealth;
    player.invuln = 2000;
    player.x = W / 2;
    player.y = H - 90;
  }

  // ============================================================
  // PLAYER
  // ============================================================
  function updatePlayer(dt) {
    if (!player) return;
    if (player.invuln > 0) player.invuln -= dt;
    if (player.flashTimer > 0) player.flashTimer -= dt;
    player.thrust = (player.thrust + dt * 0.02) % (Math.PI * 2);

    let dx = 0, dy = 0;
    if (held('ArrowLeft', 'KeyA')) dx -= 1;
    if (held('ArrowRight', 'KeyD')) dx += 1;
    if (held('ArrowUp', 'KeyW')) dy -= 1;
    if (held('ArrowDown', 'KeyS')) dy += 1;
    if (dx !== 0 && dy !== 0) {
      const k = 0.7071;
      dx *= k; dy *= k;
    }
    player.x += dx * player.speed * dt;
    player.y += dy * player.speed * dt;
    const m = 22;
    if (player.x < m) player.x = m;
    if (player.x > W - m) player.x = W - m;
    if (player.y < m) player.y = m;
    if (player.y > H - m) player.y = H - m;

    if (player.shootCooldown > 0) player.shootCooldown -= dt;
    if (held('Space') && player.shootCooldown <= 0) {
      fireWeapon();
      player.shootCooldown = 140;
    }
  }

  function fireWeapon() {
    const x = player.x;
    const y = player.y - 18;
    const sp = 0.7;
    if (player.weaponLevel >= 1) {
      pBullets.push({ x, y, vx: 0, vy: -sp, r: 4, dmg: 1, kind: 'p' });
    }
    if (player.weaponLevel >= 2) {
      pBullets.push({ x: x - 10, y: y + 4, vx: 0, vy: -sp, r: 3, dmg: 1, kind: 'p' });
      pBullets.push({ x: x + 10, y: y + 4, vx: 0, vy: -sp, r: 3, dmg: 1, kind: 'p' });
    }
    if (player.weaponLevel >= 3) {
      pBullets.push({ x, y: y + 2, vx: -0.25, vy: -sp * 0.95, r: 3, dmg: 1, kind: 'p' });
      pBullets.push({ x, y: y + 2, vx: 0.25, vy: -sp * 0.95, r: 3, dmg: 1, kind: 'p' });
    }
    SFX.shoot();
  }

  function drawPlayer() {
    if (!player) return;
    const blink = player.invuln > 0 && Math.floor(player.invuln / 80) % 2 === 0;
    if (blink) return;

    ctx.save();
    ctx.translate(player.x, player.y);

    // Engine flames
    const flameLen = 14 + Math.sin(player.thrust) * 3;
    const fGrad = ctx.createLinearGradient(0, 14, 0, 14 + flameLen);
    fGrad.addColorStop(0, '#ffeeaa');
    fGrad.addColorStop(0.5, '#ff7a00');
    fGrad.addColorStop(1, 'rgba(255, 60, 0, 0)');
    ctx.fillStyle = fGrad;
    ctx.beginPath();
    ctx.moveTo(-6, 12);
    ctx.lineTo(0, 14 + flameLen);
    ctx.lineTo(6, 12);
    ctx.closePath();
    ctx.fill();

    // Wings (silver/blue gradient)
    const wGrad = ctx.createLinearGradient(-22, 0, 22, 0);
    wGrad.addColorStop(0, '#5a7aa8');
    wGrad.addColorStop(0.5, '#cfd8e8');
    wGrad.addColorStop(1, '#5a7aa8');
    ctx.fillStyle = wGrad;
    ctx.beginPath();
    ctx.moveTo(-22, 6);
    ctx.lineTo(-8, -2);
    ctx.lineTo(-4, 10);
    ctx.lineTo(-18, 14);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22, 6);
    ctx.lineTo(8, -2);
    ctx.lineTo(4, 10);
    ctx.lineTo(18, 14);
    ctx.closePath();
    ctx.fill();

    // Fuselage
    const bGrad = ctx.createLinearGradient(-8, -16, 8, 16);
    bGrad.addColorStop(0, '#3a5d99');
    bGrad.addColorStop(0.5, '#6aa8ff');
    bGrad.addColorStop(1, '#1b3060');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.lineTo(7, -4);
    ctx.lineTo(9, 12);
    ctx.lineTo(-9, 12);
    ctx.lineTo(-7, -4);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    const cGrad = ctx.createRadialGradient(0, -6, 1, 0, -6, 6);
    cGrad.addColorStop(0, '#cfeaff');
    cGrad.addColorStop(1, '#1a4a8a');
    ctx.fillStyle = cGrad;
    ctx.beginPath();
    ctx.ellipse(0, -6, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing tip lights
    ctx.fillStyle = '#ff4040';
    ctx.fillRect(-21, 6, 2, 2);
    ctx.fillStyle = '#40ff80';
    ctx.fillRect(19, 6, 2, 2);

    ctx.restore();
  }

  // ============================================================
  // ENEMIES
  // ============================================================
  function spawnEnemy() {
    const x = 30 + Math.random() * (W - 60);
    let e;
    if (level === 1) {
      const t = Math.random() < 0.55 ? 'scout' : 'fighter';
      e = makeEnemy(t, x, -30);
    } else if (level === 2) {
      const r = Math.random();
      const t = r < 0.5 ? 'kamikaze' : r < 0.85 ? 'fighter' : 'chopper';
      e = makeEnemy(t, x, -30);
    } else if (level === 3) {
      const r = Math.random();
      const t = r < 0.45 ? 'elite' : r < 0.85 ? 'fighter' : 'cruiser';
      e = makeEnemy(t, x, -30);
    } else if (level === 4) {
      // Storm: laju + agresif, banyak kamikaze + fighter, sikit elite
      const r = Math.random();
      const t = r < 0.45 ? 'kamikaze' : r < 0.8 ? 'fighter' : 'elite';
      e = makeEnemy(t, x, -30);
    } else {
      // Arctic: berat + dingin, banyak cruiser & elite
      const r = Math.random();
      const t = r < 0.4 ? 'elite' : r < 0.75 ? 'cruiser' : r < 0.92 ? 'fighter' : 'chopper';
      e = makeEnemy(t, x, -30);
    }
    enemies.push(e);
  }

  function makeEnemy(type, x, y) {
    const base = { type, x, y, vx: 0, vy: 0, t: 0, shootTimer: 0, r: 16, hp: 1, drop: 0 };
    if (type === 'scout') {
      Object.assign(base, { r: 12, hp: 1, vy: 0.1, drop: 0.05, points: 50 });
    } else if (type === 'fighter') {
      Object.assign(base, { r: 16, hp: 2, vy: 0.14, drop: 0.1, points: 100 });
    } else if (type === 'kamikaze') {
      Object.assign(base, { r: 12, hp: 1, vy: 0.28, drop: 0.04, points: 70 });
    } else if (type === 'chopper') {
      Object.assign(base, { r: 20, hp: 4, vy: 0.09, drop: 0.18, points: 200 });
    } else if (type === 'elite') {
      Object.assign(base, { r: 16, hp: 3, vy: 0.13, drop: 0.12, points: 150 });
    } else if (type === 'cruiser') {
      Object.assign(base, { r: 24, hp: 6, vy: 0.07, drop: 0.25, points: 300 });
    }
    return base;
  }

  function updateEnemies(dt) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.t += dt;
      e.shootTimer -= dt;

      if (e.type === 'scout') {
        e.x += Math.sin(e.t * 0.003) * 0.06 * dt;
        e.y += e.vy * dt;
      } else if (e.type === 'fighter') {
        e.y += e.vy * dt;
        if (e.shootTimer <= 0 && e.y > 0 && e.y < H * 0.5) {
          enemyFire(e, 'aim');
          e.shootTimer = 1400 + Math.random() * 800;
        }
      } else if (e.type === 'kamikaze') {
        // dive toward player
        if (player) {
          const dx = player.x - e.x;
          e.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.002, 0.18) * dt;
        }
        e.y += e.vy * dt;
      } else if (e.type === 'chopper') {
        e.x += Math.sin(e.t * 0.002) * 0.12 * dt;
        e.y += e.vy * dt;
        if (e.shootTimer <= 0 && e.y > 30) {
          enemyFire(e, 'spread3');
          e.shootTimer = 1600;
        }
      } else if (e.type === 'elite') {
        e.x += Math.sin(e.t * 0.004) * 0.16 * dt;
        e.y += e.vy * dt;
        if (e.shootTimer <= 0 && e.y > 0) {
          enemyFire(e, 'aim');
          e.shootTimer = 900 + Math.random() * 400;
        }
      } else if (e.type === 'cruiser') {
        e.y += e.vy * dt;
        if (e.shootTimer <= 0 && e.y > 20) {
          enemyFire(e, 'spread5');
          e.shootTimer = 1500;
        }
      }

      if (e.y > H + 40 || e.x < -40 || e.x > W + 40) {
        enemies.splice(i, 1);
      }
    }
  }

  function enemyFire(e, pattern) {
    SFX.enemyShoot();
    if (pattern === 'aim' && player) {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const d = Math.hypot(dx, dy) || 1;
      const sp = 0.32;
      eBullets.push({ x: e.x, y: e.y + 12, vx: dx / d * sp, vy: dy / d * sp, r: 4, dmg: 10, kind: 'e' });
    } else if (pattern === 'down') {
      eBullets.push({ x: e.x, y: e.y + 12, vx: 0, vy: 0.32, r: 4, dmg: 10, kind: 'e' });
    } else if (pattern === 'spread3') {
      const sp = 0.3;
      for (const a of [-0.35, 0, 0.35]) {
        eBullets.push({ x: e.x, y: e.y + 12, vx: Math.sin(a) * sp, vy: Math.cos(a) * sp, r: 4, dmg: 10, kind: 'e' });
      }
    } else if (pattern === 'spread5') {
      const sp = 0.3;
      for (const a of [-0.5, -0.25, 0, 0.25, 0.5]) {
        eBullets.push({ x: e.x, y: e.y + 12, vx: Math.sin(a) * sp, vy: Math.cos(a) * sp, r: 4, dmg: 10, kind: 'e' });
      }
    }
  }

  function drawEnemies() {
    for (const e of enemies) drawEnemy(e);
  }

  // Helper: draw a spinning rotor (motion-blur disk + blades + hub)
  function drawRotor(cx, cy, radius, phase, bladeColor = '#1a1a1a', diskAlpha = 0.18) {
    ctx.fillStyle = `rgba(40,40,40,${diskAlpha})`;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = bladeColor;
    ctx.lineWidth = 2;
    for (let b = 0; b < 2; b++) {
      const a = phase + b * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * -radius, cy + Math.sin(a) * -radius);
      ctx.lineTo(cx + Math.cos(a) * radius, cy + Math.sin(a) * radius);
      ctx.stroke();
    }
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.arc(cx, cy, Math.max(2, radius * 0.18), 0, Math.PI * 2);
    ctx.fill();
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);

    if (e.type === 'scout') {
      // ── Light recon helicopter (small, fast spinning rotor)
      // Tail boom (extends up = rear)
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(-2, -16, 4, 10);
      // Tail rotor (small)
      const trot = e.t * 0.09;
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(trot) * -4, -17 + Math.sin(trot) * -4);
      ctx.lineTo(Math.cos(trot) * 4, -17 + Math.sin(trot) * 4);
      ctx.stroke();
      // Vertical fin
      ctx.fillStyle = '#4b5563';
      ctx.beginPath();
      ctx.moveTo(-1, -16); ctx.lineTo(-3, -18); ctx.lineTo(-1, -10); ctx.closePath();
      ctx.fill();
      // Body (teardrop bubble)
      const bg = ctx.createRadialGradient(0, 2, 1, 0, 0, 10);
      bg.addColorStop(0, '#cbd5e1');
      bg.addColorStop(1, '#6b7280');
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.ellipse(0, 1, 7, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      // Cockpit bubble (front, glassy)
      ctx.fillStyle = '#aee0ff';
      ctx.beginPath();
      ctx.ellipse(0, 5, 5, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#3a4a55';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // Landing skids (thin lines along sides)
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-7, -2); ctx.lineTo(-7, 8);
      ctx.moveTo(7, -2); ctx.lineTo(7, 8);
      ctx.stroke();
      // Main rotor (large fast-spinning disk on top)
      drawRotor(0, 1, 14, e.t * 0.075, '#222', 0.22);

    } else if (e.type === 'fighter') {
      // ── Jet fighter (delta wing, twin engines)
      const blink = (Math.floor(e.t / 240) % 2 === 0);
      // Twin engines at rear (top, since flying down)
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(-7, -14, 4, 8);
      ctx.fillRect(3, -14, 4, 8);
      // Engine exhaust glow
      const fg = ctx.createLinearGradient(0, -16, 0, -10);
      fg.addColorStop(0, 'rgba(255,210,90,0)');
      fg.addColorStop(0.5, 'rgba(255,160,60,0.7)');
      fg.addColorStop(1, 'rgba(255,80,40,0.9)');
      ctx.fillStyle = fg;
      ctx.fillRect(-7, -16, 4, 6);
      ctx.fillRect(3, -16, 4, 6);
      // Swept-back wings
      const wG = ctx.createLinearGradient(-16, 0, 16, 0);
      wG.addColorStop(0, '#4a3030');
      wG.addColorStop(0.5, '#8a4444');
      wG.addColorStop(1, '#4a3030');
      ctx.fillStyle = wG;
      ctx.beginPath();
      ctx.moveTo(-2, 4);
      ctx.lineTo(-18, -2);
      ctx.lineTo(-15, -10);
      ctx.lineTo(-3, -6);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(2, 4);
      ctx.lineTo(18, -2);
      ctx.lineTo(15, -10);
      ctx.lineTo(3, -6);
      ctx.closePath();
      ctx.fill();
      // Fuselage
      const bG = ctx.createLinearGradient(-6, -10, 6, 14);
      bG.addColorStop(0, '#5a1a1a');
      bG.addColorStop(0.5, '#cc4444');
      bG.addColorStop(1, '#3a0a0a');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.moveTo(0, 14);       // nose
      ctx.lineTo(5, 6);
      ctx.lineTo(6, -8);
      ctx.lineTo(3, -14);
      ctx.lineTo(-3, -14);
      ctx.lineTo(-6, -8);
      ctx.lineTo(-5, 6);
      ctx.closePath();
      ctx.fill();
      // Canopy
      const cg = ctx.createRadialGradient(0, 3, 1, 0, 3, 4);
      cg.addColorStop(0, '#cfeaff');
      cg.addColorStop(1, '#1a3a55');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(0, 3, 2.5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail fin (vertical stabilizer at rear)
      ctx.fillStyle = '#3a0a0a';
      ctx.beginPath();
      ctx.moveTo(-2, -8); ctx.lineTo(0, -12); ctx.lineTo(2, -8); ctx.closePath();
      ctx.fill();
      // Wingtip nav lights
      if (blink) {
        ctx.fillStyle = '#ff3030';
        ctx.fillRect(-18, -3, 2, 2);
        ctx.fillStyle = '#30ff60';
        ctx.fillRect(16, -3, 2, 2);
      }

    } else if (e.type === 'kamikaze') {
      // ── Suicide dive jet (red, sharp delta + big afterburner)
      // Long afterburner flame
      const flame = 8 + ((e.t * 0.06) % 4);
      const fg = ctx.createLinearGradient(0, -10, 0, -10 - flame);
      fg.addColorStop(0, '#fff5b0');
      fg.addColorStop(0.4, '#ffaa30');
      fg.addColorStop(1, 'rgba(255,40,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.moveTo(-3, -10); ctx.lineTo(0, -10 - flame); ctx.lineTo(3, -10); ctx.closePath();
      ctx.fill();
      // Engine
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(-3, -12, 6, 4);
      // Delta wings
      ctx.fillStyle = '#5a0a0a';
      ctx.beginPath();
      ctx.moveTo(0, 12);
      ctx.lineTo(-12, -6);
      ctx.lineTo(-3, -8);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, 12);
      ctx.lineTo(12, -6);
      ctx.lineTo(3, -8);
      ctx.closePath();
      ctx.fill();
      // Fuselage (red, sharp)

      bG.addColorStop(0, '#8a1a2a');
      bG.addColorStop(0.5, '#ff3a44');
      bG.addColorStop(1, '#5a0a0a');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.moveTo(0, 13);
      ctx.lineTo(4, 0);
      ctx.lineTo(4, -10);
      ctx.lineTo(-4, -10);
      ctx.lineTo(-4, 0);
      ctx.closePath();
      ctx.fill();
      // Canopy (small, intense red)
      ctx.fillStyle = '#ffe0b0';
      ctx.beginPath();
      ctx.ellipse(0, 0, 2, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // White trim stripe
      ctx.fillStyle = '#fff';
      ctx.fillRect(-1, 4, 2, 6);

    } else if (e.type === 'chopper') {
      // ── Attack helicopter (military green, weapons, big rotor)
      // Tail boom (extends up = rear)
      ctx.fillStyle = '#3a4a25';
      ctx.fillRect(-3, -22, 6, 14);
      // Tail rotor
      const trot = e.t * 0.07;
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(Math.cos(trot) * -6, -22 + Math.sin(trot) * -6);
      ctx.lineTo(Math.cos(trot) * 6, -22 + Math.sin(trot) * 6);
      ctx.stroke();
      // Vertical tail fin
      ctx.fillStyle = '#2a3a18';
      ctx.beginPath();
      ctx.moveTo(-4, -22); ctx.lineTo(0, -26); ctx.lineTo(4, -22); ctx.closePath();
      ctx.fill();
      // Body (military green fuselage, longer)
      const bG = ctx.createLinearGradient(-12, 0, 12, 0);
      bG.addColorStop(0, '#2a3818');
      bG.addColorStop(0.5, '#5d7a3a');
      bG.addColorStop(1, '#2a3818');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.moveTo(-11, -8);
      ctx.lineTo(-11, 6);
      ctx.lineTo(-7, 12);
      ctx.lineTo(7, 12);
      ctx.lineTo(11, 6);
      ctx.lineTo(11, -8);
      ctx.closePath();
      ctx.fill();
      // Camo stripe
      ctx.fillStyle = '#3a4a20';
      ctx.fillRect(-11, -2, 22, 3);
      // Side weapon pods (rocket pods)
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(-16, 0, 5, 8);
      ctx.fillRect(11, 0, 5, 8);
      // Rocket tips (red)
      ctx.fillStyle = '#aa3030';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(-15 + i, 8, 1, 2);
        ctx.fillRect(12 + i, 8, 1, 2);
      }
      // Cockpit canopy (tinted front)
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(-6, 4); ctx.lineTo(-4, 11); ctx.lineTo(4, 11); ctx.lineTo(6, 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#5a8a4a';
      ctx.beginPath();
      ctx.moveTo(-4, 6); ctx.lineTo(-3, 10); ctx.lineTo(3, 10); ctx.lineTo(4, 6);
      ctx.closePath();
      ctx.fill();
      // Main rotor (big, fast)
      drawRotor(0, -2, 22, e.t * 0.055, '#111', 0.16);

    } else if (e.type === 'elite') {
      // ── Stealth fighter (angular, F-117 inspired, dark purple)
      // Engines at rear
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(-8, -14, 5, 8);
      ctx.fillRect(3, -14, 5, 8);
      // Exhaust (purple plasma)
      const fg = ctx.createLinearGradient(0, -16, 0, -10);
      fg.addColorStop(0, 'rgba(180,80,255,0)');
      fg.addColorStop(1, 'rgba(180,80,255,0.85)');
      ctx.fillStyle = fg;
      ctx.fillRect(-8, -17, 5, 6);
      ctx.fillRect(3, -17, 5, 6);
      // Sharp angular wings (diamond stealth)
      const wG = ctx.createLinearGradient(-18, 0, 18, 0);
      wG.addColorStop(0, '#1a0a2a');
      wG.addColorStop(0.5, '#7a3aaa');
      wG.addColorStop(1, '#1a0a2a');
      ctx.fillStyle = wG;
      ctx.beginPath();
      ctx.moveTo(0, 14);          // nose
      ctx.lineTo(-18, 2);          // left wingtip
      ctx.lineTo(-10, -12);        // rear left
      ctx.lineTo(10, -12);
      ctx.lineTo(18, 2);
      ctx.closePath();
      ctx.fill();
      // Faceted highlight (top half)
      ctx.fillStyle = 'rgba(170,120,220,0.4)';
      ctx.beginPath();
      ctx.moveTo(0, 14);
      ctx.lineTo(-10, 0);
      ctx.lineTo(0, -2);
      ctx.lineTo(10, 0);
      ctx.closePath();
      ctx.fill();
      // Center spine
      ctx.strokeStyle = '#aa6aff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, 14); ctx.lineTo(0, -12);
      ctx.stroke();
      // Cockpit slit
      ctx.fillStyle = '#ffccff';
      ctx.fillRect(-2, 2, 4, 5);
      // Faint outline
      ctx.strokeStyle = '#bb88ff';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, 14); ctx.lineTo(-18, 2); ctx.lineTo(-10, -12);
      ctx.lineTo(10, -12); ctx.lineTo(18, 2); ctx.closePath();
      ctx.stroke();

    } else if (e.type === 'cruiser') {
      // ── Heavy bomber jet (large 4-engine, intimidating)
      // Long wings spanning the body
      const wG = ctx.createLinearGradient(0, -8, 0, 8);
      wG.addColorStop(0, '#3a3a3a');
      wG.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = wG;
      ctx.fillRect(-26, -3, 52, 8);
      // 4 engines under wings (jet pods)
      ctx.fillStyle = '#1a1a1a';
      [-20, -10, 10, 20].forEach(ex => {
        ctx.fillRect(ex - 3, -8, 6, 6);
        // Engine intake (dark)
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath();
        ctx.ellipse(ex, -8, 2.5, 1.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Engine exhaust glow
        ctx.fillStyle = 'rgba(255, 140, 50, 0.6)';
        ctx.fillRect(ex - 2, -2, 4, 2);
        ctx.fillStyle = '#1a1a1a';
      });
      // Main fuselage (long)
      const bG = ctx.createLinearGradient(0, -12, 0, 14);
      bG.addColorStop(0, '#2a2a2a');
      bG.addColorStop(0.5, '#5a5a5a');
      bG.addColorStop(1, '#2a2a2a');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.moveTo(0, 16);          // nose
      ctx.lineTo(7, 8);
      ctx.lineTo(8, -10);
      ctx.lineTo(4, -14);
      ctx.lineTo(-4, -14);
      ctx.lineTo(-8, -10);
      ctx.lineTo(-7, 8);
      ctx.closePath();
      ctx.fill();
      // Cockpit windows
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.ellipse(0, 8, 3, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail fin (vertical)
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(-3, -10); ctx.lineTo(0, -16); ctx.lineTo(3, -10); ctx.closePath();
      ctx.fill();
      // Horizontal tail wings
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(-12, -11, 24, 4);
      // Red warning bands on wings
      ctx.fillStyle = '#aa2030';
      ctx.fillRect(-25, 2, 6, 2);
      ctx.fillRect(19, 2, 6, 2);
      // Belly turret
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(0, 13, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aa3030';
      ctx.fillRect(-0.5, 15, 1, 2);
    }
    ctx.restore();
  }

  // ============================================================
  // BOSSES
  // ============================================================
  function spawnBoss() {
    bossSpawned = true;
    if (level === 1) {
      boss = {
        type: 'gunship', x: W / 2, y: -100, vx: 0.1, vy: 0.08,
        hp: 60, maxHp: 60, t: 0, shootTimer: 1500, phase: 'enter',
        w: 110, h: 150, points: 1500
      };
    } else if (level === 2) {
      boss = {
        type: 'bomber', x: W / 2, y: -60, vx: 0.18, vy: 0.06,
        hp: 80, maxHp: 80, t: 0, shootTimer: 1800, phase: 'enter',
        w: 130, h: 60, points: 2500
      };
    } else if (level === 3) {
      boss = {
        type: 'mothership', x: W / 2, y: -100, vx: 0.05, vy: 0.05,
        hp: 110, maxHp: 110, t: 0, shootTimer: 1200, phase: 'enter',
        w: 180, h: 90, points: 4000
      };
    } else if (level === 4) {
      boss = {
        type: 'stormcarrier', x: W / 2, y: -80, vx: 0.14, vy: 0.07,
        hp: 130, maxHp: 130, t: 0, shootTimer: 1500, phase: 'enter',
        w: 170, h: 80, points: 6000
      };
    } else {
      boss = {
        type: 'icedreadnought', x: W / 2, y: -110, vx: 0.08, vy: 0.06,
        hp: 160, maxHp: 160, t: 0, shootTimer: 1500, phase: 'enter',
        w: 180, h: 110, points: 9000, enraged: false
      };
    }
  }

  function updateBoss(dt) {
    if (!boss) return;
    boss.t += dt;
    boss.shootTimer -= dt;

    if (boss.phase === 'enter') {
      boss.y += boss.vy * dt;
      if (boss.y >= 120) { boss.phase = 'fight'; boss.shootTimer = 800; }
    } else if (boss.phase === 'fight') {
      if (boss.type === 'gunship') {
        boss.x += boss.vx * dt;
        if (boss.x < boss.w / 2 + 10 || boss.x > W - boss.w / 2 - 10) boss.vx *= -1;
        boss.y = 120 + Math.sin(boss.t * 0.001) * 8;
        if (boss.shootTimer <= 0) {
          // burst of 3 down + 1 angled targeted shot (from gun pods)
          SFX.enemyShoot();
          for (const ox of [-30, 0, 30]) {
            eBullets.push({ x: boss.x + ox, y: boss.y + 60, vx: 0, vy: 0.32, r: 5, dmg: 12, kind: 'e' });
          }
          if (Math.floor(boss.t / 1000) % 3 === 0 && player) {
            const dx = player.x - boss.x, dy = player.y - (boss.y + 60);
            const d = Math.hypot(dx, dy) || 1;
            const sp = 0.3;
            eBullets.push({ x: boss.x, y: boss.y + 60, vx: dx / d * sp, vy: dy / d * sp, r: 5, dmg: 12, kind: 'e' });
          }
          boss.shootTimer = 900;
        }
      } else if (boss.type === 'bomber') {
        boss.x += boss.vx * dt;
        if (boss.x < boss.w / 2 + 10 || boss.x > W - boss.w / 2 - 10) boss.vx *= -1;
        boss.y = 100 + Math.sin(boss.t * 0.0014) * 14;
        if (boss.shootTimer <= 0) {
          // 5-way splitting spread
          SFX.enemyShoot();
          for (const a of [-0.7, -0.35, 0, 0.35, 0.7]) {
            const sp = 0.28;
            eBullets.push({ x: boss.x, y: boss.y + 28, vx: Math.sin(a) * sp, vy: Math.cos(a) * sp, r: 5, dmg: 12, kind: 'e', split: 600 });
          }
          boss.shootTimer = 1100;
        }
      } else if (boss.type === 'mothership') {
        boss.x = W / 2 + Math.sin(boss.t * 0.0008) * (W / 2 - 100);
        boss.y = 110 + Math.sin(boss.t * 0.0016) * 18;
        if (boss.shootTimer <= 0) {
          // rotating circular pattern
          SFX.enemyShoot();
          const offset = boss.t * 0.001;
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2 + offset;
            const sp = 0.26;
            eBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 5, dmg: 10, kind: 'e' });
          }
          // also targeted shots every other volley
          if (Math.floor(boss.t / 1200) % 2 === 0 && player) {
            const dx = player.x - boss.x, dy = player.y - boss.y;
            const d = Math.hypot(dx, dy) || 1;
            eBullets.push({ x: boss.x, y: boss.y + 40, vx: dx / d * 0.36, vy: dy / d * 0.36, r: 6, dmg: 15, kind: 'e' });
          }
          boss.shootTimer = 750;
        }
      } else if (boss.type === 'stormcarrier') {
        // L4 Storm Carrier — terbang lebar, peluru kilat dari dua sayap
        boss.x += boss.vx * dt;
        if (boss.x < boss.w / 2 + 10 || boss.x > W - boss.w / 2 - 10) boss.vx *= -1;
        boss.y = 110 + Math.sin(boss.t * 0.0012) * 10;
        if (boss.shootTimer <= 0) {
          SFX.enemyShoot();
          // dua salvo dari sayap kiri & kanan
          for (const wx of [-70, 70]) {
            eBullets.push({ x: boss.x + wx, y: boss.y + 20, vx: 0, vy: 0.35, r: 5, dmg: 12, kind: 'e' });
          }
          // setiap 2 salvo, lepas spread aim ke player
          if (Math.floor(boss.t / 1500) % 2 === 0 && player) {
            const dx = player.x - boss.x, dy = player.y - boss.y;
            const d = Math.hypot(dx, dy) || 1;
            const sp = 0.32;
            for (const a of [-0.25, 0, 0.25]) {
              const baseA = Math.atan2(dy, dx);
              const ang = baseA + a;
              eBullets.push({ x: boss.x, y: boss.y + 30, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, r: 5, dmg: 12, kind: 'e' });
            }
          }
          boss.shootTimer = 850;
        }
      } else if (boss.type === 'icedreadnought') {
        // L5 Ice Dreadnought — multi-fasa (>50% normal, ≤50% berang)
        const hpPct = boss.hp / boss.maxHp;
        const enraged = hpPct <= 0.5;
        if (enraged && !boss.enraged) {
          boss.enraged = true;
          SFX.bossDefeat();   // mini-fanfare bila masuk fasa 2
          screenShake = 20;
        }
        // Pergerakan lebih lincah bila enraged
        boss.x += boss.vx * dt * (enraged ? 1.5 : 1);
        if (boss.x < boss.w / 2 + 10 || boss.x > W - boss.w / 2 - 10) boss.vx *= -1;
        boss.y = 130 + Math.sin(boss.t * 0.0015) * 12;
        if (boss.shootTimer <= 0) {
          SFX.enemyShoot();
          if (!enraged) {
            // Fasa 1: cannon ais — 3 peluru perlahan tapi besar
            for (const ox of [-50, 0, 50]) {
              eBullets.push({ x: boss.x + ox, y: boss.y + 40, vx: 0, vy: 0.28, r: 6, dmg: 12, kind: 'e' });
            }
            // dan satu tembakan terus ke player
            if (player) {
              const dx = player.x - boss.x, dy = player.y - boss.y;
              const d = Math.hypot(dx, dy) || 1;
              eBullets.push({ x: boss.x, y: boss.y + 40, vx: dx / d * 0.32, vy: dy / d * 0.32, r: 6, dmg: 13, kind: 'e' });
            }
            boss.shootTimer = 1100;
          } else {
            // Fasa 2: ais shard ledakan 8-arah + targeted volley
            const offset = boss.t * 0.0015;
            for (let i = 0; i < 8; i++) {
              const a = (i / 8) * Math.PI * 2 + offset;
              const sp = 0.28;
              eBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 5, dmg: 12, kind: 'e' });
            }
            // dan 3 peluru tepat sasar
            if (player) {
              const dx = player.x - boss.x, dy = player.y - boss.y;
              const d = Math.hypot(dx, dy) || 1;
              const baseA = Math.atan2(dy, dx);
              for (const a of [-0.2, 0, 0.2]) {
                const ang = baseA + a;
                eBullets.push({ x: boss.x, y: boss.y + 50, vx: Math.cos(ang) * 0.4, vy: Math.sin(ang) * 0.4, r: 5, dmg: 14, kind: 'e' });
              }
            }
            boss.shootTimer = 700;
          }
        }
      }
    }
  }

  function drawBoss() {
    if (!boss) return;
    ctx.save();
    ctx.translate(boss.x, boss.y);

    if (boss.type === 'gunship') {
      // ── Tandem-rotor heavy attack helicopter (Chinook-inspired)
      // Body: long fuselage, military green, oriented nose-down

      // Main fuselage outline (long body along Y)
      const bG = ctx.createLinearGradient(-45, 0, 45, 0);
      bG.addColorStop(0, '#1f2a10');
      bG.addColorStop(0.5, '#5d7a3a');
      bG.addColorStop(1, '#1f2a10');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.moveTo(-40, -55);              // rear-left corner
      ctx.lineTo(-45, -40);
      ctx.lineTo(-45, 50);
      ctx.lineTo(-35, 65);               // nose taper left
      ctx.lineTo(35, 65);                // nose taper right
      ctx.lineTo(45, 50);
      ctx.lineTo(45, -40);
      ctx.lineTo(40, -55);                // rear-right corner
      ctx.lineTo(20, -65);                // rear ramp
      ctx.lineTo(-20, -65);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#0e1908';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Camo splotches (darker green patches)
      ctx.fillStyle = '#3a4a20';
      ctx.beginPath();
      ctx.ellipse(-20, -10, 14, 8, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(18, 25, 12, 6, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-10, 40, 10, 5, 0.2, 0, Math.PI * 2);
      ctx.fill();

      // Side hardpoint pylons (weapon mounts)
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(-55, -5, 10, 25);
      ctx.fillRect(45, -5, 10, 25);
      // Rocket pods on pylons
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(-58, 8, 6, 18);
      ctx.fillRect(52, 8, 6, 18);
      // Rocket tips (red)
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = '#cc3030';
        ctx.fillRect(-58 + i * 2, 26, 1.5, 3);
        ctx.fillRect(52 + i * 2, 26, 1.5, 3);
      }
      // Missiles on inner pylons
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(-54, -2, 8, 6);
      ctx.fillRect(46, -2, 8, 6);
      ctx.fillStyle = '#aa3030';
      ctx.fillRect(-52, -4, 4, 2);
      ctx.fillRect(48, -4, 4, 2);

      // Cargo door details (side panels)
      ctx.strokeStyle = '#1a1f0a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-45, -25); ctx.lineTo(-45, 30);
      ctx.moveTo(45, -25); ctx.lineTo(45, 30);
      ctx.moveTo(-40, 0); ctx.lineTo(-40, 30);
      ctx.moveTo(40, 0); ctx.lineTo(40, 30);
      ctx.stroke();

      // Round side windows
      ctx.fillStyle = '#1a1a1a';
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.arc(-43, -20 + i * 12, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(43, -20 + i * 12, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      // Window glow (inner light)
      ctx.fillStyle = '#ffd24d';
      for (let i = -2; i <= 2; i++) {
        ctx.fillRect(-44, -21 + i * 12, 2, 2);
        ctx.fillRect(42, -21 + i * 12, 2, 2);
      }

      // Front cockpit canopy (multiple windscreen panels)
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.moveTo(-28, 50);
      ctx.lineTo(-30, 62);
      ctx.lineTo(30, 62);
      ctx.lineTo(28, 50);
      ctx.closePath();
      ctx.fill();
      // Tinted glass
      const cgG = ctx.createLinearGradient(0, 50, 0, 62);
      cgG.addColorStop(0, '#88ccff');
      cgG.addColorStop(1, '#1a3a55');
      ctx.fillStyle = cgG;
      ctx.beginPath();
      ctx.moveTo(-26, 52);
      ctx.lineTo(-28, 60);
      ctx.lineTo(28, 60);
      ctx.lineTo(26, 52);
      ctx.closePath();
      ctx.fill();
      // Cockpit divider bars
      ctx.strokeStyle = '#0a0a0a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-10, 52); ctx.lineTo(-10, 60);
      ctx.moveTo(10, 52); ctx.lineTo(10, 60);
      ctx.stroke();

      // Nose chin gun turret
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(0, 62, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(-1, 64, 2, 4);

      // Rear ramp detail
      ctx.fillStyle = '#1a1f0a';
      ctx.fillRect(-15, -64, 30, 4);
      ctx.strokeStyle = '#3a4a20';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-15, -64); ctx.lineTo(15, -64);
      ctx.stroke();

      // Landing skids (gear) — visible thin lines
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-30, 30); ctx.lineTo(-30, 55);
      ctx.moveTo(30, 30); ctx.lineTo(30, 55);
      ctx.stroke();
      // Skid struts
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-30, 32); ctx.lineTo(-20, 25);
      ctx.moveTo(-30, 50); ctx.lineTo(-20, 45);
      ctx.moveTo(30, 32); ctx.lineTo(20, 25);
      ctx.moveTo(30, 50); ctx.lineTo(20, 45);
      ctx.stroke();

      // ── TANDEM ROTORS (counter-rotating, front + rear)
      // Front rotor (at nose end, y = +35)
      const rotF = boss.t * 0.055;
      drawRotor(0, 35, 52, rotF, '#0a0a0a', 0.22);
      // Rear rotor (at tail end, y = -30) — rotates opposite direction
      const rotR = -boss.t * 0.055;
      drawRotor(0, -30, 52, rotR, '#0a0a0a', 0.22);

      // Rotor support pylons (raised housing where rotors sit)
      ctx.fillStyle = '#3a4a25';
      ctx.fillRect(-8, 30, 16, 10);     // front pylon base
      ctx.fillRect(-8, -38, 16, 10);    // rear pylon base
      ctx.fillStyle = '#1a1f0a';
      ctx.fillRect(-3, 32, 6, 6);
      ctx.fillRect(-3, -36, 6, 6);

      // Warning red lights (flashing)
      const blinkOn = Math.floor(boss.t / 300) % 2 === 0;
      if (blinkOn) {
        ctx.fillStyle = '#ff2a2a';
        ctx.beginPath();
        ctx.arc(-45, 0, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(45, 0, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (boss.type === 'bomber') {
      const g = ctx.createLinearGradient(0, -25, 0, 25);
      g.addColorStop(0, '#5a5a6a');
      g.addColorStop(0.5, '#2a2a35');
      g.addColorStop(1, '#0e0e15');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(0, 28);
      ctx.lineTo(-65, 8);
      ctx.lineTo(-30, -22);
      ctx.lineTo(30, -22);
      ctx.lineTo(65, 8);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#7a7a90';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // cockpit slit
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(-14, -4, 28, 3);
      // engines
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(-50, 18, 8, 6);
      ctx.fillRect(42, 18, 8, 6);
      const flicker = (Math.sin(boss.t * 0.03) + 1) * 4;
      ctx.fillStyle = 'rgba(255, 170, 60, 0.7)';
      ctx.fillRect(-50, 24, 8, flicker);
      ctx.fillRect(42, 24, 8, flicker);
    } else if (boss.type === 'mothership') {
      // outer ring
      const g = ctx.createRadialGradient(0, 0, 20, 0, 0, 90);
      g.addColorStop(0, '#aaccff');
      g.addColorStop(0.5, '#5566aa');
      g.addColorStop(1, '#1a1a3a');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, 90, 32, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#66aaff';
      ctx.lineWidth = 2;
      ctx.stroke();
      // dome
      const dg = ctx.createRadialGradient(-6, -6, 2, 0, 0, 26);
      dg.addColorStop(0, '#ffffff');
      dg.addColorStop(1, '#3366aa');
      ctx.fillStyle = dg;
      ctx.beginPath();
      ctx.ellipse(0, -8, 30, 20, 0, 0, Math.PI * 2);
      ctx.fill();
      // lights around rim
      const lightPhase = boss.t * 0.005;
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        const lx = Math.cos(a) * 82;
        const ly = Math.sin(a) * 28;
        ctx.fillStyle = (Math.sin(lightPhase + i) > 0) ? '#ffff66' : '#ff66ff';
        ctx.beginPath();
        ctx.arc(lx, ly, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      // glow
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.arc(0, 8, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (boss.type === 'stormcarrier') {
      // ── L4 Storm Carrier: kapal udara raksasa, sayap lebar, percikan kilat
      const g = ctx.createLinearGradient(0, -30, 0, 30);
      g.addColorStop(0, '#3a4055');
      g.addColorStop(0.5, '#5a6580');
      g.addColorStop(1, '#1a2030');
      ctx.fillStyle = g;
      // Body utama (lozenge / diamond memanjang)
      ctx.beginPath();
      ctx.moveTo(0, 38);             // nose ke bawah
      ctx.lineTo(50, 18);
      ctx.lineTo(85, 0);             // sayap kanan
      ctx.lineTo(50, -10);
      ctx.lineTo(20, -38);           // ekor
      ctx.lineTo(-20, -38);
      ctx.lineTo(-50, -10);
      ctx.lineTo(-85, 0);            // sayap kiri
      ctx.lineTo(-50, 18);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#1a1a2a';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Garis tengah (chassis)
      ctx.strokeStyle = '#aaccff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -30); ctx.lineTo(0, 30);
      ctx.stroke();
      // Cockpit canopy bawah
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.ellipse(0, 20, 8, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#3a5577';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Sayap pod (gun mount kiri & kanan)
      ctx.fillStyle = '#222';
      ctx.fillRect(-90, -4, 14, 8);
      ctx.fillRect(76, -4, 14, 8);
      // Lampu kilat di hujung sayap (flicker)
      const flick = Math.floor(boss.t / 120) % 2 === 0;
      ctx.fillStyle = flick ? '#aaeeff' : '#5577aa';
      ctx.beginPath(); ctx.arc(-85, 0, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(85, 0, 4, 0, Math.PI * 2); ctx.fill();
      if (flick) {
        ctx.shadowColor = '#aaeeff';
        ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(-85, 0, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(85, 0, 3, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
      }
      // 4 propeller besar di sudut (animated)
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      const prot = boss.t * 0.05;
      [[-55, -18], [55, -18], [-55, 18], [55, 18]].forEach(([px, py]) => {
        ctx.beginPath();
        ctx.arc(px, py, 12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(80,80,100,0.4)';
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(px - 10 * Math.cos(prot), py - 10 * Math.sin(prot));
        ctx.lineTo(px + 10 * Math.cos(prot), py + 10 * Math.sin(prot));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px - 10 * Math.sin(prot), py + 10 * Math.cos(prot));
        ctx.lineTo(px + 10 * Math.sin(prot), py - 10 * Math.cos(prot));
        ctx.stroke();
      });
      // Sparkle effect (electric arcs sekitar body)
      if (Math.random() < 0.4) {
        ctx.strokeStyle = `rgba(170, 230, 255, ${0.5 + Math.random() * 0.5})`;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          const sx = (Math.random() - 0.5) * 100;
          const sy = (Math.random() - 0.5) * 50;
          ctx.moveTo(sx, sy);
          ctx.lineTo(sx + (Math.random() - 0.5) * 20, sy + (Math.random() - 0.5) * 14);
          ctx.stroke();
        }
      }
    } else if (boss.type === 'icedreadnought') {
      // ── L5 Ice Dreadnought: kapal perang ais besar, multi-fasa
      const enraged = boss.enraged;
      const hullColor1 = enraged ? '#ff5577' : '#aaccff';   // bila berang, merah-pink (overheating ais)
      const hullColor2 = enraged ? '#7a2236' : '#4a6a8a';
      const hullColor3 = enraged ? '#3a0a18' : '#1a3050';

      // Body utama (kapal panjang)
      const g = ctx.createLinearGradient(0, -55, 0, 55);
      g.addColorStop(0, hullColor1);
      g.addColorStop(0.5, hullColor2);
      g.addColorStop(1, hullColor3);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(-30, -55);
      ctx.lineTo(30, -55);
      ctx.lineTo(60, -30);
      ctx.lineTo(80, 0);
      ctx.lineTo(60, 40);
      ctx.lineTo(0, 55);          // nose ke bawah (hadapan kapal)
      ctx.lineTo(-60, 40);
      ctx.lineTo(-80, 0);
      ctx.lineTo(-60, -30);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = enraged ? '#ffaabb' : '#cce4ff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Lapisan ais (ice cracks pattern)
      ctx.strokeStyle = enraged ? '#ffcccc' : '#e0f0ff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-50, -20); ctx.lineTo(-20, 0); ctx.lineTo(-40, 20);
      ctx.moveTo(50, -20); ctx.lineTo(20, 0); ctx.lineTo(40, 20);
      ctx.moveTo(-10, -40); ctx.lineTo(10, -20);
      ctx.stroke();

      // Cannon utama di hadapan (nose)
      ctx.fillStyle = '#0a1a2a';
      ctx.fillRect(-8, 40, 16, 18);
      ctx.fillStyle = enraged ? '#ff8888' : '#88ccff';
      ctx.fillRect(-3, 48, 6, 12);
      // Bersinar bila enraged
      if (enraged) {
        ctx.shadowColor = '#ff5577';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(0, 55, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // 4 turret samping
      const turretPositions = [[-50, 10], [50, 10], [-40, -20], [40, -20]];
      for (const [tx, ty] of turretPositions) {
        ctx.fillStyle = '#1a2a3a';
        ctx.beginPath();
        ctx.arc(tx, ty, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#6a8aaa';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Turret barrel (point toward bottom = ke arah player)
        ctx.fillStyle = '#0a1a2a';
        ctx.fillRect(tx - 1.5, ty, 3, 8);
      }

      // Command tower / bridge atas (rear)
      ctx.fillStyle = enraged ? '#aa3050' : '#3a5577';
      ctx.fillRect(-15, -50, 30, 20);
      ctx.strokeStyle = '#cce4ff';
      ctx.lineWidth = 1;
      ctx.strokeRect(-15, -50, 30, 20);
      // Window strip
      ctx.fillStyle = '#ffd24d';
      for (let i = -2; i <= 2; i++) ctx.fillRect(i * 5 - 1, -42, 3, 2);

      // Engine exhaust (rear) — biru ais / merah bila enraged
      const exhaustColor = enraged ? '#ff6699' : '#aaeeff';
      ctx.fillStyle = exhaustColor;
      ctx.fillRect(-20, -55, 6, 6);
      ctx.fillRect(14, -55, 6, 6);
      ctx.shadowColor = exhaustColor;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(-17, -58, 3, 0, Math.PI * 2);
      ctx.arc(17, -58, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Tanda fasa: lampu kelip bahaya bila enraged
      if (enraged && Math.floor(boss.t / 200) % 2 === 0) {
        ctx.fillStyle = '#ff2244';
        ctx.beginPath();
        ctx.arc(-65, 5, 3, 0, Math.PI * 2);
        ctx.arc(65, 5, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();

    // Boss HP bar (top of screen)
    const barW = W - 80;
    const pct = Math.max(0, boss.hp / boss.maxHp);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(36, 50, barW + 4, 12);
    ctx.fillStyle = '#330000';
    ctx.fillRect(38, 52, barW, 8);
    const grad = ctx.createLinearGradient(38, 0, 38 + barW, 0);
    grad.addColorStop(0, '#ff3333');
    grad.addColorStop(1, '#ff8800');
    ctx.fillStyle = grad;
    ctx.fillRect(38, 52, barW * pct, 8);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', W / 2, 47);
  }

  // ============================================================
  // BULLETS, POWERUPS, PARTICLES
  // ============================================================
  function updateBullets(dt) {
    for (let i = pBullets.length - 1; i >= 0; i--) {
      const b = pBullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.y < -10 || b.x < -10 || b.x > W + 10) pBullets.splice(i, 1);
    }
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.split !== undefined) {
        b.split -= dt;
        if (b.split <= 0) {
          // split into 3
          const sp = Math.hypot(b.vx, b.vy);
          const baseA = Math.atan2(b.vy, b.vx);
          eBullets.push({ x: b.x, y: b.y, vx: Math.cos(baseA - 0.3) * sp, vy: Math.sin(baseA - 0.3) * sp, r: 4, dmg: b.dmg, kind: 'e' });
          eBullets.push({ x: b.x, y: b.y, vx: Math.cos(baseA + 0.3) * sp, vy: Math.sin(baseA + 0.3) * sp, r: 4, dmg: b.dmg, kind: 'e' });
          eBullets.splice(i, 1);
          continue;
        }
      }
      if (b.y < -10 || b.y > H + 10 || b.x < -10 || b.x > W + 10) eBullets.splice(i, 1);
    }
  }

  function drawBullets() {
    for (const b of pBullets) {
      ctx.fillStyle = '#aef0ff';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r + 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r - 1, 0, Math.PI * 2);
      ctx.fill();
    }
    for (const b of eBullets) {
      ctx.fillStyle = 'rgba(255, 80, 60, 0.6)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r + 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function spawnPowerup(x, y) {
    powerups.push({ x, y, vy: 0.1, r: 12, t: 0 });
  }

  function updatePowerups(dt) {
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += p.vy * dt;
      p.t += dt;
      if (p.y > H + 20) powerups.splice(i, 1);
    }
  }

  function drawPowerups() {
    for (const p of powerups) {
      const pulse = 1 + Math.sin(p.t * 0.008) * 0.15;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.scale(pulse, pulse);
      const g = ctx.createRadialGradient(0, 0, 2, 0, 0, 14);
      g.addColorStop(0, '#fff');
      g.addColorStop(0.4, '#ffe066');
      g.addColorStop(1, '#ff8800');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('P', 0, 0);
      ctx.restore();
    }
  }

  function spawnExplosion(x, y, color = '#ff8844', count = 14) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.05 + Math.random() * 0.25;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 400 + Math.random() * 300,
        maxLife: 700,
        color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.0002 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ── L4 Storm: lightning hazard yang menyambar dari atas (alam, bukan musuh)
  function updateLightning(dt) {
    if (level !== 4) return;
    nextLightning -= dt;
    if (nextLightning <= 0) {
      // Spawn 1-2 bolts at random x
      const count = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) {
        lightningHazards.push({
          x: 40 + Math.random() * (W - 80),
          t: 0,
          life: 700,
          // pre-compute jagged path so it looks consistent (re-jitter every few frames for animation)
          path: null,
          pathTimer: 0
        });
      }
      cloudFlash = 1;
      SFX.thunder();
      nextLightning = 2200 + Math.random() * 2500;
    }
    for (let i = lightningHazards.length - 1; i >= 0; i--) {
      const h = lightningHazards[i];
      h.t += dt;
      h.pathTimer -= dt;
      if (!h.path || h.pathTimer <= 0) {
        h.path = [];
        let x = h.x, y = 0;
        while (y < H) {
          h.path.push([x, y]);
          y += 18 + Math.random() * 24;
          x = h.x + (Math.random() - 0.5) * 28;
        }
        h.pathTimer = 60;
      }
      if (h.t > h.life) lightningHazards.splice(i, 1);
    }
    // Damage check — strike is dangerous between t=120..360 (mid of lifetime)
    if (player && player.invuln <= 0) {
      for (const h of lightningHazards) {
        if (h.t > 120 && h.t < 360) {
          // Hit if player is within ±14 px of bolt center
          if (Math.abs(player.x - h.x) < 14 && player.y > 30) {
            player.health -= 25;
            player.flashTimer = 250;
            spawnExplosion(player.x, player.y, '#bbeeff', 16);
            // Move bolt away to avoid re-hit
            h.t = 400;
            if (player.health <= 0) { loseLife(); break; }
          }
        }
      }
    }
  }

  function drawLightning() {
    if (level !== 4 || !lightningHazards.length) return;
    for (const h of lightningHazards) {
      let alpha = 1;
      if (h.t < 80) alpha = h.t / 80;          // fade in
      else if (h.t > 360) alpha = Math.max(0, (h.life - h.t) / (h.life - 360));
      alpha = Math.max(0, Math.min(1, alpha));
      // Glow outer
      ctx.strokeStyle = `rgba(170, 220, 255, ${alpha * 0.4})`;
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i < h.path.length; i++) {
        const [px, py] = h.path[i];
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      // Bright core
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let i = 0; i < h.path.length; i++) {
        const [px, py] = h.path[i];
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.max(0, Math.min(1, p.life / p.maxLife));
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // COLLISIONS
  // ============================================================
  function circleHit(a, b, ra, rb) {
    const dx = a.x - b.x, dy = a.y - b.y;
    const rr = (ra + rb);
    return dx * dx + dy * dy < rr * rr;
  }

  function checkCollisions() {
    // Player bullets vs enemies
    for (let i = pBullets.length - 1; i >= 0; i--) {
      const b = pBullets[i];
      let hit = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (circleHit(b, e, b.r, e.r)) {
          e.hp -= b.dmg;
          spawnExplosion(b.x, b.y, '#aef0ff', 4);
          if (e.hp <= 0) {
            score += e.points;
            spawnExplosion(e.x, e.y, '#ff8844', 16);
            SFX.enemyExplode();
            if (Math.random() < e.drop) spawnPowerup(e.x, e.y);
            enemies.splice(j, 1);
          }
          hit = true;
          break;
        }
      }
      if (hit) { pBullets.splice(i, 1); continue; }
      // vs boss
      if (boss && boss.phase === 'fight') {
        const dx = b.x - boss.x, dy = b.y - boss.y;
        if (Math.abs(dx) < boss.w / 2 && Math.abs(dy) < boss.h / 2) {
          boss.hp -= b.dmg;
          spawnExplosion(b.x, b.y, '#aef0ff', 3);
          pBullets.splice(i, 1);
          if (boss.hp <= 0) onBossDefeated();
        }
      }
    }

    if (!player || player.invuln > 0) {
      // still allow bullet-vs-enemy hits but no player damage
    } else {
      // Enemy bullets vs player
      for (let i = eBullets.length - 1; i >= 0; i--) {
        const b = eBullets[i];
        if (circleHit(b, player, b.r, player.r - 4)) {
          player.health -= b.dmg;
          player.flashTimer = 200;
          spawnExplosion(b.x, b.y, '#ff6644', 6);
          eBullets.splice(i, 1);
          if (player.health <= 0) { loseLife(); return; }
        }
      }
      // Enemy body vs player
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (circleHit(e, player, e.r, player.r - 2)) {
          player.health -= 25;
          spawnExplosion(e.x, e.y, '#ff8844', 12);
          SFX.enemyExplode();
          enemies.splice(j, 1);
          player.flashTimer = 250;
          if (player.health <= 0) { loseLife(); return; }
        }
      }
    }

    // Powerups vs player
    if (player && player.invuln <= 0) {
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        if (circleHit(p, player, p.r, player.r)) {
          if (player.weaponLevel < 3) player.weaponLevel++;
          else { score += 200; player.health = Math.min(player.maxHealth, player.health + 25); }
          SFX.powerup();
          powerups.splice(i, 1);
        }
      }
    }
  }

  function onBossDefeated() {
    score += boss.points;
    spawnExplosion(boss.x, boss.y, '#ffeeaa', 50);
    spawnExplosion(boss.x - 20, boss.y + 10, '#ff8844', 30);
    spawnExplosion(boss.x + 20, boss.y - 10, '#ff4400', 30);
    SFX.bossDefeat();
    SFX.levelClear();
    screenShake = 30;
    boss = null;
    eBullets.length = 0;
    enemies.length = 0;
    transitionTimer = 3000;
    state = 'transition';
  }

  // ============================================================
  // BACKGROUNDS  (per-level scrolling)
  // ============================================================
  function drawBackgroundLevel1() {
    // Sky / upper atmosphere fade
    const skyG = ctx.createLinearGradient(0, 0, 0, H);
    skyG.addColorStop(0, '#0c1f3d');
    skyG.addColorStop(0.45, '#13346b');
    skyG.addColorStop(0.55, '#0e3a6e');
    skyG.addColorStop(1, '#0a223f');
    ctx.fillStyle = skyG;
    ctx.fillRect(0, 0, W, H);

    // Distant city skyline (scrolls slowly)
    const off1 = (bgOffset * 0.4) % 200;
    ctx.fillStyle = '#3a2814';
    for (let band = -1; band <= Math.ceil(H / 200) + 1; band++) {
      const baseY = band * 200 + off1;
      // building silhouette strip
      let x = 0;
      while (x < W) {
        const bw = 18 + ((x * 13 + band * 7) % 28);
        const bh = 16 + ((x * 7 + band * 11) % 24);
        ctx.fillRect(x, baseY, bw, bh);
        x += bw + 1;
      }
    }
    // Mid-layer harbor / piers
    const off2 = (bgOffset * 0.7) % 160;
    ctx.fillStyle = '#5a4226';
    for (let band = -1; band <= Math.ceil(H / 160) + 1; band++) {
      const baseY = band * 160 + off2;
      ctx.fillRect(0, baseY, 70, 14);
      ctx.fillRect(W - 90, baseY + 60, 90, 16);
      ctx.fillStyle = '#7a5d34';
      ctx.fillRect(20, baseY + 20, 30, 6);
      ctx.fillRect(W - 50, baseY + 80, 30, 6);
      ctx.fillStyle = '#5a4226';
    }

    // Water highlights (foreground)
    ctx.fillStyle = 'rgba(120, 200, 240, 0.15)';
    const off3 = (bgOffset * 1.2) % 40;
    for (let y = -off3; y < H; y += 40) {
      ctx.fillRect(0, y, W, 1);
    }
    ctx.fillStyle = 'rgba(255, 255, 255, 0.07)';
    for (let y = -off3; y < H; y += 40) {
      for (let x = (y * 13) % 70; x < W; x += 80) {
        ctx.fillRect(x, y + 8, 14, 1);
      }
    }
  }

  function drawBackgroundLevel2() {
    // Sandy gradient sky
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#5a2a10');
    g.addColorStop(0.5, '#a0571f');
    g.addColorStop(1, '#d18843');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Canyon walls left and right with scrolling rock layers
    const off1 = (bgOffset * 0.5) % 120;
    ctx.fillStyle = '#7a3c10';
    for (let band = -1; band <= Math.ceil(H / 120) + 1; band++) {
      const baseY = band * 120 + off1;
      // Left wall jagged
      ctx.beginPath();
      ctx.moveTo(0, baseY);
      ctx.lineTo(60, baseY + 20);
      ctx.lineTo(40, baseY + 60);
      ctx.lineTo(70, baseY + 100);
      ctx.lineTo(0, baseY + 120);
      ctx.closePath();
      ctx.fill();
      // Right wall jagged
      ctx.beginPath();
      ctx.moveTo(W, baseY);
      ctx.lineTo(W - 70, baseY + 30);
      ctx.lineTo(W - 50, baseY + 70);
      ctx.lineTo(W - 80, baseY + 110);
      ctx.lineTo(W, baseY + 120);
      ctx.closePath();
      ctx.fill();
    }
    // Detail rocks scattered in canyon floor
    ctx.fillStyle = '#6a2e0a';
    const off2 = (bgOffset * 0.8) % 100;
    for (let band = -1; band <= Math.ceil(H / 100) + 1; band++) {
      const baseY = band * 100 + off2;
      for (let i = 0; i < 4; i++) {
        const rx = 100 + ((i * 67 + band * 31) % (W - 200));
        const ry = baseY + ((i * 13) % 80);
        ctx.fillRect(rx, ry, 18, 8);
      }
    }
    // Dust particles
    ctx.fillStyle = 'rgba(255, 220, 160, 0.18)';
    const off3 = (bgOffset * 1.4) % 50;
    for (let y = -off3; y < H; y += 50) {
      for (let x = (y * 7) % 90; x < W; x += 110) {
        ctx.fillRect(x, y + 12, 3, 3);
      }
    }
  }

  function drawBackgroundLevel3() {
    // Deep space
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0a0518');
    g.addColorStop(0.5, '#1a0a35');
    g.addColorStop(1, '#050015');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Nebula blobs
    const neb = (bgOffset * 0.1) % H;
    for (let i = 0; i < 4; i++) {
      const cy = (i * H / 4 + neb) % H;
      const cx = (i % 2) * (W - 100) + 80;
      const nGrad = ctx.createRadialGradient(cx, cy, 5, cx, cy, 120);
      nGrad.addColorStop(0, 'rgba(180, 80, 200, 0.4)');
      nGrad.addColorStop(0.5, 'rgba(80, 50, 160, 0.2)');
      nGrad.addColorStop(1, 'rgba(30, 10, 60, 0)');
      ctx.fillStyle = nGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, 120, 0, Math.PI * 2);
      ctx.fill();
    }

    // Stars (parallax)
    for (const s of stars) {
      s.y += s.speed * 16;
      s.twinkle += 0.03;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
      const tw = 0.7 + 0.3 * Math.sin(s.twinkle);
      ctx.fillStyle = `rgba(255, 255, 255, ${tw})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
  }

  function drawBackgroundLevel4() {
    // Storm — dark base + scrolling cloud layers + occasional bright flash overlay
    const baseG = ctx.createLinearGradient(0, 0, 0, H);
    baseG.addColorStop(0, '#0a0a1a');
    baseG.addColorStop(0.5, '#1a1828');
    baseG.addColorStop(1, '#08081a');
    ctx.fillStyle = baseG;
    ctx.fillRect(0, 0, W, H);

    // Dark cloud layers (3 parallax depths)
    const off1 = (bgOffset * 0.3) % 180;
    ctx.fillStyle = 'rgba(40, 38, 60, 0.55)';
    for (let band = -1; band <= Math.ceil(H / 180) + 1; band++) {
      const baseY = band * 180 + off1;
      // Cloud "puffs"
      for (let i = 0; i < 5; i++) {
        const cx = (i * 90 + (band * 47)) % W;
        const cy = baseY + ((i * 17) % 80);
        ctx.beginPath();
        ctx.ellipse(cx, cy, 50, 22, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    const off2 = (bgOffset * 0.7) % 140;
    ctx.fillStyle = 'rgba(70, 65, 95, 0.45)';
    for (let band = -1; band <= Math.ceil(H / 140) + 1; band++) {
      const baseY = band * 140 + off2;
      for (let i = 0; i < 4; i++) {
        const cx = ((i * 110 + band * 33) % (W + 100)) - 50;
        const cy = baseY + ((i * 23) % 60);
        ctx.beginPath();
        ctx.ellipse(cx, cy, 60, 26, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Raindrop streaks (foreground)
    ctx.strokeStyle = 'rgba(170, 200, 230, 0.18)';
    ctx.lineWidth = 1;
    const off3 = (bgOffset * 2.5) % 30;
    for (let y = -off3; y < H; y += 30) {
      for (let x = (y * 7) % 50; x < W; x += 70) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x - 3, y + 12);
        ctx.stroke();
      }
    }
    // Lightning flash overlay (whole screen brief flash)
    if (cloudFlash > 0) {
      ctx.fillStyle = `rgba(220, 230, 255, ${cloudFlash * 0.4})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawBackgroundLevel5() {
    // Arctic — icy blue gradient + glacier silhouettes + falling snow
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a3a55');
    g.addColorStop(0.5, '#3a6a8a');
    g.addColorStop(1, '#88ccdd');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Glacier walls (jagged ice formations on sides)
    const off1 = (bgOffset * 0.4) % 130;
    ctx.fillStyle = '#cce4ff';
    for (let band = -1; band <= Math.ceil(H / 130) + 1; band++) {
      const baseY = band * 130 + off1;
      // Left jagged
      ctx.beginPath();
      ctx.moveTo(0, baseY);
      ctx.lineTo(40, baseY + 30);
      ctx.lineTo(20, baseY + 70);
      ctx.lineTo(50, baseY + 110);
      ctx.lineTo(0, baseY + 130);
      ctx.closePath();
      ctx.fill();
      // Right jagged
      ctx.beginPath();
      ctx.moveTo(W, baseY);
      ctx.lineTo(W - 50, baseY + 35);
      ctx.lineTo(W - 30, baseY + 75);
      ctx.lineTo(W - 60, baseY + 115);
      ctx.lineTo(W, baseY + 130);
      ctx.closePath();
      ctx.fill();
    }
    // Inner ice highlights
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    for (let band = -1; band <= Math.ceil(H / 130) + 1; band++) {
      const baseY = band * 130 + off1;
      ctx.beginPath();
      ctx.moveTo(15, baseY + 10);
      ctx.lineTo(30, baseY + 40);
      ctx.lineTo(15, baseY + 50);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(W - 15, baseY + 20);
      ctx.lineTo(W - 35, baseY + 50);
      ctx.lineTo(W - 15, baseY + 60);
      ctx.closePath();
      ctx.fill();
    }
    // Frozen ground details
    ctx.fillStyle = 'rgba(200, 230, 255, 0.25)';
    const off2 = (bgOffset * 0.9) % 80;
    for (let band = -1; band <= Math.ceil(H / 80) + 1; band++) {
      const baseY = band * 80 + off2;
      for (let i = 0; i < 3; i++) {
        const rx = 90 + ((i * 97 + band * 41) % (W - 180));
        ctx.fillRect(rx, baseY + 30, 18, 4);
      }
    }
    // Snowflakes (animated)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    for (const sf of snowflakes) {
      sf.x += sf.vx * 16 + Math.sin(sf.sway) * 0.3;
      sf.y += sf.vy * 16;
      sf.sway += 0.02;
      if (sf.y > H) { sf.y = -5; sf.x = Math.random() * W; }
      if (sf.x < 0) sf.x = W;
      if (sf.x > W) sf.x = 0;
      ctx.beginPath();
      ctx.arc(sf.x, sf.y, sf.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawBackground() {
    if (level === 1) drawBackgroundLevel1();
    else if (level === 2) drawBackgroundLevel2();
    else if (level === 3) drawBackgroundLevel3();
    else if (level === 4) drawBackgroundLevel4();
    else drawBackgroundLevel5();
  }

  // ============================================================
  // HUD
  // ============================================================
  function drawHUD() {
    // Top strip
    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
    ctx.fillRect(0, 0, W, 36);
    ctx.fillStyle = '#00e5ff';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('SCORE ' + String(score).padStart(6, '0'), 10, 11);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd24d';
    ctx.fillText('LEVEL ' + level, W / 2, 11);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#ff6688';
    let livesStr = '';
    for (let i = 0; i < lives; i++) livesStr += '♦ ';
    ctx.fillText('LIVES ' + livesStr.trim(), W - 10, 11);

    // Health bar (bottom)
    const barW = 220;
    const barX = (W - barW) / 2;
    const barY = H - 28;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, 14);
    ctx.fillStyle = '#330000';
    ctx.fillRect(barX, barY, barW, 10);
    const hp = Math.max(0, player ? player.health / player.maxHealth : 0);
    const hGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    hGrad.addColorStop(0, '#ff3344');
    hGrad.addColorStop(0.5, '#ffaa00');
    hGrad.addColorStop(1, '#44ff66');
    ctx.fillStyle = hGrad;
    ctx.fillRect(barX, barY, barW * hp, 10);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, 10);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('SHIELD', W / 2, barY - 12);

    // Weapon level pip
    ctx.textAlign = 'left';
    ctx.fillStyle = '#aef0ff';
    ctx.fillText('WPN ' + (player ? player.weaponLevel : 1), 10, H - 16);

    // Level start banner
    if (levelStartFlash > 0) {
      const a = Math.min(1, levelStartFlash / 1500);
      ctx.fillStyle = 'rgba(0, 0, 0, ' + (a * 0.6) + ')';
      ctx.fillRect(0, H / 2 - 50, W, 100);
      ctx.fillStyle = 'rgba(255, 210, 77, ' + a + ')';
      ctx.font = 'bold 28px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('LEVEL ' + level, W / 2, H / 2 - 14);
      ctx.fillStyle = 'rgba(0, 229, 255, ' + a + ')';
      ctx.font = 'bold 14px Courier New';
      const names = ['CITY & COASTAL HARBOR', 'DESERT CANYON', 'EDGE OF SPACE', 'THUNDERSTORM', 'ARCTIC GLACIER'];
      ctx.fillText(names[level - 1], W / 2, H / 2 + 16);
    }
  }

  function drawDemoJet(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1.5, 1.5);
    const wGrad = ctx.createLinearGradient(-22, 0, 22, 0);
    wGrad.addColorStop(0, '#5a7aa8');
    wGrad.addColorStop(0.5, '#cfd8e8');
    wGrad.addColorStop(1, '#5a7aa8');
    ctx.fillStyle = wGrad;
    ctx.beginPath();
    ctx.moveTo(-22, 6); ctx.lineTo(-8, -2); ctx.lineTo(-4, 10); ctx.lineTo(-18, 14); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22, 6); ctx.lineTo(8, -2); ctx.lineTo(4, 10); ctx.lineTo(18, 14); ctx.closePath(); ctx.fill();
    const bGrad = ctx.createLinearGradient(-8, -16, 8, 16);
    bGrad.addColorStop(0, '#3a5d99'); bGrad.addColorStop(0.5, '#6aa8ff'); bGrad.addColorStop(1, '#1b3060');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.moveTo(0, -20); ctx.lineTo(7, -4); ctx.lineTo(9, 12); ctx.lineTo(-9, 12); ctx.lineTo(-7, -4); ctx.closePath();
    ctx.fill();
    const cGrad = ctx.createRadialGradient(0, -6, 1, 0, -6, 6);
    cGrad.addColorStop(0, '#cfeaff'); cGrad.addColorStop(1, '#1a4a8a');
    ctx.fillStyle = cGrad;
    ctx.beginPath();
    ctx.ellipse(0, -6, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawVictoryScreen() {
    ctx.fillStyle = 'rgba(0, 0, 30, 0.7)';
    ctx.fillRect(0, 0, W, H);
    // fireworks update
    if (Math.random() < 0.08) {
      const fx = 60 + Math.random() * (W - 120);
      const fy = 80 + Math.random() * (H * 0.5);
      const colors = ['#ffd24d', '#ff66bb', '#66ffaa', '#66bbff', '#ff8844'];
      const c = colors[Math.floor(Math.random() * colors.length)];
      for (let i = 0; i < 20; i++) {
        const a = (i / 20) * Math.PI * 2;
        const sp = 0.15 + Math.random() * 0.15;
        fireworks.push({
          x: fx, y: fy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          life: 800 + Math.random() * 400, maxLife: 1200, color: c, size: 2.5
        });
      }
    }
    for (let i = fireworks.length - 1; i >= 0; i--) {
      const p = fireworks[i];
      p.x += p.vx * 16;
      p.y += p.vy * 16;
      p.vy += 0.005;
      p.life -= 16;
      if (p.life <= 0) { fireworks.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd24d';
    ctx.shadowColor = '#ffd24d';
    ctx.shadowBlur = 24;
    ctx.font = 'bold 26px Courier New';
    ctx.fillText('CONGRATULATIONS!', W / 2, H / 2 - 80);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#00e5ff';
    ctx.font = 'bold 18px Courier New';
    ctx.fillText('ALL MISSIONS CLEAR!', W / 2, H / 2 - 40);
    ctx.fillStyle = '#fff';
    ctx.font = '14px Courier New';
    ctx.fillText('Homework Done,', W / 2, H / 2);
    ctx.fillText('World Saved!', W / 2, H / 2 + 22);
    ctx.fillStyle = '#ffd24d';
    ctx.font = 'bold 14px Courier New';
    ctx.fillText('FINAL SCORE: ' + score, W / 2, H / 2 + 60);
    const blinkOn = Math.floor(performance.now() / 400) % 2 === 0;
    if (blinkOn) {
      ctx.fillStyle = '#00ff88';
      ctx.font = '14px Courier New';
      ctx.fillText("Press 'R' to fly again", W / 2, H / 2 + 110);
    }
  }

  // ============================================================
  // UPDATE / RENDER
  // ============================================================
  function update(dt) {
    bgOffset += dt * 0.06;
    if (levelStartFlash > 0) levelStartFlash -= dt;
    if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 0.04);
    if (cloudFlash > 0) cloudFlash = Math.max(0, cloudFlash - dt * 0.005);

    if (state === 'playing') {
      waveTimer += dt;
      updatePlayer(dt);
      updateEnemies(dt);
      updateBoss(dt);
      updateBullets(dt);
      updatePowerups(dt);
      updateParticles(dt);
      updateLightning(dt);
      checkCollisions();

      if (!bossSpawned && waveTimer >= bossSpawnAt) {
        spawnBoss();
      }
      if (!bossSpawned) {
        lastSpawn += dt;
        if (lastSpawn >= spawnInterval) {
          lastSpawn = 0;
          spawnEnemy();
        }
      }
    } else if (state === 'transition') {
      transitionTimer -= dt;
      updateParticles(dt);
      if (transitionTimer <= 0) startNextLevel();
    } else if (state === 'gameover' || state === 'victory') {
      updateParticles(dt);
    }
  }

  function render() {
    ctx.save();
    if (screenShake > 0 && (state === 'playing' || state === 'transition')) {
      ctx.translate((Math.random() - 0.5) * screenShake * 0.5, (Math.random() - 0.5) * screenShake * 0.5);
    }

    drawBackground();

    if (state === 'start') {
      drawStartScreen();
    } else if (state === 'playing' || state === 'transition') {
      drawPowerups();
      drawEnemies();
      drawBoss();
      drawBullets();
      drawPlayer();
      drawParticles();
      drawLightning();
      drawHUD();
      if (state === 'transition') drawTransitionScreen();
    } else if (state === 'gameover') {
      drawHUD();
      drawGameOverScreen();
    } else if (state === 'victory') {
      drawVictoryScreen();
    }

    ctx.restore();
  }

  // ============================================================
  // MAIN LOOP
  // ============================================================
  let lastT = 0;
  function loop(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(50, t - lastT);
    lastT = t;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // initial starfield for start screen
  makeStars();
})();
</script>

<script src="reward-timer.js"></script>
</body>
